          const statusBd = u.suspended ? '#5C1F22' : (expired ? '#5A4818' : 'var(--accent-d)');
          const statusLabel = u.suspended ? (lang==='ar'?'موقوف':'SUSPENDED')
                            : (u.subscription_status === 'trial' && !expired) ? (lang==='ar'?'تجربة':'TRIAL')
                            : expired ? (lang==='ar'?'منتهي':'EXPIRED')
                            : (lang==='ar'?'نشط':'ACTIVE');
          return `<div style="padding:11px 13px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px">
            <div style="width:34px;height:34px;border-radius:8px;background:linear-gradient(135deg,#1A1F2E,#0E1828);color:#5BA5FF;display:grid;place-items:center;font-weight:800;font-size:14px;border:1px solid #1F3A6E33;flex-shrink:0">${esc((u.name||u.email||'?')[0].toUpperCase())}</div>
            <div style="flex:1;min-width:0">
              <div style="font-weight:700;font-size:13px;display:flex;align-items:center;gap:6px;flex-wrap:wrap">
                ${esc(u.name||u.email.split('@')[0])}
                ${u.is_admin?'<span style="font-size:8.5px;font-weight:800;padding:1px 5px;border-radius:3px;background:#1F1A0E;color:#E8B96A;border:1px solid #5A4818;letter-spacing:.05em">ADMIN</span>':''}
                <span style="font-size:8.5px;font-weight:800;padding:1px 5px;border-radius:3px;background:${statusBg};color:${statusColor};border:1px solid ${statusBd};letter-spacing:.05em">${statusLabel}</span>
              </div>
              <div style="font-size:10.5px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(u.email)}</div>
              <div style="font-size:10px;color:var(--muted2);margin-top:2px;font-variant-numeric:tabular-nums">
                ${pfCount[u.id]||0} ${lang==='ar'?'محفظة':'pf'} · ${hCount[u.id]||0} ${lang==='ar'?'سهم':'hold'}
                ${paidUntil ? ` · ${lang==='ar'?'حتى':'until'} ${paidUntil.toISOString().slice(0,10)}` : ''}
                ${daysLeft!=null && !u.suspended ? ` · <b style="color:${expired?'var(--loss)':'var(--accent)'}">${daysLeft>=0?daysLeft:0}${lang==='ar'?' يوم':'d'}</b>` : ''}
              </div>
            </div>
            ${!u.is_admin ? `<button style="background:transparent;border:1px solid var(--line2);color:var(--muted);padding:5px 9px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;flex-shrink:0" onclick="adminUserActions('${u.id}','${esc((u.name||u.email).replace(/'/g,'').slice(0,30))}','${esc(u.email)}')">${lang==='ar'?'تحكّم':'Manage'}</button>` : ''}
          </div>`;
        }).join("") || `<div style="padding:30px;text-align:center;color:var(--muted2);font-size:12px">${lang==='ar'?'لا يوجد مستخدمون':'No users'}</div>`}
      </div>
      <div class="m-actions">
        <button class="btn" onclick="closeModal()">${lang==='ar'?'إغلاق':'Close'}</button>
      </div>
    `);
  } catch(e){
    modal(`<h2>${lang==='ar'?'خطأ':'Error'}</h2>
      <p class="sub">${esc(e.message||'')}</p>
      <div class="m-actions"><button class="btn primary" onclick="closeModal()">${lang==='ar'?'إغلاق':'Close'}</button></div>`);
  }
}

async function adminUserActions(userId, userName, userEmail){
  const { data: u } = await sb.from('profiles').select('*').eq('id', userId).single();
  const { data: pfs } = await sb.from('portfolios').select('id,name').eq('user_id', userId);
  const { data: hs } = await sb.from('holdings').select('id,portfolio_id,ticker').eq('user_id', userId);
  const hByPf = {};
  (hs||[]).forEach(h => { (hByPf[h.portfolio_id] = hByPf[h.portfolio_id]||[]).push(h); });
  const today = new Date(); today.setHours(0,0,0,0);
  const paidUntil = u.subscription_paid_until ? new Date(u.subscription_paid_until) : null;
  const daysLeft = paidUntil ? Math.ceil((paidUntil - today) / 86400000) : 0;
  const noticeSeenLabel = u.notification_seen ? (lang==='ar'?'شوهد':'seen') : (lang==='ar'?'لم يُشاهد':'unseen');
  modal(`
    <h2>${esc(userName)}</h2>
    <p class="sub">${esc(userEmail)} · ${lang==='ar'?'منذ':'since'} ${u.created_at?.slice(0,10) || '—'}</p>

    <h4 style="margin:12px 0 6px;font-size:10.5px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.08em">${lang==='ar'?'الاشتراك':'Subscription'}</h4>
    <div style="background:#000;border:1px solid var(--line);border-radius:10px;padding:11px 13px;margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <span style="font-size:11.5px;color:var(--muted)">${lang==='ar'?'الحالة':'Status'}</span>
        <span style="font-size:11px;font-weight:800;color:${u.suspended?'var(--loss)':(daysLeft<=0?'var(--gold)':'var(--accent)')}">${u.suspended?(lang==='ar'?'موقوف':'SUSPENDED'):(u.subscription_status||'').toUpperCase()}</span>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <span style="font-size:11.5px;color:var(--muted)">${lang==='ar'?'بدأ':'Started'}</span>
        <span style="font-size:11.5px;font-weight:700;font-variant-numeric:tabular-nums">${u.subscription_started || '—'}</span>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <span style="font-size:11.5px;color:var(--muted)">${lang==='ar'?'مدفوع حتى':'Paid until'}</span>
        <span style="font-size:11.5px;font-weight:700;font-variant-numeric:tabular-nums">${u.subscription_paid_until || '—'}</span>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center">
        <span style="font-size:11.5px;color:var(--muted)">${lang==='ar'?'الأيام المتبقية':'Days left'}</span>
        <span style="font-size:14px;font-weight:800;color:${daysLeft<=0?'var(--loss)':daysLeft<=3?'var(--gold)':'var(--accent)'};font-variant-numeric:tabular-nums">${daysLeft<=0?0:daysLeft} ${lang==='ar'?'يوم':'days'}</span>
      </div>
    </div>

    <h4 style="margin:14px 0 6px;font-size:10.5px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.08em">${lang==='ar'?'إجراءات':'Actions'}</h4>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px">
      <button class="btn" style="background:var(--accent-bg);border-color:var(--accent-d);color:var(--accent);font-weight:700" onclick="adminRenewMonth('${userId}','${esc(userName)}','${esc(userEmail)}')">${lang==='ar'?'+ شهر مدفوع':'+ Paid month'}</button>
      <button class="btn" onclick="adminExtendDays('${userId}','${esc(userName)}','${esc(userEmail)}')">${lang==='ar'?'+ أيام مخصّصة':'+ Custom days'}</button>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px">
      <button class="btn" onclick="adminSendNotification('${userId}','${esc(userName)}','${esc(userEmail)}')">${lang==='ar'?'📢 إرسال إشعار':'📢 Send notice'}</button>
      <button class="btn ${u.suspended?'':'danger'}" style="${u.suspended?'background:var(--accent-bg);border-color:var(--accent-d);color:var(--accent);font-weight:700':''}" onclick="adminToggleSuspend('${userId}',${u.suspended?'false':'true'},'${esc(userName)}','${esc(userEmail)}')">
        ${u.suspended?(lang==='ar'?'✓ رفع الإيقاف':'✓ Unsuspend'):(lang==='ar'?'🔒 إيقاف':'🔒 Suspend')}
      </button>
    </div>
    ${u.notification ? `<div style="background:#1F1A0E;border:1px solid #5A4818;color:#FFE9B5;padding:9px 11px;border-radius:9px;font-size:11.5px;margin-top:8px">
      <div style="font-size:9.5px;color:var(--gold);font-weight:800;text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px">${lang==='ar'?'إشعار قائم':'Pending notice'} · ${noticeSeenLabel}</div>
      <div style="font-size:11px;line-height:1.5">${esc(u.notification)}</div>
      <button onclick="adminClearNotice('${userId}','${esc(userName)}','${esc(userEmail)}')" style="margin-top:6px;background:transparent;border:1px solid #5A4818;color:var(--gold);padding:3px 8px;border-radius:5px;font-size:10px;font-weight:700;cursor:pointer;font-family:inherit">${lang==='ar'?'حذف':'Clear'}</button>
    </div>` : ''}

    ${(pfs||[]).length ? `
      <h4 style="margin:14px 0 6px;font-size:10.5px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.08em">${lang==='ar'?'محافظه':'Portfolios'} (${pfs.length})</h4>
      <div style="background:#000;border:1px solid var(--line);border-radius:10px;overflow:hidden;max-height:180px;overflow-y:auto;margin-bottom:8px">
        ${pfs.map(p => {
          const ph = hByPf[p.id] || [];
          return `<div style="padding:8px 11px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:9px;font-size:11.5px">
            <div style="flex:1;min-width:0"><b>${esc(p.name)}</b> <span style="color:var(--muted);font-size:10px">· ${ph.length} ${lang==='ar'?'سهم':'hold'} · ${ph.slice(0,3).map(h=>esc(h.ticker)).join(', ')}${ph.length>3?'…':''}</span></div>
            <button class="acct-del" style="width:26px;height:26px;font-size:11px" onclick="adminDeletePfDirect('${p.id}','${esc(p.name)}','${userId}','${esc(userName)}','${esc(userEmail)}')">✕</button>
          </div>`;
        }).join('')}
      </div>
    ` : ''}

    <div class="m-actions">
      <button class="btn" onclick="openAdminPanel()">${lang==='ar'?'رجوع':'Back'}</button>
    </div>
  `);
}

async function adminRenewMonth(userId, userName, userEmail){
  const today = new Date();
  const { data: u } = await sb.from('profiles').select('subscription_paid_until,subscription_status').eq('id', userId).single();
  let base = today;
  if (u?.subscription_paid_until){
    const cur = new Date(u.subscription_paid_until);
    if (cur > today) base = cur;
  }
  const newDate = new Date(base);
  newDate.setMonth(newDate.getMonth() + 1);
  await sb.from('profiles').update({
    subscription_paid_until: newDate.toISOString().slice(0,10),
    subscription_status: 'active'
  }).eq('id', userId);
  toast(lang==='ar'?'تم تجديد الشهر':'Renewed +1 month');
  adminUserActions(userId, userName, userEmail);
}

async function adminExtendDays(userId, userName, userEmail){
  const txt = prompt(lang==='ar'?'كم يوم تبي تضيف؟':'How many days to add?', '7');
  const days = parseInt(txt);
  if (!days || days < 1) return;
  const today = new Date();
  const { data: u } = await sb.from('profiles').select('subscription_paid_until').eq('id', userId).single();
  let base = today;
  if (u?.subscription_paid_until){
    const cur = new Date(u.subscription_paid_until);
    if (cur > today) base = cur;
  }
  const newDate = new Date(base);
  newDate.setDate(newDate.getDate() + days);
  await sb.from('profiles').update({
    subscription_paid_until: newDate.toISOString().slice(0,10),
    subscription_status: 'active'
  }).eq('id', userId);
  toast(lang==='ar'?`أُضيف ${days} يوم`:`Added ${days} days`);
  adminUserActions(userId, userName, userEmail);
}

async function adminToggleSuspend(userId, suspend, userName, userEmail){
  suspend = suspend === 'true' || suspend === true;
  await sb.from('profiles').update({ suspended: suspend }).eq('id', userId);
  toast(suspend ? (lang==='ar'?'تم الإيقاف':'Suspended') : (lang==='ar'?'تم الرفع':'Unsuspended'));
  adminUserActions(userId, userName, userEmail);
}

function adminSendNotification(userId, userName, userEmail){
  modal(`
    <h2>📢 ${lang==='ar'?'إرسال إشعار':'Send notice'}</h2>
    <p class="sub">${lang==='ar'?`لـ${esc(userName)}. سيظهر له لما يدخل التطبيق.`:`To ${esc(userName)}. Shown when they open the app.`}</p>
    <textarea id="adn_t" class="notes-textarea" style="min-height:90px" placeholder="${lang==='ar'?'اكتب رسالتك...':'Write your message...'}"></textarea>
    <div class="m-actions">
      <button class="btn" onclick="adminUserActions('${userId}','${esc(userName)}','${esc(userEmail)}')">${t().cancel}</button>
      <button class="btn primary" onclick="adminSaveNotice('${userId}','${esc(userName)}','${esc(userEmail)}')">${lang==='ar'?'إرسال':'Send'}</button>
    </div>
  `);
}

async function adminSaveNotice(userId, userName, userEmail){
  const text = $("#adn_t").value.trim();
  if (!text){ return; }
  await sb.from('profiles').update({ notification: text, notification_seen: false }).eq('id', userId);
  toast(lang==='ar'?'تم الإرسال':'Sent');
  adminUserActions(userId, userName, userEmail);
}

async function adminClearNotice(userId, userName, userEmail){
  await sb.from('profiles').update({ notification: null, notification_seen: true }).eq('id', userId);
  adminUserActions(userId, userName, userEmail);
}

async function adminDeletePfDirect(pfId, pfName, userId, userName, userEmail){
  if (!confirm((lang==='ar'?`حذف "${pfName}"؟`:`Delete "${pfName}"?`))) return;
  await sb.from('portfolios').delete().eq('id', pfId);
  adminUserActions(userId, userName, userEmail);
}

async function adminViewUser(userId, userName){ return adminUserActions(userId, userName, ''); }

async function adminDeletePf(pfId, pfName, userId, userName){
  if (!confirm((lang==='ar'?`حذف محفظة "${pfName}" نهائياً؟`:`Delete "${pfName}" permanently?`))) return;
  const { error } = await sb.from('portfolios').delete().eq('id', pfId);
  if (error){ alert('Error: '+error.message); return; }
  toast(lang==='ar'?'تم الحذف':'Deleted');
  adminUserActions(userId, userName, '');
}
/* boot */
(async function(){
  const { data: { session } } = await sb.auth.getSession();
  if (session){
    currentUser = session.user;
    await loadUserProfile();
    isAdminCloud = userProfile?.is_admin === true;
    if (!isAccessBlocked()) await cloudLoadAll();
  }
  await load();
  booted = true;
  render();
  setTimeout(()=>{ try { checkAchievements(); } catch(e){} }, 800);
  setTimeout(()=>{ try { maybeShowNotification(); } catch(e){} }, 1400);

  sb.auth.onAuthStateChange(async (event, session) => {
    if (event === 'SIGNED_IN' && session && (!currentUser || currentUser.id !== session.user.id)){
      currentUser = session.user;
      await loadUserProfile();
      isAdminCloud = userProfile?.is_admin === true;
      if (!isAccessBlocked()) await cloudLoadAll();
      settings.activePf = null;
      settings.unlocked = false;
      render();
      setTimeout(()=>{ try { maybeShowNotification(); } catch(e){} }, 800);
    } else if (event === 'SIGNED_OUT'){
      currentUser = null;
      userProfile = null;
      isAdminCloud = false;
      portfolios = []; holdings = []; watchlist = []; challenges = [];
      settings.activePf = null; settings.unlocked = false;
      settings.cash = 0; settings.cashHistory = []; settings.achievements = [];
      splashShown = false;
      render();
    }
  });
})();
</script>
