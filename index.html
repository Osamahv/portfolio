<!DOCTYPE html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Circle | سيركل</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.0/dist/umd/supabase.min.js"></script>

<style>
:root{
  --bg:#000; --surf:#0A0A0A; --surf2:#141414;
  --line:#1F1F1F; --line2:#2A2A2A;
  --txt:#FFFFFF; --muted:#7A7A7A; --muted2:#525252;
  --accent:#5FE9B0; --accent-d:#1E5C44; --accent-bg:#0B2A20;
  --loss:#F26B6E; --loss-d:#5C1F22; --loss-bg:#2A0E10;
  --blue:#5BA5FF; --gold:#E8B96A;
  --r:16px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased;font-feature-settings:"tnum","ss01"}
html,body{margin:0;padding:0;background:var(--bg);color:var(--txt);font-family:"Inter",system-ui,sans-serif;line-height:1.5}
body{min-height:100vh;padding-bottom:48px}
body[dir="rtl"]{font-family:"IBM Plex Sans Arabic","Inter",system-ui,sans-serif}
.mono{font-variant-numeric:tabular-nums}
.up{color:var(--accent)} .down{color:var(--loss)}
button{font-family:inherit;cursor:pointer;border:none;color:inherit;background:none;font-size:inherit}
input,select,textarea{font-family:inherit;color:inherit}
.wrap{max-width:680px;margin:0 auto;padding:14px 18px 0}

/* top bar */
.top{display:flex;align-items:center;justify-content:space-between;padding:6px 0 22px;gap:8px}
.pf-pill{display:inline-flex;align-items:center;gap:8px;background:var(--surf);border:1px solid var(--line);padding:7px 14px;border-radius:999px;font-size:13px;font-weight:600;color:var(--txt);max-width:55%;transition:.15s}
.pf-pill:hover{border-color:var(--line2);background:var(--surf2)}
.pf-pill .dot{width:6px;height:6px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 3px rgba(95,233,176,.14);flex-shrink:0}
.pf-pill .nm{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pf-pill .ar{color:var(--muted);font-size:10px}
.top-actions{display:flex;gap:6px;align-items:center}
.lang{font-size:11px;font-weight:700;color:var(--muted);background:var(--surf);border:1px solid var(--line);padding:6px 10px;border-radius:999px;letter-spacing:.04em;transition:.15s}
.lang:hover{color:var(--txt);border-color:var(--line2)}
.ico{width:34px;height:34px;border-radius:10px;background:var(--surf);border:1px solid var(--line);color:var(--muted);display:grid;place-items:center;font-size:15px;transition:.15s}
.ico:hover{color:var(--txt);border-color:var(--line2)}
.ico.on{color:var(--accent);border-color:var(--accent-d);background:var(--accent-bg)}

/* hero */
.hero-eyebrow{text-align:center;color:var(--blue);font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;margin-bottom:14px}
.hero-eyebrow .dot{display:inline-block;margin:0 8px;color:#3a3a3a}
.hero-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:8px;text-align:center}
.hero-cell .lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;font-weight:600;margin-bottom:4px}
.hero-cell .val{font-size:30px;font-weight:700;letter-spacing:-1px;line-height:1.1}
.hero-cell .val.up{color:var(--accent)} .hero-cell .val.down{color:var(--loss)}
.hero-sub{text-align:center;color:var(--accent);font-size:13.5px;font-weight:500;margin-top:6px}
.hero-sub.down{color:var(--loss)}
.hero-sub .sep{color:#2a2a2a;margin:0 6px}
.hero-sar{text-align:center;color:var(--muted2);font-size:11.5px;margin-top:6px}
.hero-live{display:flex;justify-content:center;align-items:center;gap:14px;margin:16px 0 18px}
.live-pill{display:inline-flex;align-items:center;gap:7px;color:var(--muted);font-size:12px;font-weight:500}
.live-pill::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--muted)}
.live-pill.on::before{background:var(--accent);box-shadow:0 0 0 3px rgba(95,233,176,.18);animation:pulse 2.2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.refresh-btn{display:inline-flex;align-items:center;gap:6px;background:transparent;border:1px solid var(--line2);border-radius:999px;padding:6px 14px;font-size:12px;color:var(--muted);font-weight:500;transition:.15s}
.refresh-btn:hover{color:var(--txt);border-color:#3a3a3a}
.refresh-btn:disabled{opacity:.5}

/* tabs */
.tabs{display:flex;justify-content:center;gap:6px;margin-bottom:14px}
.tab{padding:8px 16px;border-radius:999px;font-size:13px;font-weight:600;color:var(--muted);background:transparent;transition:.15s}
.tab:hover{color:var(--txt)} .tab.on{background:var(--surf2);color:var(--txt)}

/* horizon filter strip */
.horizon{display:flex;justify-content:center;gap:5px;margin-bottom:14px}
.h-chip{padding:6px 14px;border-radius:999px;font-size:11.5px;font-weight:700;color:var(--muted);background:transparent;border:1px solid var(--line);letter-spacing:.05em;transition:.18s;min-width:48px;text-align:center}
.h-chip:hover{color:var(--txt);border-color:var(--line2)}
.h-chip.on{background:#fff;color:#000;border-color:#fff}
.h-chip .cnt{font-size:9.5px;opacity:.6;margin-inline-start:4px;font-weight:600}

/* bubbles */
.bub-wrap{position:relative;width:100%}
#bub-svg{display:block;width:100%}
.bub{cursor:pointer}
.bub circle{transition:filter .2s,r .25s ease-out}
.bub:hover circle{filter:brightness(1.18)}
.bub text{pointer-events:none;font-family:inherit}

/* fab */
.fab{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--accent);color:#000;font-weight:700;font-size:14px;padding:13px 22px;border-radius:999px;box-shadow:0 6px 24px rgba(95,233,176,.25),0 0 0 1px rgba(95,233,176,.4);z-index:20;display:flex;align-items:center;gap:7px;transition:.15s}
.fab:hover{transform:translateX(-50%) scale(1.04)}
.fab .plus{font-size:17px;line-height:1}

/* holdings list */
.list{display:flex;flex-direction:column;gap:1px;background:var(--line);border-radius:14px;overflow:hidden;border:1px solid var(--line);margin-top:6px}
.row{background:var(--bg);padding:13px 14px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:.15s}
.row:hover{background:var(--surf)}
.row .tic-bx{width:38px;height:38px;border-radius:9px;display:grid;place-items:center;font-weight:700;font-size:11.5px;flex-shrink:0;letter-spacing:-.2px}
.row .info{flex:1;min-width:0}
.row .info .t-line{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.row .info .t{font-weight:700;font-size:14.5px;letter-spacing:-.2px}
.row .info .h-tag{font-size:9px;font-weight:800;padding:1px 5px;border-radius:3px;letter-spacing:.05em;color:var(--muted);background:#1A1A1A;border:1px solid #222}
.row .info .h-tag.st{background:#2A1F18;color:#FB923C;border-color:#5A3818}
.row .info .h-tag.mt{background:#1F2A3E;color:#5BA5FF;border-color:#1F3A6E}
.row .info .h-tag.lt{background:#1F2E25;color:#5FE9B0;border-color:#1E5C44}
.row .info .s{color:var(--muted);font-size:11.5px;margin-top:2px}
.row .rt{text-align:right;flex-shrink:0}
body[dir="rtl"] .row .rt{text-align:left}
.row .rt .mv{font-weight:700;font-size:14px}
.row .rt .pl{font-size:11.5px;font-weight:600;margin-top:2px}

/* empty / onboard */
.empty{text-align:center;padding:50px 22px;color:var(--muted)}
.empty .ic{font-size:42px;color:var(--accent);opacity:.45;margin-bottom:10px;line-height:1}
.empty h3{margin:0 0 6px;color:var(--txt);font-size:17px;font-weight:700}
.empty p{margin:0 0 18px;font-size:13.5px;line-height:1.6;max-width:300px;margin-inline:auto;color:var(--muted)}

.onboard{min-height:90vh;display:grid;place-items:center;padding:20px}
.onboard-card{max-width:380px;width:100%;text-align:center}
.onboard-card .logo{font-size:54px;color:var(--accent);margin-bottom:6px;font-weight:300;letter-spacing:-2px;line-height:1}
.onboard-card h1{margin:0 0 8px;font-size:24px;font-weight:700;letter-spacing:-.6px}
.onboard-card p{color:var(--muted);font-size:14px;margin:0 0 22px;line-height:1.7}
.onboard-card .inp{text-align:center;font-size:15px}

/* modal */
.scrim{position:fixed;inset:0;background:rgba(0,0,0,.78);backdrop-filter:blur(8px);display:grid;place-items:flex-end;padding:0;z-index:60;animation:fade .18s}
@media(min-width:520px){.scrim{place-items:center;padding:20px}}
@keyframes fade{from{opacity:0}to{opacity:1}}
.modal{width:100%;max-width:440px;background:#0A0A0A;border:1px solid var(--line);border-radius:20px 20px 0 0;padding:24px 22px;max-height:92vh;overflow:auto;animation:slide .22s}
@media(min-width:520px){.modal{border-radius:20px}}
@keyframes slide{from{transform:translateY(20px);opacity:.5}to{transform:none;opacity:1}}
.modal h2{margin:0 0 6px;font-size:19px;font-weight:700;letter-spacing:-.3px}
.modal .sub{color:var(--muted);font-size:13px;margin:0 0 18px;line-height:1.6}
.modal h4{margin:14px 0 8px;font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.08em}
.field{margin-bottom:12px}
.field label{display:block;font-size:11.5px;color:var(--muted);font-weight:600;margin-bottom:6px;letter-spacing:.02em}
.inp{width:100%;background:#000;border:1px solid var(--line);border-radius:11px;padding:11px 13px;color:var(--txt);font-size:14.5px;outline:none;transition:.15s;font-variant-numeric:tabular-nums}
.inp:focus{border-color:var(--accent-d);box-shadow:0 0 0 3px rgba(95,233,176,.08)}
.inp::placeholder{color:#3a3a3a}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.m-actions{display:flex;gap:8px;margin-top:18px}
.m-actions .btn{flex:1}
.btn{background:var(--surf2);border:1px solid var(--line);border-radius:11px;padding:11px 14px;font-size:13.5px;font-weight:600;color:var(--txt);display:inline-flex;align-items:center;gap:6px;justify-content:center;transition:.15s}
.btn:hover{background:#1c1c1c;border-color:var(--line2)}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#000}
.btn.primary:hover{filter:brightness(1.08)}
.btn.danger{background:transparent;color:var(--loss);border-color:var(--loss-d)}
.btn.danger:hover{background:var(--loss-bg)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.err{color:var(--loss);font-size:12px;margin-top:6px;font-weight:500;min-height:0}
.spin{display:inline-block;width:12px;height:12px;border:2px solid currentColor;border-top-color:transparent;border-radius:50%;animation:rot .7s linear infinite;vertical-align:-2px}
@keyframes rot{to{transform:rotate(360deg)}}

/* ticker search */
.search-wrap{position:relative}
.search-btn{position:absolute;top:8px;right:8px;width:30px;height:30px;border-radius:8px;background:var(--surf2);display:grid;place-items:center;color:var(--muted);font-size:13px;transition:.15s}
body[dir="rtl"] .search-btn{right:auto;left:8px}
.search-btn:hover{color:var(--accent);background:var(--accent-bg)}
.suggest{margin-top:6px;background:#000;border:1px solid var(--line);border-radius:10px;overflow:hidden;max-height:180px;overflow-y:auto}
.sg-item{padding:9px 12px;border-bottom:1px solid var(--line);cursor:pointer;display:flex;align-items:center;gap:10px;transition:.12s}
.sg-item:last-child{border-bottom:none}
.sg-item:hover{background:var(--surf2)}
.sg-item .tic{font-weight:700;font-size:13px;color:var(--accent);min-width:60px}
.sg-item .nm{color:var(--txt);font-size:12.5px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sg-loading{padding:11px;text-align:center;color:var(--muted);font-size:12px}

/* horizon segment in edit */
.seg{display:flex;background:#000;border:1px solid var(--line);border-radius:10px;padding:3px;gap:3px}
.seg button{flex:1;padding:9px 6px;border-radius:7px;font-size:11.5px;font-weight:700;color:var(--muted);letter-spacing:.04em;transition:.15s}
.seg button.on{background:var(--surf2);color:var(--txt)}
.seg button.on.st{color:#FB923C}
.seg button.on.mt{color:#5BA5FF}
.seg button.on.lt{color:#5FE9B0}
.seg button .lbl{display:block;font-size:9.5px;font-weight:600;opacity:.7;margin-top:1px;letter-spacing:0}

/* tags select */
.tags-grid{display:flex;flex-wrap:wrap;gap:6px}
.tag-chip{padding:6px 11px;border-radius:999px;font-size:12px;font-weight:600;background:#000;border:1px solid var(--line);color:var(--muted);cursor:pointer;transition:.15s;user-select:none}
.tag-chip:hover{border-color:var(--line2);color:var(--txt)}
.tag-chip.on{background:var(--accent-bg);border-color:var(--accent-d);color:var(--accent)}

/* detail */
.d-head{display:flex;align-items:center;gap:13px;margin-bottom:16px}
.d-head .tic-bx{width:48px;height:48px;border-radius:11px;display:grid;place-items:center;font-weight:700;font-size:13px}
.d-head .nm{font-size:19px;font-weight:700;letter-spacing:-.3px}
.d-head .sb{color:var(--muted);font-size:12.5px;margin-top:1px}
.d-rows{background:#000;border:1px solid var(--line);border-radius:12px;overflow:hidden;margin-bottom:10px}
.d-row{display:flex;justify-content:space-between;align-items:center;padding:11px 14px;border-bottom:1px solid var(--line)}
.d-row:last-child{border-bottom:none}
.d-row span{color:var(--muted);font-size:12.5px;font-weight:500}
.d-row .v{font-size:13.5px;font-weight:700;font-variant-numeric:tabular-nums}
.d-row .v small{display:block;color:var(--muted2);font-size:10.5px;font-weight:400;margin-top:1px}
.d-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px}
.d-tags .tg{padding:3px 9px;border-radius:999px;font-size:11px;font-weight:600;background:var(--accent-bg);color:var(--accent)}

/* chart */
.chart-card{background:#000;border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:12px}
.chart-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.chart-head .title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.chart-head .meta{font-size:11.5px;color:var(--muted);font-weight:500}
.chart-head .meta b{color:var(--txt);font-weight:700;font-variant-numeric:tabular-nums}
#stock-chart{display:block;width:100%;height:140px}
.chart-empty{padding:34px 14px;text-align:center;color:var(--muted2);font-size:12px}

/* buy/sell action buttons */
.trade-row{display:flex;gap:8px;margin-bottom:14px}
.trade-row .tbtn{flex:1;padding:14px;border-radius:12px;font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:7px;border:1px solid;transition:.15s;letter-spacing:.02em}
.trade-row .tbtn.buy{background:rgba(95,233,176,.08);color:var(--accent);border-color:var(--accent-d)}
.trade-row .tbtn.buy:hover{background:rgba(95,233,176,.16);border-color:var(--accent)}
.trade-row .tbtn.sell{background:rgba(242,107,110,.08);color:var(--loss);border-color:var(--loss-d)}
.trade-row .tbtn.sell:hover{background:rgba(242,107,110,.16);border-color:var(--loss)}
.trade-row .tbtn .sign{font-size:18px;font-weight:700;line-height:1}

/* realized P&L display in detail */
.realized-box{display:flex;align-items:center;justify-content:space-between;padding:10px 13px;background:#000;border:1px solid var(--line);border-radius:11px;margin-bottom:12px;font-size:12.5px}
.realized-box .lbl{color:var(--muted);font-weight:500}
.realized-box .val{font-weight:700;font-variant-numeric:tabular-nums}

/* ───── landing page (account list) ───── */
.landing{min-height:100vh;display:flex;flex-direction:column;padding:20px 18px 40px;max-width:560px;margin:0 auto}
.landing-head{text-align:center;padding:30px 0 24px;position:relative}
.landing-head .logo{font-size:48px;color:var(--accent);font-weight:300;letter-spacing:-2px;line-height:1;margin-bottom:6px}
.landing-head h1{margin:0 0 4px;font-size:23px;font-weight:700;letter-spacing:-.5px}
.landing-head .sub{color:var(--muted);font-size:13px;margin:0}
.landing-lang{position:absolute;top:30px;left:0}
body[dir="rtl"] .landing-lang{left:auto;right:0}
.accounts-list{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
.acct-card{display:flex;align-items:center;gap:12px;background:var(--surf);border:1px solid var(--line);border-radius:14px;padding:14px 16px;cursor:pointer;transition:.15s}
.acct-card:hover{background:var(--surf2);border-color:var(--line2);transform:translateY(-1px)}
.acct-card .av{width:44px;height:44px;border-radius:50%;display:grid;place-items:center;font-weight:700;font-size:17px;color:#000;flex-shrink:0}
.acct-card .acn{flex:1;min-width:0}
.acct-card .acn .name{font-weight:600;font-size:15px;letter-spacing:-.2px}
.acct-card .acn .meta{color:var(--muted);font-size:11.5px;margin-top:2px;font-variant-numeric:tabular-nums}
.acct-card .lock{color:var(--muted);font-size:14px;opacity:.7}
.acct-card.locked .lock{color:var(--gold)}
.acct-empty{text-align:center;padding:30px 14px;color:var(--muted);font-size:13.5px}
.acct-new{display:flex;align-items:center;justify-content:center;gap:8px;background:transparent;border:1.5px dashed var(--line2);color:var(--accent);padding:14px;border-radius:14px;font-weight:600;font-size:14px;cursor:pointer;transition:.15s}
.acct-new:hover{border-color:var(--accent);background:rgba(95,233,176,.04)}

/* ───── logout button in topbar ───── */
.ico.logout{color:var(--loss)}
.ico.logout:hover{background:var(--loss-bg);border-color:var(--loss-d)}

/* ───── deposited stat (added to hero) ───── */
.deposited-line{text-align:center;color:var(--muted);font-size:11.5px;margin-top:8px;font-variant-numeric:tabular-nums;letter-spacing:.02em}
.deposited-line .lbl{color:var(--muted2);font-weight:500}
.deposited-line .v{color:var(--txt2);font-weight:600}
.deposited-line .sep{color:#2a2a2a;margin:0 8px}

/* ───── performance chart ───── */
.perf-card{background:var(--surf);border:1px solid var(--line);border-radius:14px;padding:14px 14px 12px;margin-top:14px}
.perf-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.perf-head .ttl{font-size:11.5px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.perf-head .ch{font-size:12px;font-weight:700;font-variant-numeric:tabular-nums;margin-top:2px}
.perf-tabs{display:flex;gap:3px;background:#000;border:1px solid var(--line);border-radius:8px;padding:3px}
.perf-tabs button{padding:4px 9px;border-radius:5px;font-size:10.5px;font-weight:700;color:var(--muted);font-variant-numeric:tabular-nums;letter-spacing:.04em}
.perf-tabs button.on{background:var(--surf2);color:var(--txt)}
#perf-svg{display:block;width:100%;height:120px}
.perf-empty{padding:24px 0;text-align:center;color:var(--muted2);font-size:11.5px}

/* ───── chart type switcher ───── */
.chart-type-switch{display:flex;justify-content:center;gap:4px;background:var(--surf);border:1px solid var(--line);border-radius:11px;padding:3px;margin-bottom:8px;max-width:160px;margin-inline:auto}
.chart-type-switch button{padding:6px 14px;border-radius:7px;font-size:11.5px;font-weight:700;color:var(--muted);letter-spacing:.04em;flex:1;transition:.15s;display:flex;align-items:center;justify-content:center;gap:5px}
.chart-type-switch button.on{background:var(--surf2);color:var(--txt)}
.chart-type-switch button .ic{font-size:13px;opacity:.8}

/* ───── bar chart ───── */
.bar-wrap{padding:8px 10px}
.bar-row{display:flex;align-items:center;gap:10px;padding:7px 0;cursor:pointer}
.bar-row .lbl{width:56px;flex-shrink:0;font-weight:700;font-size:12.5px;font-variant-numeric:tabular-nums}
.bar-row .bar-bg{flex:1;height:22px;background:#0E0E0E;border-radius:5px;position:relative;overflow:hidden}
.bar-row .bar-fill{position:absolute;top:0;height:100%;border-radius:5px;transition:width .3s ease-out}
body[dir="ltr"] .bar-row .bar-fill{left:0}
body[dir="rtl"] .bar-row .bar-fill{right:0}
.bar-row .bar-pct{position:absolute;top:50%;transform:translateY(-50%);font-size:10.5px;font-weight:700;color:#fff;padding:0 8px;font-variant-numeric:tabular-nums;text-shadow:0 1px 2px rgba(0,0,0,.5)}
body[dir="ltr"] .bar-row .bar-pct{left:0}
body[dir="rtl"] .bar-row .bar-pct{right:0}
.bar-row .rt{flex-shrink:0;text-align:right;min-width:90px}
body[dir="rtl"] .bar-row .rt{text-align:left}
.bar-row .rt .mv{font-weight:700;font-size:12.5px;font-variant-numeric:tabular-nums}
.bar-row .rt .pl{font-size:10.5px;font-weight:600;font-variant-numeric:tabular-nums}

/* ───── transactions list in detail ───── */
.tx-head{margin:14px 0 8px;font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.08em}
.tx-list{background:#000;border:1px solid var(--line);border-radius:11px;overflow:hidden;margin-bottom:8px}
.tx-row{display:flex;align-items:center;gap:9px;padding:9px 12px;border-bottom:1px solid var(--line);font-size:12px;font-variant-numeric:tabular-nums}
.tx-row:last-child{border-bottom:none}
.tx-row .tpe{font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;letter-spacing:.04em}
.tx-row .tpe.buy{background:var(--accent-bg);color:var(--accent)}
.tx-row .tpe.sell{background:var(--loss-bg);color:var(--loss)}
.tx-row .dt{color:var(--muted);min-width:78px;font-size:11px}
.tx-row .qp{flex:1;color:var(--txt2)}
.tx-row .tot{font-weight:700;color:var(--txt)}
.tx-row .del{color:var(--muted2);width:24px;height:24px;border-radius:5px;display:grid;place-items:center;font-size:11px;flex-shrink:0}
.tx-row .del:hover{color:var(--loss);background:var(--loss-bg)}

/* ───── options fields in modal ───── */
.opt-type-seg{display:flex;background:#000;border:1px solid var(--line);border-radius:10px;padding:3px;gap:3px;margin-bottom:10px}

/* expiry banner */
.expiry-banner{padding:11px 14px;border-radius:11px;font-size:12.5px;margin-bottom:12px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;line-height:1.45}
.expiry-banner.warn{background:#2A2410;color:#E8B96A;border:1px solid #5A4818}
.expiry-banner.over{background:var(--loss-bg);color:var(--loss);border:1px solid var(--loss-d)}
.expiry-banner .msg{flex:1;min-width:140px;font-weight:600}
.expiry-banner .acts{display:flex;gap:5px;flex-wrap:wrap}
.expiry-banner button{padding:5px 11px;border-radius:7px;font-size:11px;font-weight:700;background:rgba(255,255,255,.08);color:inherit;border:1px solid rgba(255,255,255,.18);transition:.15s}
.expiry-banner button:hover{background:rgba(255,255,255,.16)}

/* tx editable hint */
.tx-row.editable{cursor:pointer;transition:.15s}
.tx-row.editable:hover{background:#080808}
.tx-hint{font-size:10.5px;color:var(--muted2);margin-top:-4px;margin-bottom:8px;text-align:center;font-weight:500;letter-spacing:.02em}

/* cash line in hero */
.cash-line{text-align:center;color:var(--muted);font-size:11.5px;margin-top:4px;font-variant-numeric:tabular-nums}
.cash-line .ic{margin-inline-end:4px;opacity:.7}
.cash-line .v{color:var(--blue);font-weight:600}

/* weekly summary banner */
.week-banner{background:linear-gradient(135deg,#0c1e1a,#0a1a2a);border:1px solid #1a3a3a;border-radius:14px;padding:13px 15px;margin-bottom:14px;display:flex;align-items:center;gap:11px;font-size:12.5px;position:relative}
.week-banner .ic{font-size:20px;flex-shrink:0}
.week-banner .body{flex:1;line-height:1.55}
.week-banner .body .ttl{font-weight:700;color:var(--accent);margin-bottom:2px;font-size:12px;letter-spacing:.03em;text-transform:uppercase}
.week-banner .body .txt{color:var(--txt2)}
.week-banner .close{position:absolute;top:8px;right:10px;color:var(--muted2);font-size:13px;width:22px;height:22px;border-radius:5px;display:grid;place-items:center}
body[dir="rtl"] .week-banner .close{right:auto;left:10px}
.week-banner .close:hover{color:var(--txt)}

/* watchlist */
.watch-empty{text-align:center;padding:50px 22px;color:var(--muted)}
.watch-list{display:flex;flex-direction:column;gap:1px;background:var(--line);border-radius:14px;overflow:hidden;border:1px solid var(--line)}
.watch-row{background:var(--bg);padding:13px 14px;display:flex;align-items:center;gap:11px;cursor:pointer;transition:.15s}
.watch-row:hover{background:var(--surf)}
.watch-row .tic-bx{width:38px;height:38px;border-radius:9px;display:grid;place-items:center;font-weight:700;font-size:11.5px;flex-shrink:0;background:#1A1F2E;color:#5BA5FF;border:1px solid #1F3A6E33}
.watch-row .info{flex:1;min-width:0}
.watch-row .info .t{font-weight:700;font-size:14.5px}
.watch-row .info .s{color:var(--muted);font-size:11.5px;margin-top:2px}
.watch-row .rt{text-align:right;flex-shrink:0}
body[dir="rtl"] .watch-row .rt{text-align:left}
.watch-row .rt .pr{font-weight:700;font-size:13.5px;font-variant-numeric:tabular-nums}
.watch-row .rt .ch{font-size:11.5px;font-weight:600;margin-top:2px;font-variant-numeric:tabular-nums}
.tgt-pill{font-size:9.5px;font-weight:700;padding:2px 6px;border-radius:4px;margin-inline-start:6px;letter-spacing:.04em}
.tgt-pill.hit{background:var(--accent-bg);color:var(--accent)}
.tgt-pill.stop{background:var(--loss-bg);color:var(--loss)}

/* targets / stop / notes inputs in detail */
.tgt-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.tgt-cell{background:#000;border:1px solid var(--line);border-radius:10px;padding:8px 10px}
.tgt-cell .lbl{font-size:10px;color:var(--muted);font-weight:700;letter-spacing:.05em;text-transform:uppercase;margin-bottom:4px}
.tgt-cell.target .lbl{color:var(--accent)}
.tgt-cell.stop .lbl{color:var(--loss)}
.tgt-cell input{background:transparent;border:none;color:var(--txt);font-size:14px;font-weight:700;width:100%;outline:none;font-variant-numeric:tabular-nums;padding:0}
.tgt-cell input::placeholder{color:var(--muted2);font-weight:400}
.notes-textarea{width:100%;background:#000;border:1px solid var(--line);border-radius:10px;padding:10px 12px;color:var(--txt);font-size:13px;font-family:inherit;resize:vertical;min-height:60px;outline:none;line-height:1.55;margin-bottom:12px}
.notes-textarea:focus{border-color:var(--accent-d)}

/* dividend row */
.div-list{background:#000;border:1px solid var(--line);border-radius:11px;overflow:hidden;margin-bottom:8px}
.div-row{display:flex;align-items:center;gap:10px;padding:9px 12px;border-bottom:1px solid var(--line);font-size:12px;font-variant-numeric:tabular-nums}
.div-row:last-child{border-bottom:none}
.div-row .ic{color:var(--gold);font-size:13px;flex-shrink:0}
.div-row .dt{color:var(--muted);min-width:78px;font-size:11px}
.div-row .nt{flex:1;color:var(--muted)}
.div-row .am{font-weight:700;color:var(--accent)}
.div-row .del{color:var(--muted2);width:24px;height:24px;border-radius:5px;display:grid;place-items:center;font-size:11px}
.div-row .del:hover{color:var(--loss);background:var(--loss-bg)}
.add-btn{display:flex;align-items:center;justify-content:center;gap:6px;padding:9px;border-radius:10px;background:transparent;border:1px dashed var(--line2);color:var(--muted);font-size:12.5px;font-weight:600;width:100%;cursor:pointer;transition:.15s}
.add-btn:hover{border-color:var(--accent-d);color:var(--accent)}

/* earnings card */
.earn-card{background:#000;border:1px solid var(--line);border-radius:11px;padding:11px 13px;margin-bottom:10px;font-size:12px}
.earn-card .head{font-size:10.5px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.earn-card .when{font-weight:700;font-size:13.5px;color:var(--gold)}
.earn-card .est{color:var(--muted2);font-size:11px;margin-top:3px}

/* insider rows */
.ins-list{background:#000;border:1px solid var(--line);border-radius:11px;overflow:hidden;margin-bottom:8px;max-height:200px;overflow-y:auto}
.ins-row{padding:8px 12px;border-bottom:1px solid var(--line);font-size:11.5px;display:flex;align-items:center;gap:10px;font-variant-numeric:tabular-nums}
.ins-row:last-child{border-bottom:none}
.ins-row .nm{flex:1;font-weight:600;font-size:11.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--txt2)}
.ins-row .act{font-size:9.5px;font-weight:700;padding:1px 5px;border-radius:3px;letter-spacing:.04em}
.ins-row .act.buy{background:var(--accent-bg);color:var(--accent)}
.ins-row .act.sell{background:var(--loss-bg);color:var(--loss)}
.ins-row .qty{font-size:11px;color:var(--muted);min-width:70px;text-align:right}
.ins-row .dt{font-size:10.5px;color:var(--muted2);min-width:64px}

/* collapsible section */
.coll{margin-bottom:12px}
.coll-head{display:flex;align-items:center;justify-content:space-between;padding:9px 0;cursor:pointer;user-select:none}
.coll-head .ttl{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
.coll-head .ar{color:var(--muted2);font-size:11px;transition:transform .2s}
.coll.open .coll-head .ar{transform:rotate(180deg)}
.coll-body{display:none}
.coll.open .coll-body{display:block}

/* challenge bar */
.ch-bar-card{background:linear-gradient(135deg,#16140a,#0f1810);border:1px solid #3a3015;border-radius:14px;padding:13px 15px;margin-bottom:14px;display:flex;align-items:center;gap:11px;font-size:12.5px;cursor:pointer;transition:.15s}
.ch-bar-card:hover{background:linear-gradient(135deg,#1a1808,#13200f);border-color:#5a4815}
.ch-bar-card .ic{font-size:22px;flex-shrink:0}
.ch-bar-card .body{flex:1;min-width:0}
.ch-bar-card .body .nm{font-weight:700;font-size:13px;color:var(--gold);margin-bottom:3px}
.ch-bar-card .body .pg{height:6px;background:#1A1A1A;border-radius:3px;overflow:hidden;margin-bottom:4px}
.ch-bar-card .body .pg-fill{height:100%;background:linear-gradient(90deg,#E8B96A,#5FE9B0);border-radius:3px;transition:width .3s}
.ch-bar-card .body .meta{font-size:11px;color:var(--muted);font-variant-numeric:tabular-nums}
.ch-bar-card .body .meta b{color:var(--txt);font-weight:700}
.ch-bar-card .ar{color:var(--muted);font-size:14px}

/* challenge page */
.ch-empty{text-align:center;padding:60px 22px;color:var(--muted)}
.ch-empty .ic{font-size:54px;margin-bottom:10px;opacity:.5}
.ch-card{background:var(--surf);border:1px solid var(--line);border-radius:14px;padding:15px;margin-bottom:12px}
.ch-card .top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;gap:10px}
.ch-card .top .nm{font-size:15px;font-weight:700;letter-spacing:-.2px}
.ch-card .top .dates{color:var(--muted);font-size:11px;margin-top:2px;font-variant-numeric:tabular-nums}
.ch-card .top .badge{padding:3px 9px;border-radius:5px;font-size:10px;font-weight:700;letter-spacing:.04em}
.ch-card .top .badge.active{background:var(--accent-bg);color:var(--accent)}
.ch-card .top .badge.done{background:#1F3A6E33;color:#5BA5FF}
.ch-card .top .badge.failed{background:var(--loss-bg);color:var(--loss)}
.ch-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px}
.ch-stat{text-align:center;padding:9px 6px;background:#000;border-radius:9px;border:1px solid var(--line)}
.ch-stat .lbl{font-size:9.5px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.05em}
.ch-stat .v{font-size:14.5px;font-weight:700;margin-top:3px;font-variant-numeric:tabular-nums;letter-spacing:-.3px}
.ch-pg{height:7px;background:#0E0E0E;border-radius:4px;overflow:hidden;margin-bottom:9px}
.ch-pg .fill{height:100%;border-radius:4px;transition:width .3s}
.ch-pg .fill.gain{background:linear-gradient(90deg,#5FE9B0,#34D399)}
.ch-pg .fill.loss{background:linear-gradient(90deg,#F26B6E,#EF4444)}
.ch-trades{margin-top:10px}
.ch-trade{display:flex;align-items:center;gap:9px;padding:8px 10px;background:#000;border:1px solid var(--line);border-radius:9px;margin-bottom:5px;font-size:11.5px;font-variant-numeric:tabular-nums}
.ch-trade .nm{flex:1;font-weight:700}
.ch-trade .nm .tic{color:var(--accent)}
.ch-trade .am{color:var(--muted);font-size:10.5px}
.ch-trade .ret{font-weight:700}
.ch-trade .open{font-size:9.5px;font-weight:700;padding:1px 5px;border-radius:3px;background:var(--gold);color:#000}

/* achievements grid */
.ach-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.ach{background:#000;border:1px solid var(--line);border-radius:11px;padding:13px 6px;text-align:center;opacity:.35;transition:.2s;position:relative}
.ach.earned{opacity:1;background:linear-gradient(135deg,#0e1f17,#0a1a15);border-color:#1e5c44}
.ach .ic{font-size:28px;line-height:1;margin-bottom:6px}
.ach .nm{font-size:10.5px;font-weight:700;color:var(--txt);letter-spacing:-.1px;line-height:1.3;min-height:26px;display:flex;align-items:center;justify-content:center;padding:0 2px}
.ach .ds{font-size:9px;color:var(--muted);margin-top:3px;line-height:1.4}

/* achievement popup */
.ach-pop{position:fixed;top:80px;left:50%;transform:translateX(-50%) translateY(-10px);background:linear-gradient(135deg,#0e3a28,#0a2018);border:1px solid #34D399;border-radius:14px;padding:14px 18px 14px 14px;z-index:90;display:flex;align-items:center;gap:12px;box-shadow:0 14px 40px rgba(0,0,0,.7);max-width:90vw;animation:ach-in .3s ease-out forwards}
@keyframes ach-in{to{transform:translateX(-50%) translateY(0);opacity:1}}
.ach-pop .ic{font-size:34px;line-height:1;flex-shrink:0}
.ach-pop .nm{font-size:11px;font-weight:700;color:var(--accent);letter-spacing:.06em;text-transform:uppercase}
.ach-pop .ds{font-size:13.5px;font-weight:700;color:var(--txt);margin-top:2px}

/* settings sections */
.set-section{margin-bottom:14px}
.set-section h4{margin:6px 0 8px;font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.08em}
.set-section .info{font-size:12px;color:var(--muted);margin-top:4px;line-height:1.55}

/* ── marketing landing (full page when logged out) ── */
.mkt{position:fixed;inset:0;overflow-y:auto;overflow-x:hidden;background:#0A0A0A;-webkit-overflow-scrolling:touch}
.mkt::before{content:"";position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 50% -20%,rgba(95,233,176,.08),transparent 60%),radial-gradient(ellipse 60% 40% at 80% 70%,rgba(91,165,255,.04),transparent 60%);pointer-events:none;z-index:0}
.mkt::after{content:"";position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,.015) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.015) 1px,transparent 1px);background-size:60px 60px;pointer-events:none;z-index:0;opacity:.5}
.mkt-wrap{position:relative;z-index:1;max-width:1180px;margin:0 auto;padding:0 22px}

.mkt-nav{position:sticky;top:0;z-index:50;backdrop-filter:saturate(180%) blur(14px);-webkit-backdrop-filter:saturate(180%) blur(14px);background:rgba(10,10,10,.72);border-bottom:1px solid rgba(255,255,255,.04)}
.mkt-nav-in{max-width:1180px;margin:0 auto;padding:13px 22px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.mkt-logo{display:flex;align-items:center;gap:10px;font-weight:800;font-size:18px;letter-spacing:-.5px;color:var(--txt)}
.circle-ico{width:30px;height:30px;border-radius:50%;border:2.5px solid var(--accent);background:radial-gradient(circle at 50% 50%,rgba(95,233,176,.15),transparent 70%);position:relative;display:inline-block;box-shadow:0 0 18px rgba(95,233,176,.35)}
.circle-ico::after{content:"";position:absolute;inset:5px;border-radius:50%;background:var(--accent);box-shadow:0 0 10px var(--accent)}
.mkt-nav-r{display:flex;align-items:center;gap:8px}
.mkt-lang{background:transparent;border:1px solid var(--line2);color:var(--txt2);padding:6px 11px;border-radius:7px;font-size:12px;font-weight:700;letter-spacing:.05em;cursor:pointer;font-family:inherit;transition:.15s}
.mkt-lang:hover{border-color:var(--muted2);background:var(--surf)}
.mkt-login{background:transparent;border:1px solid var(--line2);color:var(--txt2);padding:7px 14px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:.15s}
.mkt-login:hover{border-color:var(--accent-d);color:var(--accent);background:var(--accent-bg)}

.mkt-hero{padding:80px 0 50px;text-align:center}
@media (max-width:680px){.mkt-hero{padding:50px 0 36px}}
.mkt-badge{display:inline-flex;align-items:center;gap:7px;background:var(--accent-bg);border:1px solid var(--accent-d);color:var(--accent);font-size:12px;font-weight:700;padding:6px 13px;border-radius:99px;margin-bottom:22px;letter-spacing:.02em}
.mkt-badge .dot{width:6px;height:6px;border-radius:50%;background:var(--accent);box-shadow:0 0 10px var(--accent);animation:mpulse 2s ease-in-out infinite}
@keyframes mpulse{0%,100%{opacity:1}50%{opacity:.4}}
.mkt-hero h1{font-size:clamp(34px,7vw,64px);font-weight:900;letter-spacing:-.03em;line-height:1.08;margin:0 0 18px;background:linear-gradient(180deg,#fff 30%,#888);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.mkt-hero h1 .acc{background:linear-gradient(135deg,#5FE9B0 30%,#A8FFD8);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.mkt-hero .sub{font-size:clamp(15px,2.3vw,18px);color:var(--muted);max-width:600px;margin:0 auto 32px;line-height:1.65}
.mkt-ctas{display:flex;gap:11px;justify-content:center;flex-wrap:wrap;margin-bottom:14px}
.mkt-cta-1{background:var(--accent);color:#000;padding:14px 28px;border-radius:11px;font-size:15px;font-weight:800;border:none;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:9px;box-shadow:0 10px 32px rgba(95,233,176,.25);transition:.2s}
.mkt-cta-1:hover{transform:translateY(-2px);box-shadow:0 16px 44px rgba(95,233,176,.4)}
.mkt-cta-1 .arr{font-size:13px;transition:transform .2s;display:inline-block}
body[dir="rtl"] .mkt-cta-1 .arr{transform:scaleX(-1)}
.mkt-cta-2{background:transparent;color:var(--txt2);padding:14px 22px;border-radius:11px;font-size:14.5px;font-weight:700;border:1px solid var(--line2);cursor:pointer;font-family:inherit;transition:.2s}
.mkt-cta-2:hover{border-color:var(--muted2);background:var(--surf)}
.mkt-meta{font-size:12.5px;color:var(--muted2);display:inline-flex;align-items:center;gap:14px;flex-wrap:wrap;justify-content:center;margin-top:10px}
.mkt-meta .sep{width:3px;height:3px;border-radius:50%;background:var(--muted2)}

.mkt-stats{margin-top:50px;padding:22px;background:linear-gradient(180deg,var(--surf),transparent);border-top:1px solid var(--line);border-bottom:1px solid var(--line)}
.mkt-stats-grid{max-width:880px;margin:0 auto;display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
@media (max-width:680px){.mkt-stats-grid{grid-template-columns:repeat(2,1fr);gap:18px}}
.mkt-stat{text-align:center}
.mkt-stat .n{font-size:clamp(22px,3.5vw,30px);font-weight:800;letter-spacing:-.02em;font-variant-numeric:tabular-nums}
.mkt-stat .n.g{color:var(--accent)}
.mkt-stat .n.gd{color:var(--gold)}
.mkt-stat .n.b{color:#5BA5FF}
.mkt-stat .l{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.1em;margin-top:5px}

.mkt-section{padding:80px 0}
@media (max-width:680px){.mkt-section{padding:50px 0}}
.mkt-section-head{text-align:center;margin-bottom:42px}
.mkt-tag{display:inline-block;color:var(--accent);font-size:11px;font-weight:800;letter-spacing:.18em;text-transform:uppercase;margin-bottom:14px}
.mkt-h{font-size:clamp(28px,4.5vw,42px);font-weight:900;letter-spacing:-.025em;line-height:1.15;margin:0 0 14px}
.mkt-sub{font-size:clamp(14px,2vw,16px);color:var(--muted);max-width:580px;margin:0 auto;line-height:1.65}

.mkt-features{display:grid;grid-template-columns:repeat(3,1fr);gap:13px}
@media (max-width:920px){.mkt-features{grid-template-columns:repeat(2,1fr)}}
@media (max-width:580px){.mkt-features{grid-template-columns:1fr}}
.mkt-feat{background:var(--surf);border:1px solid var(--line);border-radius:16px;padding:22px 20px;transition:.25s}
.mkt-feat:hover{border-color:var(--line2);transform:translateY(-2px);background:var(--surf2)}

if (!window.storage) {
  window.storage = {
    async get(key) {
      const v = localStorage.getItem(key);
      return v != null ? { key, value: v } : null;
    },
    async set(key, value) {
      localStorage.setItem(key, value);
      return { key, value };
    },
    async delete(key) {
      localStorage.removeItem(key);
      return { key, deleted: true };
    }
  };
}

/* SHA-256 hash for passwords (browser native crypto) */
async function hashPin(pin){
  if (!pin) return null;
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pin));
  return [...new Uint8Array(buf)].map(b => b.toString(16).padStart(2,'0')).join('');
}

/* snapshot today's portfolio value to history */
function snapshotHistory(){
  if (!settings.activePf) return;
  const t = totals();
  if (!t.mv) return;
  const d = today();
  const key = settings.activePf + ':' + d;
  const i = history.findIndex(x => x.key === key);
  const entry = { key, pfId: settings.activePf, date: d, value: t.mv, deposited: t.deposited, realized: t.realized };
  if (i >= 0) history[i] = entry;
  else history.push(entry);
  history = history.slice(-1000);
}

/* ════ compute ════ */
/* compute holding stats from transactions */
function statsFor(h){
  const mul = (h.type && h.type !== 'stock') ? 100 : 1;
  const txs = (h.transactions || []).slice().sort((a,b) => (a.ts||0) - (b.ts||0));
  let shares = 0, totalCost = 0, realized = 0;
  for (const tx of txs) {
    const qty = Number(tx.qty) || 0;
    const px = Number(tx.price) || 0;
    if (tx.type === 'buy') {
      shares += qty;
      totalCost += qty * px;
    } else {
      const avgAtTime = shares > 0 ? totalCost / shares : px;
      realized += qty * (px - avgAtTime);
      totalCost -= qty * avgAtTime;
      shares -= qty;
    }
  }
  // also include any legacy quickShares/quickAvg if no transactions
  if (txs.length === 0 && h.shares != null) {
    shares = h.shares;
    totalCost = h.shares * (h.avg || 0);
  }
  const avg = shares > 0 ? totalCost / shares : 0;
  const price = h.price != null ? h.price : avg;
  const mv = shares * price * mul;
  const cost = shares * avg * mul;
  const unrealized = mv - cost;
  const plPct = cost > 0 ? unrealized/cost*100 : 0;
  const todayD = (h.prev != null) ? shares*(price - h.prev)*mul : null;
  const todayPct = h.dayChangePct != null ? h.dayChangePct : (h.prev ? (price-h.prev)/h.prev*100 : null);
  // total deposited for this holding = sum of buys
  let deposited = 0;
  for (const tx of txs) {
    if (tx.type === 'buy') deposited += (Number(tx.qty)||0) * (Number(tx.price)||0) * mul;
  }
  return { shares, avg, price, mv, cost, pl: unrealized, plPct, today: todayD, todayPct, realized: realized*mul, deposited, mul };
}

function totals(){
  let mv = 0, cost = 0, today = 0, hasToday = false, deposited = 0, realized = 0;
  activeHoldings().forEach(h => {
    const s = statsFor(h);
    mv += s.mv; cost += s.cost;
    deposited += s.deposited;
    realized += s.realized;
    if (s.today != null) { today += s.today; hasToday = true; }
  });
  const pl = mv - cost;
  const totalReturn = (mv + realized) - deposited;
  const totalReturnPct = deposited > 0 ? totalReturn/deposited*100 : 0;
  return {
    mv, cost, pl, deposited, realized,
    plPct: cost > 0 ? pl/cost*100 : 0,
    today: hasToday ? today : null,
    todayPct: hasToday && (mv-today) > 0 ? today/(mv-today)*100 : null,
    totalReturn, totalReturnPct,
  };
}

/* ════ zakat ════ */
const HIJRI = 354.367;
function zakatFor(h){
  if (!h.purchaseDate) return null;
  const purchase = new Date(h.purchaseDate);
  if (isNaN(purchase)) return null;
  const now = new Date();
  const days = (now - purchase) / 86400000;
  const yearsPassed = Math.floor(days / HIJRI);
  const lastHawl = new Date(purchase.getTime() + yearsPassed * HIJRI * 86400000);
  const nextHawl = new Date(purchase.getTime() + (yearsPassed + 1) * HIJRI * 86400000);
  const daysToNext = Math.ceil((nextHawl - now) / 86400000);
  const daysSinceLast = Math.floor((now - lastHawl) / 86400000);
  const due = yearsPassed >= 1;
  const amount = statsFor(h).mv * 0.025;
  const progress = Math.max(0, Math.min(100, daysSinceLast / HIJRI * 100));
  return {
    purchaseDate: h.purchaseDate, nextHawlDate: nextHawl.toISOString().slice(0,10),
    daysToNext, daysSinceLast, due, amount, progress,
    status: due ? "due" : (daysToNext < 30 ? "soon" : "ok"),
  };
}

/* ════ bubbles ════ */
function setChartType(type){ settings.chartType = type; save(); renderTab(); }

function renderBubbles(){
  const wrap = $("#viz-wrap"); if (!wrap) return;
  wrap.className = 'bub-wrap';
  const W = wrap.clientWidth || 640;
  const H = Math.min(Math.max(W * 0.95, 360), 520);
  const hs = activeHoldings();
  const data = hs.map(h => { const s = statsFor(h); return { ...h, mv: s.mv, pl: s.pl, plPct: s.plPct, hasP: h.price != null }; }).filter(d => d.mv > 0);
  if (!data.length) { wrap.innerHTML = ""; return; }
  const root = d3.hierarchy({ children: data }).sum(d => d.mv);
  d3.pack().size([W, H]).padding(8)(root);
  const total = root.value || 1;
  const ns = "http://www.w3.org/2000/svg";
  const svg = document.createElementNS(ns, "svg");
  svg.setAttribute("viewBox", `0 0 ${W} ${H}`);
  svg.setAttribute("id", "bub-svg");

  const palettes = [
    { fill:"#0F4A36", ring:"#5FE9B0" }, // green
    { fill:"#4A1F22", ring:"#F26B6E" }, // red
    { fill:"#1F3A6E", ring:"#5BA5FF" }, // blue
    { fill:"#4A3D1F", ring:"#E8B96A" }, // gold
    { fill:"#3D1F4A", ring:"#A78BFA" }, // purple
    { fill:"#1F4A4A", ring:"#5FE9E9" }, // teal
    { fill:"#4A1F3D", ring:"#FB7185" }, // pink
    { fill:"#3D4A1F", ring:"#A3E635" }, // lime
    { fill:"#4A2D1F", ring:"#FB923C" }, // orange
    { fill:"#1F2D4A", ring:"#818CF8" }, // indigo
    { fill:"#3A1F4A", ring:"#D946EF" }, // fuchsia
    { fill:"#1F4A2D", ring:"#34D399" }, // emerald
  ];
  const pickPalette = (h) => {
    // every ticker gets a stable distinct color from its name — no gray, no sentiment override
    let sum = 0;
    for (let i = 0; i < h.ticker.length; i++) sum += h.ticker.charCodeAt(i) * (i+1) * 31 + 17;
    return palettes[Math.abs(sum) % palettes.length];
  };

  root.leaves().forEach(d => {
    const r = d.r, x = d.x, y = d.y, h = d.data;
    const share = h.mv/total*100;
    const p = pickPalette(h);
    const g = document.createElementNS(ns, "g");
    g.setAttribute("class", "bub");
    g.setAttribute("transform", `translate(${x},${y})`);
    g.addEventListener("click", () => openDetail(h.id));
    const c = document.createElementNS(ns, "circle");
    c.setAttribute("r", r);
    c.setAttribute("fill", p.fill);
    c.setAttribute("stroke", p.ring);
    c.setAttribute("stroke-width", Math.max(1.5, r * 0.022));
    c.setAttribute("stroke-opacity", "0.85");
    g.appendChild(c);
    if (r > 30){
      const fz = Math.min(r * 0.32, 24);
      mkText(g, ns, h.ticker, { y: -r*0.20, "text-anchor":"middle", "font-size": fz, fill:"#fff", "font-weight":"700" });
      mkText(g, ns, share.toFixed(1)+"%", { y: r*0.02, "text-anchor":"middle", "font-size": fz*0.55, fill:"rgba(255,255,255,.75)", "font-weight":"500" });
      if (r > 42 && h.hasP && !settings.privacy){
        const plCol = h.pl >= 0 ? "#5FE9B0" : "#F26B6E";
        mkText(g, ns, (h.pl>=0?"+$":"-$")+fmt0(Math.abs(h.pl)), { y: r*0.28, "text-anchor":"middle", "font-size": fz*0.55, fill: plCol, "font-weight":"700" });
        mkText(g, ns, pct(h.plPct), { y: r*0.48, "text-anchor":"middle", "font-size": fz*0.48, fill: plCol, "font-weight":"600" });
      }
    } else if (r > 14){
      mkText(g, ns, h.ticker, { y: r*0.12, "text-anchor":"middle", "font-size": Math.min(r*0.42, 13), fill:"#fff", "font-weight":"700" });
    }
    svg.appendChild(g);
  });
  wrap.innerHTML = "";
  wrap.appendChild(svg);
}
function mkText(parent, ns, text, attrs){
  const e = document.createElementNS(ns, "text");
  for (const k in attrs) e.setAttribute(k, attrs[k]);
  e.textContent = text;
  parent.appendChild(e);
}

function renderBars(){

/* ════ Black-Scholes (Greeks for options) ════ */
function bsNormCDF(x){
  const t = 1/(1 + 0.2316419*Math.abs(x));
  const d = 0.3989423*Math.exp(-x*x/2);
  let p = d*t*(0.3193815 + t*(-0.3565638 + t*(1.781478 + t*(-1.821256 + t*1.330274))));
  return x > 0 ? 1-p : p;
}
function bsNormPDF(x){ return Math.exp(-x*x/2)/Math.sqrt(2*Math.PI); }
function computeGreeks(h, spotPrice){
  if (!h.strike || !h.expiry || !h.iv) return null;
  const S = Number(spotPrice);
  const K = Number(h.strike);
  const sigma = Number(h.iv)/100;
  const r = 0.045; // assume risk-free rate ~4.5%
  const expDate = new Date(h.expiry);
  const T = (expDate - new Date()) / (365 * 86400000);
  if (T <= 0 || !S || !K || !sigma) return null;
  const sqrtT = Math.sqrt(T);
  const d1 = (Math.log(S/K) + (r + sigma*sigma/2)*T) / (sigma*sqrtT);
  const d2 = d1 - sigma*sqrtT;
  const Nd1 = bsNormCDF(d1), Nd2 = bsNormCDF(d2);
  const phi = bsNormPDF(d1);
  const isCall = h.type === 'call';
  const theoPrice = isCall
    ? S*Nd1 - K*Math.exp(-r*T)*Nd2
    : K*Math.exp(-r*T)*bsNormCDF(-d2) - S*bsNormCDF(-d1);
  const delta = isCall ? Nd1 : Nd1 - 1;
  const gamma = phi / (S*sigma*sqrtT);
  const thetaPerYear = isCall
    ? -S*phi*sigma/(2*sqrtT) - r*K*Math.exp(-r*T)*Nd2
    : -S*phi*sigma/(2*sqrtT) + r*K*Math.exp(-r*T)*bsNormCDF(-d2);
  const theta = thetaPerYear / 365;
  const vega = S*phi*sqrtT / 100;
  return { theoPrice, delta, gamma, theta, vega, daysToExpiry: Math.ceil(T*365) };
}

async function searchTicker(){
  const q = $("#f_tic").value.trim();
  if (!q) return;
  const box = $("#sg-box");
  box.innerHTML = `<div class="suggest"><div class="sg-loading"><span class="spin"></span> ${t().search_loading}</div></div>`;
  try {
    const results = await finnhubSearch(q);
    if (!results.length){ box.innerHTML = `<div class="suggest"><div class="sg-loading">${t().no_match}</div></div>`; return; }
    box.innerHTML = `<div class="suggest">${results.map(r => {
      const nm = (r.d || '').replace(/'/g,"&#39;").replace(/"/g,"&quot;");
      return `<div class="sg-item" onclick="pickTicker('${esc(r.s)}','${esc(nm)}')">
        <span class="tic">${esc(r.s)}</span>
        <span class="nm">${esc(r.d || '')}</span>
      </div>`;
    }).join("")}</div>`;
  } catch(e){
    box.innerHTML = `<div class="suggest"><div class="sg-loading">${esc(e.message||t().no_match)}</div></div>`;
  }
}
function pickTicker(tic, name){
  $("#f_tic").value = tic;
  $("#sg-box").innerHTML = "";
  $("#f_tic").dataset.name = name;
}

function saveHold(id){

  const pr = prRaw === "" ? null : parseFloat(prRaw);
  const presetName = $("#f_tic").dataset.name || tic;
  if (!tic){ $("#f_err").textContent = t().invalid; return; }
  const strike = $("#f_strike")?.value ? parseFloat($("#f_strike").value) : null;
  const expiry = $("#f_exp")?.value || null;
  const iv = $("#f_iv")?.value ? parseFloat($("#f_iv").value) : null;
  if (id){
    const h = holdings.find(x => x.id === id);
    Object.assign(h, {
      ticker: tic, type: editType,
      price: pr != null ? pr : h.price,
      horizon: editHorizon, tags: editTags,
      name: h.name || presetName,
      strike, expiry, iv,
    });
    cloudUpsertHolding(h);
  } else {
    const sh = parseFloat($("#f_sh").value);
    const avg = parseFloat($("#f_avg").value);
    const dt = $("#f_dt").value || today();
    if (isNaN(sh) || isNaN(avg) || sh <= 0 || avg < 0){
      $("#f_err").textContent = t().invalid; return;
    }
    const newH = {
      id: uid(), pfId: settings.activePf,
      ticker: tic, name: presetName, type: editType,
      transactions: [{ id: uid(), type:'buy', qty: sh, price: avg, date: dt, ts: new Date(dt).getTime() }],
      price: pr, prev: null, dayChangePct: null,
      purchaseDate: dt,
      horizon: editHorizon, tags: editTags,
      strike, expiry, iv,
    };
    holdings.push(newH);
    cloudUpsertHolding(newH);
  }
  save(); closeModal(); render();
}

/* Chart ranges: 1d, 1w, 1m, 3m, 6m, 1y, 5y, all */
const CHART_RANGES = [
  { id:'1d',  ar:'يوم',    en:'1D',  interval:'1h',     size:24 },
  { id:'1w',  ar:'أسبوع',  en:'1W',  interval:'1day',   size:7 },
  { id:'1m',  ar:'شهر',    en:'1M',  interval:'1day',   size:30 },
  { id:'3m',  ar:'٣ أشهر', en:'3M',  interval:'1day',   size:90 },
  { id:'6m',  ar:'٦ أشهر', en:'6M',  interval:'1day',   size:180 },
  { id:'1y',  ar:'سنة',    en:'1Y',  interval:'1week',  size:52 },
  { id:'5y',  ar:'٥ سنوات',en:'5Y',  interval:'1month', size:60 },
  { id:'all', ar:'الكل',   en:'ALL', interval:'1month', size:120 },
];

let chartCurrentRange = '1m';
let chartCurrentTicker = null;
let chartCurrentData = null; // {prices, dates}

async function loadChart(ticker){
  chartCurrentTicker = ticker;
  if (!chartCurrentRange) chartCurrentRange = '1m';
  await loadChartRange(ticker, chartCurrentRange);
}

async function loadChartRange(ticker, rangeId){
  const box = $("#chart-box");
  if (!box) return;
  chartCurrentRange = rangeId;
  const range = CHART_RANGES.find(r => r.id === rangeId) || CHART_RANGES[2];
  const cacheKey = `${ticker}_${rangeId}`;
  const cached = chartCache[cacheKey];
  // update active button
  document.querySelectorAll('.chart-range-btn').forEach(b => {
    b.classList.toggle('on', b.dataset.range === rangeId);
  });
  if (cached && Date.now() - cached.fetched < 1800000){
    chartCurrentData = cached.data;
    renderChart(cached.data.prices, ticker, cached.data.dates);
    return;
  }
  box.innerHTML = `<div class="chart-empty"><span class="spin"></span> ${lang==='ar'?'تحميل...':'Loading...'}</div>`;
  try {
    const r = await fetch(`${TD}/time_series?symbol=${encodeURIComponent(ticker)}&interval=${range.interval}&outputsize=${range.size}&apikey=${TD_KEY}`);
    if (!r.ok) throw new Error("HTTP "+r.status);
    const data = await r.json();
    if (data.status === 'error') throw new Error(data.message || 'API error');
    const values = (data?.values || []).slice().reverse();
    const prices = [], dates = [];
    values.forEach(v => {
      const p = parseFloat(v.close);
      if (isFinite(p) && p > 0){ prices.push(p); dates.push(v.datetime); }
    });
    if (prices.length < 2) throw new Error("insufficient data");
    const payload = { prices, dates };
    chartCache[cacheKey] = { data: payload, fetched: Date.now() };
    chartCurrentData = payload;
    renderChart(prices, ticker, dates);
  } catch(e){
    box.innerHTML = `<div class="chart-empty" style="color:var(--muted2)">${lang==='ar'?'تعذّر تحميل الشارت لهذه الفترة':'Chart unavailable for this range'}</div>`;
  }
}

function renderChart(prices, ticker, dates){
  const box = $("#chart-box");
  const meta = $("#chart-meta");
  if (!box || !prices || prices.length < 2) return;
  const min = Math.min(...prices), max = Math.max(...prices), range = max-min || 1;
  const W = 600, H = 140, PAD = 8;
  const xs = prices.map((_,i) => PAD + (i/(prices.length-1))*(W-2*PAD));
  const ys = prices.map(v => PAD + (1-(v-min)/range)*(H-2*PAD));
  const pts = prices.map((_,i) => `${xs[i]},${ys[i]}`).join(" ");
  const up = prices[prices.length-1] >= prices[0];
  const chg = prices[prices.length-1] - prices[0];
  const chgPct = prices[0] > 0 ? chg/prices[0]*100 : 0;
  const col = up ? "#5FE9B0" : "#F26B6E";
  box.innerHTML = `<svg id="stock-chart" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="touch-action:none;cursor:crosshair">
    <defs><linearGradient id="cg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="${col}" stop-opacity="0.25"/>
      <stop offset="1" stop-color="${col}" stop-opacity="0"/>
    </linearGradient></defs>
    <polygon points="${PAD},${H-PAD} ${pts} ${W-PAD},${H-PAD}" fill="url(#cg)"/>
    <polyline points="${pts}" fill="none" stroke="${col}" stroke-width="1.8"/>
    <line id="ch-cross" x1="0" y1="0" x2="0" y2="${H}" stroke="rgba(255,255,255,.25)" stroke-width="0.6" style="display:none"/>
    <circle id="ch-dot" cx="0" cy="0" r="3.5" fill="${col}" stroke="#000" stroke-width="1.4" style="display:none"/>
  </svg>`;
  const metaDefault = `<b style="color:${col}">${chg>=0?'+':''}${pct(chgPct)}</b> · $${fmt(prices[0])} → <b>$${fmt(prices[prices.length-1])}</b>`;
  if (meta) meta.innerHTML = metaDefault;

  // crosshair interaction
  const svg = $("#stock-chart");
  const cross = $("#ch-cross");
  const dot = $("#ch-dot");
  if (!svg) return;
  const handle = (e) => {
    const t = e.touches ? e.touches[0] : e;
    if (!t) return;
    const rect = svg.getBoundingClientRect();
    const x = (t.clientX - rect.left) / rect.width * W;
    let idx = Math.round((x - PAD) / (W - 2*PAD) * (prices.length - 1));
    idx = Math.max(0, Math.min(prices.length-1, idx));
    const cx = xs[idx], cy = ys[idx];
    cross.setAttribute('x1', cx); cross.setAttribute('x2', cx);
    cross.style.display = 'block';
    dot.setAttribute('cx', cx); dot.setAttribute('cy', cy);
    dot.style.display = 'block';
    const p = prices[idx];
    const d = dates ? dates[idx] : '';
    const dShort = d ? d.slice(0, d.length > 10 ? 10 : 10) : '';
    if (meta) meta.innerHTML = `<b style="color:${col};font-variant-numeric:tabular-nums">$${fmt(p)}</b> <small style="color:var(--muted);font-weight:500">· ${esc(dShort)}</small>`;
    e.preventDefault();
  };
  const reset = () => {
    cross.style.display = 'none';
    dot.style.display = 'none';
    if (meta) meta.innerHTML = metaDefault;
  };
  svg.addEventListener('mousemove', handle);
  svg.addEventListener('mouseleave', reset);
  svg.addEventListener('touchstart', handle, { passive: false });
  svg.addEventListener('touchmove', handle, { passive: false });
  svg.addEventListener('touchend', reset);
}

async function refreshNews(){
  if (!allHoldingsInPf().length) return;
  const btn = $("#news-btn");
  if (btn) { btn.disabled = true; btn.innerHTML = `<span class="spin"></span> ${t().news_refreshing}`; }
  const tickers = [...new Set(allHoldingsInPf().map(h => h.ticker))];
  const today_d = new Date().toISOString().slice(0,10);
  const from = new Date(Date.now() - 14*86400000).toISOString().slice(0,10);
  const all = [];
  let lastErr = null;
  await Promise.all(tickers.map(async tic => {
    try {
      const url = `${FINNHUB}/company-news?symbol=${encodeURIComponent(tic)}&from=${from}&to=${today_d}&token=${FINNHUB_KEY}`;
      const r = await fetch(url);
      if (!r.ok) { lastErr = new Error("HTTP "+r.status); return; }
      const items = await r.json();
      if (!Array.isArray(items)) return;
      items.sort((a,b) => (b.datetime||0) - (a.datetime||0));
      items.slice(0, 4).forEach(n => {
        if (!n.headline) return;
        all.push({
          id: uid(),
          ticker: tic,
          title: n.headline,
          summary: n.summary || "",
          source: n.source || "",
          url: n.url || "",
          ts: n.datetime || 0,
          time: n.datetime ? timeAgo(n.datetime * 1000) : ""
        });
      });
    } catch(e) { lastErr = e; }
  }));
  if (!all.length){
    toast((lang==='ar'?"خطأ: ":"Error: ") + (lastErr?.message || t().news_failed));
    if (btn) { btn.disabled = false; btn.innerHTML = `↻ ${t().news_refresh}`; }
    return;
  }
  const seen = new Set();
  const dedup = all.filter(n => { const k = n.title.toLowerCase(); if (seen.has(k)) return false; seen.add(k); return true; });
  dedup.sort((a,b) => (b.ts||0) - (a.ts||0));
  news = dedup.slice(0, 40);
  settings.lastNewsRefresh = new Date().toLocaleTimeString(lang==='ar'?'ar-SA':'en-US',{hour:'2-digit',minute:'2-digit'});
  save();
  render();
  if (lang === 'ar') translateNewsToArabic();
}

/* translate news to Arabic via MyMemory (free, CORS-enabled) */
async function translateNewsToArabic(){
  for (const n of news) {
    if (n.titleAr && (n.summaryAr || !n.summary)) continue;
    try {
      if (!n.titleAr && n.title) {
        const r = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(n.title)}&langpair=en|ar`);
        if (r.ok) {
          const d = await r.json();
          const out = d?.responseData?.translatedText;
          if (out && !out.includes("MYMEMORY")) n.titleAr = out;
        }
      }
      if (!n.summaryAr && n.summary) {
        const short = n.summary.slice(0, 400);
        const r = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(short)}&langpair=en|ar`);
        if (r.ok) {
          const d = await r.json();
          const out = d?.responseData?.translatedText;
          if (out && !out.includes("MYMEMORY")) n.summaryAr = out;
        }
      }
    } catch(e){}
  }
  save();
  if (activeTab === 'news') renderTab();
}

async function finnhubSearch(q){

/* try direct fetch, then two CORS proxies */
async function tryFetch(url){
  const attempts = [
    url,
    "https://corsproxy.io/?url=" + encodeURIComponent(url),
    "https://api.allorigins.win/raw?url=" + encodeURIComponent(url),
  ];
  let lastErr;
  for (const u of attempts) {
    try {
      const r = await fetch(u);
      if (!r.ok) { lastErr = new Error("HTTP " + r.status); continue; }
      return await r.json();
    } catch(e) { lastErr = e; }
  }
  throw lastErr || new Error("network failed");
}

function timeAgo(ms){
  const sec = (Date.now() - ms) / 1000;
  if (sec < 60) return lang==='ar' ? "الآن" : "now";
  const min = sec / 60;
  if (min < 60) return Math.floor(min) + (lang==='ar' ? " د" : "m");
  const hr = min / 60;
  if (hr < 24) return Math.floor(hr) + (lang==='ar' ? " س" : "h");
  const day = hr / 24;
  if (day < 30) return Math.floor(day) + (lang==='ar' ? " ي" : "d");
  return new Date(ms).toLocaleDateString(lang==='ar'?'ar-SA':'en-US',{month:'short',day:'numeric'});
}

    $("#tr_err").textContent = lang==='ar'?'تأكّد من الكمية والسعر':'Check quantity and price';
    return;
  }
  const curShares = statsFor(h).shares;
  if (type === 'sell' && qty > curShares){
    $("#tr_err").textContent = lang==='ar'?`الكمية أكبر من عندك (${fmt(curShares,curShares%1?4:0)})`:`Quantity exceeds holdings (${fmt(curShares,curShares%1?4:0)})`;

  }
  if (!Array.isArray(h.transactions)) h.transactions = [];
  h.transactions.push({ id: uid(), type, qty, price, date, ts: new Date(date).getTime() });

function saveWatch(){
  const tic = $("#wl_tic").value.trim().toUpperCase();
  if (!tic){ $("#wl_err").textContent = lang==='ar'?'اكتب الرمز':'Enter ticker'; return; }
  const name = $("#wl_tic").dataset.name || tic;
  const target = $("#wl_t").value ? parseFloat($("#wl_t").value) : null;
  const stop = $("#wl_s").value ? parseFloat($("#wl_s").value) : null;
  const note = $("#wl_n").value.trim();
  if (watchlist.find(w => w.ticker === tic && w.pfId === settings.activePf)){
    $("#wl_err").textContent = lang==='ar'?'موجود مسبقاً':'Already on watchlist'; return;
  }
  const w = { id: uid(), pfId: settings.activePf, ticker: tic, name, target, stop, note, price: null, dayChangePct: null, addedAt: Date.now() };
  watchlist.push(w);
  cloudUpsertWatch(w);
  save();
  closeModal();
  refreshWatchlistPrices();
  render();
}
function delWatch(id){
  cloudDeleteWatch(id);
  watchlist = watchlist.filter(w => w.id !== id);
  save();
  render();
}
function moveWatchToPortfolio(id){
  const w = watchlist.find(x => x.id === id);
  if (!w) return;
  watchlist = watchlist.filter(x => x.id !== id);
  save();
  editType = 'stock';
  editTags = [];
  editHorizon = null;
  modal(renderEditModal(null));
  setTimeout(()=>{
    if ($("#f_tic")) $("#f_tic").value = w.ticker;
    if ($("#f_tic")) $("#f_tic").dataset.name = w.name;
  }, 80);
}
async function refreshWatchlistPrices(){
  const items = watchlist.filter(w => w.pfId === settings.activePf);
  if (!items.length) return;
  await Promise.all(items.map(async w => {
    try {
      const r = await fetch(`${FINNHUB}/quote?symbol=${encodeURIComponent(w.ticker)}&token=${FINNHUB_KEY}`);
      if (!r.ok) return;
      const q = await r.json();
      if (q.c != null && q.c !== 0){
        w.price = q.c;
        w.dayChangePct = q.dp;
      }
    } catch(e){}
  }));
  save();
  if (activeTab === 'watch') renderTab();
}

function saveDividend(holdId){
  const h = holdings.find(x => x.id === holdId);
  if (!h) return;
  const amount = parseFloat($("#dv_a").value);
  const date = $("#dv_d").value || today();
  const note = $("#dv_n").value.trim();
  if (!isFinite(amount) || amount <= 0){
    $("#dv_err").textContent = lang==='ar'?'مبلغ غير صحيح':'invalid amount';
    return;

  if (!Array.isArray(h.dividends)) h.dividends = [];
  h.dividends.push({ id: uid(), amount, date, note, ts: new Date(date).getTime() });
  cloudUpsertHolding(h);
  save();
  closeModal();
  openDetail(holdId);
}
function delDividend(holdId, dvId){
  const h = holdings.find(x => x.id === holdId);
  if (!h) return;
  h.dividends = (h.dividends||[]).filter(d => d.id !== dvId);
  cloudUpsertHolding(h);
  save();
  openDetail(holdId);
}
function totalDividends(){
  let total = 0;
  holdings.filter(h => h.pfId === settings.activePf).forEach(h => {
    (h.dividends||[]).forEach(d => total += d.amount);
  });
  return total;
}

/* ── Watchlist + portfolio: target/stop alerts ── */
function targetAlertsCount(){
  let n = 0;
  holdings.filter(h => h.pfId === settings.activePf).forEach(h => {
    if (h.price == null) return;
    if (h.target && h.price >= h.target) n++;
    if (h.stopLoss && h.price <= h.stopLoss) n++;
  });
  watchlist.filter(w => w.pfId === settings.activePf).forEach(w => {
    if (w.price == null) return;
    if (w.target && w.price >= w.target) n++;
    if (w.stop && w.price <= w.stop) n++;
  });
  return n;
}

/* ── Insider trades via Finnhub ── */
async function loadInsiderTrades(holdId, ticker){
  const box = $("#ins-box-"+holdId);
  if (!box) return;
  try {
    const r = await fetch(`${FINNHUB}/stock/insider-transactions?symbol=${encodeURIComponent(ticker)}&token=${FINNHUB_KEY}`);
    if (!r.ok) throw new Error("HTTP "+r.status);
    const data = await r.json();
    const items = (data?.data || []).slice(0, 10);
    if (!items.length){ box.innerHTML = `<div style="padding:11px;text-align:center;color:var(--muted2);font-size:12px">${lang==='ar'?'لا توجد صفقات مطّلعين حديثة':'No recent insider activity'}</div>`; return; }
    box.innerHTML = `<div class="ins-list">${items.map(it => {
      const isBuy = (it.change || 0) > 0;
      return `<div class="ins-row">
        <span class="act ${isBuy?'buy':'sell'}">${isBuy?'BUY':'SELL'}</span>
        <span class="nm">${esc((it.name||'').slice(0,30))}</span>
        <span class="qty">${Math.abs(it.change||0).toLocaleString()}</span>
        <span class="dt">${esc((it.transactionDate||'').slice(0,10))}</span>
      </div>`;
    }).join("")}</div>`;
  } catch(e){
    box.innerHTML = `<div style="padding:11px;text-align:center;color:var(--muted2);font-size:12px">—</div>`;
  }
}

/* ── Earnings calendar via Finnhub ── */
async function loadStockEarnings(holdId, ticker){
  const box = $("#earn-box-"+holdId);
  if (!box) return;
  try {
    const to = new Date(Date.now() + 90*86400000).toISOString().slice(0,10);
    const from = new Date().toISOString().slice(0,10);
    const r = await fetch(`${FINNHUB}/calendar/earnings?from=${from}&to=${to}&symbol=${encodeURIComponent(ticker)}&token=${FINNHUB_KEY}`);
    if (!r.ok) throw new Error("HTTP "+r.status);
    const data = await r.json();
    const items = (data?.earningsCalendar || []);
    if (!items.length){ box.style.display = 'none'; return; }
    const next = items[0];
    const days = Math.ceil((new Date(next.date) - new Date()) / 86400000);
    box.innerHTML = `<div class="head">${lang==='ar'?'الأرباح القادمة':'Upcoming Earnings'}</div>
      <div class="when">${esc(next.date)} ${days>0?`<span style="color:var(--muted);font-size:11px;font-weight:500">· ${lang==='ar'?'بعد':'in'} ${days} ${lang==='ar'?'يوم':'days'}</span>`:''}</div>
      ${next.epsEstimate!=null?`<div class="est">${lang==='ar'?'EPS متوقع':'EPS estimate'}: $${fmt(next.epsEstimate,2)}</div>`:''}`;
  } catch(e){
    box.style.display = 'none';
  }
}

function doCreateChallenge(){
  const name = $("#nc_n").value.trim() || (lang==='ar'?'تحدّي':'Challenge');
  const cap = parseFloat($("#nc_c").value);
  const goal = parseFloat($("#nc_g").value);
  const sd = $("#nc_s").value;
  const ed = $("#nc_e").value;
  if (!isFinite(cap) || cap <= 0 || !isFinite(goal) || goal <= 0 || !sd || !ed){
    $("#nc_err").textContent = lang==='ar'?'تأكّد من الحقول':'Check fields'; return;

    startDate: sd, endDate: ed,

  openChallengePage();

function doChallengeSell(chId, tradeId){
  const c = challenges.find(x => x.id === chId);
  if (!c) return;
  const tr = c.trades.find(t => t.id === tradeId);
  if (!tr) return;
  const price = parseFloat($("#cs_p").value);
  const date = $("#cs_d").value || today();
  if (!isFinite(price) || price <= 0){
    $("#cs_err").textContent = lang==='ar'?'تأكّد من السعر':'Check price'; return;
  }
  tr.sellDate = date;
  tr.sellPrice = price;
  // assume bought whole balance: shares = invested / buyPrice, sold = shares * sellPrice
  const shares = tr.invested / tr.buyPrice;
  tr.sold = shares * price;
  tr.returnPct = (tr.sold - tr.invested) / tr.invested * 100;
  c.currentBalance = tr.sold;
  // achievement check: target hit?
  const pct = (c.currentBalance - c.startCapital) / c.startCapital * 100;
  if (pct >= c.targetPct){
    grantAchievement('challenge_win');
  }
  cloudUpsertChallenge(c);
  save();
  openChallengePage();
}

function checkAchievements(){
  if (!settings.achievements) settings.achievements = [];
  const hs = holdings.filter(h => h.pfId === settings.activePf);
  if (hs.length >= 1) grantAchievement('first_stock');
  const allTx = hs.flatMap(h => h.transactions || []);
  const buys = allTx.filter(t => t.type === 'buy');
  const sells = allTx.filter(t => t.type === 'sell');
  if (buys.length >= 1) grantAchievement('first_buy');
  if (sells.length >= 1) grantAchievement('first_sell');
  if (allTx.length >= 10) grantAchievement('ten_trades');
  if (hs.length >= 5) grantAchievement('five_stocks');
  if (hs.some(h => h.type && h.type !== 'stock')) grantAchievement('options');
  if (hs.some(h => (h.dividends||[]).length > 0)) grantAchievement('dividend');
  if (hs.some(h => { const s = statsFor(h); return s.realized > 0; })) grantAchievement('first_win');
  if (hs.some(h => { const s = statsFor(h); return s.plPct > 25 || (s.deposited>0 && (s.realized/s.deposited)*100 > 25); })) grantAchievement('big_win');
  const uniqueTags = new Set();
  hs.forEach(h => (h.tags||[]).forEach(tg => uniqueTags.add(tg)));
  if (uniqueTags.size >= 3) grantAchievement('diversified');
  if (hs.some(h => h.purchaseDate && (Date.now() - new Date(h.purchaseDate).getTime()) > 180*86400000)) grantAchievement('patient');
}

/* ── Weekly summary ── */
function weeklySummary(){
  const hist = history.filter(h => h.pfId === settings.activePf);
  if (hist.length < 2) return null;
  const now = Date.now();
  const week_ago = now - 7*86400000;
  const past = hist.filter(h => new Date(h.date).getTime() <= week_ago).slice(-1)[0];
  const cur = hist[hist.length-1];
  if (!past || !cur) return null;
  const change = cur.value - past.value;
  const pct = past.value > 0 ? change/past.value*100 : 0;
  // best/worst holding this week (based on day change roughly)
  const hs = activeHoldings().map(h => ({ h, s: statsFor(h) }));
  hs.sort((a,b) => (b.s.todayPct||0) - (a.s.todayPct||0));
  const best = hs[0]?.h.ticker;
  const worst = hs[hs.length-1]?.h.ticker;
  return { change, pct, best, worst };
}

function importData(){
  const inp = document.createElement('input');
  inp.type = 'file';
  inp.accept = 'application/json,.json';
  inp.onchange = e => {
    const f = e.target.files[0];
    if (!f) return;
    const r = new FileReader();
    r.onload = async ev => {
      try {
        const b = JSON.parse(ev.target.result);
        if (!b.portfolios || !b.holdings){ toast(lang==='ar'?'ملف غير صالح':'Invalid file'); return; }
        profile = b.profile || profile;
        settings = { ...settings, ...(b.settings || {}) };
        portfolios = b.portfolios || [];
        holdings = b.holdings || [];
        news = b.news || [];
        history = b.history || [];
        watchlist = b.watchlist || [];
        challenges = b.challenges || [];
        await save();
        toast(lang==='ar'?'تم الاستيراد':'Imported');
        render();
      } catch(err){ toast((lang==='ar'?'خطأ: ':'Error: ') + err.message); }
    };
    r.readAsText(f);
  };
  inp.click();
}

const _origLiveSearch = liveSearch;
liveSearch = function(inpId, boxId){
  // backward-compat: no args → old behavior on f_tic/sg-box
  const ti = inpId || 'f_tic';
  const bx = boxId || 'sg-box';
  clearTimeout(searchTimer);
  searchTimer = setTimeout(async () => {
    const inp = document.getElementById(ti);
    const box = document.getElementById(bx);
    if (!inp || !box) return;
    const q = inp.value.trim();
    if (!q) { box.innerHTML = ""; return; }
    box.innerHTML = `<div class="suggest"><div class="sg-loading"><span class="spin"></span> ${t().search_loading}</div></div>`;
    try {
      const results = await finnhubSearch(q);
      if (inp.value.trim() !== q) return;
      if (!results.length) { box.innerHTML = `<div class="suggest"><div class="sg-loading">${t().no_match}</div></div>`; return; }
      box.innerHTML = `<div class="suggest">${results.map(r => {
        const nm = (r.d || '').replace(/'/g,"&#39;").replace(/"/g,"&quot;");
        return `<div class="sg-item" onclick="(()=>{document.getElementById('${ti}').value='${esc(r.s)}';document.getElementById('${ti}').dataset.name='${esc(nm)}';document.getElementById('${bx}').innerHTML='';})()">
          <span class="tic">${esc(r.s)}</span>
          <span class="nm">${esc(r.d || '')}</span>
        </div>`;
      }).join("")}</div>`;
    } catch(e) {
      if (inp.value.trim() === q) box.innerHTML = `<div class="suggest"><div class="sg-loading">${esc(e.message||t().no_match)}</div></div>`;
    }
  }, 380);
};

/* ════ refresh prices via Finnhub ════ */
async function refreshPrices(){
  if (!allHoldingsInPf().length){ toast(t().add_first); return; }
  const btn = $("#refresh-btn");
  if (btn) { btn.disabled = true; btn.innerHTML = `<span class="spin"></span> ${t().refreshing}`; }
  ensureSymbols();
  const tickers = [...new Set(allHoldingsInPf().map(h => h.ticker))];
  let n = 0, lastErr = null;
  const results = await Promise.all(tickers.map(async tic => {
    try {
      const url = `${FINNHUB}/quote?symbol=${encodeURIComponent(tic)}&token=${FINNHUB_KEY}`;
      const r = await fetch(url);
      if (!r.ok) { lastErr = new Error("HTTP "+r.status); return null; }
      const q = await r.json();
      if (q.c == null || q.c === 0) { lastErr = new Error((lang==='ar'?`الرمز ${tic} غير صالح`:`invalid: ${tic}`)); return null; }
      return { tic, price: q.c, prev: q.pc, changePct: q.dp };
    } catch(e) { lastErr = e; return null; }
  }));
  results.forEach(r => {
    if (!r) return;
    holdings.forEach(h => {
      if (h.pfId === settings.activePf && h.ticker === r.tic) {
        h.price = r.price;
        if (r.prev != null) h.prev = r.prev;
        if (r.changePct != null) h.dayChangePct = r.changePct;
        n++;
      }
    });
  });
  // backfill names from cached symbol list
  if (symbolList?.length) {
    holdings.forEach(h => {
      if (h.pfId === settings.activePf && (!h.name || h.name === h.ticker)) {
        const found = symbolList.find(s => s.s === h.ticker);
        if (found?.d) h.name = found.d;
      }
    });
  }
  if (n === 0) {
    toast((lang==='ar'?"خطأ: ":"Error: ") + (lastErr?.message || t().refresh_failed));
    if (btn) { btn.disabled = false; btn.innerHTML = `↻ ${t().refresh}`; }
    return;
  }
  settings.lastRefresh = new Date().toLocaleTimeString(lang==='ar'?'ar-SA':'en-US',{hour:'2-digit',minute:'2-digit'});
  save();
  toast(t().refresh_ok(n));
  render();
}

async function doDeletePf(id){
  await cloudDeletePortfolio(id);
  portfolios = portfolios.filter(p => p.id !== id);
  holdings = holdings.filter(h => h.pfId !== id);
  watchlist = watchlist.filter(w => w.pfId !== id);
  challenges = challenges.filter(c => c.pfId !== id);
  history = history.filter(h => h.pfId !== id);
  if (settings.activePf === id) { settings.activePf = null; settings.unlocked = false; }
  save();
  closeModal();
  render();
}

/* modal / toast */
function modal(html){
  closeModal();
  const s = document.createElement("div"); s.className="scrim"; s.id="scrim";
  s.innerHTML = `<div class="modal">${html}</div>`;
  s.addEventListener("click", e => { if (e.target === s) closeModal(); });
  document.body.appendChild(s);
}
function closeModal(){ const s=$("#scrim"); if(s) s.remove(); }
function toast(msg){
  $$(".toast").forEach(t => t.remove());
  const el = document.createElement("div");
  el.className = "toast";
  el.textContent = msg;
  el.title = "Tap to dismiss";
  el.style.cursor = "pointer";
  el.onclick = () => el.remove();
  document.body.appendChild(el);
  setTimeout(()=>{ if (el.parentElement) { el.style.transition="opacity .3s"; el.style.opacity="0"; setTimeout(()=>el.remove(),300); } }, 7000);
}
