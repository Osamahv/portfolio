/* ── Live price refresh while in stock detail (every 30s) ── */
let _stockDetailInterval = null;
function startStockLiveRefresh(holdId){
  stopStockLiveRefresh();
  _stockDetailInterval = setInterval(async () => {
    const stillOpen = document.querySelector('.modal');
    if (!stillOpen){ stopStockLiveRefresh(); return; }
    const h = holdings.find(x => x.id === holdId);
    if (!h) { stopStockLiveRefresh(); return; }
    try {
      const r = await fetch(`${FINNHUB}/quote?symbol=${h.ticker}&token=${FINNHUB_KEY}`);
      if (!r.ok) return;
      const q = await r.json();
      if (q && q.c){
        h.price = q.c;
        h.prev = q.pc;
        h.dayChangePct = q.dp;
        // Update display elements live
        if (typeof updateWhatIf === 'function') updateWhatIf(holdId);
        save();
      }
    } catch(e){}
  }, 30000);
}
function stopStockLiveRefresh(){
  if (_stockDetailInterval){
    clearInterval(_stockDetailInterval);
    _stockDetailInterval = null;
  }
}
function closeDetail(){
  stopStockLiveRefresh();
  closeModal();
}

/* ── What-if calculator ── */
function updateWhatIf(holdId){
  const h = holdings.find(x => x.id === holdId);
  if (!h) return;
  const inp = document.getElementById('whatif_p');
  const resEl = document.getElementById('whatif_result');
  if (!inp || !resEl) return;
  const sellPrice = parseFloat(inp.value);
  if (!isFinite(sellPrice) || sellPrice <= 0){
    resEl.innerHTML = `<span style="color:var(--muted2)">${lang==='ar'?'أدخل سعر صحيح':'Enter a valid price'}</span>`;
    return;
  }
  const s = statsFor(h);
  const mult = (h.type && h.type !== 'stock') ? 100 : 1;
  const proceedsGross = s.shares * sellPrice * mult;
  const costBasis = s.shares * s.avg * mult;
  const profit = proceedsGross - costBasis;
  const profitPct = costBasis > 0 ? (profit / costBasis) * 100 : 0;
  const up = profit >= 0;
  const ar = lang === 'ar';
  resEl.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px">
      <span style="color:var(--muted)">${ar?'إجمالي المبيع':'Proceeds'}</span>
      <b style="font-variant-numeric:tabular-nums">${fmtMoney(proceedsGross, 2)}</b>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px">
      <span style="color:var(--muted)">${ar?'التكلفة الأصلية':'Cost basis'}</span>
      <span style="font-variant-numeric:tabular-nums">${fmtMoney(costBasis, 2)}</span>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:baseline;padding-top:7px;border-top:1px solid var(--line);margin-top:5px">
      <span style="font-weight:700">${ar?'الربح/الخسارة':'P&L'}</span>
      <b style="color:${up?'var(--accent)':'var(--loss)'};font-variant-numeric:tabular-nums;font-size:14.5px">${up?'+':''}${fmtMoney(Math.abs(profit), 2)} (${up?'+':''}${fmt(profitPct,1)}%)</b>
    </div>
  `;
}

/* ── Fetch latest stock news (3-5 items) ── */
async function loadStockNews(holdId, ticker){
  const wrap = document.getElementById(`stock-news-${holdId}`);
  if (!wrap) return;
  try {
    const from = new Date(Date.now() - 30*86400000).toISOString().slice(0,10);
    const to = new Date().toISOString().slice(0,10);
    const r = await fetch(`${FINNHUB}/company-news?symbol=${ticker}&from=${from}&to=${to}&token=${FINNHUB_KEY}`);
    if (!r.ok) return;
    const news = await r.json();
    const items = (Array.isArray(news) ? news : []).slice(0, 5);
    if (!items.length) return;
    const ar = lang === 'ar';
    wrap.innerHTML = `
      <div class="coll open">
        <div class="coll-head">
          <span class="ttl">📰 ${ar?'آخر الأخبار':'Latest News'}</span>
        </div>
        <div class="coll-body" style="max-height:none">
          ${items.map(n => `<a href="${esc(n.url||'#')}" target="_blank" rel="noopener" style="display:block;padding:10px 13px;border-bottom:1px solid var(--line);text-decoration:none;color:var(--txt2)">
            <div style="font-size:12.5px;font-weight:600;line-height:1.45;margin-bottom:4px">${esc((n.headline||'').slice(0,140))}</div>
            <div style="font-size:10px;color:var(--muted2);font-variant-numeric:tabular-nums">${esc(n.source||'')} · ${n.datetime?new Date(n.datetime*1000).toISOString().slice(0,10):''}</div>
          </a>`).join('')}
        </div>
      </div>
    `;
  } catch(e){}
}

/* ── Inline analyst recommendation summary in stock detail ── */
async function loadStockAnalystInline(holdId, ticker){
  const wrap = document.getElementById(`stock-analyst-${holdId}`);
  if (!wrap) return;
  try {
    const data = await fetchAnalystData(ticker);
    if (!data) return;
    const rec = data.recommendation;
    const t = data.target;
    if (!rec && !t) return;
    const ar = lang === 'ar';
    const totalRec = rec ? (rec.strongBuy + rec.buy + rec.hold + rec.sell + rec.strongSell) : 0;
    const buyish = rec ? rec.strongBuy + rec.buy : 0;
    const sellish = rec ? rec.sell + rec.strongSell : 0;
    const consensus = totalRec ? (buyish > sellish + (rec.hold||0)/2 ? (ar?'شراء':'Buy') 
                                 : sellish > buyish + (rec.hold||0)/2 ? (ar?'بيع':'Sell')
                                 : (ar?'تثبيت':'Hold')) : null;
    const consColor = consensus === (ar?'شراء':'Buy') ? 'var(--accent)' 
                    : consensus === (ar?'بيع':'Sell') ? 'var(--loss)' 
                    : 'var(--gold)';
    const price = data.price || holdings.find(x => x.id === holdId)?.price || null;
    wrap.innerHTML = `
      <div class="coll open">
        <div class="coll-head">
          <span class="ttl">📈 ${ar?'توصيات المحللين':'Analyst Recommendations'}</span>
        </div>
        <div class="coll-body" style="padding:13px">
          ${consensus && totalRec > 0 ? `
            <div style="background:#000;border:1px solid var(--line);border-radius:10px;padding:11px 12px;margin-bottom:8px;font-size:12.5px;line-height:1.6">
              ${ar?`<b>${totalRec}</b> محلل بإجماع <b style="color:${consColor}">${consensus}</b>` : `<b>${totalRec}</b> analysts with consensus <b style="color:${consColor}">${consensus}</b>`}
              ${t && t.mean && price ? `<br><span style="color:var(--muted);font-size:11.5px">${ar?'الهدف المتوسط':'Avg target'}: <b style="color:var(--txt2)">$${fmt(t.mean,0)}</b> (<b style="color:${t.mean>price?'var(--accent)':'var(--loss)'}">${t.mean>price?'+':''}${fmt((t.mean-price)/price*100,1)}%</b>)</span>`:''}
            </div>
          ` : ''}
          ${rec ? `<div class="an-rec" style="margin:0">
            ${rec.strongBuy ? `<span class="pill strongbuy">${rec.strongBuy} ${ar?'شراء قوي':'STRONG BUY'}</span>` : ''}
            ${rec.buy ? `<span class="pill buy">${rec.buy} ${ar?'شراء':'BUY'}</span>` : ''}
            ${rec.hold ? `<span class="pill hold">${rec.hold} ${ar?'تثبيت':'HOLD'}</span>` : ''}
            ${rec.sell ? `<span class="pill sell">${rec.sell} ${ar?'بيع':'SELL'}</span>` : ''}
            ${rec.strongSell ? `<span class="pill strongsell">${rec.strongSell} ${ar?'بيع قوي':'STRONG SELL'}</span>` : ''}
          </div>` : ''}
          ${t && t.high && t.low ? `<div style="margin-top:9px;display:flex;justify-content:space-between;background:#000;border:1px solid var(--line);border-radius:9px;padding:9px 11px;font-size:11.5px;font-variant-numeric:tabular-nums">
            <div><div style="color:var(--muted);font-size:9.5px;text-transform:uppercase;letter-spacing:.05em">${ar?'أدنى':'Low'}</div><div style="color:var(--loss);font-weight:800">$${fmt(t.low,0)}</div></div>
            <div><div style="color:var(--muted);font-size:9.5px;text-transform:uppercase;letter-spacing:.05em">${ar?'متوسط':'Avg'}</div><div style="color:var(--txt);font-weight:800">$${fmt(t.mean,2)}</div></div>
            <div><div style="color:var(--muted);font-size:9.5px;text-transform:uppercase;letter-spacing:.05em">${ar?'أعلى':'High'}</div><div style="color:var(--accent);font-weight:800">$${fmt(t.high,0)}</div></div>
          </div>` : ''}
        </div>
      </div>
    `;
  } catch(e){}
}

function delTransaction(holdId, txId){
  const h = holdings.find(x => x.id === holdId);
  if (!h) return;
  modal(`<h2>${lang==='ar'?'حذف العملية؟':'Delete transaction?'}</h2>
    <p class="sub">${lang==='ar'?'بيُعاد حساب المتوسط والربح المحقّق.':'Average and realized P&L will be recomputed.'}</p>
    <div class="m-actions">
      <button class="btn" onclick="openDetail('${holdId}')">${t().cancel}</button>
      <button class="btn danger" onclick="doDelTx('${holdId}','${txId}')">${t().delete}</button>
    </div>`);
}
function doDelTx(holdId, txId){
  const h = holdings.find(x => x.id === holdId);
  if (!h) return;
  h.transactions = (h.transactions||[]).filter(t => t.id !== txId);
  cloudUpsertHolding(h);
  save(); closeModal(); openDetail(holdId);
}

let chartCurrentRange = '1m';
let chartCurrentTicker = null;
let chartCurrentData = null; // {prices, dates}

async function loadChart(ticker){
  chartCurrentTicker = ticker;
  if (!chartCurrentRange) chartCurrentRange = '1m';
  await loadChartRange(ticker, chartCurrentRange);
}

async function loadChartRange(ticker, rangeId){
  const box = $("#chart-box");
  if (!box) return;
  chartCurrentRange = rangeId;
  const range = CHART_RANGES.find(r => r.id === rangeId) || CHART_RANGES[2];
  const cacheKey = `${ticker}_${rangeId}`;
  const cached = chartCache[cacheKey];
  // update active button
  document.querySelectorAll('.chart-range-btn').forEach(b => {
    b.classList.toggle('on', b.dataset.range === rangeId);
  });
  if (cached && Date.now() - cached.fetched < 1800000){
    chartCurrentData = cached.data;
    renderChart(cached.data.prices, ticker, cached.data.dates);
    return;
  }
  box.innerHTML = `<div class="chart-empty"><span class="spin"></span> ${lang==='ar'?'تحميل...':'Loading...'}</div>`;
  try {
    const r = await fetch(`${TD}/time_series?symbol=${encodeURIComponent(ticker)}&interval=${range.interval}&outputsize=${range.size}&apikey=${TD_KEY}`);
    if (!r.ok) throw new Error("HTTP "+r.status);
    const data = await r.json();
    if (data.status === 'error') throw new Error(data.message || 'API error');
    const values = (data?.values || []).slice().reverse();
    const prices = [], dates = [];
    values.forEach(v => {
      const p = parseFloat(v.close);
      if (isFinite(p) && p > 0){ prices.push(p); dates.push(v.datetime); }
    });
    if (prices.length < 2) throw new Error("insufficient data");
    const payload = { prices, dates };
    chartCache[cacheKey] = { data: payload, fetched: Date.now() };
    chartCurrentData = payload;
    renderChart(prices, ticker, dates);
  } catch(e){
    box.innerHTML = `<div class="chart-empty" style="color:var(--muted2)">${lang==='ar'?'تعذّر تحميل الشارت لهذه الفترة':'Chart unavailable for this range'}</div>`;
  }
}

function renderChart(prices, ticker, dates){
  const box = $("#chart-box");
  const meta = $("#chart-meta");
  if (!box || !prices || prices.length < 2) return;
  const min = Math.min(...prices), max = Math.max(...prices), range = max-min || 1;
  const W = 600, H = 200, PAD = 12;
  const xs = prices.map((_,i) => PAD + (i/(prices.length-1))*(W-2*PAD));
  const ys = prices.map(v => PAD + (1-(v-min)/range)*(H-2*PAD));
  const pts = prices.map((_,i) => `${xs[i]},${ys[i]}`).join(" ");
  const up = prices[prices.length-1] >= prices[0];
  const chg = prices[prices.length-1] - prices[0];
  const chgPct = prices[0] > 0 ? chg/prices[0]*100 : 0;
  // Navy/indigo theme for chart (like competitor)
  const col = up ? "#5FE9B0" : "#F08080";
  const lineCol = "#9B9FFF"; // soft indigo
  const fillFrom = "#5B5FE9";
  box.innerHTML = `<svg id="stock-chart" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="touch-action:none;cursor:crosshair;width:100%;height:200px">
    <defs><linearGradient id="cg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="${fillFrom}" stop-opacity="0.32"/>
      <stop offset="1" stop-color="${fillFrom}" stop-opacity="0"/>
    </linearGradient></defs>
    <text x="${PAD}" y="${ys[ys.indexOf(Math.min(...ys))]+18}" fill="#666" font-size="11" font-family="-apple-system,SF Pro Display,Inter,sans-serif" font-weight="500">$${fmt(min,2)}</text>
    <text x="${PAD}" y="${Math.max(ys[ys.indexOf(Math.max(...ys))]-6,14)}" fill="#888" font-size="11" font-family="-apple-system,SF Pro Display,Inter,sans-serif" font-weight="500">$${fmt(max,2)}</text>
    <polygon points="${PAD},${H-PAD} ${pts} ${W-PAD},${H-PAD}" fill="url(#cg)"/>
    <polyline points="${pts}" fill="none" stroke="${lineCol}" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    <line id="ch-cross" x1="0" y1="0" x2="0" y2="${H}" stroke="rgba(255,255,255,.25)" stroke-width="0.6" style="display:none"/>
    <circle id="ch-dot" cx="0" cy="0" r="4" fill="${lineCol}" stroke="#000" stroke-width="1.5" style="display:none"/>
  </svg>`;
  const metaDefault = `<b style="color:${col}">${chg>=0?'+':''}${pct(chgPct)}</b> · $${fmt(prices[0])} → <b>$${fmt(prices[prices.length-1])}</b>`;
  if (meta) meta.innerHTML = metaDefault;

  // crosshair interaction
  const svg = $("#stock-chart");
  const cross = $("#ch-cross");
  const dot = $("#ch-dot");
  if (!svg) return;
  const handle = (e) => {
    const t = e.touches ? e.touches[0] : e;
    if (!t) return;
    const rect = svg.getBoundingClientRect();
    const x = (t.clientX - rect.left) / rect.width * W;
    let idx = Math.round((x - PAD) / (W - 2*PAD) * (prices.length - 1));
    idx = Math.max(0, Math.min(prices.length-1, idx));
    const cx = xs[idx], cy = ys[idx];
    cross.setAttribute('x1', cx); cross.setAttribute('x2', cx);
    cross.style.display = 'block';
    dot.setAttribute('cx', cx); dot.setAttribute('cy', cy);
    dot.style.display = 'block';
    const p = prices[idx];
    const d = dates ? dates[idx] : '';
    const dShort = d ? d.slice(0, d.length > 10 ? 10 : 10) : '';
    if (meta) meta.innerHTML = `<b style="color:${col};font-variant-numeric:tabular-nums">$${fmt(p)}</b> <small style="color:var(--muted);font-weight:500">· ${esc(dShort)}</small>`;
    e.preventDefault();
  };
  const reset = () => {
    cross.style.display = 'none';
    dot.style.display = 'none';
    if (meta) meta.innerHTML = metaDefault;
  };
  svg.addEventListener('mousemove', handle);
  svg.addEventListener('mouseleave', reset);
  svg.addEventListener('touchstart', handle, { passive: false });
  svg.addEventListener('touchmove', handle, { passive: false });
  svg.addEventListener('touchend', reset);
}

async function refreshNews(){
  if (!allHoldingsInPf().length) return;
  const btn = $("#news-btn");
  if (btn) { btn.disabled = true; btn.innerHTML = `<span class="spin"></span> ${t().news_refreshing}`; }
  const tickers = [...new Set(allHoldingsInPf().map(h => h.ticker))];
  const today_d = new Date().toISOString().slice(0,10);
  const from = new Date(Date.now() - 14*86400000).toISOString().slice(0,10);
  const all = [];
  let lastErr = null;
  await Promise.all(tickers.map(async tic => {
    try {
      const url = `${FINNHUB}/company-news?symbol=${encodeURIComponent(tic)}&from=${from}&to=${today_d}&token=${FINNHUB_KEY}`;
      const r = await fetch(url);
      if (!r.ok) { lastErr = new Error("HTTP "+r.status); return; }
      const items = await r.json();
      if (!Array.isArray(items)) return;
      items.sort((a,b) => (b.datetime||0) - (a.datetime||0));
      items.slice(0, 4).forEach(n => {
        if (!n.headline) return;
        all.push({
          id: uid(),
          ticker: tic,
          title: n.headline,
          summary: n.summary || "",
          source: n.source || "",
          url: n.url || "",
          ts: n.datetime || 0,
          time: n.datetime ? timeAgo(n.datetime * 1000) : ""
        });
      });
    } catch(e) { lastErr = e; }
  }));
  if (!all.length){
    toast((lang==='ar'?"خطأ: ":"Error: ") + (lastErr?.message || t().news_failed));
    if (btn) { btn.disabled = false; btn.innerHTML = `↻ ${t().news_refresh}`; }
    return;
  }
  const seen = new Set();
  const dedup = all.filter(n => { const k = n.title.toLowerCase(); if (seen.has(k)) return false; seen.add(k); return true; });
  dedup.sort((a,b) => (b.ts||0) - (a.ts||0));
  news = dedup.slice(0, 40);
  settings.lastNewsRefresh = new Date().toLocaleTimeString(lang==='ar'?'ar-SA':'en-US',{hour:'2-digit',minute:'2-digit'});
  save();
  render();
  if (lang === 'ar') translateNewsToArabic();
}

/* translate news to Arabic via MyMemory (free, CORS-enabled) */
async function translateNewsToArabic(){
  for (const n of news) {
    if (n.titleAr && (n.summaryAr || !n.summary)) continue;
    try {
      if (!n.titleAr && n.title) {
        const r = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(n.title)}&langpair=en|ar`);
        if (r.ok) {
          const d = await r.json();
          const out = d?.responseData?.translatedText;
          if (out && !out.includes("MYMEMORY")) n.titleAr = out;
        }
      }
      if (!n.summaryAr && n.summary) {
        const short = n.summary.slice(0, 400);
        const r = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(short)}&langpair=en|ar`);
        if (r.ok) {
          const d = await r.json();
          const out = d?.responseData?.translatedText;
          if (out && !out.includes("MYMEMORY")) n.summaryAr = out;
        }
      }
    } catch(e){}
  }
  save();
  if (activeTab === 'news') renderTab();
}

const CURRENCIES = {
  USD: { sym:'$',    fl:'🇺🇸', name:{ar:'دولار',  en:'USD'}, rate:1     },
  SAR: { sym:'ر.س', fl:'🇸🇦', name:{ar:'ريال',   en:'SAR'}, rate:3.75  },
  EUR: { sym:'€',    fl:'🇪🇺', name:{ar:'يورو',   en:'EUR'}, rate:0.92  },

};
function getCurrency(){ return (settings && settings.currency) || 'USD'; }
function convCur(usdAmount){
  const c = CURRENCIES[getCurrency()] || CURRENCIES.USD;
  return usdAmount * c.rate;
}
function fmtMoney(usdAmount, decimals){
  const c = CURRENCIES[getCurrency()] || CURRENCIES.USD;
  const v = usdAmount * c.rate;
  const dec = decimals != null ? decimals : (Math.abs(v) >= 100 ? 0 : 2);
  const formatted = (v >= 0 ? '' : '−') + Math.abs(v).toLocaleString(undefined, { minimumFractionDigits: dec, maximumFractionDigits: dec });
  if (getCurrency() === 'USD') return '$' + formatted;
  return formatted + ' ' + c.sym;
}
function fmtMoney0(usdAmount){ return fmtMoney(usdAmount, 0); }
// Always-USD formatter (for base values that should never convert)
function fmtUSD(usdAmount, decimals){
  const dec = decimals != null ? decimals : (Math.abs(usdAmount) >= 100 ? 0 : 2);
  const formatted = (usdAmount >= 0 ? '' : '−') + Math.abs(usdAmount).toLocaleString(undefined, { minimumFractionDigits: dec, maximumFractionDigits: dec });
  return '$' + formatted;
}
function fmtUSD0(usdAmount){ return fmtUSD(usdAmount, 0); }
// Localized currency under the hero (uses settings.currency)
function fmtLocalCurrency(usdAmount){
  const c = CURRENCIES[getCurrency()] || CURRENCIES.USD;
  if (getCurrency() === 'USD') return null; // Don't show duplicate USD
  const v = usdAmount * c.rate;
  return Math.round(v).toLocaleString() + ' ' + c.sym;
}

/* try direct fetch, then two CORS proxies */
async function tryFetch(url){
  const attempts = [
    url,
    "https://corsproxy.io/?url=" + encodeURIComponent(url),
    "https://api.allorigins.win/raw?url=" + encodeURIComponent(url),
  ];
  let lastErr;
  for (const u of attempts) {
    try {
      const r = await fetch(u);
      if (!r.ok) { lastErr = new Error("HTTP " + r.status); continue; }
      return await r.json();
    } catch(e) { lastErr = e; }
  }
  throw lastErr || new Error("network failed");
}

function timeAgo(ms){
  const sec = (Date.now() - ms) / 1000;
  if (sec < 60) return lang==='ar' ? "الآن" : "now";
  const min = sec / 60;
  if (min < 60) return Math.floor(min) + (lang==='ar' ? " د" : "m");
  const hr = min / 60;
  if (hr < 24) return Math.floor(hr) + (lang==='ar' ? " س" : "h");
  const day = hr / 24;
  if (day < 30) return Math.floor(day) + (lang==='ar' ? " ي" : "d");
  return new Date(ms).toLocaleDateString(lang==='ar'?'ar-SA':'en-US',{month:'short',day:'numeric'});
}

function setTradeField(field){
  if (!window._trade) return;
  window._trade.activeField = field;
  document.querySelectorAll('.tr-field-inp').forEach(el => el.classList.remove('active'));
  const id = field === 'price' ? 'tr-price-disp' : 'tr-qty-disp';
  document.getElementById(id)?.classList.add('active');
}

function tradeKey(k){
  if (!window._trade) return;
  const T = window._trade;
  const field = T.activeField;
  let cur = T[field] || '';
  if (k === '⌫'){
    cur = cur.slice(0, -1);
  } else if (k === '.'){
    if (!cur.includes('.')) cur = (cur || '0') + '.';
  } else {
    if (cur === '0') cur = k;
    else cur = cur + k;
  }
  T[field] = cur;
  updateTradeDisplay();
}

function updateTradeDisplay(){
  const T = window._trade; if (!T) return;
  const priceVal = document.getElementById('tr-price-val');
  const qtyVal = document.getElementById('tr-qty-val');
  if (priceVal) priceVal.textContent = T.price || '';
  if (qtyVal) qtyVal.textContent = T.qty || '0';
  const price = parseFloat(T.price) || T.curPrice || 0;
  const qty = parseFloat(T.qty) || 0;
  const total = price * qty;
  const totEl = document.getElementById('tr-total');
  if (totEl) totEl.textContent = fmtUSD(total, 2);
  const submit = document.getElementById('tr-submit');
  const err = document.getElementById('tr_err');
  if (!submit) return;
  let canSubmit = qty > 0 && price > 0;
  let errMsg = '';
  if (T.type === 'buy' && total > T.cash){
    canSubmit = false;
    errMsg = lang==='ar'?`الرصيد ${fmtUSD(T.cash,2)} فقط`:`Balance only ${fmtUSD(T.cash,2)}`;
  } else if (T.type === 'sell' && qty > T.curShares){
    canSubmit = false;
    errMsg = lang==='ar'?`عندك ${fmt(T.curShares,4)} فقط`:`You have ${fmt(T.curShares,4)} only`;
  }
  submit.disabled = !canSubmit;
  if (err) err.textContent = errMsg;
}

function saveTradeFromKeypad(){
  const T = window._trade; if (!T) return;
  const price = parseFloat(T.price);
  const qty = parseFloat(T.qty);
  if (!isFinite(price) || price <= 0 || !isFinite(qty) || qty <= 0) return;
  const h = holdings.find(x => x.id === T.holdId);
  if (!h) return;
  // Create transaction
  if (!h.transactions) h.transactions = [];
  h.transactions.push({ id: uid(), type: T.type, qty, price, date: today(), ts: Date.now() });
  const totalCost = qty * price;
  if (T.type === 'buy'){
    setPfCash(getPfCash() - totalCost);
  } else {
    setPfCash(getPfCash() + totalCost);
  }
  // Auto-delete if fully sold
  const remaining = statsFor(h).shares;
  if (remaining <= 0.0001){
    holdings = holdings.filter(x => x.id !== h.id);
  }
  logActivity(T.type, { ticker: T.ticker, qty, price, total: totalCost });
  save();
  closeModal();
  setActiveTab('portfolio');
  toast(lang==='ar'? (T.type==='buy'?'تم الشراء':'تم البيع' + (remaining<=0.0001?' · تم حذف السهم':'')) : (T.type==='buy'?'Bought':'Sold' + (remaining<=0.0001?' · Holding removed':'')));
}

function saveTrade(holdId, type){
  const h = holdings.find(x => x.id === holdId);
  if (!h) return;
  const qty = parseFloat($("#tr_q").value);
  const price = parseFloat($("#tr_p").value);
  const date = $("#tr_d").value || today();
  if (isNaN(qty) || qty <= 0 || isNaN(price) || price < 0){
    $("#tr_err").textContent = lang==='ar'?'تأكّد من الكمية والسعر':'Check quantity and price';
    return;
  }
  const curShares = statsFor(h).shares;
  if (type === 'sell' && qty > curShares){
    $("#tr_err").textContent = lang==='ar'?`الكمية أكبر من عندك (${fmt(curShares,curShares%1?4:0)})`:`Quantity exceeds holdings (${fmt(curShares,curShares%1?4:0)})`;
    return;
  }
  if (!Array.isArray(h.transactions)) h.transactions = [];
  // Update portfolio cash based on trade
  const mult = (h.type && h.type !== 'stock') ? 100 : 1;
  const tradeCost = qty * price * mult;
  if (type === 'buy'){
    const curCash = getPfCash();
    if (curCash < tradeCost && curCash > 0){
      // Soft warning but allow (might be using external funds)
      if (!confirm(lang==='ar'
        ? `الكاش الحالي ${fmtMoney(curCash)} أقل من سعر الصفقة ${fmtMoney(tradeCost)}. متابعة؟`
        : `Current cash ${fmtMoney(curCash)} is less than trade cost ${fmtMoney(tradeCost)}. Continue?`)){
        return;
      }
    }
    setPfCash(Math.max(0, curCash - tradeCost));
  } else {
    setPfCash(getPfCash() + tradeCost);
  }
  h.transactions.push({ id: uid(), type, qty, price, date, ts: new Date(date).getTime() });
  cloudUpsertHolding(h);
  logActivity(type, { ticker: h.ticker, qty, price });
  // check if sold everything
  const after = statsFor(h);
  if (type === 'sell' && after.shares <= 0.0000001){
    save();
    modal(`<h2>${lang==='ar'?'بعت كل الكمية':'Sold all shares'}</h2>
      <p class="sub">${lang==='ar'?`الربح المحقّق التراكمي: ${after.realized>=0?'+':''}$${fmt(Math.abs(after.realized),2)}. تبي تشيل ${esc(h.ticker)} من المحفظة؟ (السجل ينحفظ لو تشيله)`:`Realized total: ${after.realized>=0?'+':''}$${fmt(Math.abs(after.realized),2)}. Remove ${esc(h.ticker)} from portfolio?`}</p>
      <div class="m-actions">
        <button class="btn" onclick="closeModal();render();">${lang==='ar'?'احتفظ به':'Keep it'}</button>
        <button class="btn danger" onclick="doDel('${h.id}')">${lang==='ar'?'احذفه':'Remove'}</button>
      </div>`);
    return;
  }
  save();
  closeModal();
  openDetail(h.id);
}

/* ── Option expiry status + close handlers ── */
function optionExpiryStatus(h){
  if (!h.type || h.type === 'stock' || !h.expiry) return null;
  const s = statsFor(h);
  if (s.shares <= 0) return null;
  const exp = new Date(h.expiry);
  const now = new Date();
  const days = Math.ceil((exp - now) / 86400000);
  if (days < 0) return { kind:'over', days };
  if (days <= 7) return { kind:'warn', days };
  return null;
}
function expireWorthless(holdId){
  const h = holdings.find(x => x.id === holdId);
  if (!h) return;
  const s = statsFor(h);
  if (s.shares <= 0) return;
  h.transactions.push({
    id: uid(), type:'sell', qty: s.shares, price: 0,
    date: h.expiry || today(), ts: new Date(h.expiry || today()).getTime(),
    note: 'expired'
  });
  cloudUpsertHolding(h);
  save();
  toast(lang==='ar'?'تم التسجيل: انتهى بصفر':'Marked as expired worthless');
  openDetail(holdId);
}

function updateCashContinueBtn(type, curCash){
  const amt = parseFloat($("#ch_a")?.value || '0');
  const btn = $("#ch_continue");
  const err = $("#ch_err");
  if (!btn) return;
  if (!isFinite(amt) || amt <= 0){
    btn.disabled = true;
    if (err) err.textContent = '';
    return;
  }
  if (type === 'withdraw' && amt > curCash){
    btn.disabled = true;
    if (err) err.textContent = lang==='ar'?`الرصيد ${fmtUSD(curCash)} فقط`:`Balance is only ${fmtUSD(curCash)}`;
    return;
  }
  btn.disabled = false;
  if (err) err.textContent = '';
}

function doCashTx(type){
  if (activeIsPaper()) return;
  const amount = parseFloat($("#ch_a").value);
  if (!isFinite(amount) || amount <= 0){ $("#ch_err").textContent = lang==='ar'?'مبلغ غير صحيح':'invalid'; return; }
  const curCash = getPfCash();
  if (type === 'withdraw' && amount > curCash){
    $("#ch_err").textContent = lang==='ar'?`الرصيد ${fmtUSD(curCash)} فقط`:`Balance is only ${fmtUSD(curCash)}`;
    return;
  }
  pushPfCashHistory({ id: uid(), type, amount, date: today(), note: '', ts: Date.now() });
  setPfCash(curCash + (type === 'deposit' ? amount : -amount));
  logActivity(type, { amount, pfId: settings.activePf });
  closeModal();
  setActiveTab('portfolio');
  toast(lang==='ar'? (type==='deposit'?'تم الإيداع':'تم السحب') : (type==='deposit'?'Deposited':'Withdrew'));
}
function delCashTx(id){
  if (activeIsPaper()) return;
  const tx = getPfCashHistory().find(x => x.id === id);
  if (!tx) return;
  setPfCash(getPfCash() - (tx.type === 'deposit' ? tx.amount : -tx.amount));
  removePfCashHistory(id);
  openSettings();
}

let _lastWatchRefresh = 0;
async function refreshWatchlistPrices(force){
  const items = watchlist.filter(w => w.pfId === settings.activePf);
  if (!items.length) return;
  // Skip if refreshed within last 60 seconds (unless forced)
  if (!force && Date.now() - _lastWatchRefresh < 60000) return;
  _lastWatchRefresh = Date.now();
  // Batched parallel fetch (5 at a time)
  const chunks = [];
  for (let i = 0; i < items.length; i += 5) chunks.push(items.slice(i, i + 5));
  let changed = false;
  for (const chunk of chunks) {
    await Promise.all(chunk.map(async w => {
      try {
        const r = await fetch(`${FINNHUB}/quote?symbol=${encodeURIComponent(w.ticker)}&token=${FINNHUB_KEY}`);
        if (!r.ok) return;
        const q = await r.json();
        if (q.c != null && q.c !== 0){
          w.price = q.c;
          w.dayChangePct = q.dp;
          changed = true;
        }
      } catch(e){}
    }));
  }
  if (changed){
    save();
    if (activeTab === 'watch') renderWatchlist();
  }
}

// Mini sparkline placeholder
// Synthetic sparkline based on day change (no API needed)
function genSparkData(ticker, changePct){
  const change = (changePct || 0) / 100;
  const n = 22;
  let seed = 0;
  for (let i = 0; i < ticker.length; i++) seed += ticker.charCodeAt(i);
  const rand = () => { seed = (seed * 9301 + 49297) % 233280; return seed / 233280; };
  const data = [];
  for (let i = 0; i < n; i++){
    const t = i / (n - 1);
    const trend = change * t;
    const wave = Math.sin(i * 0.55 + (ticker.charCodeAt(0) || 0) * 0.1) * Math.abs(change) * 0.18;
    const noise = (rand() - 0.5) * Math.max(Math.abs(change) * 0.15, 0.004);
    data.push(trend + wave + noise);
  }
  data[0] = 0;
  data[n-1] = change;
  return data;
}

function miniSparkline(ticker, up, changePct){
  if (changePct == null){
    const h = holdings.find(x => x.ticker === ticker);
    if (h && h.dayChangePct != null) changePct = h.dayChangePct;
    else {
      const w = watchlist.find(x => x.ticker === ticker);
      if (w && w.dayChangePct != null) changePct = w.dayChangePct;
    }
  }
  if (changePct == null) changePct = up ? 0.5 : -0.5;
  const data = genSparkData(ticker, changePct);
  const W = 84, H = 36, pad = 3;
  const min = Math.min(...data);
  const max = Math.max(...data);
  const range = max - min || 0.01;
  const pts = data.map((c, i) => ({
    x: (i / (data.length - 1)) * (W - 2*pad) + pad,
    y: H - pad - ((c - min) / range) * (H - 2*pad),
  }));
  const line = 'M ' + pts.map(p => `${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' L ');
  const area = line + ` L ${(W-pad).toFixed(1)},${(H-pad).toFixed(1)} L ${pad},${(H-pad).toFixed(1)} Z`;
  const last = pts[pts.length - 1];
  const color = up ? '#5FE9B0' : '#F08080';
  const gid = `sg_${ticker}_${Math.floor(Math.random()*9999)}`;
  return `<svg class="wr-spark" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
    <defs><linearGradient id="${gid}" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="${color}" stop-opacity=".22"/>
      <stop offset="100%" stop-color="${color}" stop-opacity="0"/>
    </linearGradient></defs>
    <path d="${area}" fill="url(#${gid})"/>
    <path d="${line}" fill="none" stroke="${color}" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="${last.x.toFixed(1)}" cy="${last.y.toFixed(1)}" r="2.2" fill="${color}"/>
  </svg>`;
}

function saveDividend(holdId){
  const h = holdings.find(x => x.id === holdId);
  if (!h) return;
  const amount = parseFloat($("#dv_a").value);
  const date = $("#dv_d").value || today();
  const note = $("#dv_n").value.trim();
  if (!isFinite(amount) || amount <= 0){
    $("#dv_err").textContent = lang==='ar'?'مبلغ غير صحيح':'invalid amount';
    return;
  }
  if (!Array.isArray(h.dividends)) h.dividends = [];

  cloudUpsertHolding(h);

  closeModal();
  openDetail(holdId);
}
function delDividend(holdId, dvId){
  const h = holdings.find(x => x.id === holdId);
  if (!h) return;
  h.dividends = (h.dividends||[]).filter(d => d.id !== dvId);
  cloudUpsertHolding(h);
  save();
  openDetail(holdId);
}

}

    if (h.target && h.price >= h.target) n++;

let _lpTimer = null;
let _lpStartXY = null;

function attachLongPress(){
  if (window._lpAttached) return;
  window._lpAttached = true;
  document.addEventListener('touchstart', (e) => {
    const row = e.target.closest('.row[onclick*="openDetail"]');
    if (!row) return;
    const match = row.getAttribute('onclick').match(/openDetail\('([^']+)'\)/);
    if (!match) return;
    const holdId = match[1];
    _lpStartXY = { x: e.touches[0].clientX, y: e.touches[0].clientY };
    _lpTimer = setTimeout(() => {
      if (navigator.vibrate) navigator.vibrate(30);
      openLongPressMenu(holdId);
    }, 550);
  }, { passive: true });
  document.addEventListener('touchmove', (e) => {
    if (_lpTimer && _lpStartXY){
      const dx = Math.abs(e.touches[0].clientX - _lpStartXY.x);
      const dy = Math.abs(e.touches[0].clientY - _lpStartXY.y);
      if (dx > 10 || dy > 10){ clearTimeout(_lpTimer); _lpTimer = null; }
    }
  }, { passive: true });
  document.addEventListener('touchend', () => {
    if (_lpTimer){ clearTimeout(_lpTimer); _lpTimer = null; }
  }, { passive: true });
  // Desktop: right-click
  document.addEventListener('contextmenu', (e) => {
    const row = e.target.closest('.row[onclick*="openDetail"]');
    if (!row) return;
    e.preventDefault();
    const match = row.getAttribute('onclick').match(/openDetail\('([^']+)'\)/);
    if (match) openLongPressMenu(match[1]);
  });
}

/* ════ Notifications Tab (v17) — replaces Analysts ════ */
function renderNotifications(){
  const c = $("#tab-content"); if (!c) return;
  const ar = lang === 'ar';
  // Build notification feed from: transactions, cash history, targets hit, earnings approaching, subscription warning
  const notifs = [];
  
  // 1. Transactions (recent buys/sells)
  holdings.filter(h => h.pfId === settings.activePf).forEach(h => {
    (h.transactions || []).forEach(tx => {
      notifs.push({
        type: tx.type, // 'buy' or 'sell'
        ts: tx.ts || new Date(tx.date).getTime(),
        ticker: h.ticker,
        name: h.name,
        qty: tx.qty,
        price: tx.price,
        total: tx.qty * tx.price * ((h.type && h.type !== 'stock') ? 100 : 1),
        category: 'trade',
      });
    });
  });
  
  // 2. Cash operations
  const cashHist = getPfCashHistory();
  cashHist.forEach(c => {
    notifs.push({
      type: c.type, // 'deposit' or 'withdraw'
      ts: c.ts || new Date(c.date || Date.now()).getTime(),
      amount: c.amount,
      note: c.note,
      category: 'cash',
    });
  });
  
  // 3. Target / Stop hits (from current state)
  watchlist.filter(w => w.pfId === settings.activePf).forEach(w => {
    if (w.target && w.price && w.price >= w.target){
      notifs.push({
        type: 'target_hit', ts: Date.now() - 3600000,
        ticker: w.ticker, name: w.name, target: w.target, price: w.price,
        category: 'alert',
      });
    }
    if (w.stop && w.price && w.price <= w.stop){
      notifs.push({
        type: 'stop_hit', ts: Date.now() - 3600000,
        ticker: w.ticker, name: w.name, stop: w.stop, price: w.price,
        category: 'alert',
      });
    }
  });
  
  // 4. Upcoming earnings (≤14 days)
  const allTickers = new Set([
    ...holdings.filter(h => h.pfId === settings.activePf).map(h => h.ticker),
    ...watchlist.filter(w => w.pfId === settings.activePf).map(w => w.ticker),
  ]);
  allTickers.forEach(tic => {
    const cached = window._earnCache?.[tic];
    if (cached && cached.d){
      const days = Math.ceil((new Date(cached.d) - new Date()) / 86400000);
      if (days >= 0 && days <= 14){
        notifs.push({
          type: 'earnings_soon', ts: Date.now() - days*1000,
          ticker: tic, date: cached.d, days,
          category: 'alert',
        });
      }
    }
  });
  
  // Sort by ts desc
  notifs.sort((a,b) => (b.ts||0) - (a.ts||0));
  
  // Group by category
  const alerts = notifs.filter(n => n.category === 'alert').slice(0, 8);

    if (days < 7) return ar?`قبل ${days} ي`:`${days}d ago`;

              </div>
              <div class="nf-time">${fmtRelTime(n.ts)}</div>
            </div>`;
            if (n.type === 'stop_hit') return `<div class="notif-row alert loss">
              <div class="nf-ic loss-ic">${icn('bell')}</div>
              <div class="nf-body">
                <div class="nf-title">${ar?'كسر وقف الخسارة':'Stop loss triggered'}</div>
                <div class="nf-sub">${esc(n.ticker)} ${ar?'كسر الوقف عند':'broke stop at'} $${fmt(n.stop,2)} · ${ar?'الآن':'now'} $${fmt(n.price,2)}</div>
              </div>
              <div class="nf-time">${fmtRelTime(n.ts)}</div>
            </div>`;
            if (n.type === 'earnings_soon') return `<div class="notif-row alert gold">
              <div class="nf-ic gold-ic">${icn('calendar')}</div>
              <div class="nf-body">
                <div class="nf-title">${ar?'إعلان أرباح قريب':'Earnings approaching'}</div>
                <div class="nf-sub">${esc(n.ticker)} · ${ar?'بعد':'in'} ${n.days} ${ar?'يوم':n.days===1?'day':'days'} (${esc(n.date)})</div>

              <div class="nf-time">${fmtRelTime(n.ts)}</div>
            </div>`;
            return '';
          }).join('')}
        </div>
      </div>
    ` : ''}
    
    ${orders.length ? `
      <div class="notif-section">
        <div class="notif-section-head">
          <span class="ttl">${ar?'الأوامر':'Orders'}</span>
          <span class="arr">${ar?'‹':'›'}</span>
        </div>
        <div class="notif-list">
          ${orders.map(n => {
            const isBuy = n.type === 'buy';
            return `<div class="notif-row trade">

    ${cashOps.length ? `

// Unified earnings dates cache (24hr) used by portfolio + watchlist
window._earnCache = window._earnCache || {};

async function fetchNextEarning(ticker){
  const c = window._earnCache[ticker];
  if (c && Date.now() - c.t < 86400000) return c.d;
  try {
    const from = new Date().toISOString().slice(0,10);
    const to = new Date(Date.now() + 90*86400000).toISOString().slice(0,10);
    const r = await fetch(`${FINNHUB}/calendar/earnings?from=${from}&to=${to}&symbol=${encodeURIComponent(ticker)}&token=${FINNHUB_KEY}`);
    if (!r.ok){ window._earnCache[ticker] = { d:'', t:Date.now() }; return ''; }
    const data = await r.json();
    const next = data?.earningsCalendar?.[0];
    const d = next ? next.date : '';
    window._earnCache[ticker] = { d, t: Date.now() };
    return d;
  } catch(e){ window._earnCache[ticker] = { d:'', t:Date.now() }; return ''; }
}

// Loads earnings for ALL portfolio + watchlist tickers in parallel (cached)
async function preloadAllEarnings(){
  const tickers = new Set();
  holdings.forEach(h => tickers.add(h.ticker));
  watchlist.forEach(w => tickers.add(w.ticker));
  const arr = [...tickers];
  // Only fetch ones not cached
  const needs = arr.filter(t => {
    const c = window._earnCache[t];
    return !c || Date.now() - c.t > 86400000;
  });
  if (!needs.length) return;
  // Batch parallel (5 at a time)
  for (let i = 0; i < needs.length; i += 5) {
    await Promise.all(needs.slice(i, i + 5).map(fetchNextEarning));
  }
  // Re-render current tab if relevant
  if (activeTab === 'portfolio') renderTab();
  else if (activeTab === 'watch') renderWatchlist();
}

// Returns badge HTML if earnings within 60 days, else empty
function earnBadge(ticker){
  const c = window._earnCache[ticker];
  if (!c || !c.d) return '';
  const days = Math.ceil((new Date(c.d) - new Date()) / 86400000);
  if (days < 0 || days > 60) return '';
  const ar = lang === 'ar';
  const dateObj = new Date(c.d);
  const monthAr = ['ينا','فبر','مار','أبر','ماي','يون','يول','أغس','سبت','أكت','نوف','ديس'];
  const monthEn = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const day = dateObj.getDate();
  const mon = (ar ? monthAr : monthEn)[dateObj.getMonth()];
  const dateStr = `${day} ${mon}`;
  const soon = days <= 7;
  return `<span class="earn-badge ${soon?'soon':''}" title="${ar?'إعلان أرباح':'Earnings announcement'} ${c.d}">📅 ${ar?'إعلان:':'Earnings:'} ${dateStr}${days<=14?` (${days}${ar?'ي':'d'})`:''}</span>`;
}

// Loads + renders earnings timeline (last 2 + next) in stock detail
async function loadEarningsTimeline(holdId, ticker){
  const wrap = document.getElementById(`earn-timeline-${holdId}`);
  if (!wrap) return;
  const ar = lang === 'ar';
  wrap.innerHTML = `<div class="earn-tl"><div class="earn-tl-head">📅 ${ar?'الأرباح':'Earnings'}</div><div style="text-align:center;color:var(--muted2);font-size:11px;padding:6px"><span class="spin"></span></div></div>`;
  try {
    // Historical earnings (actual vs estimate)
    const [pastRes, nextDate] = await Promise.all([
      fetch(`${FINNHUB}/stock/earnings?symbol=${encodeURIComponent(ticker)}&limit=4&token=${FINNHUB_KEY}`).then(r => r.ok ? r.json() : []).catch(() => []),
      fetchNextEarning(ticker),
    ]);
    const past = Array.isArray(pastRes) ? pastRes.slice(0, 2) : [];
    if (!past.length && !nextDate){
      wrap.innerHTML = '';
      return;
    }
    const cells = [];
    // Past 2 (in chronological order, oldest first)
    past.slice().reverse().forEach(p => {
      const actual = p.actual;
      const est = p.estimate;
      const beat = actual != null && est != null && actual > est;
      const miss = actual != null && est != null && actual < est;
      const verdict = beat ? (ar?'تفوّق ✓':'BEAT') : miss ? (ar?'تراجع':'MISS') : (ar?'مطابق':'INLINE');
      const qDate = new Date(p.period || p.date);
      const q = `Q${p.quarter || Math.floor((qDate.getMonth())/3)+1} ${qDate.getFullYear()}`;
      cells.push(`<div class="earn-tl-cell ${beat?'beat':miss?'miss':''}">
        <div class="dt">${esc(p.period || p.date || '')}</div>
        <div class="pq">${q}</div>
        <div class="vals">
          <div class="vr"><span class="l">${ar?'فعلي':'Actual'}</span><span class="v">$${actual!=null?fmt(actual,2):'—'}</span></div>
          <div class="vr"><span class="l">${ar?'متوقع':'Est'}</span><span class="v" style="color:var(--muted)">$${est!=null?fmt(est,2):'—'}</span></div>
        </div>
        <div class="verdict">${verdict}</div>
      </div>`);
    });
    // Next upcoming
    if (nextDate){
      const days = Math.ceil((new Date(nextDate) - new Date()) / 86400000);
      cells.push(`<div class="earn-tl-cell next">
        <div class="dt">${esc(nextDate)}</div>
        <div class="pq">${ar?'القادم':'NEXT'}</div>
        <div class="countdown">${days>0?`${ar?'بعد ':''}${days} ${ar?'يوم':days===1?'day':'days'}`:(ar?'اليوم':'TODAY')}</div>
        <div class="verdict">${ar?'مرتقب':'UPCOMING'}</div>
      </div>`);
    }
    if (!cells.length){ wrap.innerHTML = ''; return; }
    wrap.innerHTML = `
      <div class="earn-tl">
        <div class="earn-tl-head">📅 ${ar?'سجل الأرباح':'Earnings Track Record'}</div>
        <div class="earn-tl-row">${cells.join('')}</div>
      </div>
    `;
  } catch(e){ wrap.innerHTML = ''; }
}

// Loads + renders professional financials summary with verdict
async function loadStockFinancials(holdId, ticker){
  // Insert financials card after earnings timeline
  const tlWrap = document.getElementById(`earn-timeline-${holdId}`);
  if (!tlWrap) return;
  let finWrap = document.getElementById(`fin-card-${holdId}`);
  if (!finWrap){
    finWrap = document.createElement('div');
    finWrap.id = `fin-card-${holdId}`;
    tlWrap.insertAdjacentElement('afterend', finWrap);
  }
  const ar = lang === 'ar';
  finWrap.innerHTML = `<div class="fin-card"><div style="text-align:center;color:var(--muted2);font-size:11px;padding:6px"><span class="spin"></span> ${ar?'يجلب الأرقام...':'Loading metrics...'}</div></div>`;
  try {
    const r = await fetch(`${FINNHUB}/stock/metric?symbol=${encodeURIComponent(ticker)}&metric=all&token=${FINNHUB_KEY}`);
    if (!r.ok){ finWrap.innerHTML = ''; return; }
    const data = await r.json();
    const m = data?.metric || {};
    
    // Extract key metrics
    const pe = m['peNormalizedAnnual'] || m['peBasicExclExtraTTM'] || m['peTTM'] || null;
    const pegAnnual = m['pegRatioTTM'] || m['pegRatioAnnual'] || null;
    const revGrowth = m['revenueGrowthTTMYoy'] || m['revenueGrowth5Y'] || null;
    const epsGrowth = m['epsGrowthTTMYoy'] || m['epsGrowth5Y'] || null;
    const grossMargin = m['grossMarginTTM'] || m['grossMarginAnnual'] || null;
    const netMargin = m['netProfitMarginTTM'] || m['netProfitMarginAnnual'] || null;
    const roe = m['roeTTM'] || m['roeRfy'] || null;
    const debtEquity = m['totalDebt/totalEquityAnnual'] || m['totalDebt/totalEquityQuarterly'] || null;
    const dividendYield = m['dividendYieldIndicatedAnnual'] || m['currentDividendYieldTTM'] || null;
    const beta = m['beta'] || null;
    const wkHigh = m['52WeekHigh'] || null;
    const wkLow = m['52WeekLow'] || null;
    
    // Score (0-100) based on weighted metrics
    let score = 50, total = 0;
    const judge = (val, good, bad, inverse) => {
      if (val == null) return null;
      const isGood = inverse ? val <= good : val >= good;
      const isBad = inverse ? val >= bad : val <= bad;
      total += 10;
      if (isGood) { score += 10; return 'good'; }
      if (isBad) { score -= 10; return 'bad'; }
      return 'ok';
    };
    const peJudge = pe!=null ? (pe<25 ? 'good' : pe>40 ? 'bad' : 'ok') : null;
    if (peJudge){ total+=10; if (peJudge==='good') score+=10; if (peJudge==='bad') score-=10; }
    const revJudge = judge(revGrowth, 15, 0);
    const epsJudge = judge(epsGrowth, 15, 0);
    const grossJudge = judge(grossMargin, 40, 20);
    const netJudge = judge(netMargin, 15, 0);
    const roeJudge = judge(roe, 15, 0);
    const debtJudge = debtEquity!=null ? (debtEquity<1 ? 'good' : debtEquity>2 ? 'bad' : 'ok') : null;
    if (debtJudge){ total+=10; if (debtJudge==='good') score+=10; if (debtJudge==='bad') score-=10; }
    
    const norm = total > 0 ? Math.max(0, Math.min(100, ((score - 50) / total * 100) + 50)) : 50;
    const verdict = norm >= 65 ? { cls:'strong', ar:'مالية قوية ✓', en:'STRONG' }
                  : norm >= 45 ? { cls:'fair', ar:'مالية متوسطة', en:'FAIR' }
                  : { cls:'weak', ar:'تحتاج حذر ⚠', en:'WEAK' };
    
    // Build cells (only show ones with data)
    const cells = [];
    if (pe != null) cells.push(`<div class="fin-cell"><div class="lbl"><span class="dot ${peJudge}"></span>P/E</div><div class="v">${fmt(pe,1)}</div><div class="note">${pe<20?(ar?'منخفض':'Low'):pe<30?(ar?'معقول':'Normal'):pe<50?(ar?'مرتفع':'High'):(ar?'مبالغ':'Very high')}</div></div>`);
    if (revGrowth != null) cells.push(`<div class="fin-cell"><div class="lbl"><span class="dot ${revJudge}"></span>${ar?'نمو الإيرادات':'Revenue Growth'}</div><div class="v">${revGrowth>0?'+':''}${fmt(revGrowth,1)}%</div><div class="note">${ar?'سنوياً':'YoY'}</div></div>`);
    if (epsGrowth != null) cells.push(`<div class="fin-cell"><div class="lbl"><span class="dot ${epsJudge}"></span>${ar?'نمو EPS':'EPS Growth'}</div><div class="v">${epsGrowth>0?'+':''}${fmt(epsGrowth,1)}%</div><div class="note">${ar?'سنوياً':'YoY'}</div></div>`);
    if (grossMargin != null) cells.push(`<div class="fin-cell"><div class="lbl"><span class="dot ${grossJudge}"></span>${ar?'هامش إجمالي':'Gross Margin'}</div><div class="v">${fmt(grossMargin,1)}%</div></div>`);
    if (netMargin != null) cells.push(`<div class="fin-cell"><div class="lbl"><span class="dot ${netJudge}"></span>${ar?'هامش صافي':'Net Margin'}</div><div class="v">${fmt(netMargin,1)}%</div></div>`);
    if (roe != null) cells.push(`<div class="fin-cell"><div class="lbl"><span class="dot ${roeJudge}"></span>ROE</div><div class="v">${fmt(roe,1)}%</div><div class="note">${ar?'العائد على حقوق المساهمين':'Return on equity'}</div></div>`);
    if (debtEquity != null) cells.push(`<div class="fin-cell"><div class="lbl"><span class="dot ${debtJudge}"></span>${ar?'الدين/الملكية':'Debt/Equity'}</div><div class="v">${fmt(debtEquity,2)}</div><div class="note">${debtEquity<0.5?(ar?'منخفض جداً':'Very low'):debtEquity<1?(ar?'صحي':'Healthy'):debtEquity<2?(ar?'متوسط':'Moderate'):(ar?'مرتفع':'High')}</div></div>`);
    if (beta != null) cells.push(`<div class="fin-cell"><div class="lbl"><span class="dot ${beta<1?'good':beta<1.5?'ok':'bad'}"></span>Beta</div><div class="v">${fmt(beta,2)}</div><div class="note">${beta<1?(ar?'أقل تقلباً من السوق':'Less volatile'):beta<1.5?(ar?'تقلب معتدل':'Moderate'):(ar?'تقلب عالي':'Volatile')}</div></div>`);
    if (dividendYield != null && dividendYield > 0) cells.push(`<div class="fin-cell"><div class="lbl">💰 ${ar?'العائد':'Div Yield'}</div><div class="v">${fmt(dividendYield,2)}%</div></div>`);
    
    if (wkHigh && wkLow){
      const h = holdings.find(x => x.id === holdId);
      const price = h?.price;
      if (price){
        const wkPos = ((price - wkLow) / (wkHigh - wkLow)) * 100;
        cells.push(`<div class="fin-cell" style="grid-column:span 2"><div class="lbl">📊 ${ar?'نطاق ٥٢ أسبوع':'52-Week Range'}</div>
          <div style="margin-top:5px;height:6px;background:var(--surf);border-radius:3px;position:relative;overflow:hidden">
            <div style="position:absolute;left:0;right:0;top:0;bottom:0;background:linear-gradient(90deg,var(--loss),var(--gold),var(--accent))"></div>
            <div style="position:absolute;left:${Math.max(0,Math.min(100,wkPos))}%;top:-3px;width:3px;height:12px;background:#fff;border-radius:1px;box-shadow:0 0 4px rgba(255,255,255,.6)"></div>
          </div>
          <div style="display:flex;justify-content:space-between;font-size:9.5px;color:var(--muted2);margin-top:4px;font-variant-numeric:tabular-nums">
            <span>$${fmt(wkLow,0)}</span><span style="color:var(--txt2);font-weight:700">$${fmt(price,2)}</span><span>$${fmt(wkHigh,0)}</span>
          </div>
        </div>`);
      }
    }
    
    if (!cells.length){ finWrap.innerHTML = ''; return; }
    finWrap.innerHTML = `
      <div class="fin-card">
        <div class="fin-card-head">
          <span class="ttl">📊 ${ar?'الملخص المالي':'Financial Summary'}</span>
          <span class="fin-verdict ${verdict.cls}">${verdict[lang]}</span>
        </div>
        <div class="fin-grid">${cells.join('')}</div>
      </div>
    `;
  } catch(e){ finWrap.innerHTML = ''; }
}

function doChallengeSell(chId, tradeId){
  const c = challenges.find(x => x.id === chId);
  if (!c) return;
  const tr = c.trades.find(t => t.id === tradeId);
  if (!tr) return;
  const price = parseFloat($("#cs_p").value);
  const date = $("#cs_d").value || today();
  if (!isFinite(price) || price <= 0){
    $("#cs_err").textContent = lang==='ar'?'تأكّد من السعر':'Check price'; return;
  }
  tr.sellDate = date;
  tr.sellPrice = price;
  // assume bought whole balance: shares = invested / buyPrice, sold = shares * sellPrice
  const shares = tr.invested / tr.buyPrice;
  tr.sold = shares * price;
  tr.returnPct = (tr.sold - tr.invested) / tr.invested * 100;
  c.currentBalance = tr.sold;
  // achievement check: target hit?
  const pct = (c.currentBalance - c.startCapital) / c.startCapital * 100;
  if (pct >= c.targetPct){
    grantAchievement('challenge_win');
  }
  cloudUpsertChallenge(c);
  save();
  openChallengePage();
}

function grantAchievement(id){
  if (!settings.achievements) settings.achievements = [];
  if (settings.achievements.includes(id)) return;
  settings.achievements.push(id);
  cloudSaveSettings();
  save();
  showAchievementPopup(id);
}
function showAchievementPopup(id){
  const a = ACHIEVEMENTS.find(x => x.id === id);
  if (!a) return;
  document.querySelectorAll('.ach-pop').forEach(p => p.remove());
  const el = document.createElement('div');
  el.className = 'ach-pop';
  el.style.opacity = '0';
  el.innerHTML = `<div class="ic">${a.ic}</div><div><div class="nm">${lang==='ar'?'إنجاز':'Achievement'}</div><div class="ds">${esc(a.nm[lang])}</div></div>`;
  document.body.appendChild(el);

function checkAchievements(){
  if (!settings.achievements) settings.achievements = [];
  const hs = holdings.filter(h => h.pfId === settings.activePf);
  if (hs.length >= 1) grantAchievement('first_stock');
  const allTx = hs.flatMap(h => h.transactions || []);
  const buys = allTx.filter(t => t.type === 'buy');
  const sells = allTx.filter(t => t.type === 'sell');
  if (buys.length >= 1) grantAchievement('first_buy');
  if (sells.length >= 1) grantAchievement('first_sell');
  if (allTx.length >= 10) grantAchievement('ten_trades');
  if (hs.length >= 5) grantAchievement('five_stocks');
  if (hs.some(h => h.type && h.type !== 'stock')) grantAchievement('options');
  if (hs.some(h => (h.dividends||[]).length > 0)) grantAchievement('dividend');
  if (hs.some(h => { const s = statsFor(h); return s.realized > 0; })) grantAchievement('first_win');
  if (hs.some(h => { const s = statsFor(h); return s.plPct > 25 || (s.deposited>0 && (s.realized/s.deposited)*100 > 25); })) grantAchievement('big_win');
  const uniqueTags = new Set();
  hs.forEach(h => (h.tags||[]).forEach(tg => uniqueTags.add(tg)));
  if (uniqueTags.size >= 3) grantAchievement('diversified');
  if (hs.some(h => h.purchaseDate && (Date.now() - new Date(h.purchaseDate).getTime()) > 180*86400000)) grantAchievement('patient');
}

/* ── Weekly summary ── */
function weeklySummary(){
  const hist = history.filter(h => h.pfId === settings.activePf);
  if (hist.length < 2) return null;
  const now = Date.now();
  const week_ago = now - 7*86400000;
  const past = hist.filter(h => new Date(h.date).getTime() <= week_ago).slice(-1)[0];
  const cur = hist[hist.length-1];
  if (!past || !cur) return null;
  const change = cur.value - past.value;
  const pct = past.value > 0 ? change/past.value*100 : 0;
  // best/worst holding this week (based on day change roughly)
  const hs = activeHoldings().map(h => ({ h, s: statsFor(h) }));
  hs.sort((a,b) => (b.s.todayPct||0) - (a.s.todayPct||0));
  const best = hs[0]?.h.ticker;
  const worst = hs[hs.length-1]?.h.ticker;
  return { change, pct, best, worst };
}

function exportData(){
  const blob = {
    v: 6, exported: new Date().toISOString(),
    profile, settings, portfolios, holdings, news, history, watchlist, challenges,
  };
  const json = JSON.stringify(blob, null, 2);
  const dataUri = 'data:application/json;charset=utf-8,' + encodeURIComponent(json);
  const a = document.createElement('a');
  a.href = dataUri;
  a.download = `portfolio-backup-${today()}.json`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  toast(lang==='ar'?'تم التحميل':'Downloaded');
}
function importData(){
  const inp = document.createElement('input');
  inp.type = 'file';
  inp.accept = 'application/json,.json';
  inp.onchange = e => {
    const f = e.target.files[0];
    if (!f) return;
    const r = new FileReader();
    r.onload = async ev => {
      try {
        const b = JSON.parse(ev.target.result);
        if (!b.portfolios || !b.holdings){ toast(lang==='ar'?'ملف غير صالح':'Invalid file'); return; }
        profile = b.profile || profile;
        settings = { ...settings, ...(b.settings || {}) };
        portfolios = b.portfolios || [];
        holdings = b.holdings || [];
        news = b.news || [];
        history = b.history || [];
        watchlist = b.watchlist || [];
        challenges = b.challenges || [];
        await save();
        toast(lang==='ar'?'تم الاستيراد':'Imported');
        render();
      } catch(err){ toast((lang==='ar'?'خطأ: ':'Error: ') + err.message); }
    };
    r.readAsText(f);
  };
  inp.click();
}

/* ── Updated liveSearch supporting different target boxes ── */
const _origLiveSearch = liveSearch;
liveSearch = function(inpId, boxId){
  // backward-compat: no args → old behavior on f_tic/sg-box
  const ti = inpId || 'f_tic';
  const bx = boxId || 'sg-box';
  clearTimeout(searchTimer);
  searchTimer = setTimeout(async () => {
    const inp = document.getElementById(ti);
    const box = document.getElementById(bx);
    if (!inp || !box) return;
    const q = inp.value.trim();
    if (!q) { box.innerHTML = ""; return; }
    box.innerHTML = `<div class="suggest"><div class="sg-loading"><span class="spin"></span> ${t().search_loading}</div></div>`;
    try {
      const results = await finnhubSearch(q);
      if (inp.value.trim() !== q) return;
      if (!results.length) { box.innerHTML = `<div class="suggest"><div class="sg-loading">${t().no_match}</div></div>`; return; }
      box.innerHTML = `<div class="suggest">${results.map(r => {
        const nm = (r.d || '').replace(/'/g,"&#39;").replace(/"/g,"&quot;");
        return `<div class="sg-item" onclick="(()=>{document.getElementById('${ti}').value='${esc(r.s)}';document.getElementById('${ti}').dataset.name='${esc(nm)}';document.getElementById('${bx}').innerHTML='';})()">
          <span class="tic">${esc(r.s)}</span>
          <span class="nm">${esc(r.d || '')}</span>
        </div>`;
      }).join("")}</div>`;
    } catch(e) {
      if (inp.value.trim() === q) box.innerHTML = `<div class="suggest"><div class="sg-loading">${esc(e.message||t().no_match)}</div></div>`;
    }
  }, 380);
};

    renderTab();

function setPfChartRange(r){

function drawPfMiniChart(){
  const svg = document.getElementById('pf-mini-svg');
  if (!svg) return;
  const hist = history.filter(h => h.pfId === settings.activePf)
    .sort((a,b) => new Date(a.date) - new Date(b.date));
  if (hist.length < 2){
    svg.parentElement.innerHTML = `<div style="text-align:center;color:var(--muted2);font-size:11.5px;padding:30px 10px">${lang==='ar'?'مافي بيانات كافية بعد. سجّل عمليات وارجع بعد كم يوم.':'Not enough history yet. Make some trades and check back.'}</div>`;
    return;
  }
  const now = Date.now();
  const ranges = { '1w':7, '1m':30, '3m':90, '6m':180, '1y':365, 'all':null };
  const cutoff = ranges[pfChartRange] ? now - ranges[pfChartRange] * 86400000 : 0;
  const data = hist.filter(h => new Date(h.date).getTime() >= cutoff);
  if (data.length < 2){
    svg.parentElement.innerHTML = `<div style="text-align:center;color:var(--muted2);font-size:11.5px;padding:30px 10px">${lang==='ar'?'لا توجد بيانات لهذه الفترة':'No data for this range'}</div>`;
    return;
  }
  const values = data.map(d => d.value);
  const min = Math.min(...values), max = Math.max(...values), range = max - min || 1;
  const W = 600, H = 120, PAD = 6;
  const xs = values.map((_,i) => PAD + (i/(values.length-1))*(W-2*PAD));
  const ys = values.map(v => PAD + (1-(v-min)/range)*(H-2*PAD));
  const pts = values.map((_,i) => `${xs[i]},${ys[i]}`).join(' ');
  const first = values[0], last = values[values.length-1];
  const chg = last - first;
  const chgPct = first > 0 ? chg/first*100 : 0;
  const up = chg >= 0;
  const col = up ? '#5FE9B0' : '#F26B6E';
  svg.innerHTML = `
    <defs><linearGradient id="pfgrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="${col}" stop-opacity="0.3"/>
      <stop offset="1" stop-color="${col}" stop-opacity="0"/>
    </linearGradient></defs>
    <polygon points="${PAD},${H-PAD} ${pts} ${W-PAD},${H-PAD}" fill="url(#pfgrad)"/>
    <polyline points="${pts}" fill="none" stroke="${col}" stroke-width="1.8"/>
    <line id="pfx" x1="0" y1="0" x2="0" y2="${H}" stroke="rgba(255,255,255,.25)" stroke-width="0.6" style="display:none"/>
    <circle id="pfdot" r="3.5" fill="${col}" stroke="#000" stroke-width="1.4" style="display:none"/>
  `;
  const head = document.getElementById('pf-mini-head-v');
  if (head) head.innerHTML = `<span class="v ${up?'up':'down'}">${up?'+':''}${fmtMoney(Math.abs(chg))} · ${up?'+':''}${fmt(chgPct,1)}%</span>`;
  const headTtl = document.getElementById('pf-mini-head-t');
  if (headTtl) headTtl.textContent = (lang==='ar'?'تغيّر القيمة':'Value change');
  const cross = svg.querySelector('#pfx');
  const dot = svg.querySelector('#pfdot');
  const handle = (e) => {
    const t = e.touches ? e.touches[0] : e;
    if (!t) return;
    const rect = svg.getBoundingClientRect();
    const x = (t.clientX - rect.left) / rect.width * W;
    let idx = Math.round((x - PAD) / (W - 2*PAD) * (values.length - 1));
    idx = Math.max(0, Math.min(values.length-1, idx));
    cross.setAttribute('x1', xs[idx]); cross.setAttribute('x2', xs[idx]); cross.style.display='block';
    dot.setAttribute('cx', xs[idx]); dot.setAttribute('cy', ys[idx]); dot.style.display='block';
    if (head) head.innerHTML = `<span class="v" style="color:${col};font-variant-numeric:tabular-nums">${fmtMoney(values[idx])}</span>`;
    if (headTtl) headTtl.textContent = data[idx].date;
    e.preventDefault();
  };
  const reset = () => {
    cross.style.display='none'; dot.style.display='none';
    if (head) head.innerHTML = `<span class="v ${up?'up':'down'}">${up?'+':''}${fmtMoney(Math.abs(chg))} · ${up?'+':''}${fmt(chgPct,1)}%</span>`;
    if (headTtl) headTtl.textContent = (lang==='ar'?'تغيّر القيمة':'Value change');
  };
  svg.addEventListener('mousemove', handle);
  svg.addEventListener('mouseleave', reset);
  svg.addEventListener('touchstart', handle, { passive:false });
  svg.addEventListener('touchmove', handle, { passive:false });
  svg.addEventListener('touchend', reset);
}

function calcPerfStats(periodKey){
  const hist = history.filter(h => h.pfId === settings.activePf)
    .sort((a,b) => new Date(a.date) - new Date(b.date));
  const ranges = { '1w':7, '1m':30, '3m':90, '6m':180, '1y':365, 'all':null };
  const cutoff = ranges[periodKey] ? Date.now() - ranges[periodKey]*86400000 : 0;
  const data = hist.filter(h => new Date(h.date).getTime() >= cutoff);
  const allHs = activeHoldings();
  const allTx = [];
  allHs.forEach(h => (h.transactions||[]).forEach(tx => allTx.push({...tx, holdId:h.id, ticker:h.ticker, isOpt: h.type && h.type !== 'stock'})));
  const txInRange = allTx.filter(tx => tx.ts >= cutoff);

  // realized P&L in period (matching sells against running avg from earlier txs)
  let realizedInRange = 0;
  const byHold = {};
  allTx.forEach(tx => (byHold[tx.holdId] = byHold[tx.holdId] || []).push(tx));
  Object.values(byHold).forEach(txs => {
    txs.sort((a,b) => (a.ts||0)-(b.ts||0));
    let shares = 0, cost = 0;
    txs.forEach(tx => {
      const mult = tx.isOpt ? 100 : 1;
      if (tx.type === 'buy'){ cost += tx.qty * tx.price * mult; shares += tx.qty; }
      else {
        const avg = shares > 0 ? cost/shares : 0;
        const r = (tx.price - avg/mult) * tx.qty * mult;
        if (tx.ts >= cutoff) realizedInRange += r;
        cost = Math.max(0, cost - avg*tx.qty);
        shares = Math.max(0, shares - tx.qty);
      }
    });
  });
  const buysInRange = txInRange.filter(t => t.type === 'buy').length;
  const sellsInRange = txInRange.filter(t => t.type === 'sell').length;
  let wins = 0, losses = 0;
  Object.values(byHold).forEach(txs => {
    txs.sort((a,b) => (a.ts||0)-(b.ts||0));
    let shares = 0, cost = 0;
    txs.forEach(tx => {
      const mult = tx.isOpt ? 100 : 1;
      if (tx.type === 'buy'){ cost += tx.qty * tx.price * mult; shares += tx.qty; }
      else {
        const avg = shares > 0 ? cost/shares : 0;
        const r = (tx.price - avg/mult) * tx.qty * mult;
        if (tx.ts >= cutoff){
          if (r > 0) wins++; else if (r < 0) losses++;
        }
        cost = Math.max(0, cost - avg*tx.qty);
        shares = Math.max(0, shares - tx.qty);
      }
    });
  });
  const winRate = (wins+losses) > 0 ? wins/(wins+losses)*100 : null;

  // value change
  let valueChange = null, valueChangePct = null;
  if (data.length >= 2){
    const first = data[0].value, last = data[data.length-1].value;
    valueChange = last - first;
    valueChangePct = first > 0 ? valueChange/first*100 : 0;
  }

  // best/worst holding (by today's plPct)
  const hStats = allHs.map(h => ({ h, s: statsFor(h) }))
    .filter(x => x.s.shares > 0)
    .sort((a,b) => (b.s.plPct||0) - (a.s.plPct||0));
  const best = hStats[0]?.h;
  const worst = hStats[hStats.length-1]?.h;

  return {
    valueChange, valueChangePct,
    realizedInRange, buysInRange, sellsInRange,
    wins, losses, winRate,
    best, worst,
    bestStats: hStats[0]?.s, worstStats: hStats[hStats.length-1]?.s,
  };
}

    a.download = filename;

    toast(lang==='ar'?'تم التحميل':'Downloaded');

/* ── Analyst recommendations (Polygon.io) ── */
const analystCache = {};
async function fetchAnalystData(ticker){
  const cached = analystCache[ticker];
  if (cached && Date.now() - cached.fetched < 6*3600000) return cached.data;
  try {
    // Polygon free tier (may return 401/403 - we handle silently)
    let details = null, snapshot = null;
    try {
      const [detailsRes, snapshotRes] = await Promise.all([
        fetch(`${POLYGON}/v3/reference/tickers/${ticker}?apiKey=${POLYGON_KEY}`).catch(()=>null),
        fetch(`${POLYGON}/v2/snapshot/locale/us/markets/stocks/tickers/${ticker}?apiKey=${POLYGON_KEY}`).catch(()=>null),
      ]);
      if (detailsRes?.ok) details = await detailsRes.json();
      if (snapshotRes?.ok) snapshot = await snapshotRes.json();
    } catch(e){}
    const result = {
      name: details?.results?.name || ticker,
      price: snapshot?.ticker?.day?.c || snapshot?.ticker?.lastTrade?.p || null,
      changePct: snapshot?.ticker?.todaysChangePerc || null,
      marketCap: details?.results?.market_cap || null,
    };
    // Finnhub recommendation (free tier supports this)
    try {
      const recRes = await fetch(`${FINNHUB}/stock/recommendation?symbol=${ticker}&token=${FINNHUB_KEY}`);
      if (recRes.ok){
        const recData = await recRes.json();
        if (Array.isArray(recData) && recData.length > 0){
          result.recommendation = recData[0];
        }
      }
    } catch(e){}
    // Finnhub price-target (paid tier - will 403 silently on free)
    try {
      const tgtRes = await fetch(`${FINNHUB}/stock/price-target?symbol=${ticker}&token=${FINNHUB_KEY}`);
      if (tgtRes.ok){
        const tgtData = await tgtRes.json();
        if (tgtData.targetMean){
          result.target = {
            high: tgtData.targetHigh, low: tgtData.targetLow,
            mean: tgtData.targetMean, median: tgtData.targetMedian,
            analysts: tgtData.numberOfAnalysts,
            updated: tgtData.lastUpdated,
          };
        }
      }
    } catch(e){}
    analystCache[ticker] = { data: result, fetched: Date.now() };
    return result;
  } catch(e){
    return null;
  }
}

/* ── Ticker tape (top live strip) ── */
function renderTickerTape(){
  const hs = activeHoldings();
  const wl = watchlist.filter(w => w.pfId === settings.activePf);
  // Merge holdings + watchlist (dedup by ticker)
  const seen = new Set();
  const merged = [];
  hs.forEach(h => {
    if (h.price != null && !seen.has(h.ticker)){
      seen.add(h.ticker);
      merged.push({ ticker: h.ticker, price: h.price, changePct: h.dayChangePct, inPf: true });
    }
  });
  wl.forEach(w => {
    if (w.price != null && !seen.has(w.ticker)){
      seen.add(w.ticker);
      merged.push({ ticker: w.ticker, price: w.price, changePct: w.dayChangePct, inPf: false });
    }
  });
  if (!merged.length) return '';
  // duplicate items for seamless scroll
  const all = [...merged, ...merged];
  return `<div class="ticker-tape"><div class="ticker-track">
    ${all.map(it => {
      const up = (it.changePct||0) >= 0;
      return `<span class="ticker-item">
        <span class="sy">${esc(it.ticker)}${!it.inPf?'<span style="font-size:7.5px;font-weight:800;margin-inline-start:3px;color:#5BA5FF;opacity:.7">⭐</span>':''}</span>
        <span class="pr">$${fmt(it.price,2)}</span>
        ${it.changePct!=null?`<span class="ch ${up?'up':'down'}">${up?'▲':'▼'}${fmt(Math.abs(it.changePct),2)}%</span>`:''}
      </span>`;
    }).join("")}
  </div></div>`;
}

/* ── Heatmap monthly performance ── */
function buildHeatmap(){
  const hist = history.filter(h => h.pfId === settings.activePf);
  if (hist.length < 2) return null;
  // group by year-month, take last value of month
  const byMonth = {};
  hist.forEach(h => {
    const key = h.date.slice(0,7); // YYYY-MM
    if (!byMonth[key] || new Date(h.date) > new Date(byMonth[key].date)){
      byMonth[key] = h;
    }
  });
  const sorted = Object.entries(byMonth).sort((a,b) => a[0].localeCompare(b[0]));
  if (sorted.length < 2) return null;
  // compute monthly % change from first record's value
  const results = [];
  for (let i = 1; i < sorted.length; i++){
    const prev = sorted[i-1][1].value;
    const cur = sorted[i][1].value;
    const pct = prev > 0 ? (cur - prev) / prev * 100 : 0;
    results.push({ ym: sorted[i][0], pct });
  }
  // group by year
  const years = {};
  results.forEach(r => {
    const [y, m] = r.ym.split('-');
    if (!years[y]) years[y] = {};
    years[y][parseInt(m)] = r.pct;
  });
  return years;
}
function renderHeatmapHTML(){
  const data = buildHeatmap();
  if (!data) return '';
  const months = ['J','F','M','A','M','J','J','A','S','O','N','D'];
  const monthsAr = ['ي','ف','م','أ','م','ي','ي','أ','س','أ','ن','د'];
  const ml = lang === 'ar' ? monthsAr : months;
  const yrs = Object.keys(data).sort();
  return `<div class="heat-wrap">
    <div class="heat-title">${lang==='ar'?'الأداء الشهري':'Monthly Performance'}</div>
    <div class="heat-grid">
      <div></div>
      ${ml.map(m => `<div class="heat-month-label">${m}</div>`).join('')}
      ${yrs.map(y => `
        <div class="heat-yr-label">${y.slice(2)}</div>
        ${ml.map((_, i) => {
          const pct = data[y][i+1];
          if (pct == null) return `<div class="heat-cell" style="background:#0A0A0A;border-color:#101010"></div>`;
          const up = pct >= 0;
          const intensity = Math.min(1, Math.abs(pct) / 15);
          const bg = up
            ? `rgba(95,233,176,${0.1 + intensity * 0.5})`
            : `rgba(242,107,110,${0.1 + intensity * 0.5})`;
          const bd = up ? 'var(--accent-d)' : 'var(--loss-d)';
          const fg = up ? '#5FE9B0' : '#F26B6E';
          return `<div class="heat-cell" style="background:${bg};border-color:${bd};color:${fg}" title="${y}/${i+1}: ${pct>=0?'+':''}${fmt(pct,1)}%">${pct>=0?'+':''}${fmt(pct,0)}</div>`;
        }).join('')}
      `).join('')}
    </div>
    <div class="heat-legend">
      <span>${lang==='ar'?'أقل':'Lower'}</span>
      <div class="b" style="background:rgba(242,107,110,.55);border-color:var(--loss-d)"></div>
      <div class="b" style="background:rgba(242,107,110,.25);border-color:var(--loss-d)"></div>
      <div class="b" style="background:#0A0A0A;border-color:#101010"></div>
      <div class="b" style="background:rgba(95,233,176,.25);border-color:var(--accent-d)"></div>
      <div class="b" style="background:rgba(95,233,176,.55);border-color:var(--accent-d)"></div>
      <span>${lang==='ar'?'أعلى':'Higher'}</span>
    </div>
  </div>`;
}

    const snapshot = {

  } catch(e){

  }
}

/* ── Pull to Refresh ── */
let _ptrStartY = 0;
let _ptrDelta = 0;
let _ptrActive = false;
let _ptrRefreshing = false;
const PTR_THRESHOLD = 70;

function installPullToRefresh(){
  const ind = document.createElement('div');
  ind.className = 'ptr-indicator';
  ind.id = 'ptr-ind';
  ind.innerHTML = `<div class="ptr-inner"><span class="ptr-arrow" id="ptr-arrow">↓</span><span id="ptr-txt">${lang==='ar'?'اسحب للتحديث':'Pull to refresh'}</span></div>`;
  document.body.appendChild(ind);

  document.body.addEventListener('touchstart', (e) => {
    if (window.scrollY > 0 || _ptrRefreshing) return;
    const open = document.querySelector('.modal-back');
    if (open) return;
    _ptrStartY = e.touches[0].clientY;
    _ptrActive = true;
    _ptrDelta = 0;
  }, { passive: true });

  document.body.addEventListener('touchmove', (e) => {
    if (!_ptrActive || _ptrRefreshing) return;
    const y = e.touches[0].clientY;
    _ptrDelta = y - _ptrStartY;
    if (_ptrDelta <= 0){
      ind.classList.remove('show');
      return;
    }
    if (_ptrDelta > 6) ind.classList.add('show');
    const arrow = document.getElementById('ptr-arrow');
    const txt = document.getElementById('ptr-txt');
    if (_ptrDelta >= PTR_THRESHOLD){
      arrow?.classList.add('up');
      if (txt) txt.textContent = lang==='ar' ? 'حرّر للتحديث' : 'Release to refresh';
    } else {
      arrow?.classList.remove('up');
      if (txt) txt.textContent = lang==='ar' ? 'اسحب للتحديث' : 'Pull to refresh';
    }
  }, { passive: true });

  document.body.addEventListener('touchend', async () => {
    if (!_ptrActive) return;
    _ptrActive = false;
    if (_ptrDelta >= PTR_THRESHOLD && !_ptrRefreshing){
      _ptrRefreshing = true;
      const arrow = document.getElementById('ptr-arrow');
      const txt = document.getElementById('ptr-txt');
      if (arrow) arrow.outerHTML = '<span class="ptr-spin" id="ptr-arrow"></span>';
      if (txt) txt.textContent = lang==='ar' ? 'جاري التحديث...' : 'Refreshing...';
      try {
        await triggerRefresh();
      } catch(e){}
      _ptrRefreshing = false;
      ind.classList.remove('show');
      setTimeout(()=>{
        const arr = document.getElementById('ptr-arrow');
        if (arr) arr.outerHTML = '<span class="ptr-arrow" id="ptr-arrow">↓</span>';
        const t = document.getElementById('ptr-txt');
        if (t) t.textContent = lang==='ar'?'اسحب للتحديث':'Pull to refresh';
      }, 200);
    } else {
      ind.classList.remove('show');
    }
    _ptrDelta = 0;
  }, { passive: true });
}

async function triggerRefresh(){
  if (activeTab === 'portfolio'){
    if (typeof refreshPrices === 'function') await refreshPrices();
    renderTab();
  } else if (activeTab === 'watch'){
    if (typeof refreshWatchlistPrices === 'function') await refreshWatchlistPrices();
    renderWatchlist();
  } else if (activeTab === 'notifications'){
    renderNotifications();
  } else if (activeTab === 'news'){
    if (typeof renderNews === 'function') renderNews();
  } else if (activeTab === 'more'){
    renderMore();
  } else if (activeTab === 'community'){
    renderCommunity();
  }
}

/* ── Daily Brief ── */
function shouldShowDailyBrief(){
  if (!currentUser) return false;
  if (!portfolios.length || !holdings.length) return false;
  const key = 'lastBrief_' + currentUser.id;
  const last = localStorage.getItem(key);
  const today = new Date().toISOString().slice(0,10);
  return last !== today;
}
function markBriefSeen(){
  if (!currentUser) return;
  localStorage.setItem('lastBrief_' + currentUser.id, new Date().toISOString().slice(0,10));
}

function showDailyBrief(){
  if (!shouldShowDailyBrief()) return;
  // Need active portfolio with stocks
  const pf = portfolios.find(p => p.id === settings.activePf);
  if (!pf) return;
  const hs = activeHoldings();
  if (!hs.length) return;
  
  const ar = lang === 'ar';
  const now = new Date();
  const hour = now.getHours();
  const greeting = hour < 5 ? (ar?'مساء الخير':'Good evening')
                  : hour < 12 ? (ar?'صباح الخير':'Good morning')
                  : hour < 18 ? (ar?'مساء الخير':'Good afternoon')
                  : (ar?'مساء الخير':'Good evening');
  const dateStr = now.toLocaleDateString(ar?'ar-SA-u-ca-gregory':'en-US',{weekday:'long', month:'long', day:'numeric'});
  
  // Compute today's performance
  let todayPL = 0, todayPLPct = 0, totalMV = 0;
  hs.forEach(h => {
    const s = statsFor(h);
    totalMV += s.mv;
    if (s.today != null) todayPL += s.today;
  });
  if (totalMV > 0) todayPLPct = (todayPL / (totalMV - todayPL)) * 100;
  const up = todayPL >= 0;
  
  // Top 3 movers (by day change %)
  const movers = hs
    .map(h => ({ h, s: statsFor(h) }))
    .filter(x => x.s.todayPct != null && x.s.mv > 0)
    .sort((a,b) => Math.abs(b.s.todayPct) - Math.abs(a.s.todayPct))
    .slice(0, 5);
  
  modal(`
    <div class="brief-wrap">
      <div class="brief-greeting">${greeting} 👋</div>
      <div class="brief-h">${ar?'هذي محفظتك اليوم':'Your portfolio today'}</div>
      <div style="font-size:10px;color:var(--muted2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:14px;font-weight:700">${esc(dateStr)}</div>
