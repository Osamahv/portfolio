body[dir="ltr"] .tr-total{flex-direction:row}
.tr-total-lbl{font-size:15px;color:#fff;font-weight:600}
.tr-total-val{font-size:16px;color:#fff;font-weight:700;font-variant-numeric:tabular-nums;font-family:-apple-system,"SF Pro Display","Inter",sans-serif}
.tr-err{font-size:12.5px;color:#F08080;text-align:center;min-height:18px}
.tr-submit{margin:6px 22px 12px;padding:16px;background:#1F4A2D;color:#5FE9B0;border:none;border-radius:18px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;transition:.15s}
.tr-submit:not(:disabled){background:var(--accent);color:#000}
.tr-submit:disabled{cursor:not-allowed}
.tr-submit.sell:not(:disabled){background:#F08080;color:#000}
.tr-keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:0;padding:8px 0 20px;background:transparent}
.tr-key{background:transparent;border:none;color:#fff;font-size:24px;font-weight:500;padding:18px;cursor:pointer;font-family:-apple-system,"SF Pro Display","Inter",sans-serif;font-variant-numeric:tabular-nums;transition:.1s}
.tr-key:active{background:#1F1F22}
.tr-key-del{font-size:18px}

/* Why moved card */
.why-moved-wrap{margin:18px 0}
.wm-title{display:flex;align-items:center;gap:10px;font-size:22px;font-weight:800;letter-spacing:-.015em;margin:0 0 12px;flex-direction:row-reverse;justify-content:flex-start}
body[dir="ltr"] .wm-title{flex-direction:row}
.wm-icon{width:38px;height:38px;border-radius:10px;display:grid;place-items:center;flex-shrink:0}
.wm-icon.up{background:#0F2A1F;color:#5FE9B0}
.wm-icon.down{background:#2A0F1F;color:#F08080}
.wm-icon svg{width:20px;height:20px}
.wm-card{background:#0E1A14;border:1px solid #1A3326;border-radius:14px;padding:18px 20px}
.wm-card.down{background:#1A0E14;border-color:#33191F}
.wm-text{margin:0;font-size:14.5px;line-height:1.7;color:#D8D8DC}
body[dir="rtl"] .wm-text{text-align:right}
body[dir="ltr"] .wm-text{text-align:left}
.wm-time{margin-top:12px;font-size:12px;color:#7A7A82;text-align:end}
body[dir="ltr"] .wm-time{text-align:start}

/* Stock Detail Sections v18 */
.sd-section-h2{margin:24px 0 12px;font-size:20px;font-weight:700;letter-spacing:-.015em;color:#fff}
body[dir="rtl"] .sd-section-h2{text-align:right;font-family:-apple-system,"SF Arabic","SF Pro Display",sans-serif}
body[dir="ltr"] .sd-section-h2{text-align:left}
.sd-section-h2 span:last-child{cursor:pointer}

/* About company */
.sd-about-card{background:#15151A;border-radius:14px;padding:16px 18px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;flex-direction:row-reverse;justify-content:flex-start}
body[dir="ltr"] .sd-about-card{flex-direction:row}
.sd-about-text{font-size:13.5px;color:#D8D8DC;line-height:1.6}
.sd-about-more{background:none;border:none;color:#9B9FFF;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;padding:0;white-space:nowrap}
.sd-about-more:hover{text-decoration:underline}

/* Bid / Ask */
.sd-bidask-card{background:#15151A;border-radius:14px;padding:18px}
.bidask-prices{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-direction:row-reverse}
body[dir="ltr"] .bidask-prices{flex-direction:row}
.ba-val{font-size:16px;font-weight:700;font-variant-numeric:tabular-nums;font-family:-apple-system,"SF Pro Display",sans-serif}
.ba-val.up{color:var(--accent)}
.ba-val.down{color:#F08080}
.ba-spread{font-size:13px;color:#7A7A82;font-variant-numeric:tabular-nums}
.bidask-bar{display:flex;height:5px;border-radius:3px;overflow:hidden;margin-bottom:8px;flex-direction:row-reverse}
body[dir="ltr"] .bidask-bar{flex-direction:row}
.bidask-bar-buy{background:#1B7A4F;height:100%}
.bidask-bar-sell{background:#B33B3B;height:100%}
.bidask-counts{display:flex;justify-content:space-between;font-size:13px;color:#A8A8B0;font-variant-numeric:tabular-nums;flex-direction:row-reverse}
body[dir="ltr"] .bidask-counts{flex-direction:row}

/* Key Numbers */
.sd-keynums-card{background:#15151A;border-radius:14px;padding:18px}
.keynum-row{display:flex;justify-content:space-between;margin-bottom:18px;flex-direction:row-reverse}
body[dir="ltr"] .keynum-row{flex-direction:row}
.keynum-cell{text-align:end}
body[dir="ltr"] .keynum-cell{text-align:start}
.keynum-lbl{font-size:13px;color:#A8A8B0;margin-bottom:5px}
.keynum-val{font-size:16px;font-weight:700;color:#fff;font-variant-numeric:tabular-nums;font-family:-apple-system,"SF Pro Display",sans-serif}
.keynum-slider-block{padding:14px 0;border-top:0.5px solid #25252A}
.keynum-slider-block:last-child{border-bottom:none;padding-bottom:0}
.keynum-slider-title{text-align:center;font-size:14px;color:#fff;font-weight:600;margin-bottom:14px}
.keynum-slider-track{position:relative;height:18px;display:flex;align-items:center;margin:0 12px 12px}
.keynum-slider-line{flex:1;height:2px;background:#2A2D34;border-radius:1px;position:relative}
.keynum-slider-line::before{content:'';position:absolute;top:50%;left:0;transform:translateY(-50%);width:8px;height:8px;border-left:1.5px solid #4A4A52;border-bottom:1.5px solid #4A4A52;transform:translateY(-50%) rotate(45deg)}
.keynum-slider-line::after{content:'';position:absolute;top:50%;right:0;transform:translateY(-50%);width:8px;height:8px;border-right:1.5px solid #4A4A52;border-top:1.5px solid #4A4A52;transform:translateY(-50%) rotate(45deg)}
.keynum-slider-dot{position:absolute;top:50%;width:14px;height:14px;border-radius:50%;background:#9B9FFF;transform:translate(50%,-50%);box-shadow:0 0 0 3px rgba(155,159,255,.2)}
body[dir="ltr"] .keynum-slider-dot{transform:translate(-50%,-50%)}
.keynum-slider-labels{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;flex-direction:row-reverse}
body[dir="ltr"] .keynum-slider-labels{flex-direction:row}
.kn-lbl{text-align:start;flex:1}
.kn-lbl-c{text-align:center}
body[dir="rtl"] .kn-lbl:first-child{text-align:start}
body[dir="rtl"] .kn-lbl:last-child{text-align:end}
.kn-tag{font-size:11.5px;color:#7A7A82;margin-bottom:2px}
.kn-v{font-size:14px;font-weight:700;color:#fff;font-variant-numeric:tabular-nums;font-family:-apple-system,"SF Pro Display",sans-serif}

/* Analyst */
.sd-analyst-card{background:#15151A;border-radius:14px;padding:20px;margin-bottom:6px}
.analyst-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;flex-direction:row-reverse}
body[dir="ltr"] .analyst-top{flex-direction:row}
.analyst-cell{flex:1;text-align:end}
body[dir="ltr"] .analyst-cell{text-align:start}
.analyst-cell:last-child{text-align:start}
body[dir="rtl"] .analyst-cell:last-child{text-align:start}
body[dir="rtl"] .analyst-cell:first-child{text-align:end}
.analyst-lbl{font-size:13px;color:#A8A8B0;margin-bottom:6px}
.analyst-val{font-size:20px;font-weight:700;color:#fff;font-variant-numeric:tabular-nums;font-family:-apple-system,"SF Pro Display",sans-serif}
.analyst-divider{width:0.5px;background:#25252A;align-self:stretch;margin:0 12px}
.analyst-bars{display:flex;align-items:center;gap:18px;padding-top:18px;border-top:0.5px solid #25252A;flex-direction:row-reverse}
body[dir="ltr"] .analyst-bars{flex-direction:row}
.analyst-circle{width:96px;height:96px;border-radius:50%;background:#3D3BC4;display:grid;place-items:center;flex-shrink:0}
.analyst-circle-num{font-size:18px;font-weight:800;color:#fff;font-variant-numeric:tabular-nums;font-family:-apple-system,"SF Pro Display",sans-serif}
.analyst-bars-l{flex:1;display:flex;flex-direction:column;gap:8px}
.ab-row{display:flex;align-items:center;gap:10px;flex-direction:row-reverse}
body[dir="ltr"] .ab-row{flex-direction:row}
.ab-lbl{font-size:13px;color:#A8A8B0;font-variant-numeric:tabular-nums;flex-shrink:0;min-width:90px;text-align:end}
body[dir="ltr"] .ab-lbl{text-align:start}
.ab-bar{flex:1;height:6px;background:#25252A;border-radius:3px;overflow:hidden}
.ab-fill{height:100%;border-radius:3px}
.ab-fill.buy{background:#9B9FFF}
.ab-fill.hold{background:#5A5A62}
.ab-fill.sell{background:#3A3A40}
.analyst-footer{font-size:11.5px;color:#7A7A82;text-align:center;margin-top:14px;padding-top:14px;border-top:0.5px solid #25252A}

/* Analyst sheet (bottom modal) */
.analyst-sheet-top{display:flex;justify-content:space-between;align-items:center;background:#15151A;border-radius:14px;padding:14px;flex-direction:row-reverse}
body[dir="ltr"] .analyst-sheet-top{flex-direction:row}
.analyst-sheet-cell{flex:1;text-align:center;padding:4px 8px}
.analyst-sheet-divider{width:0.5px;background:#25252A;align-self:stretch}

/* Dividends */
.sd-divs-wrap{display:flex;flex-direction:column;gap:10px;margin-bottom:6px}
.div-row{background:#15151A;border-radius:12px;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-direction:row-reverse}
body[dir="ltr"] .div-row{flex-direction:row}
.div-info{flex:1;text-align:end}
body[dir="ltr"] .div-info{text-align:start}
.div-amount{font-size:15px;font-weight:700;color:#fff;font-variant-numeric:tabular-nums}
.div-date{font-size:12px;color:#7A7A82;margin-top:4px}
.div-badge{font-size:11.5px;font-weight:600;padding:5px 12px;border-radius:8px;flex-shrink:0}
.div-badge.paid{background:#25252A;color:#A8A8B0}
.div-badge.upcoming{background:rgba(155,159,255,.15);color:#9B9FFF}

/* Create new watchlist modal */
.wl-create-modal{padding:6px 4px 8px;direction:inherit}
.wl-create-h2{font-size:18px;font-weight:700;text-align:center;color:#fff;margin:14px 0 22px}
.wl-create-input-wrap{margin-bottom:14px}
.wl-create-input{width:100%;background:transparent;border:1px solid #2A2D34;border-radius:14px;color:#fff;font-size:15px;padding:16px 18px;outline:none;font-family:inherit;text-align:end;box-sizing:border-box;transition:.15s}
body[dir="ltr"] .wl-create-input{text-align:start}
.wl-create-input:focus{border-color:#B6B5F5}
.wl-create-input::placeholder{color:#5A5A62}
.wl-add-list-btn{width:100%;padding:16px;background:#2A2D34;color:#7A7A82;border:none;border-radius:14px;font-size:15px;font-weight:600;cursor:not-allowed;font-family:inherit;margin-bottom:8px;transition:.15s}
.wl-add-list-btn:not(:disabled){background:#B6B5F5;color:#15151A;cursor:pointer}
.wl-add-list-btn:not(:disabled):hover{background:#C9C8F8}
.wl-cancel-btn{width:100%;padding:16px;background:transparent;color:#9B9FFF;border:none;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit}

/* Watchlist bottom-sheet & manage */
.wl-sheet,.wl-add-sheet{padding:8px 0 0;direction:inherit}
.wl-sheet-grip{width:36px;height:4px;border-radius:2px;background:#3A3A40;margin:0 auto 14px}
.wl-sheet-header{display:flex;align-items:center;justify-content:space-between;padding:0 4px 18px;gap:10px;flex-direction:row-reverse}
body[dir="ltr"] .wl-sheet-header{flex-direction:row}
.wl-sheet-title{font-size:15px;font-weight:600;color:#fff;margin:0;flex:1;text-align:center}
.wl-edit-link{background:none;border:none;color:#9B9FFF;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;padding:4px 0;width:40px;text-align:start}
.wl-lists{display:flex;flex-direction:column;gap:1px;background:#222226;border-radius:12px;overflow:hidden;margin-bottom:12px}
.wl-list-item{background:#15151A;padding:14px 18px;cursor:pointer;transition:.15s;display:flex;align-items:center;justify-content:space-between;flex-direction:row-reverse}
body[dir="ltr"] .wl-list-item{flex-direction:row}
.wl-list-item.on{background:#1A1D27}
.wl-list-item:hover{background:#1A1A1F}
.wl-list-info{text-align:end}
body[dir="ltr"] .wl-list-info{text-align:start}
.wl-list-name{font-size:15px;font-weight:700;color:#fff}
.wl-list-count{font-size:11.5px;color:#7A7A82;margin-top:2px}
.wl-create-btn{display:flex;align-items:center;justify-content:center;width:100%;padding:16px;background:#15151A;border:none;color:#fff;font-size:14.5px;font-weight:600;border-radius:12px;cursor:pointer;font-family:inherit;margin-bottom:14px;transition:.15s}
.wl-create-btn:hover{background:#1F1F22}
.wl-done-btn{width:100%;padding:16px;background:#B6B5F5;color:#15151A;border:none;border-radius:14px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;transition:.15s}
.wl-done-btn:hover{background:#C9C8F8}

/* Watchlist add sheet (search) */
.wl-add-title{font-size:15px;font-weight:600;color:#fff;text-align:center;margin:0 0 16px}
.wl-search-wrap{position:relative;background:#1A1A1D;border-radius:12px;padding:12px 14px;margin-bottom:14px;display:flex;align-items:center;gap:10px;flex-direction:row-reverse}
body[dir="ltr"] .wl-search-wrap{flex-direction:row}
.wl-search-ic{color:#7A7A82;display:grid;place-items:center;flex-shrink:0}
.wl-search-ic svg{width:16px;height:16px}
.wl-search-inp{flex:1;background:transparent;border:none;color:#fff;font-size:14px;font-family:inherit;outline:none;text-align:end}
body[dir="ltr"] .wl-search-inp{text-align:start}
.wl-search-inp::placeholder{color:#7A7A82}
.wl-search-results{display:flex;flex-direction:column;gap:1px;background:#222226;border-radius:12px;overflow:hidden;max-height:60vh;overflow-y:auto;margin-bottom:14px}
.wl-result-row{background:#15151A;padding:14px 16px;display:flex;align-items:center;gap:14px;flex-direction:row-reverse}
body[dir="ltr"] .wl-result-row{flex-direction:row}
.wl-result-add{background:none;border:none;color:#9B9FFF;padding:0;display:grid;place-items:center;cursor:pointer;width:28px;height:28px;flex-shrink:0}
.wl-result-add svg{width:24px;height:24px}
.wl-result-add.on{color:#9B9FFF}
.wl-result-logo{width:42px;height:42px;border-radius:10px;background:#fff;color:#000;display:grid;place-items:center;font-size:10px;font-weight:800;flex-shrink:0;overflow:hidden}
.wl-result-logo img{width:100%;height:100%;object-fit:contain;padding:5px;box-sizing:border-box}
.wl-result-info{flex:1;min-width:0;text-align:end}
body[dir="ltr"] .wl-result-info{text-align:start}
.wl-result-name{font-size:13.5px;font-weight:600;color:#fff;line-height:1.4}
.wl-result-tic{font-size:11.5px;color:#7A7A82;margin-top:3px;letter-spacing:.04em}

/* Price flash animation when value changes */
@keyframes flashUp {
  0%{background:rgba(95,233,176,.35);color:#5FE9B0}
  100%{background:transparent;color:inherit}
}
@keyframes flashDown {
  0%{background:rgba(240,128,128,.35);color:#F08080}
  100%{background:transparent;color:inherit}
}
.flash-up{animation:flashUp .65s ease-out;border-radius:4px;padding:0 2px;margin:0 -2px}
.flash-down{animation:flashDown .65s ease-out;border-radius:4px;padding:0 2px;margin:0 -2px}

/* Sector badge */
.sector-badge{display:inline-flex;align-items:center;font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:7px;letter-spacing:.01em;white-space:nowrap;vertical-align:middle}

/* Market session pill */
.mkt-pill{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:10px;font-size:11px;font-weight:700;letter-spacing:.01em;white-space:nowrap}
.mkt-dot{width:6px;height:6px;border-radius:50%;display:inline-block;animation:mktPulse 2s ease-in-out infinite}
@keyframes mktPulse{0%,100%{opacity:1}50%{opacity:.4}}

/* Cash deposit/withdraw page (clean) */
.cash-topbar{justify-content:space-between}
.cash-title{font-size:17px;font-weight:700;color:var(--txt);font-family:-apple-system,"SF Arabic","SF Pro Display",sans-serif}
.cash-content{padding-top:24px;display:flex;flex-direction:column;gap:18px}
.cash-bal-card{background:#1A1D24;border-radius:14px;padding:16px 18px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-direction:row-reverse}
body[dir="ltr"] .cash-bal-card{flex-direction:row}
.cash-bal-r{text-align:end}
body[dir="ltr"] .cash-bal-r{text-align:start}
.cash-bal-lbl{font-size:14px;font-weight:600;color:#fff;margin-bottom:5px}
.cash-bal-rate{font-size:11px;color:#7A7A82;font-variant-numeric:tabular-nums}
.cash-bal-l{text-align:start}
body[dir="ltr"] .cash-bal-l{text-align:end}
.cash-bal-val{font-size:18px;font-weight:700;color:#fff;font-variant-numeric:tabular-nums;font-family:-apple-system,"SF Pro Display","Inter",sans-serif}
.cash-bal-sar{font-size:11px;color:#7A7A82;font-variant-numeric:tabular-nums;margin-top:3px}
.cash-input-card{border:1px solid #2A2D34;border-radius:14px;padding:16px 18px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-direction:row-reverse;background:transparent;transition:.15s}
body[dir="ltr"] .cash-input-card{flex-direction:row}
.cash-input-card:focus-within{border-color:#B6B5F5}
.cash-input-lbl{font-size:15px;color:#fff;font-weight:600;flex-shrink:0;cursor:text;font-family:-apple-system,"SF Arabic","SF Pro Display",sans-serif}
.cash-input{flex:1;background:transparent;border:none;color:#fff;font-size:18px;font-weight:600;font-variant-numeric:tabular-nums;font-family:-apple-system,"SF Pro Display","Inter",sans-serif;outline:none;padding:0;width:100%;text-align:start}
body[dir="rtl"] .cash-input{text-align:start}
.cash-input::placeholder{color:#5BC98E;font-weight:700}
.cash-err{font-size:12.5px;color:#F08080;text-align:center;min-height:18px}
.cash-continue{width:100%;background:#2A2D34;color:#7A7A82;border:none;padding:16px;border-radius:14px;font-size:16px;font-weight:700;cursor:not-allowed;font-family:inherit;transition:.15s}
.cash-continue:not(:disabled){background:#B6B5F5;color:#15151A;cursor:pointer}
.cash-continue:not(:disabled):hover{background:#C9C8F8}

/* Sticky Trade Bar at bottom of stock detail */
.sd-trade-bar{position:sticky;bottom:0;left:0;right:0;background:linear-gradient(to top,#0A0A0A 75%,rgba(10,10,10,0));padding:14px 22px 22px;z-index:5;margin-top:auto}
.sd-trade-btn{width:100%;background:#B6B5F5;color:#15151A;border:none;padding:16px;border-radius:14px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;letter-spacing:-.005em;transition:.15s}
.sd-trade-btn:hover{background:#C9C8F8;transform:translateY(-1px)}
.sd-trade-btn:active{transform:scale(.98)}

/* Trade chooser modal */
.tc-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:8px}
.tc-btn{padding:18px;border-radius:14px;font-size:16px;font-weight:700;cursor:pointer;border:none;font-family:inherit;transition:.15s;display:flex;align-items:center;justify-content:center;gap:8px}
.tc-btn.buy{background:rgba(95,233,176,.12);color:var(--accent);border:1px solid var(--accent-d)}
.tc-btn.sell{background:rgba(242,107,110,.12);color:#F08080;border:1px solid #5C2222}
.tc-btn:hover{transform:translateY(-1px)}

/* Your Position card matching screenshot */
.ys-stats{background:#15151A;border-radius:14px;padding:20px;margin-bottom:18px}
.ys-row{display:flex;justify-content:space-between;gap:16px;flex-direction:row-reverse}
body[dir="ltr"] .ys-row{flex-direction:row}
.ys-cell{flex:1;min-width:0;text-align:end}
body[dir="ltr"] .ys-cell{text-align:start}
.ys-lbl{font-size:13px;color:#9090A0;font-weight:500;margin-bottom:6px}
.ys-val{font-size:20px;font-weight:700;color:#fff;font-variant-numeric:tabular-nums;font-family:-apple-system,"SF Pro Display","Inter",sans-serif;letter-spacing:-.01em;display:flex;align-items:center;gap:6px;justify-content:flex-end}
body[dir="ltr"] .ys-val{justify-content:flex-start}
.ys-val.up{color:var(--accent)}
.ys-val.down{color:#F08080}
.ys-tri{font-size:14px}
.ys-divider{height:0.5px;background:#25252A;margin:18px 0}

/* Buying Power card (compact) */
.bp-card{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:13px 16px;margin:0 0 14px;background:#1A1A1D;border:none;border-radius:14px;cursor:pointer;transition:.18s}
.bp-card:hover{background:#1F1F22}
body[dir="rtl"] .bp-card{flex-direction:row}
body[dir="ltr"] .bp-card{flex-direction:row-reverse}
/* In RTL: arrow far-left, value middle-left, label far-right */
.bp-card .bp-arrow{color:#6B6B72;font-size:18px;font-weight:300;line-height:1;order:1}
.bp-card .bp-val{font-size:15px;font-weight:600;color:#fff;font-variant-numeric:tabular-nums;font-family:-apple-system,"SF Pro Display","Inter",sans-serif;order:2}
.bp-card .bp-lbl{font-size:14px;color:#A8A8B0;font-weight:500;flex:1;order:3;text-align:end}

/* Buying Power full page */
.bp-page-header{text-align:center;font-size:17px;font-weight:600;color:var(--txt);padding:12px 0 18px}
.bp-hero{background:#15151A;border-radius:18px;padding:24px 20px 18px;margin-bottom:18px}
.bp-hero-lbl{font-size:14px;color:#A8A8B0;text-align:center;margin-bottom:6px;font-weight:500}
.bp-hero-val{font-size:34px;font-weight:700;color:#fff;text-align:center;font-variant-numeric:tabular-nums;font-family:-apple-system,"SF Pro Display","Inter",sans-serif;letter-spacing:-.01em;margin-bottom:18px}
.bp-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.bp-btn{display:flex;align-items:center;justify-content:center;gap:7px;padding:13px;border-radius:11px;font-size:14.5px;font-weight:600;cursor:pointer;border:none;font-family:inherit;transition:.15s}
.bp-btn.dep{background:#B6B5F5;color:#15151A}
.bp-btn.dep:hover{background:#C9C8F8}
.bp-btn.wd{background:#3D3BC4;color:#fff}
.bp-btn.wd:hover{background:#4D4BD4}
.bp-btn svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round}

/* Total Assets card */
.bp-assets{background:#15151A;border-radius:14px;padding:18px 20px;margin-bottom:22px}
.bp-assets-lbl{font-size:13.5px;color:#A8A8B0;margin-bottom:6px;text-align:end}
body[dir="ltr"] .bp-assets-lbl{text-align:start}
.bp-assets-val{font-size:24px;font-weight:700;color:#fff;font-variant-numeric:tabular-nums;font-family:-apple-system,"SF Pro Display","Inter",sans-serif;text-align:end}
body[dir="ltr"] .bp-assets-val{text-align:start}

/* Transactions list */
.bp-txs-month{font-size:13px;color:#A8A8B0;margin:14px 4px 8px;text-align:end;font-weight:500}
body[dir="ltr"] .bp-txs-month{text-align:start}
.bp-txs{background:#15151A;border-radius:14px;overflow:hidden}
.bp-tx{display:flex;align-items:center;gap:14px;padding:14px 16px;border-bottom:0.5px solid #25252A;flex-direction:row-reverse}
body[dir="ltr"] .bp-tx{flex-direction:row}
.bp-tx:last-child{border-bottom:none}
.bp-tx-ic{width:36px;height:36px;border-radius:50%;background:#25252A;display:grid;place-items:center;flex-shrink:0;color:#A8A8B0}
.bp-tx-ic svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.bp-tx-info{flex:1;min-width:0;text-align:end}
body[dir="ltr"] .bp-tx-info{text-align:start}
.bp-tx-title{font-size:14.5px;font-weight:600;color:#fff;line-height:1.2}
.bp-tx-time{font-size:12px;color:#7A7A82;margin-top:3px}
.bp-tx-r{text-align:start;flex-shrink:0}
body[dir="rtl"] .bp-tx-r{text-align:start}
.bp-tx-amt{font-size:14.5px;font-weight:600;color:#fff;font-variant-numeric:tabular-nums;line-height:1.2}
.bp-tx-status{font-size:11.5px;color:var(--accent);margin-top:3px;display:flex;align-items:center;gap:4px;justify-content:flex-start}
.bp-tx-status::before{content:'✓';display:inline-grid;place-items:center;width:13px;height:13px;background:var(--accent);color:#000;border-radius:50%;font-size:9px;font-weight:800}

/* Cash bar with quick add - compact (legacy hide) */
.cash-bar{display:none}
.cash-add-btn{display:inline-flex;align-items:center;justify-content:center;background:var(--accent);color:#000;border:none;width:26px;height:26px;border-radius:50%;cursor:pointer;font-family:inherit;transition:.15s;flex-shrink:0}
.cash-add-btn:hover{background:#7AFAC2;transform:scale(1.08)}
.cash-add-btn svg{width:12px;height:12px;stroke:#000;fill:none;stroke-width:3;stroke-linecap:round}

/* Today summary strip atop Hero */
.today-strip{display:flex;align-items:center;gap:10px;padding:9px 14px;margin:0 0 12px;background:rgba(20,20,20,.6);border:1px solid var(--line);border-radius:12px;font-size:11.5px;font-variant-numeric:tabular-nums}
.today-strip .lbl{font-size:9.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;font-weight:800}
.today-strip .val{font-weight:800}
.today-strip .val.up{color:var(--accent)}
.today-strip .val.down{color:var(--loss)}
.today-strip .sep{color:var(--line2);margin:0 4px}
.today-strip .movers{display:flex;gap:6px;margin-inline-start:auto;overflow-x:auto;scrollbar-width:none}
.today-strip .movers::-webkit-scrollbar{display:none}
.today-strip .mover{font-size:10.5px;padding:2px 7px;border-radius:5px;background:var(--surf);border:1px solid var(--line);font-weight:700;white-space:nowrap}
.today-strip .mover.up{color:var(--accent);border-color:var(--accent-d)}
.today-strip .mover.down{color:var(--loss);border-color:var(--loss-d)}

/* Watchlist group buttons */
.wg-btn{flex:1;background:transparent;border:1px solid var(--line);color:var(--muted);padding:8px 6px;border-radius:9px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;letter-spacing:.02em;transition:.15s;white-space:nowrap;text-align:center}
.wg-btn:hover{color:var(--txt2);border-color:var(--line2)}
.wg-btn.on{background:var(--accent-bg);border-color:var(--accent-d);color:var(--accent)}
.wg-pill{display:inline-flex;align-items:center;gap:3px;font-size:8.5px;font-weight:800;padding:2px 6px;border-radius:4px;background:var(--surf);color:var(--muted);border:1px solid var(--line);letter-spacing:.05em;text-transform:uppercase}
.wg-pill.buy{background:var(--accent-bg);color:var(--accent);border-color:var(--accent-d)}
.wg-pill.study{background:#1F1A0E;color:var(--gold);border-color:#5A4818}
.wg-pill.watch{background:#0E1828;color:#5BA5FF;border-color:#1F3A6E}

/* Watchlist filter chips */
.wl-filter-row{display:flex;gap:5px;margin-bottom:10px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.wl-filter-row::-webkit-scrollbar{display:none}

/* Earnings approaching badge */
.earn-warn{display:inline-flex;align-items:center;gap:4px;font-size:9px;font-weight:800;padding:2px 6px;border-radius:4px;background:#2A1A0E;color:#E89B6B;border:1px solid #5C3B22;letter-spacing:.05em;text-transform:uppercase;margin-inline-start:4px}

/* ── Earnings timeline + financials summary (v15) ── */
.earn-tl{background:#000;border:1px solid var(--line);border-radius:12px;padding:12px;margin-top:12px}
.earn-tl-head{display:flex;align-items:center;gap:7px;font-size:10.5px;color:var(--muted);font-weight:800;text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px}
.earn-tl-row{display:flex;align-items:stretch;gap:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.earn-tl-row::-webkit-scrollbar{display:none}
.earn-tl-cell{flex:1;min-width:90px;background:var(--surf);border:1px solid var(--line);border-radius:9px;padding:9px 10px;text-align:center;position:relative}
.earn-tl-cell.next{background:linear-gradient(135deg,#1F1A0E,#0F0A05);border-color:#5A4818}
.earn-tl-cell.beat{background:linear-gradient(135deg,#0E2517,#06160d);border-color:var(--accent-d)}
.earn-tl-cell.miss{background:linear-gradient(135deg,#2A0E10,#1a0608);border-color:var(--loss-d)}
.earn-tl-cell .dt{font-size:9.5px;color:var(--muted);font-weight:800;text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px}
.earn-tl-cell .pq{font-size:9px;color:var(--muted2);font-weight:700;margin-bottom:5px}
.earn-tl-cell .vals{display:flex;flex-direction:column;gap:2px;font-variant-numeric:tabular-nums}
.earn-tl-cell .vr{display:flex;justify-content:space-between;align-items:baseline;font-size:10.5px}
.earn-tl-cell .vr .l{color:var(--muted2);font-size:9px;font-weight:700}
.earn-tl-cell .vr .v{font-weight:800;color:var(--txt2)}
.earn-tl-cell .verdict{font-size:9.5px;font-weight:800;margin-top:5px;padding:1px 5px;border-radius:4px;display:inline-block;letter-spacing:.05em}
.earn-tl-cell.beat .verdict{background:var(--accent-bg);color:var(--accent);border:1px solid var(--accent-d)}
.earn-tl-cell.miss .verdict{background:var(--loss-bg);color:var(--loss);border:1px solid var(--loss-d)}
.earn-tl-cell.next .verdict{background:#1F1A0E;color:var(--gold);border:1px solid #5A4818}
.earn-tl-cell .countdown{font-size:11px;font-weight:800;color:var(--gold);margin-top:3px;font-variant-numeric:tabular-nums}

/* Financials summary card */
.fin-card{background:#000;border:1px solid var(--line);border-radius:12px;padding:13px;margin-top:10px}
.fin-card-head{display:flex;align-items:center;justify-content:space-between;gap:7px;margin-bottom:10px}
.fin-card-head .ttl{font-size:10.5px;color:var(--muted);font-weight:800;text-transform:uppercase;letter-spacing:.07em}
.fin-verdict{font-size:11px;font-weight:800;padding:3px 9px;border-radius:6px;letter-spacing:.04em}
.fin-verdict.strong{background:var(--accent-bg);color:var(--accent);border:1px solid var(--accent-d)}
.fin-verdict.fair{background:#1F1A0E;color:var(--gold);border:1px solid #5A4818}
.fin-verdict.weak{background:var(--loss-bg);color:var(--loss);border:1px solid var(--loss-d)}
.fin-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:7px}
.fin-cell{background:var(--surf);border:1px solid var(--line);border-radius:8px;padding:8px 10px}
.fin-cell .lbl{font-size:9.5px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px;display:flex;align-items:center;gap:4px}
.fin-cell .lbl .dot{width:5px;height:5px;border-radius:50%}
.fin-cell .lbl .dot.good{background:var(--accent)}
.fin-cell .lbl .dot.ok{background:var(--gold)}
.fin-cell .lbl .dot.bad{background:var(--loss)}
.fin-cell .v{font-size:13.5px;font-weight:800;font-variant-numeric:tabular-nums;color:var(--txt)}
.fin-cell .note{font-size:9.5px;color:var(--muted2);margin-top:1px}

/* Earnings badge pill on portfolio/watchlist rows */
.earn-badge{display:inline-flex;align-items:center;gap:3px;font-size:8.5px;font-weight:700;padding:1px 5px;border-radius:3px;background:rgba(232,185,106,.1);color:#E8B96A;border:none;letter-spacing:.02em;font-variant-numeric:tabular-nums;margin-inline-start:5px;white-space:nowrap;vertical-align:1px}
.earn-badge.soon{background:rgba(232,155,107,.13);color:#E89B6B}

/* Luxury SVG icon container in More menu */
.more-row .ic{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;flex-shrink:0;background:linear-gradient(135deg,rgba(95,233,176,.08),rgba(95,233,176,.03));border:1px solid rgba(95,233,176,.15);color:var(--accent)}
.more-row .ic.gr{background:linear-gradient(135deg,rgba(95,233,176,.1),rgba(95,233,176,.04));border-color:rgba(95,233,176,.18);color:var(--accent)}
.more-row .ic.gd{background:linear-gradient(135deg,rgba(232,185,106,.1),rgba(232,185,106,.03));border-color:rgba(232,185,106,.2);color:#E8B96A}
.more-row .ic.bl{background:linear-gradient(135deg,rgba(91,165,255,.1),rgba(91,165,255,.03));border-color:rgba(91,165,255,.2);color:#5BA5FF}
.more-row .ic.rd{background:linear-gradient(135deg,rgba(242,107,110,.1),rgba(242,107,110,.03));border-color:rgba(242,107,110,.2);color:var(--loss)}
.more-row .ic svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* Compact icon style for badges/inline */
.icn{display:inline-flex;align-items:center;justify-content:center;width:1em;height:1em;vertical-align:-.15em}
.icn svg{width:100%;height:100%;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* Notifications screen */
.notif-empty{text-align:center;padding:50px 20px}
.notif-section{margin-bottom:18px}
.notif-section-head{display:flex;align-items:center;justify-content:space-between;padding:0 4px 10px;font-family:-apple-system,"SF Arabic","SF Pro Display",sans-serif}
body[dir="rtl"] .notif-section-head{flex-direction:row-reverse}
.notif-section-head .ttl{font-size:18px;font-weight:800;color:var(--txt);letter-spacing:-.01em}
.notif-section-head .arr{font-size:20px;color:var(--muted);font-weight:300}
.notif-list{display:flex;flex-direction:column;gap:1px;background:var(--line);border-radius:14px;overflow:hidden;border:1px solid var(--line)}
.notif-row{background:#0A0A0A;padding:14px 16px;display:flex;align-items:center;gap:12px;flex-direction:row-reverse}
body[dir="ltr"] .notif-row{flex-direction:row}
.nf-ic{width:36px;height:36px;border-radius:50%;flex-shrink:0;display:grid;place-items:center;background:var(--surf);border:1px solid var(--line);color:var(--muted)}
.nf-ic svg{width:17px;height:17px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.nf-ic.alert-ic{background:rgba(95,233,176,.08);border-color:var(--accent-d);color:var(--accent)}
.nf-ic.loss-ic{background:var(--loss-bg);border-color:var(--loss-d);color:var(--loss)}
.nf-ic.gold-ic{background:rgba(232,185,106,.1);border-color:#5A4818;color:#E8B96A}
.nf-ic.buy-ic{background:rgba(95,233,176,.08);border-color:var(--accent-d);color:var(--accent)}
.nf-ic.sell-ic{background:rgba(91,165,255,.1);border-color:#1F3A6E;color:#5BA5FF}
.nf-ic.cash-ic{background:var(--surf);border-color:var(--line);color:var(--muted)}
.nf-body{flex:1;min-width:0;text-align:start}
.nf-title{font-size:14px;font-weight:700;color:var(--txt);letter-spacing:-.005em}
.nf-sub{font-size:11.5px;color:var(--muted);margin-top:3px;line-height:1.4}
.nf-status{flex-shrink:0;display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;padding:3px 8px;border-radius:5px}
.nf-status.nf-done{background:var(--accent-bg);color:var(--accent);border:1px solid var(--accent-d)}
.nf-time{font-size:10.5px;color:var(--muted2);font-weight:600;flex-shrink:0;font-variant-numeric:tabular-nums;white-space:nowrap}
.nf-amount{flex-shrink:0;font-size:13.5px;font-weight:800;font-variant-numeric:tabular-nums}
.nf-amount.up{color:var(--accent)}
.nf-amount.down{color:var(--loss)}

/* Manage watchlists button */
.wl-manage-bar{display:none}

/* "My Stocks" cards — matching upload exactly */
.ms-section-title{font-size:17px;font-weight:800;color:var(--txt);margin:18px 4px 12px;letter-spacing:-.01em;text-align:start;font-family:-apple-system,"SF Arabic","SF Pro Display",sans-serif}
.ms-card{background:#161618;border:1px solid #1F1F22;border-radius:18px;padding:0;margin-bottom:12px;cursor:pointer;transition:.15s;overflow:hidden}
.ms-card:hover{border-color:#2A2A2D;transform:translateY(-1px)}
.ms-top{background:#1C1C1F;padding:11px 14px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-direction:row-reverse}
body[dir="ltr"] .ms-top{flex-direction:row}
.ms-day{display:flex;align-items:center;gap:9px;min-width:0;flex-direction:row-reverse}
body[dir="ltr"] .ms-day{flex-direction:row}
.ms-price{font-size:16px;font-weight:700;color:#E8E8EA;font-variant-numeric:tabular-nums;font-family:-apple-system,"SF Pro Display","Inter",sans-serif;letter-spacing:-.01em}
.ms-day-pct{font-size:12px;font-weight:700;font-variant-numeric:tabular-nums}
.ms-day-pct.up{color:var(--accent)}
.ms-day-pct.down{color:#F08080}
.ms-day .wr-spark{width:70px;height:26px;flex-shrink:0}
.ms-tic-wrap{display:flex;align-items:center;gap:9px;flex-shrink:0;flex-direction:row-reverse}
body[dir="ltr"] .ms-tic-wrap{flex-direction:row}
.ms-tic{font-size:14.5px;font-weight:700;color:#E8E8EA;font-family:-apple-system,"SF Pro Display","Inter",sans-serif;letter-spacing:-.01em}
.ms-logo{width:32px;height:32px;border-radius:8px;background:#0E0E10;border:1px solid #1F1F22;object-fit:contain;padding:4px;flex-shrink:0}
.ms-logo.ms-logo-fb{display:grid;place-items:center;font-size:9px;font-weight:800;color:var(--accent);padding:0}
.ms-bot{padding:13px 14px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-direction:row-reverse}
body[dir="ltr"] .ms-bot{flex-direction:row}
.ms-bot-l{display:flex;align-items:center;gap:10px;flex-direction:row-reverse}
body[dir="ltr"] .ms-bot-l{flex-direction:row}
.ms-pct-pill{display:inline-flex;align-items:center;padding:5px 11px;border-radius:9px;font-size:12.5px;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:.01em}
.ms-pct-pill.up{background:#1B3A2A;color:#7FE0AE}
.ms-pct-pill.down{background:#3A1B1F;color:#F08080}
.ms-qty{font-size:12px;color:#777;font-weight:500;font-variant-numeric:tabular-nums}
.ms-bot-r{text-align:start;flex-shrink:0}
body[dir="rtl"] .ms-bot-r{text-align:end}
.ms-mv{font-size:16px;font-weight:700;color:#E8E8EA;font-variant-numeric:tabular-nums;font-family:-apple-system,"SF Pro Display","Inter",sans-serif;letter-spacing:-.01em;line-height:1.2}
.ms-pl{font-size:11.5px;font-weight:700;font-variant-numeric:tabular-nums;margin-top:3px;display:flex;align-items:center;gap:3px;justify-content:flex-start}
body[dir="rtl"] .ms-pl{justify-content:flex-end}
.ms-pl.up{color:var(--accent)}
.ms-pl.down{color:#F08080}

/* Watchlist v3 — exact match to upload */
.watchlist-header{padding:8px 4px 18px}
.watchlist-title{font-size:30px;font-weight:800;color:var(--txt);margin:0 0 18px;letter-spacing:-.02em;text-align:end;font-family:-apple-system,"SF Arabic","SF Pro Display",sans-serif}
body[dir="ltr"] .watchlist-title{text-align:start}
.watchlist-tabs{display:flex;align-items:center;justify-content:space-between;gap:10px;border-bottom:1px solid var(--line);padding-bottom:0;flex-direction:row-reverse}
body[dir="ltr"] .watchlist-tabs{flex-direction:row}
.wl-tab{background:transparent;border:none;color:var(--txt);font-size:15px;font-weight:700;padding:6px 0 12px;position:relative;cursor:pointer;font-family:inherit}
.wl-tab.on::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:2px;background:#9B9FFF;border-radius:2px 2px 0 0}
.wl-edit{background:transparent;border:none;color:var(--muted);cursor:pointer;padding:6px;display:grid;place-items:center}
.wl-edit svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

.watch-list{display:flex;flex-direction:column;gap:12px;background:transparent;border:none;border-radius:0;overflow:visible;padding:0;margin-top:16px}
.watch-row{background:#0E0E10;border:1px solid #1A1A1D;border-radius:18px;padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:.18s;position:relative;overflow:hidden;flex-direction:row-reverse;min-height:72px}
body[dir="ltr"] .watch-row{flex-direction:row}
.watch-row:hover{border-color:#27272B}
.watch-row.up{background:linear-gradient(to var(--gradDir, left),#0E1F18 0%,#0E0E10 55%)}
.watch-row.down{background:linear-gradient(to var(--gradDir, left),#1F0E11 0%,#0E0E10 55%)}
body[dir="rtl"] .watch-row{--gradDir:right}
body[dir="ltr"] .watch-row{--gradDir:left}
.watch-row .wr-logo{width:52px;height:52px;border-radius:13px;flex-shrink:0;background:#FFFFFF;border:none;display:grid;place-items:center;overflow:hidden;padding:5px}
.watch-row .wr-logo img{width:100%;height:100%;object-fit:contain}
.watch-row .wr-logo.fallback{font-size:11px;font-weight:800;color:#000;background:#FFFFFF;padding:0}
.watch-row .wr-info{flex:1;min-width:0;text-align:end}
body[dir="ltr"] .watch-row .wr-info{text-align:start}
.watch-row .wr-tic{font-size:19px;font-weight:700;letter-spacing:-.01em;color:var(--txt);font-family:-apple-system,"SF Pro Display","Inter",sans-serif;line-height:1.15;display:flex;align-items:center;gap:7px;justify-content:flex-end}
body[dir="ltr"] .watch-row .wr-tic{justify-content:flex-start}
.watch-row .wr-name{font-size:13.5px;color:#7A7A82;font-weight:500;margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.watch-row .wr-spark{flex-shrink:0;width:90px;height:38px;display:block}
.watch-row .wr-price-col{flex-shrink:0;text-align:start;min-width:88px}
.watch-row .wr-price{font-size:21px;font-weight:700;font-variant-numeric:tabular-nums;color:var(--txt);font-family:-apple-system,"SF Pro Display","Inter",sans-serif;line-height:1.1;letter-spacing:-.01em}
.watch-row .wr-change{font-size:13px;font-weight:600;margin-top:4px;font-variant-numeric:tabular-nums;display:flex;align-items:center;gap:5px;justify-content:flex-start;line-height:1.1}
.watch-row .wr-change.up{color:var(--accent)}
.watch-row .wr-change.down{color:#F08080}
.watch-row .wr-change-tri{font-size:11px;line-height:1}
.adr-tag{display:inline-flex;align-items:center;font-size:9px;font-weight:700;padding:2px 7px;border-radius:5px;background:#2A2A2D;color:#9A9AA0;border:none;letter-spacing:.05em}

/* Add watchlist bottom button */
.wl-add-bottom{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;background:transparent;border:none;color:#9B9FFF;padding:22px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:18px}
.wl-add-bottom svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round}
.wl-add-bottom:hover{opacity:.85}

/* viz frame around portfolio holdings */
.viz-frame{background:rgba(20,20,20,.35);border:1px solid var(--line);border-radius:18px;padding:14px;margin-bottom:14px}
.viz-frame > #viz-wrap{margin-bottom:0}

/* ── Pull to refresh ── */
.ptr-indicator{position:fixed;top:0;left:0;right:0;height:0;display:flex;align-items:flex-end;justify-content:center;pointer-events:none;z-index:100;transition:height .2s ease-out;overflow:hidden}
.ptr-indicator.show{height:54px}
.ptr-indicator .ptr-inner{display:flex;align-items:center;justify-content:center;gap:8px;background:rgba(8,8,8,.92);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border:1px solid var(--line);border-radius:999px;padding:8px 14px;color:var(--accent);font-size:11px;font-weight:700;margin-bottom:8px;letter-spacing:.04em}
.ptr-spin{width:14px;height:14px;border:2px solid var(--accent);border-top-color:transparent;border-radius:50%;animation:ptrSpin .8s linear infinite;display:inline-block}
@keyframes ptrSpin{to{transform:rotate(360deg)}}
.ptr-arrow{display:inline-block;font-size:14px;transition:transform .2s}
.ptr-arrow.up{transform:rotate(180deg)}

/* ── Daily Brief ── */
.brief-wrap{background:linear-gradient(180deg,#0E2517,#0A1812);border:1px solid var(--accent-d);border-radius:16px;padding:22px 20px;margin-bottom:16px;position:relative;overflow:hidden}
.brief-wrap::before{content:'';position:absolute;top:-50%;right:-30%;width:280px;height:280px;background:radial-gradient(circle,rgba(95,233,176,.18),transparent 70%);pointer-events:none}
.brief-greeting{font-size:12.5px;color:var(--accent);font-weight:700;letter-spacing:.06em;margin-bottom:4px}
.brief-h{font-size:22px;font-weight:900;letter-spacing:-.5px;margin-bottom:12px;line-height:1.3}
.brief-pl{font-size:32px;font-weight:900;font-variant-numeric:tabular-nums;letter-spacing:-.8px;line-height:1;margin-bottom:8px}
.brief-pl.up{color:var(--accent)}
.brief-pl.down{color:var(--loss)}
.brief-pct{font-size:13px;color:var(--muted);font-weight:700;font-variant-numeric:tabular-nums}
.brief-movers{margin-top:18px}
.brief-movers-h{font-size:10px;color:var(--muted);font-weight:800;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
.brief-mover{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-top:1px solid rgba(255,255,255,.06);font-size:12px}
.brief-mover:first-of-type{border-top:none}
.brief-mover .tic{font-weight:800;color:var(--txt)}
.brief-mover .val{font-variant-numeric:tabular-nums;font-weight:700}
.brief-mover .val.up{color:var(--accent)}
.brief-mover .val.down{color:var(--loss)}

/* ── Paper trading badge ── */
.paper-badge{font-size:8.5px;font-weight:800;padding:2px 6px;border-radius:4px;background:#0E1828;color:#5BA5FF;border:1px solid #1F3A6E;letter-spacing:.08em;display:inline-flex;align-items:center;gap:4px}
.paper-bg-tint{background:linear-gradient(135deg,rgba(91,165,255,.08),transparent)}

/* ── Community ── */
.com-post-form{background:linear-gradient(135deg,#0E1F17,#0a1812);border:1px solid var(--accent-d);border-radius:14px;padding:14px;margin-bottom:14px}
.com-post-form textarea{width:100%;background:#000;border:1px solid var(--line);color:var(--txt);padding:11px 13px;border-radius:10px;font-family:inherit;font-size:13.5px;line-height:1.55;min-height:80px;resize:vertical}
.com-post-form textarea:focus{outline:none;border-color:var(--accent-d)}
.com-post-form .actions{display:flex;justify-content:space-between;align-items:center;margin-top:8px}
.com-post-form .meta{font-size:10px;color:var(--muted2);font-variant-numeric:tabular-nums}
.com-post-form button{background:var(--accent);color:#000;border:none;padding:9px 18px;border-radius:9px;font-weight:800;font-size:12.5px;cursor:pointer;font-family:inherit}
.com-post-form button:disabled{opacity:.4;cursor:not-allowed}
.com-feed{display:flex;flex-direction:column;gap:10px}
.com-post{background:var(--surf);border:1px solid var(--line);border-radius:14px;padding:14px;transition:.18s}
.com-post .head{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.com-post .avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#1A1F2E,#0E1828);color:#5BA5FF;display:grid;place-items:center;font-weight:800;font-size:13px;border:1px solid #1F3A6E33;flex-shrink:0}
.com-post .meta{flex:1;min-width:0}
.com-post .pseudo{font-weight:800;font-size:12.5px;color:var(--txt)}
.com-post .dt{font-size:10px;color:var(--muted2);font-variant-numeric:tabular-nums}
.com-post .body{font-size:13.5px;line-height:1.6;color:var(--txt2);white-space:pre-wrap;margin-bottom:10px}
.com-post .tickers{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
.com-post .tic-pill{font-size:11px;font-weight:800;padding:2px 8px;border-radius:5px;background:var(--accent-bg);color:var(--accent);border:1px solid var(--accent-d);font-variant-numeric:tabular-nums;letter-spacing:.04em}
.com-post .footer{display:flex;align-items:center;gap:14px;padding-top:10px;border-top:1px solid var(--line)}
.com-post .act{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--muted);font-weight:700;cursor:pointer;background:none;border:none;font-family:inherit;padding:4px 8px;border-radius:6px;transition:.15s}
.com-post .act:hover{color:var(--txt2);background:var(--surf2)}
.com-post .act.liked{color:var(--accent)}
.com-post .act.liked .heart{color:var(--accent)}
.com-post .act .heart{font-size:14px}
.com-post .del-btn{margin-inline-start:auto;background:none;border:none;color:var(--muted2);cursor:pointer;font-size:13px;font-family:inherit;padding:4px 8px;border-radius:6px;transition:.15s}
.com-post .del-btn:hover{color:var(--loss)}
.com-comments-list{margin-top:10px;padding-top:10px;border-top:1px solid var(--line);display:none}
.com-post.expanded .com-comments-list{display:block}
.com-comment{display:flex;gap:9px;padding:8px 0;align-items:flex-start;font-size:12px}
.com-comment .av-sm{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,#1A1F2E,#0E1828);color:#5BA5FF;display:grid;place-items:center;font-weight:800;font-size:10px;border:1px solid #1F3A6E33;flex-shrink:0}
.com-comment .body{flex:1;min-width:0}
.com-comment .pseudo{font-weight:800;color:var(--txt);font-size:11.5px}
.com-comment .dt{font-size:9.5px;color:var(--muted2);margin-inline-start:6px}
.com-comment .text{margin-top:2px;color:var(--txt2);line-height:1.5}
.com-comment-form{display:flex;gap:6px;margin-top:8px}
.com-comment-form input{flex:1;background:#000;border:1px solid var(--line);color:var(--txt);padding:8px 11px;border-radius:8px;font-family:inherit;font-size:12px}
.com-comment-form button{background:var(--accent);color:#000;border:none;padding:8px 14px;border-radius:8px;font-weight:800;font-size:12px;cursor:pointer;font-family:inherit}
.com-locked{background:linear-gradient(135deg,#1F1A0E,#160E08);border:1px solid #5A4818;border-radius:14px;padding:24px 18px;text-align:center}
.com-locked .ic{font-size:32px;margin-bottom:8px}
.com-locked h3{font-size:16px;font-weight:800;color:var(--gold);margin:0 0 6px}
.com-locked p{font-size:12.5px;color:var(--muted);line-height:1.6;margin:0 auto 14px;max-width:280px}


/* ── Stock Assessment Tool (v12) ── */
.assess-stage{animation:slideIn .25s ease-out}
.assess-step-h{display:flex;align-items:center;gap:8px;margin:-4px 0 12px;font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.08em}
.assess-step-h .dot{width:6px;height:6px;border-radius:50%;background:var(--accent)}
.assess-stock-pick{background:linear-gradient(135deg,#0E1F17,#0a1812);border:1px solid var(--accent-d);border-radius:14px;padding:18px;margin-bottom:14px;text-align:center}
.assess-stock-pick .l{font-size:10.5px;color:var(--accent);font-weight:800;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
.assess-stock-pick input{width:100%;text-align:center;background:#000;border:1.5px solid var(--accent-d);color:var(--accent);font-size:24px;font-weight:800;padding:14px;border-radius:10px;font-family:inherit;text-transform:uppercase;letter-spacing:.1em;font-variant-numeric:tabular-nums}
.assess-stock-pick input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(95,233,176,.15)}
.assess-stock-pick .h-name{font-size:13px;color:var(--muted);margin-top:6px;min-height:16px}

.assess-crit-list{background:#000;border:1px solid var(--line);border-radius:12px;overflow:hidden}
.assess-crit-row{padding:12px 14px;border-bottom:1px solid var(--line);display:flex;align-items:flex-start;gap:9px;font-size:13px}
.assess-crit-row:last-child{border-bottom:none}
.assess-crit-row .check{width:22px;height:22px;border-radius:6px;border:1.5px solid var(--line2);display:grid;place-items:center;flex-shrink:0;margin-top:1px;cursor:pointer;transition:.15s;background:transparent}
.assess-crit-row .check.on{background:var(--accent);border-color:var(--accent)}
.assess-crit-row .check.on::after{content:"✓";color:#000;font-weight:800;font-size:14px;line-height:1}
.assess-crit-row .txt{flex:1;line-height:1.5;color:var(--txt2);cursor:pointer}
.assess-crit-row.included .txt{color:var(--txt)}
.assess-crit-row .actions{display:flex;gap:4px;flex-shrink:0;align-items:center}
.assess-crit-row .act-btn{width:26px;height:26px;border-radius:6px;background:transparent;border:1px solid var(--line2);color:var(--muted);font-size:11px;cursor:pointer;display:grid;place-items:center;transition:.15s;font-family:inherit}
.assess-crit-row .act-btn:hover{border-color:var(--line2);color:var(--txt2);background:var(--surf)}
.assess-add-crit{padding:14px;display:flex;gap:6px;border-top:1px dashed var(--line)}
.assess-add-crit input{flex:1;background:#000;border:1px solid var(--line);color:var(--txt);padding:9px 11px;border-radius:8px;font-size:13px;font-family:inherit}
.assess-add-crit button{background:var(--accent);color:#000;border:none;padding:9px 14px;border-radius:8px;font-weight:800;font-size:12.5px;cursor:pointer;font-family:inherit}

/* Rating dots (1-5 colored circles) */
.rate-q{padding:14px 14px 12px;border-bottom:1px solid var(--line);background:#000}
.rate-q:last-child{border-bottom:none}
.rate-q .q-txt{font-size:13.5px;font-weight:700;color:var(--txt);line-height:1.5;margin-bottom:10px}
.rate-q .q-dots{display:flex;gap:8px;justify-content:space-between;align-items:center;margin-bottom:8px}
.rate-q .dot{width:36px;height:36px;border-radius:50%;border:2px solid var(--line2);background:transparent;cursor:pointer;transition:.18s;display:grid;place-items:center;font-size:13px;font-weight:800;color:var(--muted2);font-family:inherit;font-variant-numeric:tabular-nums}
.rate-q .dot:hover{border-color:var(--line2);color:var(--txt2);transform:scale(1.05)}
.rate-q .dot.on{transform:scale(1.05)}
.rate-q .dot[data-r="1"].on{background:#3a0e10;border-color:#F26B6E;color:#F26B6E}
.rate-q .dot[data-r="2"].on{background:#3a1d10;border-color:#E89B6B;color:#E89B6B}
.rate-q .dot[data-r="3"].on{background:#3a3010;border-color:#E8B96A;color:#E8B96A}
.rate-q .dot[data-r="4"].on{background:#1A3025;border-color:#7FD9A5;color:#7FD9A5}
.rate-q .dot[data-r="5"].on{background:#0E2517;border-color:#5FE9B0;color:#5FE9B0}
.rate-q .scale-lbl{display:flex;justify-content:space-between;font-size:9px;color:var(--muted2);font-weight:700;text-transform:uppercase;letter-spacing:.06em;padding:0 2px}
.rate-q textarea{width:100%;margin-top:8px;background:transparent;border:1px solid var(--line);color:var(--muted);padding:7px 9px;border-radius:7px;font-size:11.5px;font-family:inherit;resize:none;min-height:34px}
.rate-q textarea:focus{outline:none;border-color:var(--accent-d);color:var(--txt2)}

/* Running total bar */
.rate-running{position:sticky;top:0;background:rgba(8,8,8,.94);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);z-index:5;padding:10px 12px;border:1px solid var(--line);border-radius:10px;margin-bottom:10px;display:flex;align-items:center;gap:10px}
.rate-running .r-bar{flex:1;height:6px;background:#1A1A1A;border-radius:3px;overflow:hidden}
.rate-running .r-fill{height:100%;background:linear-gradient(90deg,var(--loss),var(--gold),var(--accent));transition:width .25s}
.rate-running .r-score{font-size:14px;font-weight:800;color:var(--txt);font-variant-numeric:tabular-nums;min-width:50px;text-align:end}

/* Result screen */
.result-hero{background:linear-gradient(180deg,var(--surf),#000);border:1px solid var(--line);border-radius:16px;padding:24px 18px;text-align:center;margin-bottom:14px;position:relative;overflow:hidden}
.result-hero.strong{background:linear-gradient(180deg,#0E2517,#000);border-color:var(--accent-d)}
.result-hero.caution{background:linear-gradient(180deg,#1F1A0E,#000);border-color:#5A4818}
.result-hero.avoid{background:linear-gradient(180deg,#2A0E10,#000);border-color:var(--loss-d)}
.result-hero .rec-emoji{font-size:38px;margin-bottom:6px;line-height:1}
.result-hero .rec-label{font-size:14.5px;font-weight:800;letter-spacing:.04em;margin-bottom:10px}
.result-hero.strong .rec-label{color:var(--accent)}
.result-hero.caution .rec-label{color:var(--gold)}
.result-hero.avoid .rec-label{color:var(--loss)}
.result-hero .score-big{font-size:44px;font-weight:900;letter-spacing:-1.2px;font-variant-numeric:tabular-nums;line-height:1}
.result-hero.strong .score-big{color:var(--accent)}
.result-hero.caution .score-big{color:var(--gold)}
.result-hero.avoid .score-big{color:var(--loss)}
.result-hero .score-frac{font-size:18px;color:var(--muted2);font-weight:600}
.result-hero .pct{font-size:14px;color:var(--muted);font-weight:700;margin-top:4px;font-variant-numeric:tabular-nums}
.result-hero .ticker-line{font-size:18px;font-weight:800;margin-bottom:14px}

.result-section{margin-bottom:14px;background:#000;border:1px solid var(--line);border-radius:12px;overflow:hidden}
.result-section .head{padding:11px 14px;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.07em;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:7px}
.result-section.strengths .head{color:var(--accent)}
.result-section.weak .head{color:var(--loss)}
.result-section.neutral .head{color:var(--gold)}
.result-section .item{padding:10px 14px;font-size:13px;color:var(--txt2);line-height:1.5;border-bottom:1px solid var(--line);display:flex;align-items:flex-start;gap:9px}
.result-section .item:last-child{border-bottom:none}
.result-section .item .num{flex-shrink:0;font-size:11px;font-weight:800;padding:1px 6px;border-radius:4px;font-variant-numeric:tabular-nums}
.result-section.strengths .item .num{background:var(--accent-bg);color:var(--accent);border:1px solid var(--accent-d)}
.result-section.weak .item .num{background:var(--loss-bg);color:var(--loss);border:1px solid var(--loss-d)}
.result-section.neutral .item .num{background:#1F1A0E;color:var(--gold);border:1px solid #5A4818}

/* Assessment history rows */
.assess-hist-row{padding:13px 14px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:11px;cursor:pointer;transition:.15s}
.assess-hist-row:hover{background:var(--surf)}
.assess-hist-row:last-child{border-bottom:none}
.assess-hist-row .logo{width:38px;height:38px;border-radius:9px;background:#000;border:1px solid var(--line2);object-fit:contain;padding:3px;flex-shrink:0}
.assess-hist-row .logo-fb{width:38px;height:38px;border-radius:9px;display:grid;place-items:center;font-weight:800;font-size:12px;flex-shrink:0;border:1px solid}
.assess-hist-row .info{flex:1;min-width:0}
.assess-hist-row .tic{font-weight:800;font-size:13.5px;color:var(--txt)}
.assess-hist-row .nm{font-size:11px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.assess-hist-row .dt{font-size:10px;color:var(--muted2);margin-top:2px;font-variant-numeric:tabular-nums}
.assess-hist-row .pill{font-size:11px;font-weight:800;padding:4px 9px;border-radius:6px;letter-spacing:.04em;font-variant-numeric:tabular-nums}
.assess-hist-row .pill.strong{background:var(--accent-bg);color:var(--accent);border:1px solid var(--accent-d)}
.assess-hist-row .pill.caution{background:#1F1A0E;color:var(--gold);border:1px solid #5A4818}
.assess-hist-row .pill.avoid{background:var(--loss-bg);color:var(--loss);border:1px solid var(--loss-d)}

/* chart range buttons */
.chart-range-row{display:flex;gap:3px;margin:6px 0 10px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding:0 1px;scrollbar-width:none}
.chart-range-row::-webkit-scrollbar{display:none}
.chart-range-btn{flex-shrink:0;background:transparent;border:1px solid var(--line);color:var(--muted);padding:4px 9px;border-radius:6px;font-size:10.5px;font-weight:700;cursor:pointer;font-family:inherit;letter-spacing:.04em;transition:.15s;font-variant-numeric:tabular-nums}
.chart-range-btn:hover{border-color:var(--line2);color:var(--txt2)}
.chart-range-btn.on{background:var(--accent-bg);border-color:var(--accent-d);color:var(--accent)}

/* cards view */
.cards-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px}
@media (max-width:380px){.cards-grid{grid-template-columns:1fr}}
.card-h{background:var(--surf);border:1px solid var(--line);border-radius:14px;padding:13px;cursor:pointer;transition:.2s;position:relative;overflow:hidden}
.card-h:active{transform:scale(.98)}
.card-h .top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:9px;gap:6px}
.card-h .tic-bx{width:36px;height:36px;border-radius:9px;display:grid;place-items:center;font-weight:800;font-size:11px;border:1px solid;flex-shrink:0}
.card-h .ch{font-size:10.5px;font-weight:700;font-variant-numeric:tabular-nums;padding:2px 6px;border-radius:5px;white-space:nowrap}
.card-h .ch.up{background:var(--accent-bg);color:var(--accent)}
.card-h .ch.down{background:var(--loss-bg);color:var(--loss)}
.card-h .nm{font-weight:800;font-size:14px;letter-spacing:-.3px;margin-bottom:2px}
.card-h .sub-l{font-size:10.5px;color:var(--muted);margin-bottom:8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-h .row-line{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:3px}
.card-h .row-line .l{font-size:9px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.05em}
.card-h .row-line .v{font-size:12.5px;font-weight:700;font-variant-numeric:tabular-nums}
.card-h .row-line .v.pl-up{color:var(--accent)}
.card-h .row-line .v.pl-down{color:var(--loss)}

/* currency selector */
.cur-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.cur-btn{background:#000;border:1px solid var(--line);color:var(--txt2);padding:9px 6px;border-radius:9px;text-align:center;cursor:pointer;font-family:inherit;transition:.15s;font-weight:700;font-size:11.5px;font-variant-numeric:tabular-nums}
.cur-btn:hover{border-color:var(--line2)}
.cur-btn.on{background:var(--accent-bg);border-color:var(--accent-d);color:var(--accent)}
.cur-btn .fl{font-size:17px;display:block;margin-bottom:2px}

/* portfolio mini chart */
.mv-chart-btn{margin-inline-start:6px;background:transparent;border:1px solid var(--line2);color:var(--muted);width:24px;height:24px;border-radius:6px;font-size:11px;font-family:inherit;cursor:pointer;vertical-align:middle;transition:.15s;line-height:1;display:inline-grid;place-items:center;padding:0}
.mv-chart-btn:hover,.mv-chart-btn.on{border-color:var(--accent-d);color:var(--accent);background:var(--accent-bg)}
.pf-mini-chart{background:var(--surf);border:1px solid var(--line);border-radius:14px;padding:12px;margin:10px 0 14px;animation:slideIn .25s ease-out}
@keyframes slideIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}
.pf-mini-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;gap:8px}

/* ════ Storage shim — works in plain browser via localStorage,
        falls back to Claude artifact's window.storage when present ════ */
if (!window.storage) {
  window.storage = {
    async get(key) {
      const v = localStorage.getItem(key);
      return v != null ? { key, value: v } : null;
    },
    async set(key, value) {
      localStorage.setItem(key, value);
      return { key, value };
    },
    async delete(key) {
      localStorage.removeItem(key);
      return { key, deleted: true };
    }
  };
}

/* SHA-256 hash for passwords (browser native crypto) */
async function hashPin(pin){
  if (!pin) return null;
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pin));
  return [...new Uint8Array(buf)].map(b => b.toString(16).padStart(2,'0')).join('');
}

/* snapshot today's portfolio value to history */
function snapshotHistory(){
  if (!settings.activePf) return;
  const t = totals();
  if (!t.mv) return;
  const d = today();
  const key = settings.activePf + ':' + d;
  const i = history.findIndex(x => x.key === key);
  const entry = { key, pfId: settings.activePf, date: d, value: t.mv, deposited: t.deposited, realized: t.realized };
  if (i >= 0) history[i] = entry;
  else history.push(entry);
  history = history.slice(-1000);
}

/* ════ compute ════ */
/* compute holding stats from transactions */
function statsFor(h){
  const mul = (h.type && h.type !== 'stock') ? 100 : 1;
  const txs = (h.transactions || []).slice().sort((a,b) => (a.ts||0) - (b.ts||0));
  let shares = 0, totalCost = 0, realized = 0;
  for (const tx of txs) {
    const qty = Number(tx.qty) || 0;
    const px = Number(tx.price) || 0;
    if (tx.type === 'buy') {
      shares += qty;
      totalCost += qty * px;
    } else {
      const avgAtTime = shares > 0 ? totalCost / shares : px;
      realized += qty * (px - avgAtTime);
      totalCost -= qty * avgAtTime;
      shares -= qty;
    }
  }
  // also include any legacy quickShares/quickAvg if no transactions
  if (txs.length === 0 && h.shares != null) {
    shares = h.shares;
    totalCost = h.shares * (h.avg || 0);
  }
  const avg = shares > 0 ? totalCost / shares : 0;
  const price = h.price != null ? h.price : avg;
  const mv = shares * price * mul;
  const cost = shares * avg * mul;
  const unrealized = mv - cost;
  const plPct = cost > 0 ? unrealized/cost*100 : 0;
  const todayD = (h.prev != null) ? shares*(price - h.prev)*mul : null;
  const todayPct = h.dayChangePct != null ? h.dayChangePct : (h.prev ? (price-h.prev)/h.prev*100 : null);
  // total deposited for this holding = sum of buys
  let deposited = 0;
  for (const tx of txs) {
    if (tx.type === 'buy') deposited += (Number(tx.qty)||0) * (Number(tx.price)||0) * mul;
  }
  return { shares, avg, price, mv, cost, pl: unrealized, plPct, today: todayD, todayPct, realized: realized*mul, deposited, mul };
}

function totals(){
  let mv = 0, cost = 0, today = 0, hasToday = false, deposited = 0, realized = 0;
  activeHoldings().forEach(h => {
    const s = statsFor(h);
    mv += s.mv; cost += s.cost;
    deposited += s.deposited;
    realized += s.realized;
    if (s.today != null) { today += s.today; hasToday = true; }
  });
  const pl = mv - cost;
  const totalReturn = (mv + realized) - deposited;
  const totalReturnPct = deposited > 0 ? totalReturn/deposited*100 : 0;
  return {
    mv, cost, pl, deposited, realized,
    plPct: cost > 0 ? pl/cost*100 : 0,
    today: hasToday ? today : null,
    todayPct: hasToday && (mv-today) > 0 ? today/(mv-today)*100 : null,
    totalReturn, totalReturnPct,
  };
}

/* ════ zakat ════ */
const HIJRI = 354.367;
function zakatFor(h){
  if (!h.purchaseDate) return null;
  const purchase = new Date(h.purchaseDate);
  if (isNaN(purchase)) return null;
  const now = new Date();
  const days = (now - purchase) / 86400000;
  const yearsPassed = Math.floor(days / HIJRI);
  const lastHawl = new Date(purchase.getTime() + yearsPassed * HIJRI * 86400000);
  const nextHawl = new Date(purchase.getTime() + (yearsPassed + 1) * HIJRI * 86400000);
  const daysToNext = Math.ceil((nextHawl - now) / 86400000);
  const daysSinceLast = Math.floor((now - lastHawl) / 86400000);
  const due = yearsPassed >= 1;
  const amount = statsFor(h).mv * 0.025;
  const progress = Math.max(0, Math.min(100, daysSinceLast / HIJRI * 100));
  return {
    purchaseDate: h.purchaseDate, nextHawlDate: nextHawl.toISOString().slice(0,10),
    daysToNext, daysSinceLast, due, amount, progress,
    status: due ? "due" : (daysToNext < 30 ? "soon" : "ok"),
  };
}

function renderBubbles(){
  const wrap = $("#viz-wrap"); if (!wrap) return;
  wrap.className = 'bub-wrap';
  const W = wrap.clientWidth || 640;
  const H = Math.min(Math.max(W * 0.95, 360), 520);
  const hs = activeHoldings();
  const data = hs.map(h => { const s = statsFor(h); return { ...h, mv: s.mv, pl: s.pl, plPct: s.plPct, hasP: h.price != null }; }).filter(d => d.mv > 0);
  if (!data.length) { wrap.innerHTML = ""; return; }
  const root = d3.hierarchy({ children: data }).sum(d => d.mv);
  d3.pack().size([W, H]).padding(8)(root);
  const total = root.value || 1;
  const ns = "http://www.w3.org/2000/svg";
  const svg = document.createElementNS(ns, "svg");
  svg.setAttribute("viewBox", `0 0 ${W} ${H}`);
  svg.setAttribute("id", "bub-svg");

  const palettes = [
    { fill:"#0F4A36", ring:"#5FE9B0" }, // green
    { fill:"#4A1F22", ring:"#F26B6E" }, // red
    { fill:"#1F3A6E", ring:"#5BA5FF" }, // blue
    { fill:"#4A3D1F", ring:"#E8B96A" }, // gold
    { fill:"#3D1F4A", ring:"#A78BFA" }, // purple
    { fill:"#1F4A4A", ring:"#5FE9E9" }, // teal
    { fill:"#4A1F3D", ring:"#FB7185" }, // pink
    { fill:"#3D4A1F", ring:"#A3E635" }, // lime
    { fill:"#4A2D1F", ring:"#FB923C" }, // orange
    { fill:"#1F2D4A", ring:"#818CF8" }, // indigo
    { fill:"#3A1F4A", ring:"#D946EF" }, // fuchsia
    { fill:"#1F4A2D", ring:"#34D399" }, // emerald
    { fill:"#4A3A1F", ring:"#FACC15" }, // yellow
    { fill:"#1F4A3D", ring:"#22D3EE" }, // cyan
    { fill:"#4A2D2D", ring:"#EF4444" }, // rose
    { fill:"#2D1F4A", ring:"#8B5CF6" }, // violet
    { fill:"#1F4A1F", ring:"#10B981" }, // forest
    { fill:"#4A1F2D", ring:"#EC4899" }, // hot-pink
    { fill:"#2D4A1F", ring:"#65A30D" }, // moss
    { fill:"#1F3A4A", ring:"#0EA5E9" }, // sky
  ];
  const pickPalette = (h) => {
    // FNV-like hash for better distribution
    let hash = 2166136261;
    for (let i = 0; i < h.ticker.length; i++){
      hash ^= h.ticker.charCodeAt(i);
      hash = (hash * 16777619) >>> 0;
    }
    return palettes[hash % palettes.length];
  };

  root.leaves().forEach(d => {
    const r = d.r, x = d.x, y = d.y, h = d.data;
    const share = h.mv/total*100;
    const p = pickPalette(h);
    const g = document.createElementNS(ns, "g");
    g.setAttribute("class", "bub");
    g.setAttribute("transform", `translate(${x},${y})`);
    g.addEventListener("click", () => openDetail(h.id));
    const c = document.createElementNS(ns, "circle");
    c.setAttribute("r", r);
    c.setAttribute("fill", p.fill);
    c.setAttribute("stroke", p.ring);
    c.setAttribute("stroke-width", Math.max(1.5, r * 0.022));
    c.setAttribute("stroke-opacity", "0.85");
    g.appendChild(c);
    if (r > 30){
      const fz = Math.min(r * 0.32, 24);
      mkText(g, ns, h.ticker, { y: -r*0.20, "text-anchor":"middle", "font-size": fz, fill:"#fff", "font-weight":"700" });
      mkText(g, ns, share.toFixed(1)+"%", { y: r*0.02, "text-anchor":"middle", "font-size": fz*0.55, fill:"rgba(255,255,255,.75)", "font-weight":"500" });
      if (r > 42 && h.hasP && !settings.privacy){
        const plCol = h.pl >= 0 ? "#5FE9B0" : "#F26B6E";
        mkText(g, ns, (h.pl>=0?"+$":"-$")+fmt0(Math.abs(h.pl)), { y: r*0.28, "text-anchor":"middle", "font-size": fz*0.55, fill: plCol, "font-weight":"700" });
        mkText(g, ns, pct(h.plPct), { y: r*0.48, "text-anchor":"middle", "font-size": fz*0.48, fill: plCol, "font-weight":"600" });
      }
    } else if (r > 14){
      mkText(g, ns, h.ticker, { y: r*0.12, "text-anchor":"middle", "font-size": Math.min(r*0.42, 13), fill:"#fff", "font-weight":"700" });
    }
    svg.appendChild(g);
  });
  wrap.innerHTML = "";
  wrap.appendChild(svg);
}
function mkText(parent, ns, text, attrs){
  const e = document.createElementNS(ns, "text");
  for (const k in attrs) e.setAttribute(k, attrs[k]);
  e.textContent = text;
  parent.appendChild(e);
}

const _logoCache = {};
async function fetchLogo(ticker){
  if (_logoCache[ticker] !== undefined) return _logoCache[ticker];
  try {
    const r = await fetch(`${FINNHUB}/stock/profile2?symbol=${ticker}&token=${FINNHUB_KEY}`);
    if (r.ok){
      const data = await r.json();
      _logoCache[ticker] = data.logo || null;
      return data.logo || null;
    }
  } catch(e){}
  _logoCache[ticker] = null;
  return null;
}
async function lazyLoadLogos(tickers){
  for (const tic of tickers){
    if (_logoCache[tic] === undefined){
      const logo = await fetchLogo(tic);
      if (logo){
        document.querySelectorAll(`[data-logo-tic="${tic}"]`).forEach(el => {
          const isAnTic = el.classList.contains('an-tic');
          const isTicBx = el.classList.contains('tic-bx');
          const cls = isAnTic ? 'co-logo" style="width:46px;height:46px' : 'co-logo';
          el.outerHTML = `<img src="${logo}" alt="${tic}" class="${cls}" onerror="this.outerHTML='<div class=\\'logo-fallback\\' style=\\'background:var(--accent-bg);color:var(--accent);border-color:var(--accent-d)\\'>${tic.slice(0,3)}</div>'">`;
        });
      }
    } else if (_logoCache[tic]){
      // Cache hit - still update any pending placeholders
      const logo = _logoCache[tic];
      document.querySelectorAll(`[data-logo-tic="${tic}"]`).forEach(el => {
        const isAnTic = el.classList.contains('an-tic');
        const cls = isAnTic ? 'co-logo" style="width:46px;height:46px' : 'co-logo';
        el.outerHTML = `<img src="${logo}" alt="${tic}" class="${cls}">`;
      });
    }
  }
}

  ];
  const colorOf = (tic) => {
    let sum = 0; for (let i=0;i<tic.length;i++) sum += tic.charCodeAt(i)*(i+1);

  };
  wrap.innerHTML = `<div class="bar-wrap">${data.map(({h, s}) => {
    const pct = (s.mv / maxMV) * 100;
    const sharePct = (s.mv / tt.mv) * 100;

        <div class="pl ${sgn(s.pl)}">${settings.privacy?'••••':((s.pl>=0?'+':'')+fmt(s.plPct,1)+'%')}</div>
      </div>
    </div>`;
  }).join("")}</div>`;
}

/* ════ Black-Scholes (Greeks for options) ════ */
function bsNormCDF(x){
  const t = 1/(1 + 0.2316419*Math.abs(x));
  const d = 0.3989423*Math.exp(-x*x/2);
  let p = d*t*(0.3193815 + t*(-0.3565638 + t*(1.781478 + t*(-1.821256 + t*1.330274))));
  return x > 0 ? 1-p : p;
}
function bsNormPDF(x){ return Math.exp(-x*x/2)/Math.sqrt(2*Math.PI); }
function computeGreeks(h, spotPrice){
  if (!h.strike || !h.expiry || !h.iv) return null;
  const S = Number(spotPrice);
  const K = Number(h.strike);
  const sigma = Number(h.iv)/100;
  const r = 0.045; // assume risk-free rate ~4.5%
  const expDate = new Date(h.expiry);
  const T = (expDate - new Date()) / (365 * 86400000);
  if (T <= 0 || !S || !K || !sigma) return null;
  const sqrtT = Math.sqrt(T);
  const d1 = (Math.log(S/K) + (r + sigma*sigma/2)*T) / (sigma*sqrtT);
  const d2 = d1 - sigma*sqrtT;
  const Nd1 = bsNormCDF(d1), Nd2 = bsNormCDF(d2);
  const phi = bsNormPDF(d1);
  const isCall = h.type === 'call';
  const theoPrice = isCall
    ? S*Nd1 - K*Math.exp(-r*T)*Nd2
    : K*Math.exp(-r*T)*bsNormCDF(-d2) - S*bsNormCDF(-d1);
  const delta = isCall ? Nd1 : Nd1 - 1;
  const gamma = phi / (S*sigma*sqrtT);
  const thetaPerYear = isCall
    ? -S*phi*sigma/(2*sqrtT) - r*K*Math.exp(-r*T)*Nd2
    : -S*phi*sigma/(2*sqrtT) + r*K*Math.exp(-r*T)*bsNormCDF(-d2);
  const theta = thetaPerYear / 365;
  const vega = S*phi*sqrtT / 100;
  return { theoPrice, delta, gamma, theta, vega, daysToExpiry: Math.ceil(T*365) };
}

function saveHold(id){
  const tic = $("#f_tic").value.trim().toUpperCase();
  const prRaw = $("#f_pr")?.value.trim() || "";
  const pr = prRaw === "" ? null : parseFloat(prRaw);
  const presetName = $("#f_tic").dataset.name || tic;
  if (!tic){ $("#f_err").textContent = t().invalid; return; }
  const strike = $("#f_strike")?.value ? parseFloat($("#f_strike").value) : null;
  const expiry = $("#f_exp")?.value || null;
  const iv = $("#f_iv")?.value ? parseFloat($("#f_iv").value) : null;
  if (id){
    const h = holdings.find(x => x.id === id);
    Object.assign(h, {
      ticker: tic, type: editType,
      price: pr != null ? pr : h.price,
      horizon: editHorizon, tags: editTags,
      name: h.name || presetName,
      strike, expiry, iv,
    });
    cloudUpsertHolding(h);
  } else {
    const sh = parseFloat($("#f_sh").value);
    const avg = parseFloat($("#f_avg").value);
    const dt = $("#f_dt").value || today();
    if (isNaN(sh) || isNaN(avg) || sh <= 0 || avg < 0){
      $("#f_err").textContent = t().invalid; return;
    }
    const newH = {
      id: uid(), pfId: settings.activePf,
      ticker: tic, name: presetName, type: editType,
      transactions: [{ id: uid(), type:'buy', qty: sh, price: avg, date: dt, ts: new Date(dt).getTime() }],
      price: pr, prev: null, dayChangePct: null,
      purchaseDate: dt,
      horizon: editHorizon, tags: editTags,
      strike, expiry, iv,
    };
    // Deduct cash for initial purchase
    const mult = (editType && editType !== 'stock') ? 100 : 1;
    const cost = sh * avg * mult;
    const curCash = getPfCash();
    if (curCash > 0 && curCash < cost){
      if (!confirm(lang==='ar'
        ? `الكاش المتاح ${fmtMoney(curCash)} أقل من تكلفة الصفقة ${fmtMoney(cost)}. متابعة؟`
        : `Available cash ${fmtMoney(curCash)} is less than trade cost ${fmtMoney(cost)}. Continue?`)){
        return;
      }
    }
    setPfCash(Math.max(0, curCash - cost));
    holdings.push(newH);
    cloudUpsertHolding(newH);
    logActivity('buy', { ticker: tic, qty: sh, price: avg });
  }
  save(); closeModal(); render();
}
