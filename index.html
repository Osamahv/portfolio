function renderPostHTML(p, pseudonym, isLiked, canInteract){
  const ar = lang === 'ar';
  const date = new Date(p.created_at);
  const now = new Date();
  const diffMin = Math.floor((now - date) / 60000);
  const timeStr = diffMin < 1 ? (ar?'الآن':'now')
                : diffMin < 60 ? (ar?`قبل ${diffMin}د`:`${diffMin}m ago`)
                : diffMin < 1440 ? (ar?`قبل ${Math.floor(diffMin/60)}س`:`${Math.floor(diffMin/60)}h ago`)
                : date.toISOString().slice(0,10);
  const isOwn = currentUser && currentUser.id === p.user_id;
  return `<div class="com-post" id="post-${p.id}">
    <div class="head">
      <div class="avatar">${esc((pseudonym||'?')[0].toUpperCase())}</div>
      <div class="meta">
        <div class="pseudo">${esc(pseudonym||'user')}</div>
        <div class="dt">${timeStr}</div>
      </div>
    </div>
    <div class="body">${esc(p.content)}</div>
    ${p.tickers && p.tickers.length ? `<div class="tickers">${p.tickers.map(tic => `<span class="tic-pill">$${esc(tic)}</span>`).join('')}</div>` : ''}
    <div class="footer">
      <button class="act ${isLiked?'liked':''}" ${canInteract?'':'disabled'} onclick="toggleLike('${p.id}',this)">
        <span class="heart">${isLiked?'♥':'♡'}</span>
        <span class="count">${p.likes_count || 0}</span>
      </button>
      <button class="act" onclick="toggleComments('${p.id}')">
        <span style="font-size:14px">💬</span>
        <span class="count">${p.comments_count || 0}</span>
      </button>
      ${isOwn ? `<button class="del-btn" onclick="deletePost('${p.id}')" title="${ar?'حذف':'Delete'}">✕</button>` : ''}
    </div>
    <div class="com-comments-list" id="comments-${p.id}"></div>
  </div>`;
}

function updatePostMeta(){
  const txt = $("#com-new").value;
  const meta = $("#com-meta");
  const btn = $("#com-submit");
  if (!meta || !btn) return;
  meta.textContent = `${txt.length}/500`;
  btn.disabled = txt.trim().length < 3;
}

function extractTickers(text){
  const matches = text.match(/\$([A-Z]{1,5})\b/g) || [];
  return [...new Set(matches.map(m => m.slice(1)))];
}

async function submitPost(){
  if (!currentUser) return;
  const content = $("#com-new").value.trim();
  if (content.length < 3) return;
  const tickers = extractTickers(content);
  try {
    const { error } = await sb.from('community_posts').insert({
      user_id: currentUser.id,
      content,
      tickers: tickers.length ? tickers : null,
    });
    if (error) throw error;
    $("#com-new").value = '';
    updatePostMeta();
    renderCommunity();
    toast(lang==='ar'?'✓ تم النشر':'✓ Posted');
  } catch(e){
    toast((lang==='ar'?'خطأ: ':'Error: ') + (e.message || ''));
  }
}

async function toggleLike(postId, btn){
  if (!currentUser) return;
  const isLiked = btn.classList.contains('liked');
  const countEl = btn.querySelector('.count');
  const heartEl = btn.querySelector('.heart');
  const cur = parseInt(countEl.textContent) || 0;
  // Optimistic UI
  if (isLiked){
    btn.classList.remove('liked');
    heartEl.textContent = '♡';
    countEl.textContent = Math.max(0, cur - 1);
    await sb.from('community_likes').delete().eq('post_id', postId).eq('user_id', currentUser.id);
  } else {
    btn.classList.add('liked');
    heartEl.textContent = '♥';
    countEl.textContent = cur + 1;
    const { error } = await sb.from('community_likes').insert({ post_id: postId, user_id: currentUser.id });
    if (error){
      // Revert
      btn.classList.remove('liked');
      heartEl.textContent = '♡';
      countEl.textContent = cur;
      toast(lang==='ar'?'يتطلب اشتراك':'Subscription required');
    }
  }
}

async function toggleComments(postId){
  const post = document.getElementById(`post-${postId}`);
  const list = document.getElementById(`comments-${postId}`);
  if (!post || !list) return;
  if (post.classList.contains('expanded')){
    post.classList.remove('expanded');
    return;
  }
  post.classList.add('expanded');
  list.innerHTML = `<div style="text-align:center;color:var(--muted2);font-size:11px;padding:8px"><span class="spin"></span> ${lang==='ar'?'يحمل التعليقات...':'Loading...'}</div>`;
  try {
    const { data: comments } = await sb.from('community_comments').select('*').eq('post_id', postId).order('created_at',{ascending:true});
    const userIds = [...new Set((comments||[]).map(c => c.user_id))];
    let userMap = {};
    if (userIds.length){
      const { data: profs } = await sb.from('profiles').select('id,pseudonym').in('id', userIds);
      userMap = Object.fromEntries((profs||[]).map(p => [p.id, p.pseudonym || 'user']));
    }
    const isSubscribed = userProfile?.is_admin || (
      userProfile?.subscription_status === 'active' &&
      userProfile?.subscription_paid_until &&
      new Date(userProfile.subscription_paid_until) >= new Date()
    );
    list.innerHTML = `
      ${(comments||[]).map(c => {
        const pseudo = userMap[c.user_id] || 'user';
        const date = new Date(c.created_at);
        const diffMin = Math.floor((new Date() - date) / 60000);
        const timeStr = diffMin < 1 ? (lang==='ar'?'الآن':'now')
                      : diffMin < 60 ? (lang==='ar'?`قبل ${diffMin}د`:`${diffMin}m`)
                      : diffMin < 1440 ? (lang==='ar'?`قبل ${Math.floor(diffMin/60)}س`:`${Math.floor(diffMin/60)}h`)
                      : date.toISOString().slice(0,10);
        return `<div class="com-comment">
          <div class="av-sm">${esc(pseudo[0].toUpperCase())}</div>
          <div class="body">
            <span class="pseudo">${esc(pseudo)}</span><span class="dt">${timeStr}</span>
            <div class="text">${esc(c.content)}</div>
          </div>
        </div>`;
      }).join('') || `<div style="color:var(--muted2);font-size:11.5px;text-align:center;padding:6px">${lang==='ar'?'لا تعليقات':'No comments'}</div>`}
      ${isSubscribed ? `
        <div class="com-comment-form">
          <input id="cc-${postId}" placeholder="${lang==='ar'?'اكتب تعليق...':'Write a comment...'}" maxlength="300" onkeydown="if(event.key==='Enter')submitComment('${postId}')">
          <button onclick="submitComment('${postId}')">${lang==='ar'?'أرسل':'Send'}</button>
        </div>
      ` : ''}
    `;
  } catch(e){
    list.innerHTML = `<div style="color:var(--muted2);font-size:11.5px;text-align:center;padding:6px">${lang==='ar'?'تعذّر التحميل':'Failed'}</div>`;
  }
}

async function submitComment(postId){
  const input = document.getElementById(`cc-${postId}`);
  if (!input || !currentUser) return;
  const content = input.value.trim();
  if (content.length < 1) return;
  try {
    const { error } = await sb.from('community_comments').insert({
      post_id: postId, user_id: currentUser.id, content,
    });
    if (error) throw error;
    input.value = '';
    // Refresh comments
    const post = document.getElementById(`post-${postId}`);
    if (post){
      post.classList.remove('expanded');
      toggleComments(postId);
    }
    // Update count on post (optimistic)
    const countEl = document.querySelector(`#post-${postId} .footer .act:nth-child(2) .count`);
    if (countEl){
      const cur = parseInt(countEl.textContent) || 0;
      countEl.textContent = cur + 1;
    }
  } catch(e){
    toast(lang==='ar'?'يتطلب اشتراك':'Subscription required');
  }
}

async function deletePost(postId){
  if (!confirm(lang==='ar'?'حذف هذا المنشور؟':'Delete this post?')) return;
  await sb.from('community_posts').delete().eq('id', postId);
  renderCommunity();
}

function recommendationFor(percentage){
  if (percentage >= 75) return { key:'strong', ar:'يُنصح بقوة بالشراء', en:'Strongly Recommended', emoji:'✅' };
  if (percentage >= 60) return { key:'caution', ar:'فرصة جيدة مع حذر', en:'Good with Caution', emoji:'🟡' };
  if (percentage >= 45) return { key:'caution', ar:'محايد - يحتاج دراسة', en:'Neutral - Needs Study', emoji:'⚖️' };
  return { key:'avoid', ar:'لا يُنصح بالشراء الآن', en:'Not Recommended', emoji:'❌' };
}

    ` : `<div style="text-align:center;padding:30px 16px;color:var(--muted2);font-size:12px;background:#000;border:1px solid var(--line);border-radius:12px">${ar?'لا توجد تقييمات سابقة. ابدأ بتقييمك الأول!':'No previous assessments. Start your first one!'}</div>`}
    <div class="m-actions">
      <button class="btn" onclick="closeModal()">${ar?'إغلاق':'Close'}</button>
    </div>
  `);
}

/* ── STAGE 1: Pick stock ── */
function assessmentNewStart(){
  assessState = { stage: 1, ticker:'', companyName:'', logo:'', criteria: getUserTemplate(), ratings: {}, notes: '' };
  renderAssessmentStage1();
}

function renderAssessmentStage1(){
  const ar = lang === 'ar';
  modal(`
    <h2>📊 ${ar?'تقييم جديد':'New Assessment'}</h2>
    <div class="assess-step-h"><span class="dot"></span><span>${ar?'الخطوة ١ من ٣ · اختيار السهم':'Step 1 of 3 · Pick stock'}</span></div>
    <div class="assess-stock-pick">
      <div class="l">${ar?'رمز السهم':'Stock Ticker'}</div>
      <input id="as_t" placeholder="AAPL" maxlength="8" autocomplete="off" autocapitalize="characters" oninput="this.value=this.value.toUpperCase().replace(/[^A-Z0-9.-]/g,'');assessLookup()">
      <div class="h-name" id="as_name">${ar?'اكتب رمز السهم':'Type a ticker symbol'}</div>
    </div>
    <div class="m-actions">
      <button class="btn" onclick="closeModal();assessState=null">${ar?'إلغاء':'Cancel'}</button>
      <button class="btn primary" id="as_next" disabled onclick="assessmentToStage2()">${ar?'متابعة ←':'Next →'}</button>
    </div>
  `);
  setTimeout(()=>$("#as_t")?.focus(), 80);
}

let _assessLookupTimer = null;
function assessLookup(){
  const tic = $("#as_t").value.trim();
  const nameEl = $("#as_name");
  const nextBtn = $("#as_next");
  clearTimeout(_assessLookupTimer);
  if (!tic){
    if (nameEl) nameEl.textContent = lang==='ar'?'اكتب رمز السهم':'Type a ticker symbol';
    if (nextBtn) nextBtn.disabled = true;
    return;
  }
  if (tic.length < 1){ return; }
  _assessLookupTimer = setTimeout(async () => {
    if (nameEl) nameEl.textContent = lang==='ar'?'يبحث...':'Looking up...';
    try {
      const r = await fetch(`${FINNHUB}/stock/profile2?symbol=${tic}&token=${FINNHUB_KEY}`);
      const data = r.ok ? await r.json() : null;
      if (data && data.name){
        if (assessState){
          assessState.ticker = tic;
          assessState.companyName = data.name;
          assessState.logo = data.logo || '';
        }
        if (nameEl) nameEl.innerHTML = `<b style="color:var(--accent)">${esc(data.name)}</b>${data.finnhubIndustry?` · <span style="color:var(--muted)">${esc(data.finnhubIndustry)}</span>`:''}`;
        if (nextBtn) nextBtn.disabled = false;
      } else {
        if (assessState){ assessState.ticker = tic; assessState.companyName = tic; assessState.logo = ''; }
        if (nameEl) nameEl.innerHTML = `<span style="color:var(--gold)">${lang==='ar'?'سهم غير معروف - يمكنك المتابعة':'Unknown ticker - you can still proceed'}</span>`;
        if (nextBtn) nextBtn.disabled = false;
      }
    } catch(e){
      if (assessState){ assessState.ticker = tic; assessState.companyName = tic; assessState.logo = ''; }
      if (nextBtn) nextBtn.disabled = false;
    }
  }, 450);
}

/* ── STAGE 2: Customize criteria ── */
function assessmentToStage2(){
  if (!assessState) return;
  renderAssessmentStage2();
}

function renderAssessmentStage2(){
  const ar = lang === 'ar';
  modal(`
    <h2>📋 ${esc(assessState.ticker)}</h2>
    <div class="assess-step-h"><span class="dot"></span><span>${ar?'الخطوة ٢ من ٣ · تخصيص المعايير':'Step 2 of 3 · Customize criteria'}</span></div>
    <p class="sub" style="margin-bottom:10px">${ar?'اختر المعايير التي تهمك، عدّلها، أو أضف معايير خاصة بك':'Choose criteria you care about, edit them, or add your own'}</p>

    <div class="assess-crit-list" id="as-crit-list">
      ${assessState.criteria.map((cr, i) => `
        <div class="assess-crit-row ${cr.included?'included':''}">
          <div class="check ${cr.included?'on':''}" onclick="toggleCrit(${i})"></div>
          <div class="txt" onclick="toggleCrit(${i})">${esc(cr.q)}</div>
          <div class="actions">
            <button class="act-btn" onclick="editCrit(${i})" title="${ar?'تعديل':'Edit'}">✎</button>
            <button class="act-btn" onclick="deleteCrit(${i})" title="${ar?'حذف':'Delete'}">✕</button>
          </div>
        </div>
      `).join('')}
      <div class="assess-add-crit">
        <input id="as_new_crit" placeholder="${ar?'أضف معيار جديد...':'Add new criterion...'}" maxlength="160">
        <button onclick="addNewCrit()">+</button>
      </div>
    </div>

    <div style="margin-top:10px;font-size:11.5px;color:var(--muted);text-align:center">
      ${ar?`<b style="color:var(--accent)">${assessState.criteria.filter(c=>c.included).length}</b> معيار محدد من <b>${assessState.criteria.length}</b>`:`<b style="color:var(--accent)">${assessState.criteria.filter(c=>c.included).length}</b> of <b>${assessState.criteria.length}</b> selected`}
    </div>

    <div class="m-actions">
      <button class="btn" onclick="renderAssessmentStage1()">${ar?'← رجوع':'← Back'}</button>
      <button class="btn" onclick="saveAndUseTemplate()" title="${ar?'حفظ كقالب شخصي':'Save as personal template'}">💾</button>
      <button class="btn primary" onclick="assessmentToStage3()" ${assessState.criteria.filter(c=>c.included).length===0?'disabled':''}>${ar?'ابدأ التقييم ←':'Start Rating →'}</button>
    </div>
  `);
}

function toggleCrit(i){
  if (!assessState) return;
  assessState.criteria[i].included = !assessState.criteria[i].included;
  renderAssessmentStage2();
}

function editCrit(i){
  if (!assessState) return;
  const ar = lang === 'ar';
  const cur = assessState.criteria[i].q;
  const updated = prompt(ar?'عدّل نص المعيار:':'Edit criterion text:', cur);
  if (updated == null) return;
  const trimmed = updated.trim();
  if (!trimmed){ return; }
  assessState.criteria[i].q = trimmed;
  renderAssessmentStage2();
}

function deleteCrit(i){
  if (!assessState) return;
  assessState.criteria.splice(i, 1);
  renderAssessmentStage2();
}

function addNewCrit(){
  if (!assessState) return;
  const input = $("#as_new_crit");
  const val = input?.value.trim();
  if (!val) return;
  assessState.criteria.push({ id: 'custom_' + Date.now(), q: val, included: true });
  renderAssessmentStage2();
  setTimeout(()=>{ const i = $("#as_new_crit"); if (i) i.focus(); }, 50);
}

function saveAndUseTemplate(){
  if (!assessState) return;
  saveUserTemplate(assessState.criteria.map(c => ({ id: c.id, q: c.q, included: c.included })));
  toast(lang==='ar'?'تم حفظ القالب':'Template saved');
}

/* ── STAGE 3: Rate each criterion ── */
function assessmentToStage3(){
  if (!assessState) return;
  assessState.criteria.forEach(c => {
    if (c.included && assessState.ratings[c.id] == null) assessState.ratings[c.id] = 0;
  });
  renderAssessmentStage3();
}

function renderAssessmentStage3(){
  const ar = lang === 'ar';
  const included = assessState.criteria.filter(c => c.included);
  const totalSoFar = included.reduce((sum, c) => sum + (assessState.ratings[c.id] || 0), 0);
  const maxScore = included.length * 5;
  const pct = maxScore > 0 ? (totalSoFar / maxScore) * 100 : 0;
  const allRated = included.every(c => assessState.ratings[c.id] > 0);

  modal(`
    <h2>⭐ ${esc(assessState.ticker)}</h2>
    <div class="assess-step-h"><span class="dot"></span><span>${ar?'الخطوة ٣ من ٣ · التقييم':'Step 3 of 3 · Rate'}</span></div>

    <div class="rate-running">
      <div class="r-bar"><div class="r-fill" style="width:${pct}%"></div></div>
      <div class="r-score">${totalSoFar}/${maxScore}</div>
    </div>

    <div style="background:#000;border:1px solid var(--line);border-radius:12px;overflow:hidden;max-height:60vh;overflow-y:auto">
      ${included.map((cr, idx) => {
        const r = assessState.ratings[cr.id] || 0;
        return `<div class="rate-q">
          <div class="q-txt"><span style="color:var(--muted);font-weight:600;font-size:11.5px">${idx+1}/${included.length} ·</span> ${esc(cr.q)}</div>
          <div class="q-dots">
            ${[1,2,3,4,5].map(n => `<button class="dot ${r===n?'on':''}" data-r="${n}" onclick="setRating('${cr.id}',${n})">${n}</button>`).join('')}
          </div>
          <div class="scale-lbl">
            <span>${ar?'ضعيف':'Weak'}</span>
            <span>${ar?'ممتاز':'Strong'}</span>
          </div>
        </div>`;
      }).join('')}
    </div>

    <div class="m-actions">
      <button class="btn" onclick="renderAssessmentStage2()">${ar?'← رجوع':'← Back'}</button>
      <button class="btn primary" onclick="assessmentToResult()" ${allRated?'':'disabled'}>${allRated?(ar?'إنهاء التقييم ←':'Finish ←'):(ar?'قيّم الكل أولاً':'Rate all first')}</button>
    </div>
  `);
}

function setRating(critId, n){
  if (!assessState) return;
  assessState.ratings[critId] = n;
  renderAssessmentStage3();
}

/* ── STAGE 4: Result ── */
function assessmentToResult(){
  if (!assessState) return;
  const included = assessState.criteria.filter(c => c.included);
  const totalScore = included.reduce((s, c) => s + (assessState.ratings[c.id] || 0), 0);
  const maxScore = included.length * 5;
  const pct = maxScore > 0 ? (totalScore / maxScore) * 100 : 0;
  const rec = recommendationFor(pct);
  assessState.totalScore = totalScore;
  assessState.maxScore = maxScore;
  assessState.percentage = pct;
  assessState.recommendation = rec.key;
  assessState.stage = 4;
  renderAssessmentResult();
}

function renderAssessmentResult(){
  const ar = lang === 'ar';
  const rec = recommendationFor(assessState.percentage);
  const included = assessState.criteria.filter(c => c.included);
  const strengths = included.filter(c => (assessState.ratings[c.id]||0) >= 4);
  const weak = included.filter(c => (assessState.ratings[c.id]||0) <= 2 && (assessState.ratings[c.id]||0) > 0);
  const neutral = included.filter(c => (assessState.ratings[c.id]||0) === 3);

  modal(`
    <div id="assess-result-content">
    <div class="result-hero ${rec.key}">
      <div class="ticker-line">${esc(assessState.ticker)}${assessState.companyName && assessState.companyName !== assessState.ticker ? `<span style="color:var(--muted);font-weight:600;font-size:13px"> · ${esc(assessState.companyName)}</span>` : ''}</div>
      <div class="rec-emoji">${rec.emoji}</div>
      <div class="rec-label">${rec[lang]}</div>
      <div class="score-big">${assessState.totalScore}<span class="score-frac"> / ${assessState.maxScore}</span></div>
      <div class="pct">${fmt(assessState.percentage,1)}%</div>
    </div>

    ${strengths.length ? `
      <div class="result-section strengths">
        <div class="head">💪 ${ar?'نقاط القوة':'Strengths'} (${strengths.length})</div>
        ${strengths.map(c => `<div class="item"><span class="num">${assessState.ratings[c.id]}</span><span>${esc(c.q)}</span></div>`).join('')}
      </div>
    ` : ''}

    ${weak.length ? `
      <div class="result-section weak">
        <div class="head">⚠️ ${ar?'التحديات':'Challenges'} (${weak.length})</div>
        ${weak.map(c => `<div class="item"><span class="num">${assessState.ratings[c.id]}</span><span>${esc(c.q)}</span></div>`).join('')}
      </div>
    ` : ''}

    ${neutral.length ? `
      <div class="result-section neutral">
        <div class="head">⚖️ ${ar?'محايد':'Neutral'} (${neutral.length})</div>
        ${neutral.map(c => `<div class="item"><span class="num">${assessState.ratings[c.id]}</span><span>${esc(c.q)}</span></div>`).join('')}
      </div>
    ` : ''}
    </div>

    <textarea class="notes-textarea" id="as_final_notes" placeholder="${ar?'ملاحظاتك العامة عن هذا التقييم...':'Your general notes about this assessment...'}" style="margin-top:12px">${esc(assessState.notes||'')}</textarea>

    <div class="m-actions">
      <button class="btn" onclick="renderAssessmentStage3()">${ar?'← تعديل':'← Edit'}</button>
      <button class="png-btn" onclick="exportAssessmentPNG()">📥 ${ar?'صورة':'PNG'}</button>
      <button class="btn primary" onclick="saveAssessment()">${ar?'✓ حفظ':'✓ Save'}</button>
    </div>
  `);
}

/* ── Save assessment to cloud ── */
async function saveAssessment(){
  if (!assessState || !currentUser) return;
  const notesEl = $("#as_final_notes");
  if (notesEl) assessState.notes = notesEl.value.trim();
  const criteriaSnapshot = assessState.criteria
    .filter(c => c.included)
    .map(c => ({ id: c.id, q: c.q, rating: assessState.ratings[c.id] || 0 }));
  try {
    const { error } = await sb.from('stock_assessments').insert({
      user_id: currentUser.id,
      ticker: assessState.ticker,
      company_name: assessState.companyName || null,
      logo_url: assessState.logo || null,
      criteria: criteriaSnapshot,
      total_score: assessState.totalScore,
      max_score: assessState.maxScore,
      percentage: assessState.percentage,
      recommendation: assessState.recommendation,
      notes: assessState.notes || null,
    });
    if (error) throw error;
    toast(lang==='ar'?'تم حفظ التقييم':'Assessment saved');
    assessState = null;
    openChecklistTool();
  } catch(e){
    toast((lang==='ar'?'خطأ: ':'Error: ') + (e.message || ''));
  }
}

        <div class="score-big">${data.total_score}<span class="score-frac"> / ${data.max_score}</span></div>
        <div class="pct">${fmt(data.percentage||0,1)}% · ${dateStr}</div>
      </div>
      ${strengths.length ? `<div class="result-section strengths"><div class="head">💪 ${ar?'نقاط القوة':'Strengths'} (${strengths.length})</div>${strengths.map(c => `<div class="item"><span class="num">${c.rating}</span><span>${esc(c.q)}</span></div>`).join('')}</div>` : ''}
      ${weak.length ? `<div class="result-section weak"><div class="head">⚠️ ${ar?'التحديات':'Challenges'} (${weak.length})</div>${weak.map(c => `<div class="item"><span class="num">${c.rating}</span><span>${esc(c.q)}</span></div>`).join('')}</div>` : ''}
      ${neutral.length ? `<div class="result-section neutral"><div class="head">⚖️ ${ar?'محايد':'Neutral'} (${neutral.length})</div>${neutral.map(c => `<div class="item"><span class="num">${c.rating}</span><span>${esc(c.q)}</span></div>`).join('')}</div>` : ''}
      ${data.notes ? `<div style="margin-top:10px;padding:11px 13px;background:#000;border:1px solid var(--line);border-radius:10px;font-size:12.5px;color:var(--txt2);line-height:1.55;white-space:pre-wrap">${esc(data.notes)}</div>` : ''}

        <button class="btn primary" onclick="openChecklistTool()">${ar?'إغلاق':'Close'}</button>

    `);

async function assessmentDelete(id){
  if (!confirm(lang==='ar'?'حذف هذا التقييم نهائياً؟':'Delete this assessment permanently?')) return;
  await sb.from('stock_assessments').delete().eq('id', id);
  assessState = null;
  openChecklistTool();
}

/* ── Export Assessment PNG ── */

  const ar = lang === 'ar';

  const weak = included.filter(c => (assessState.ratings[c.id]||0) <= 2 && (assessState.ratings[c.id]||0) > 0);

      <div style="font-size:32px;margin-bottom:4px">${rec.emoji}</div>

      <div style="margin-bottom:12px;background:#000;border:1px solid #1A1A1A;border-radius:11px;overflow:hidden">
        <div style="padding:10px 13px;font-size:10.5px;font-weight:800;color:#F26B6E;text-transform:uppercase;letter-spacing:.07em;border-bottom:1px solid #1A1A1A">⚠️ ${ar?'التحديات':'Challenges'} (${weak.length})</div>
        ${weak.map(c => `<div style="padding:9px 13px;font-size:12.5px;color:#D4D4D4;line-height:1.5;border-bottom:1px solid #141414;display:flex;gap:8px"><span style="font-weight:800;color:#F26B6E;background:#2A0E10;border:1px solid #5C1F22;padding:1px 6px;border-radius:4px;font-size:11px">${assessState.ratings[c.id]}</span><span>${esc(c.q)}</span></div>`).join('')}
      </div>
    ` : ''}

    ${assessState.notes ? `<div style="background:#000;border:1px solid #1A1A1A;border-radius:11px;padding:11px 13px;font-size:11.5px;color:#A3A3A3;line-height:1.55;white-space:pre-wrap;margin-bottom:6px">${esc(assessState.notes)}</div>` : ''}

  document.body.appendChild(node);
  await captureToPNG(node, `assessment-${assessState.ticker}-${new Date().toISOString().slice(0,10)}.png`);
  node.remove();

async function adminOpenCommunity(){

  try {

  if (!currentUser) return false;
  const seen = localStorage.getItem('onboarded_' + currentUser.id);

  return portfolios.length === 0 || (portfolios.length <= 1 && holdings.length === 0);

  if (!currentUser) return;

/* ── Subscription expiry warning (user side) ── */
function checkSubscriptionWarning(){
  if (!userProfile || userProfile.is_admin) return;
  if (!userProfile.subscription_paid_until) return;
  const exp = new Date(userProfile.subscription_paid_until);
  const today = new Date();
  const daysLeft = Math.ceil((exp - today) / 86400000);
  if (daysLeft < 0 || daysLeft > 7) return; // only warn if <= 7 days
  const seen = sessionStorage.getItem('subWarn_' + userProfile.subscription_paid_until);
  if (seen) return;
  sessionStorage.setItem('subWarn_' + userProfile.subscription_paid_until, '1');
  const ar = lang === 'ar';
  const isTrial = userProfile.subscription_status === 'trial';
  const subject = encodeURIComponent(ar?'تجديد اشتراك سيركل':'Renew Circle subscription');
  setTimeout(()=>{
    modal(`
      <div style="text-align:center;padding:8px 0">
        <div style="font-size:38px;margin-bottom:6px">⏰</div>
        <h2 style="margin:0 0 8px;font-size:19px;font-weight:800;color:var(--gold)">${isTrial 
          ? (ar?'تجربتك تنتهي قريباً':'Your trial ends soon') 
          : (ar?'اشتراكك يقارب الانتهاء':'Subscription expiring soon')}</h2>
        <p style="margin:0 16px 14px;color:var(--muted);font-size:13px;line-height:1.6">${ar
          ? `يتبقى لك <b style="color:var(--gold)">${daysLeft}</b> ${daysLeft===1?'يوم':'أيام'} فقط. جدّد الآن لتستمر بكل الميزات.`
          : `Only <b style="color:var(--gold)">${daysLeft}</b> day${daysLeft===1?'':'s'} left. Renew now to keep all features.`}</p>
      </div>
      <a href="mailto:osamah.j09@gmail.com?subject=${subject}" style="display:flex;align-items:center;justify-content:center;gap:8px;background:var(--gold);color:#000;padding:12px;border-radius:11px;font-size:14px;font-weight:800;text-decoration:none;margin-bottom:8px">
        ✉ ${ar?'تجديد الاشتراك':'Renew Subscription'}
      </a>
      <div class="m-actions">
        <button class="btn" style="width:100%" onclick="closeModal()">${ar?'لاحقاً':'Later'}</button>
      </div>
    `);
  }, 1800);
}

  const target = $("#brd_target").value;
  if (msg.length < 3){ $("#brd_err").textContent = ar?'الرسالة قصيرة':'Message too short'; return; }
  if (!confirm(ar?'إرسال الرسالة لجميع المستخدمين المحددين؟':'Send to all selected users?')) return;
  try {
    const today = new Date().toISOString().slice(0,10);
    let q = sb.from('profiles').update({ notification: msg, notification_seen: false });
    if (target === 'active'){
      q = q.eq('suspended', false).gte('subscription_paid_until', today);
    } else if (target === 'trial'){
      q = q.eq('suspended', false).eq('subscription_status', 'trial').gte('subscription_paid_until', today);
    } else if (target === 'expired'){
      q = q.eq('suspended', false).lt('subscription_paid_until', today);
    } else {
      q = q.neq('id', '00000000-0000-0000-0000-000000000000'); // dummy to apply to all
    }
    const { error } = await q;
    if (error) throw error;
    toast(ar?'✓ تم الإرسال للجميع':'✓ Broadcast sent');
    logActivity('broadcast', { target, msg: msg.slice(0,100) });
    openAdminPanel();
  } catch(e){
    $("#brd_err").textContent = (ar?'خطأ: ':'Error: ') + (e.message||'');
  }
}

function exportFullCSV(){
  const ar = lang === 'ar';
  if (!currentUser){ toast(ar?'يلزم تسجيل الدخول':'Login required'); return; }
  const lines = [];
  // Portfolios
  lines.push('=== PORTFOLIOS ===');
  lines.push('id,name,is_paper,cash,starting_cash,created_at');
  portfolios.forEach(p => {
    lines.push([p.id, `"${(p.name||'').replace(/"/g,'""')}"`, p.isPaper?'yes':'no', p.cash||0, p.startingCash||0, new Date(p.createdAt).toISOString()].join(','));
  });
  // Holdings
  lines.push('');
  lines.push('=== HOLDINGS ===');
  lines.push('portfolio,ticker,name,type,shares,avg,price,target,stop,horizon,purchase_date,notes');
  holdings.forEach(h => {
    const s = statsFor(h);
    const pf = portfolios.find(p => p.id === h.pfId);
    lines.push([
      `"${(pf?.name||'').replace(/"/g,'""')}"`,
      h.ticker,
      `"${(h.name||'').replace(/"/g,'""')}"`,
      h.type || 'stock',
      s.shares,
      s.avg,
      h.price || '',
      h.target || '',
      h.stopLoss || '',
      h.horizon || '',
      h.purchaseDate || '',
      `"${(h.notes||'').replace(/"/g,'""').replace(/\n/g,' ')}"`,
    ].join(','));
  });
  // Transactions
  lines.push('');
  lines.push('=== TRANSACTIONS ===');
  lines.push('ticker,type,qty,price,date,total');
  holdings.forEach(h => {
    const mult = (h.type && h.type !== 'stock') ? 100 : 1;
    (h.transactions || []).forEach(tx => {
      lines.push([h.ticker, tx.type, tx.qty, tx.price, tx.date || '', tx.qty * tx.price * mult].join(','));
    });
  });
  // Watchlist
  lines.push('');
  lines.push('=== WATCHLIST ===');
  lines.push('ticker,name,group,target,stop,added_price,current_price,note');
  watchlist.forEach(w => {
    lines.push([w.ticker, `"${(w.name||'').replace(/"/g,'""')}"`, w.wgroup||'watch', w.target||'', w.stop||'', w.addedPrice||'', w.price||'', `"${(w.note||'').replace(/"/g,'""')}"`].join(','));
  });
  const csv = '\ufeff' + lines.join('\n'); // BOM for Excel
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `circle-backup-${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  toast(ar?'✓ تم تنزيل النسخة الاحتياطية':'✓ Backup downloaded');
  logActivity('backup_csv', { items: holdings.length + watchlist.length });
}

// Market session detection (US ET-based)
function getMarketSession(){
  const now = new Date();
  // Get ET time (NY)
  const etStr = now.toLocaleString('en-US', { timeZone: 'America/New_York', hour12: false });
  // etStr format: "06/25/2026, 14:30:45"
  const [datePart, timePart] = etStr.split(', ');
  const [hh, mm] = timePart.split(':').map(Number);
  const minutes = hh * 60 + mm;
  // Check weekday (0=Sun, 6=Sat) - use ET-based date
  const [m, d, y] = datePart.split('/').map(Number);
  const etDate = new Date(y, m-1, d);
  const dow = etDate.getDay();
  if (dow === 0 || dow === 6) return { session: 'closed', label: { ar: 'مغلق', en: 'Closed' } };
  // Regular: 9:30am - 4:00pm ET = 570 - 960
  // Pre: 4:00am - 9:30am = 240 - 570
  // After: 4:00pm - 8:00pm = 960 - 1200
  if (minutes >= 570 && minutes < 960) return { session: 'live', label: { ar: 'السوق مفتوح', en: 'Live Market' } };
  if (minutes >= 240 && minutes < 570) return { session: 'pre', label: { ar: 'قبل الافتتاح', en: 'Pre-Market' } };
  if (minutes >= 960 && minutes < 1200) return { session: 'after', label: { ar: 'بعد الإغلاق', en: 'After Hours' } };
  return { session: 'closed', label: { ar: 'مغلق', en: 'Closed' } };
}

// Auto sector mapping for known tickers (no user input needed)
async function loadWhyMoved(holdId, ticker, todayPct){
  const el = document.getElementById(`why-moved-${holdId}`);
  if (!el) return;
  if (todayPct == null || Math.abs(todayPct) < 0.5) return;
  const up = todayPct >= 0;
  const ar = lang === 'ar';
  const sector = getSectorForTicker(ticker);
  const sectorName = sector ? (SECTOR_NAMES[sector]?.[ar?'ar':'en'] || '') : '';
  // Build an explanation - try news, fall back to synthetic
  let text = '';
  let timeStr = new Date().toLocaleTimeString(ar?'ar-SA-u-ca-gregory':'en-US', { hour:'2-digit', minute:'2-digit' });
  try {
    const today = new Date();
    const fromD = new Date(today.getTime() - 2 * 86400000);
    const fmtD = (d) => d.toISOString().split('T')[0];
    const r = await fetch(`${FINNHUB}/company-news?symbol=${encodeURIComponent(ticker)}&from=${fmtD(fromD)}&to=${fmtD(today)}&token=${FINNHUB_KEY}`);
    if (r.ok){
      const news = await r.json();
      if (Array.isArray(news) && news.length){
        const top = news[0];
        if (top.headline){
          if (ar){
            // For Arabic mode, build a synthesized summary that doesn't depend on translating English news
            text = synthesizeArabicReason(ticker, todayPct, sectorName, top);
            timeStr = new Date((top.datetime || Date.now()/1000) * 1000).toLocaleTimeString('ar-SA-u-ca-gregory', { hour:'2-digit', minute:'2-digit' });
          } else {
            text = top.summary || top.headline;
            timeStr = new Date((top.datetime || Date.now()/1000) * 1000).toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit' });
          }
        }
      }
    }
  } catch(e){}
  // Fallback synthetic if no news
  if (!text){
    if (ar) text = synthesizeArabicReason(ticker, todayPct, sectorName, null);
    else text = synthesizeEnglishReason(ticker, todayPct, sectorName);
  }
  if (!text) return;
  const title = ar ? (up ? 'لماذا ارتفع السهم؟' : 'لماذا نزل السهم؟') : (up ? 'Why is the stock up?' : 'Why is the stock down?');
  el.innerHTML = `
    <h2 class="wm-title">
      <span class="wm-icon ${up?'up':'down'}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="${up?'23 6 13.5 15.5 8.5 10.5 1 18':'23 18 13.5 8.5 8.5 13.5 1 6'}"/>
          <polyline points="${up?'17 6 23 6 23 12':'17 18 23 18 23 12'}"/>
        </svg>
      </span>
      ${title}
    </h2>
    <div class="wm-card ${up?'up':'down'}">
      <p class="wm-text">${esc(text)}</p>
      <div class="wm-time">${ar?'اليوم':'Today'}, ${timeStr}</div>
    </div>
  `;
}

function synthesizeArabicReason(ticker, pct, sectorName, news){
  const up = pct >= 0;
  const absP = Math.abs(pct);
  const magnitude = absP > 5 ? 'بقوة' : absP > 2 ? 'بشكل ملحوظ' : 'بشكل طفيف';
  const sector = sectorName ? ` ضمن قطاع ${sectorName}` : '';
  if (news && news.headline){
    return up
      ? `يرتفع سهم ${ticker} ${magnitude} اليوم بنسبة ${absP.toFixed(2)}%${sector}. وتشير الأخبار الأخيرة إلى تطوّرات إيجابية تتعلّق بالشركة. يعكس هذا الأداء ثقة المستثمرين في الاتجاه القصير للسهم.`
      : `يتراجع سهم ${ticker} ${magnitude} اليوم بنسبة ${absP.toFixed(2)}%${sector}. هذا التراجع قد يكون مرتبطاً بأخبار حديثة عن الشركة أو ضغوط بيع عامة في السوق. يُنصح بمتابعة الأخبار قبل اتخاذ قرارات.`;
  }
  return up
    ? `يرتفع سهم ${ticker} ${magnitude} اليوم بنسبة ${absP.toFixed(2)}%${sector}. لم نجد خبراً محدداً مرتبطاً بالحركة، وقد يعود السبب إلى زخم السوق العام أو نشاط على مستوى القطاع.`
    : `يتراجع سهم ${ticker} ${magnitude} اليوم بنسبة ${absP.toFixed(2)}%${sector}. لم نجد خبراً محدداً مرتبطاً بالحركة، وقد يعود السبب إلى ضغط بيع عام أو حركة سوقية أوسع.`;
}

function synthesizeEnglishReason(ticker, pct, sectorName){
  const up = pct >= 0;
  const absP = Math.abs(pct);
  const magnitude = absP > 5 ? 'sharply' : absP > 2 ? 'notably' : 'modestly';
  const sector = sectorName ? ` in the ${sectorName} sector` : '';
  return up
    ? `${ticker} is up ${magnitude} today, gaining ${absP.toFixed(2)}%${sector}. No specific catalyst identified — the move may reflect broad market sentiment or sector-level momentum.`
    : `${ticker} is down ${magnitude} today, falling ${absP.toFixed(2)}%${sector}. No specific catalyst identified — the drop may stem from market-wide selling pressure or sector rotation.`;
}

async function loadBidAsk(holdId, ticker){
  const el = document.getElementById(`sd-bidask-${holdId}`);
  if (!el) return;
  const ar = lang === 'ar';
  const h = holdings.find(x => x.id === holdId) || { price: 0 };

  if (p <= 0){ el.innerHTML = `<div style="padding:14px;text-align:center;color:var(--muted);font-size:13px">${ar?'غير متاح':'Not available'}</div>`; return; }
  const spread = Math.max(0.01, p * 0.0005);
  const bid = +(p - spread/2).toFixed(2);
  const ask = +(p + spread/2).toFixed(2);
  const seed = ticker.charCodeAt(0) + (ticker.charCodeAt(1)||0);
  const bidQty = (seed * 7) % 500 + 50;
  const askQty = (seed * 11) % 500 + 50;
  el.innerHTML = `
    <div class="bidask-prices">
      <div class="ba-val down">$${ask.toFixed(2)}</div>
      <div class="ba-spread">$${spread.toFixed(2)}</div>
      <div class="ba-val up">$${bid.toFixed(2)}</div>
    </div>
    <div class="bidask-bar">
      <div class="bidask-bar-sell" style="width:${(askQty/(bidQty+askQty)*100).toFixed(0)}%"></div>

    </div>
  `;
}

function fmtCompact(n){
  if (n == null || !isFinite(n)) return '—';
  const abs = Math.abs(n);
  if (abs >= 1e12) return (n/1e12).toFixed(2)+'T';
  if (abs >= 1e9) return (n/1e9).toFixed(1)+'B';
  if (abs >= 1e6) return (n/1e6).toFixed(0)+'M';
  if (abs >= 1e3) return (n/1e3).toFixed(0)+'K';
  return n.toFixed(0);
}

async function refreshPrices(){
  if (!allHoldingsInPf().length){ return; }
  ensureSymbols();
  // Include watchlist tickers too
  const allTickers = [...new Set([
    ...allHoldingsInPf().map(h => h.ticker),
    ...watchlist.filter(w => w.pfId === settings.activePf).map(w => w.ticker),
  ])];
  let n = 0, lastErr = null;
  const oldPrices = {};
  holdings.forEach(h => { if (h.pfId === settings.activePf) oldPrices[h.ticker] = h.price; });
  watchlist.forEach(w => { if (w.pfId === settings.activePf && oldPrices[w.ticker] == null) oldPrices[w.ticker] = w.price; });
  const results = await Promise.all(allTickers.map(async tic => {
    try {
      const url = `${FINNHUB}/quote?symbol=${encodeURIComponent(tic)}&token=${FINNHUB_KEY}`;
      const r = await fetch(url);
      if (!r.ok) { lastErr = new Error("HTTP "+r.status); return null; }
      const q = await r.json();
      if (q.c == null || q.c === 0) return null;
      return { tic, price: q.c, prev: q.pc, changePct: q.dp };
    } catch(e) { lastErr = e; return null; }
  }));
  const changes = {};
  results.forEach(r => {
    if (!r) return;
    holdings.forEach(h => {
      if (h.pfId === settings.activePf && h.ticker === r.tic) {
        h.price = r.price;
        if (r.prev != null) h.prev = r.prev;
        if (r.changePct != null) h.dayChangePct = r.changePct;
        n++;
      }
    });
    watchlist.forEach(w => {
      if (w.pfId === settings.activePf && w.ticker === r.tic){
        w.price = r.price;
        if (r.changePct != null) w.dayChangePct = r.changePct;
      }
    });
    if (oldPrices[r.tic] != null && Math.abs(oldPrices[r.tic] - r.price) > 0.001){
      changes[r.tic] = { old: oldPrices[r.tic], new: r.price, up: r.price > oldPrices[r.tic] };
    }
  });
  // backfill names
  if (symbolList?.length) {
    holdings.forEach(h => {
      if (h.pfId === settings.activePf && (!h.name || h.name === h.ticker)) {
        const found = symbolList.find(s => s.s === h.ticker);
        if (found?.d) h.name = found.d;
      }
    });
  }
  if (n === 0) return;
  settings.lastRefresh = new Date().toLocaleTimeString(lang==='ar'?'ar-SA':'en-US',{hour:'2-digit',minute:'2-digit'});
  // Save in background but don't block
  save();
  // Update DOM selectively (no full re-render)
  updatePricesInDOM(changes);
}

function updatePricesInDOM(changes){
  // Update all elements with data-price-tic
  document.querySelectorAll('[data-price-tic]').forEach(el => {
    const tic = el.getAttribute('data-price-tic');
    const h = holdings.find(x => x.pfId === settings.activePf && x.ticker === tic);
    const w = watchlist.find(x => x.pfId === settings.activePf && x.ticker === tic);
    const item = h || w;
    if (!item || item.price == null) return;
    const newText = '$' + fmt(item.price, 2);
    if (el.textContent !== newText){
      el.textContent = newText;
      if (changes[tic]){
        el.classList.remove('flash-up','flash-down');
        void el.offsetWidth;
        el.classList.add(changes[tic].up ? 'flash-up' : 'flash-down');
        setTimeout(() => el.classList.remove('flash-up','flash-down'), 700);
      }
    }
  });
  // Update day change percent
  document.querySelectorAll('[data-daypct-tic]').forEach(el => {
    const tic = el.getAttribute('data-daypct-tic');
    const item = holdings.find(x => x.pfId === settings.activePf && x.ticker === tic)
              || watchlist.find(x => x.pfId === settings.activePf && x.ticker === tic);
    if (!item || item.dayChangePct == null) return;
    const up = item.dayChangePct >= 0;
    const newText = (up?'+':'')+fmt(item.dayChangePct,2)+'%';
    if (el.textContent !== newText){
      el.textContent = newText;
      el.className = el.className.replace(/\b(up|down)\b/g, '') + ' ' + (up?'up':'down');
    }
  });
  // Update Hero totals when on portfolio tab
  if (activeTab === 'portfolio'){
    const tt = totals();
    const mvEl = document.querySelector('[data-hero-mv]');
    if (mvEl) mvEl.textContent = maskMoney(fmtUSD(tt.mv));
    const plEl = document.querySelector('[data-hero-pl]');
    if (plEl) plEl.textContent = settings.privacy?'••••':((tt.pl>=0?'+':'')+fmtUSD(Math.abs(tt.pl)));
  }
}

/* modal / toast */
function modal(html, opts){
  closeModal();
  const fullpage = opts && opts.fullpage;
  const s = document.createElement("div"); s.className=fullpage?"scrim fullpage":"scrim"; s.id="scrim";
  s.innerHTML = `<div class="modal${fullpage?' fullpage':''}">${fullpage?'':'<button class="modal-close-x" onclick="closeModal()" aria-label="Close">✕</button>'}${html}</div>`;
  if (!fullpage) s.addEventListener("click", e => { if (e.target === s) closeModal(); });
  document.body.appendChild(s);
  // Enable swipe-down-to-dismiss for fullpage modals
  if (fullpage){
    const modalEl = s.querySelector('.modal.fullpage');
    let startY = 0, currentY = 0, dragging = false;
    const topbar = s.querySelector('.sd-topbar');
    const swipeStart = (e) => {
      // Only trigger from top of page or topbar
      if (s.scrollTop > 5) return;
      const y = e.touches ? e.touches[0].clientY : e.clientY;
      startY = y; currentY = y; dragging = true;
    };
    const swipeMove = (e) => {
      if (!dragging) return;
      currentY = e.touches ? e.touches[0].clientY : e.clientY;
      const dy = currentY - startY;
      if (dy > 0){
        e.preventDefault?.();
        modalEl.style.transform = `translateY(${Math.min(dy, 500)}px)`;
        modalEl.style.opacity = Math.max(0.3, 1 - dy / 600);
      }
    };
    const swipeEnd = () => {
      if (!dragging) return;
      dragging = false;
      const dy = currentY - startY;
      if (dy > 130){
        // Close
        modalEl.style.transition = 'transform .2s, opacity .2s';
        modalEl.style.transform = 'translateY(100vh)';
        modalEl.style.opacity = '0';
        setTimeout(closeModal, 200);
      } else {
        // Snap back
        modalEl.style.transition = 'transform .25s, opacity .25s';
        modalEl.style.transform = 'translateY(0)';
        modalEl.style.opacity = '1';
        setTimeout(() => { modalEl.style.transition = ''; }, 250);
      }
    };
    s.addEventListener('touchstart', swipeStart, { passive: true });
    s.addEventListener('touchmove', swipeMove, { passive: false });
    s.addEventListener('touchend', swipeEnd);
  }
}
function closeModal(){ const s=$("#scrim"); if(s) s.remove(); }
function toast(msg){
  $$(".toast").forEach(t => t.remove());
  const el = document.createElement("div");
  el.className = "toast";
  el.textContent = msg;
  el.title = "Tap to dismiss";
  el.style.cursor = "pointer";
  el.onclick = () => el.remove();
  document.body.appendChild(el);
  setTimeout(()=>{ if (el.parentElement) { el.style.transition="opacity .3s"; el.style.opacity="0"; setTimeout(()=>el.remove(),300); } }, 7000);
}

    <div class="field"><label>${lang==='ar'?'كلمة السر':'Password'} <small style="color:#444">${lang==='ar'?'6 أحرف على الأقل':'min 6 chars'}</small></label>

  `);
  setTimeout(()=>$("#au_n")?.focus(),60);
}
async function doSignup(){
  const name = $("#au_n").value.trim();
  const email = $("#au_e").value.trim();
  const pw = $("#au_p").value;
  if (!name){ $("#au_err").textContent = lang==='ar'?'اكتب اسمك':'Enter your name'; return; }
  if (!email || !email.includes('@')){ $("#au_err").textContent = lang==='ar'?'إيميل غير صالح':'Invalid email'; return; }
  if (!pw || pw.length < 6){ $("#au_err").textContent = lang==='ar'?'كلمة السر 6 أحرف على الأقل':'Password min 6 chars'; return; }
  $("#au_err").textContent = lang==='ar'?'جاري الإنشاء...':'Creating...';
  const { error } = await sb.auth.signUp({ email, password: pw, options: { data: { name } } });
  if (error){ $("#au_err").textContent = error.message; return; }
  closeModal();
}
function openLogin(){
  modal(`
    <h2>${lang==='ar'?'تسجيل الدخول':'Log in'}</h2>
    <div class="field"><label>${lang==='ar'?'الإيميل':'Email'}</label>
      <input class="inp" id="lo_e" type="email" autocomplete="email"></div>
    <div class="field"><label>${lang==='ar'?'كلمة السر':'Password'}</label>
      <input class="inp" id="lo_p" type="password" autocomplete="current-password"></div>
    <div class="err" id="lo_err"></div>
    <div class="m-actions">
      <button class="btn" onclick="closeModal();openSignup()">${lang==='ar'?'حساب جديد':'New account'}</button>
      <button class="btn primary" onclick="doLogin()">${lang==='ar'?'دخول':'Log in'}</button>
    </div>
  `);
  setTimeout(()=>{
    $("#lo_e")?.focus();
    ['lo_e','lo_p'].forEach(id=>$("#"+id)?.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()}));
  },60);
}
async function doLogin(){
  const email = $("#lo_e").value.trim();
  const pw = $("#lo_p").value;
  if (!email || !pw){ $("#lo_err").textContent = lang==='ar'?'املأ الحقول':'Fill fields'; return; }
  $("#lo_err").textContent = lang==='ar'?'جاري الدخول...':'Logging in...';
  const { error } = await sb.auth.signInWithPassword({ email, password: pw });
  if (error){ $("#lo_err").textContent = error.message; return; }
  closeModal();
}
async function cloudLogout(){
  await sb.auth.signOut();
}

async function adminRenewMonth(userId, userName, userEmail){
  const today = new Date();
  const { data: u } = await sb.from('profiles').select('subscription_paid_until,subscription_status').eq('id', userId).single();
  let base = today;
  if (u?.subscription_paid_until){
    const cur = new Date(u.subscription_paid_until);
    if (cur > today) base = cur;
  }
  const newDate = new Date(base);
  newDate.setMonth(newDate.getMonth() + 1);
  await sb.from('profiles').update({
    subscription_paid_until: newDate.toISOString().slice(0,10),
    subscription_status: 'active'
  }).eq('id', userId);
  toast(lang==='ar'?'تم تجديد الشهر':'Renewed +1 month');
  adminUserActions(userId, userName, userEmail);
}

async function adminExtendDays(userId, userName, userEmail){
  const txt = prompt(lang==='ar'?'كم يوم تبي تضيف؟':'How many days to add?', '7');
  const days = parseInt(txt);
  if (!days || days < 1) return;
  const today = new Date();
  const { data: u } = await sb.from('profiles').select('subscription_paid_until').eq('id', userId).single();
  let base = today;
  if (u?.subscription_paid_until){
    const cur = new Date(u.subscription_paid_until);
    if (cur > today) base = cur;
  }
  const newDate = new Date(base);
  newDate.setDate(newDate.getDate() + days);
  await sb.from('profiles').update({
    subscription_paid_until: newDate.toISOString().slice(0,10),
    subscription_status: 'active'
  }).eq('id', userId);
  toast(lang==='ar'?`أُضيف ${days} يوم`:`Added ${days} days`);
  adminUserActions(userId, userName, userEmail);
}

async function adminToggleSuspend(userId, suspend, userName, userEmail){
  suspend = suspend === 'true' || suspend === true;
  await sb.from('profiles').update({ suspended: suspend }).eq('id', userId);
  toast(suspend ? (lang==='ar'?'تم الإيقاف':'Suspended') : (lang==='ar'?'تم الرفع':'Unsuspended'));
  adminUserActions(userId, userName, userEmail);
}

    <div class="m-actions">
      <button class="btn" onclick="adminUserActions('${userId}','${esc(userName)}','${esc(userEmail)}')">${t().cancel}</button>

async function adminSaveNotice(userId, userName, userEmail){
  const text = $("#adn_t").value.trim();
  if (!text){ return; }
  await sb.from('profiles').update({ notification: text, notification_seen: false }).eq('id', userId);
  toast(lang==='ar'?'تم الإرسال':'Sent');
  adminUserActions(userId, userName, userEmail);
}

async function adminClearNotice(userId, userName, userEmail){
  await sb.from('profiles').update({ notification: null, notification_seen: true }).eq('id', userId);
  adminUserActions(userId, userName, userEmail);
}

async function adminDeletePfDirect(pfId, pfName, userId, userName, userEmail){
  if (!confirm((lang==='ar'?`حذف "${pfName}"؟`:`Delete "${pfName}"?`))) return;
  await sb.from('portfolios').delete().eq('id', pfId);
  adminUserActions(userId, userName, userEmail);
}

async function adminViewUser(userId, userName){ return adminUserActions(userId, userName, ''); }

async function adminDeletePf(pfId, pfName, userId, userName){
  if (!confirm((lang==='ar'?`حذف محفظة "${pfName}" نهائياً؟`:`Delete "${pfName}" permanently?`))) return;
  const { error } = await sb.from('portfolios').delete().eq('id', pfId);
  if (error){ alert('Error: '+error.message); return; }
  toast(lang==='ar'?'تم الحذف':'Deleted');
  adminUserActions(userId, userName, '');
}
/* boot */
(async function(){
  const { data: { session } } = await sb.auth.getSession();
  if (session){
    currentUser = session.user;
    await loadUserProfile();
    isAdminCloud = userProfile?.is_admin === true;
    if (!isAccessBlocked()) await cloudLoadAll();
  }
  await load();
  booted = true;
  try { applyViewMode(); } catch(e){}
  render();
  setTimeout(()=>{ try { checkAchievements(); } catch(e){} }, 800);
  setTimeout(()=>{ try { maybeShowNotification(); } catch(e){} }, 1400);
  setTimeout(()=>{ try { maybeRunDailyBackup(); } catch(e){} }, 3000);
  setTimeout(()=>{ try { showDailyBrief(); } catch(e){} }, 2200);
  setTimeout(()=>{ try { showOnboarding(); } catch(e){} }, 1200);
  setTimeout(()=>{ try { checkSubscriptionWarning(); } catch(e){} }, 2600);
  setTimeout(()=>{ try { preloadAllEarnings(); } catch(e){} }, 3500);
  try { installPullToRefresh(); } catch(e){}
  try { attachLongPress(); } catch(e){}

  sb.auth.onAuthStateChange(async (event, session) => {
    if (event === 'SIGNED_IN' && session && (!currentUser || currentUser.id !== session.user.id)){
      currentUser = session.user;
      await loadUserProfile();
      isAdminCloud = userProfile?.is_admin === true;
      if (!isAccessBlocked()) await cloudLoadAll();
      settings.activePf = null;
      settings.unlocked = false;
      render();
      setTimeout(()=>{ try { maybeShowNotification(); } catch(e){} }, 800);
    } else if (event === 'SIGNED_OUT'){
      currentUser = null;
      userProfile = null;
      isAdminCloud = false;
      portfolios = []; holdings = []; watchlist = []; challenges = [];
      settings.activePf = null; settings.unlocked = false;
      settings.cash = 0; settings.cashHistory = []; settings.achievements = [];
      splashShown = false;
      render();
    }
  });
})();
