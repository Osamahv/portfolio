/* ════ compute ════ */
/* compute holding stats from transactions */
function statsFor(h){
  const mul = (h.type && h.type !== 'stock') ? 100 : 1;
  const txs = (h.transactions || []).slice().sort((a,b) => (a.ts||0) - (b.ts||0));
  let shares = 0, totalCost = 0, realized = 0;
  for (const tx of txs) {
    const qty = Number(tx.qty) || 0;
    const px = Number(tx.price) || 0;
    if (tx.type === 'buy') {
      shares += qty;
      totalCost += qty * px;
    } else {
      const avgAtTime = shares > 0 ? totalCost / shares : px;
      realized += qty * (px - avgAtTime);
      totalCost -= qty * avgAtTime;
      shares -= qty;
    }
  }
  // also include any legacy quickShares/quickAvg if no transactions
  if (txs.length === 0 && h.shares != null) {
    shares = h.shares;
    totalCost = h.shares * (h.avg || 0);
  }
  const avg = shares > 0 ? totalCost / shares : 0;
  const price = h.price != null ? h.price : avg;
  const mv = shares * price * mul;
  const cost = shares * avg * mul;
  const unrealized = mv - cost;
  const plPct = cost > 0 ? unrealized/cost*100 : 0;
  const todayD = (h.prev != null) ? shares*(price - h.prev)*mul : null;
  const todayPct = h.dayChangePct != null ? h.dayChangePct : (h.prev ? (price-h.prev)/h.prev*100 : null);
  // total deposited for this holding = sum of buys
  let deposited = 0;
  for (const tx of txs) {
    if (tx.type === 'buy') deposited += (Number(tx.qty)||0) * (Number(tx.price)||0) * mul;
  }
  return { shares, avg, price, mv, cost, pl: unrealized, plPct, today: todayD, todayPct, realized: realized*mul, deposited, mul };
}

function totals(){
  let mv = 0, cost = 0, today = 0, hasToday = false, deposited = 0, realized = 0;
  activeHoldings().forEach(h => {
    const s = statsFor(h);
    mv += s.mv; cost += s.cost;
    deposited += s.deposited;
    realized += s.realized;
    if (s.today != null) { today += s.today; hasToday = true; }
  });
  const pl = mv - cost;
  const totalReturn = (mv + realized) - deposited;
  const totalReturnPct = deposited > 0 ? totalReturn/deposited*100 : 0;
  return {
    mv, cost, pl, deposited, realized,
    plPct: cost > 0 ? pl/cost*100 : 0,
    today: hasToday ? today : null,
    todayPct: hasToday && (mv-today) > 0 ? today/(mv-today)*100 : null,
    totalReturn, totalReturnPct,
  };
}

/* ════ zakat ════ */
const HIJRI = 354.367;
function zakatFor(h){
  if (!h.purchaseDate) return null;
  const purchase = new Date(h.purchaseDate);
  if (isNaN(purchase)) return null;
  const now = new Date();
  const days = (now - purchase) / 86400000;
  const yearsPassed = Math.floor(days / HIJRI);
  const lastHawl = new Date(purchase.getTime() + yearsPassed * HIJRI * 86400000);
  const nextHawl = new Date(purchase.getTime() + (yearsPassed + 1) * HIJRI * 86400000);
  const daysToNext = Math.ceil((nextHawl - now) / 86400000);
  const daysSinceLast = Math.floor((now - lastHawl) / 86400000);
  const due = yearsPassed >= 1;
  const amount = statsFor(h).mv * 0.025;
  const progress = Math.max(0, Math.min(100, daysSinceLast / HIJRI * 100));
  return {
    purchaseDate: h.purchaseDate, nextHawlDate: nextHawl.toISOString().slice(0,10),
    daysToNext, daysSinceLast, due, amount, progress,
    status: due ? "due" : (daysToNext < 30 ? "soon" : "ok"),
  };
}

function renderBubbles(){
  const wrap = $("#viz-wrap"); if (!wrap) return;
  wrap.className = 'bub-wrap';
  const W = wrap.clientWidth || 640;
  const H = Math.min(Math.max(W * 0.95, 360), 520);
  const hs = activeHoldings();
  const data = hs.map(h => { const s = statsFor(h); return { ...h, mv: s.mv, pl: s.pl, plPct: s.plPct, hasP: h.price != null }; }).filter(d => d.mv > 0);
  if (!data.length) { wrap.innerHTML = ""; return; }
  const root = d3.hierarchy({ children: data }).sum(d => d.mv);
  d3.pack().size([W, H]).padding(8)(root);
  const total = root.value || 1;
  const ns = "http://www.w3.org/2000/svg";
  const svg = document.createElementNS(ns, "svg");
  svg.setAttribute("viewBox", `0 0 ${W} ${H}`);
  svg.setAttribute("id", "bub-svg");

  const palettes = [
    { fill:"#0F4A36", ring:"#5FE9B0" }, // green
    { fill:"#4A1F22", ring:"#F26B6E" }, // red
    { fill:"#1F3A6E", ring:"#5BA5FF" }, // blue
    { fill:"#4A3D1F", ring:"#E8B96A" }, // gold
    { fill:"#3D1F4A", ring:"#A78BFA" }, // purple
    { fill:"#1F4A4A", ring:"#5FE9E9" }, // teal
    { fill:"#4A1F3D", ring:"#FB7185" }, // pink
    { fill:"#3D4A1F", ring:"#A3E635" }, // lime
    { fill:"#4A2D1F", ring:"#FB923C" }, // orange
    { fill:"#1F2D4A", ring:"#818CF8" }, // indigo
    { fill:"#3A1F4A", ring:"#D946EF" }, // fuchsia
    { fill:"#1F4A2D", ring:"#34D399" }, // emerald
  ];
  const pickPalette = (h) => {
    // every ticker gets a stable distinct color from its name — no gray, no sentiment override
    let sum = 0;
    for (let i = 0; i < h.ticker.length; i++) sum += h.ticker.charCodeAt(i) * (i+1) * 31 + 17;
    return palettes[Math.abs(sum) % palettes.length];
  };

  root.leaves().forEach(d => {
    const r = d.r, x = d.x, y = d.y, h = d.data;
    const share = h.mv/total*100;
    const p = pickPalette(h);
    const g = document.createElementNS(ns, "g");
    g.setAttribute("class", "bub");
    g.setAttribute("transform", `translate(${x},${y})`);
    g.addEventListener("click", () => openDetail(h.id));
    const c = document.createElementNS(ns, "circle");
    c.setAttribute("r", r);
    c.setAttribute("fill", p.fill);
    c.setAttribute("stroke", p.ring);
    c.setAttribute("stroke-width", Math.max(1.5, r * 0.022));
    c.setAttribute("stroke-opacity", "0.85");
    g.appendChild(c);
    if (r > 30){
      const fz = Math.min(r * 0.32, 24);
      mkText(g, ns, h.ticker, { y: -r*0.20, "text-anchor":"middle", "font-size": fz, fill:"#fff", "font-weight":"700" });
      mkText(g, ns, share.toFixed(1)+"%", { y: r*0.02, "text-anchor":"middle", "font-size": fz*0.55, fill:"rgba(255,255,255,.75)", "font-weight":"500" });
      if (r > 42 && h.hasP && !settings.privacy){
        const plCol = h.pl >= 0 ? "#5FE9B0" : "#F26B6E";
        mkText(g, ns, (h.pl>=0?"+$":"-$")+fmt0(Math.abs(h.pl)), { y: r*0.28, "text-anchor":"middle", "font-size": fz*0.55, fill: plCol, "font-weight":"700" });
        mkText(g, ns, pct(h.plPct), { y: r*0.48, "text-anchor":"middle", "font-size": fz*0.48, fill: plCol, "font-weight":"600" });
      }
    } else if (r > 14){
      mkText(g, ns, h.ticker, { y: r*0.12, "text-anchor":"middle", "font-size": Math.min(r*0.42, 13), fill:"#fff", "font-weight":"700" });
    }
    svg.appendChild(g);
  });
  wrap.innerHTML = "";
  wrap.appendChild(svg);
}
function mkText(parent, ns, text, attrs){
  const e = document.createElementNS(ns, "text");
  for (const k in attrs) e.setAttribute(k, attrs[k]);
  e.textContent = text;
  parent.appendChild(e);
}

const _logoCache = {};
async function fetchLogo(ticker){
  if (_logoCache[ticker] !== undefined) return _logoCache[ticker];
  try {
    const r = await fetch(`${FINNHUB}/stock/profile2?symbol=${ticker}&token=${FINNHUB_KEY}`);
    if (r.ok){
      const data = await r.json();
      _logoCache[ticker] = data.logo || null;
      return data.logo || null;
    }
  } catch(e){}
  _logoCache[ticker] = null;
  return null;
}
async function lazyLoadLogos(tickers){
  for (const tic of tickers){
    if (_logoCache[tic] === undefined){
      const logo = await fetchLogo(tic);
      if (logo){
        document.querySelectorAll(`[data-logo-tic="${tic}"]`).forEach(el => {
          const isAnTic = el.classList.contains('an-tic');
          const isTicBx = el.classList.contains('tic-bx');
          const cls = isAnTic ? 'co-logo" style="width:46px;height:46px' : 'co-logo';
          el.outerHTML = `<img src="${logo}" alt="${tic}" class="${cls}" onerror="this.outerHTML='<div class=\\'logo-fallback\\' style=\\'background:var(--accent-bg);color:var(--accent);border-color:var(--accent-d)\\'>${tic.slice(0,3)}</div>'">`;
        });
      }
    } else if (_logoCache[tic]){
      // Cache hit - still update any pending placeholders
      const logo = _logoCache[tic];
      document.querySelectorAll(`[data-logo-tic="${tic}"]`).forEach(el => {
        const isAnTic = el.classList.contains('an-tic');
        const cls = isAnTic ? 'co-logo" style="width:46px;height:46px' : 'co-logo';
        el.outerHTML = `<img src="${logo}" alt="${tic}" class="${cls}">`;
      });
    }
  }
}

/* ════ Black-Scholes (Greeks for options) ════ */
function bsNormCDF(x){
  const t = 1/(1 + 0.2316419*Math.abs(x));
  const d = 0.3989423*Math.exp(-x*x/2);
  let p = d*t*(0.3193815 + t*(-0.3565638 + t*(1.781478 + t*(-1.821256 + t*1.330274))));
  return x > 0 ? 1-p : p;
}
function bsNormPDF(x){ return Math.exp(-x*x/2)/Math.sqrt(2*Math.PI); }
function computeGreeks(h, spotPrice){
  if (!h.strike || !h.expiry || !h.iv) return null;
  const S = Number(spotPrice);
  const K = Number(h.strike);
  const sigma = Number(h.iv)/100;
  const r = 0.045; // assume risk-free rate ~4.5%
  const expDate = new Date(h.expiry);
  const T = (expDate - new Date()) / (365 * 86400000);
  if (T <= 0 || !S || !K || !sigma) return null;
  const sqrtT = Math.sqrt(T);
  const d1 = (Math.log(S/K) + (r + sigma*sigma/2)*T) / (sigma*sqrtT);
  const d2 = d1 - sigma*sqrtT;
  const Nd1 = bsNormCDF(d1), Nd2 = bsNormCDF(d2);
  const phi = bsNormPDF(d1);
  const isCall = h.type === 'call';
  const theoPrice = isCall
    ? S*Nd1 - K*Math.exp(-r*T)*Nd2
    : K*Math.exp(-r*T)*bsNormCDF(-d2) - S*bsNormCDF(-d1);
  const delta = isCall ? Nd1 : Nd1 - 1;
  const gamma = phi / (S*sigma*sqrtT);
  const thetaPerYear = isCall
    ? -S*phi*sigma/(2*sqrtT) - r*K*Math.exp(-r*T)*Nd2
    : -S*phi*sigma/(2*sqrtT) + r*K*Math.exp(-r*T)*bsNormCDF(-d2);
  const theta = thetaPerYear / 365;
  const vega = S*phi*sqrtT / 100;
  return { theoPrice, delta, gamma, theta, vega, daysToExpiry: Math.ceil(T*365) };
}

function setEditType(type){
  editType = type;
  // re-render modal preserving current values
  const cur = {
    tic: $("#f_tic")?.value || '',
    sh: $("#f_sh")?.value || '',
    avg: $("#f_avg")?.value || '',
    pr: $("#f_pr")?.value || '',
    dt: $("#f_dt")?.value || today(),
    strike: $("#f_strike")?.value || '',
    exp: $("#f_exp")?.value || '',
    iv: $("#f_iv")?.value || '',
  };
  const id = $(".btn.danger")?.getAttribute("onclick")?.match(/'([^']+)'/)?.[1];
  const h = id ? holdings.find(x => x.id === id) : null;
  closeModal();
  modal(renderEditModal(h));
  // restore values
  if (cur.tic) $("#f_tic").value = cur.tic;
  if (cur.sh && $("#f_sh")) $("#f_sh").value = cur.sh;
  if (cur.avg && $("#f_avg")) $("#f_avg").value = cur.avg;
  if (cur.pr) $("#f_pr").value = cur.pr;
  if (cur.dt && $("#f_dt")) $("#f_dt").value = cur.dt;
  if (cur.strike && $("#f_strike")) $("#f_strike").value = cur.strike;
  if (cur.exp && $("#f_exp")) $("#f_exp").value = cur.exp;
  if (cur.iv && $("#f_iv")) $("#f_iv").value = cur.iv;
}

function setEditHorizon(h){ editHorizon = editHorizon === h ? null : h; refreshHorizonSeg(); }
function refreshHorizonSeg(){
  const seg = $("#seg-hz"); if (!seg) return;
  $$("button", seg).forEach((b,i) => {
    const id = ["st","mt","lt"][i];
    b.className = editHorizon === id ? `on ${id}` : "";
  });
}
function toggleEditTag(id){
  if (editTags.includes(id)) editTags = editTags.filter(x => x !== id);
  else editTags.push(id);
  const grid = $("#tg-grid"); if (!grid) return;
  $$(".tag-chip", grid).forEach((b,i) => {
    b.classList.toggle("on", editTags.includes(TAGS_LIST[i].id));
  });
}

async function searchTicker(){
  const q = $("#f_tic").value.trim();
  if (!q) return;
  const box = $("#sg-box");
  box.innerHTML = `<div class="suggest"><div class="sg-loading"><span class="spin"></span> ${t().search_loading}</div></div>`;
  try {
    const results = await finnhubSearch(q);
    if (!results.length){ box.innerHTML = `<div class="suggest"><div class="sg-loading">${t().no_match}</div></div>`; return; }
    box.innerHTML = `<div class="suggest">${results.map(r => {
      const nm = (r.d || '').replace(/'/g,"&#39;").replace(/"/g,"&quot;");
      return `<div class="sg-item" onclick="pickTicker('${esc(r.s)}','${esc(nm)}')">
        <span class="tic">${esc(r.s)}</span>
        <span class="nm">${esc(r.d || '')}</span>
      </div>`;
    }).join("")}</div>`;
  } catch(e){
    box.innerHTML = `<div class="suggest"><div class="sg-loading">${esc(e.message||t().no_match)}</div></div>`;
  }
}
function pickTicker(tic, name){
  $("#f_tic").value = tic;
  $("#sg-box").innerHTML = "";
  $("#f_tic").dataset.name = name;
}

function saveHold(id){
  const tic = $("#f_tic").value.trim().toUpperCase();
  const prRaw = $("#f_pr")?.value.trim() || "";
  const pr = prRaw === "" ? null : parseFloat(prRaw);
  const presetName = $("#f_tic").dataset.name || tic;
  if (!tic){ $("#f_err").textContent = t().invalid; return; }
  const strike = $("#f_strike")?.value ? parseFloat($("#f_strike").value) : null;
  const expiry = $("#f_exp")?.value || null;
  const iv = $("#f_iv")?.value ? parseFloat($("#f_iv").value) : null;
  if (id){
    const h = holdings.find(x => x.id === id);
    Object.assign(h, {
      ticker: tic, type: editType,
      price: pr != null ? pr : h.price,
      horizon: editHorizon, tags: editTags,
      name: h.name || presetName,
      strike, expiry, iv,
    });
    cloudUpsertHolding(h);
  } else {
    const sh = parseFloat($("#f_sh").value);
    const avg = parseFloat($("#f_avg").value);
    const dt = $("#f_dt").value || today();
    if (isNaN(sh) || isNaN(avg) || sh <= 0 || avg < 0){
      $("#f_err").textContent = t().invalid; return;
    }
    const newH = {
      id: uid(), pfId: settings.activePf,
      ticker: tic, name: presetName, type: editType,
      transactions: [{ id: uid(), type:'buy', qty: sh, price: avg, date: dt, ts: new Date(dt).getTime() }],
      price: pr, prev: null, dayChangePct: null,
      purchaseDate: dt,
      horizon: editHorizon, tags: editTags,
      strike, expiry, iv,
    };
    holdings.push(newH);
    cloudUpsertHolding(newH);
  }
  save(); closeModal(); render();
}

function askDel(id){
  modal(`<h2>${t().confirmDelete}</h2><p class="sub">${t().confirmDeleteSub}</p>

function doDelTx(holdId, txId){
  const h = holdings.find(x => x.id === holdId);
  if (!h) return;
  h.transactions = (h.transactions||[]).filter(t => t.id !== txId);
  cloudUpsertHolding(h);
  save(); closeModal(); openDetail(holdId);
}

let chartCurrentRange = '1m';
let chartCurrentTicker = null;
let chartCurrentData = null; // {prices, dates}

async function loadChart(ticker){
  chartCurrentTicker = ticker;
  if (!chartCurrentRange) chartCurrentRange = '1m';
  await loadChartRange(ticker, chartCurrentRange);
}

async function loadChartRange(ticker, rangeId){
  const box = $("#chart-box");
  if (!box) return;
  chartCurrentRange = rangeId;
  const range = CHART_RANGES.find(r => r.id === rangeId) || CHART_RANGES[2];
  const cacheKey = `${ticker}_${rangeId}`;
  const cached = chartCache[cacheKey];
  // update active button
  document.querySelectorAll('.chart-range-btn').forEach(b => {
    b.classList.toggle('on', b.dataset.range === rangeId);
  });
  if (cached && Date.now() - cached.fetched < 1800000){
    chartCurrentData = cached.data;
    renderChart(cached.data.prices, ticker, cached.data.dates);
    return;
  }
  box.innerHTML = `<div class="chart-empty"><span class="spin"></span> ${lang==='ar'?'تحميل...':'Loading...'}</div>`;
  try {
    const r = await fetch(`${TD}/time_series?symbol=${encodeURIComponent(ticker)}&interval=${range.interval}&outputsize=${range.size}&apikey=${TD_KEY}`);
    if (!r.ok) throw new Error("HTTP "+r.status);
    const data = await r.json();
    if (data.status === 'error') throw new Error(data.message || 'API error');
    const values = (data?.values || []).slice().reverse();
    const prices = [], dates = [];
    values.forEach(v => {
      const p = parseFloat(v.close);
      if (isFinite(p) && p > 0){ prices.push(p); dates.push(v.datetime); }
    });
    if (prices.length < 2) throw new Error("insufficient data");
    const payload = { prices, dates };
    chartCache[cacheKey] = { data: payload, fetched: Date.now() };
    chartCurrentData = payload;
    renderChart(prices, ticker, dates);
  } catch(e){
    box.innerHTML = `<div class="chart-empty" style="color:var(--muted2)">${lang==='ar'?'تعذّر تحميل الشارت لهذه الفترة':'Chart unavailable for this range'}</div>`;
  }
}

function renderChart(prices, ticker, dates){
  const box = $("#chart-box");
  const meta = $("#chart-meta");
  if (!box || !prices || prices.length < 2) return;
  const min = Math.min(...prices), max = Math.max(...prices), range = max-min || 1;
  const W = 600, H = 140, PAD = 8;
  const xs = prices.map((_,i) => PAD + (i/(prices.length-1))*(W-2*PAD));
  const ys = prices.map(v => PAD + (1-(v-min)/range)*(H-2*PAD));
  const pts = prices.map((_,i) => `${xs[i]},${ys[i]}`).join(" ");
  const up = prices[prices.length-1] >= prices[0];
  const chg = prices[prices.length-1] - prices[0];
  const chgPct = prices[0] > 0 ? chg/prices[0]*100 : 0;
  const col = up ? "#5FE9B0" : "#F26B6E";
  box.innerHTML = `<svg id="stock-chart" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="touch-action:none;cursor:crosshair">
    <defs><linearGradient id="cg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="${col}" stop-opacity="0.25"/>
      <stop offset="1" stop-color="${col}" stop-opacity="0"/>
    </linearGradient></defs>
    <polygon points="${PAD},${H-PAD} ${pts} ${W-PAD},${H-PAD}" fill="url(#cg)"/>
    <polyline points="${pts}" fill="none" stroke="${col}" stroke-width="1.8"/>
    <line id="ch-cross" x1="0" y1="0" x2="0" y2="${H}" stroke="rgba(255,255,255,.25)" stroke-width="0.6" style="display:none"/>
    <circle id="ch-dot" cx="0" cy="0" r="3.5" fill="${col}" stroke="#000" stroke-width="1.4" style="display:none"/>
  </svg>`;
  const metaDefault = `<b style="color:${col}">${chg>=0?'+':''}${pct(chgPct)}</b> · $${fmt(prices[0])} → <b>$${fmt(prices[prices.length-1])}</b>`;
  if (meta) meta.innerHTML = metaDefault;

  // crosshair interaction
  const svg = $("#stock-chart");
  const cross = $("#ch-cross");
  const dot = $("#ch-dot");
  if (!svg) return;
  const handle = (e) => {
    const t = e.touches ? e.touches[0] : e;
    if (!t) return;
    const rect = svg.getBoundingClientRect();
    const x = (t.clientX - rect.left) / rect.width * W;
    let idx = Math.round((x - PAD) / (W - 2*PAD) * (prices.length - 1));
    idx = Math.max(0, Math.min(prices.length-1, idx));
    const cx = xs[idx], cy = ys[idx];
    cross.setAttribute('x1', cx); cross.setAttribute('x2', cx);
    cross.style.display = 'block';
    dot.setAttribute('cx', cx); dot.setAttribute('cy', cy);
    dot.style.display = 'block';
    const p = prices[idx];
    const d = dates ? dates[idx] : '';
    const dShort = d ? d.slice(0, d.length > 10 ? 10 : 10) : '';
    if (meta) meta.innerHTML = `<b style="color:${col};font-variant-numeric:tabular-nums">$${fmt(p)}</b> <small style="color:var(--muted);font-weight:500">· ${esc(dShort)}</small>`;
    e.preventDefault();
  };
  const reset = () => {
    cross.style.display = 'none';
    dot.style.display = 'none';
    if (meta) meta.innerHTML = metaDefault;
  };
  svg.addEventListener('mousemove', handle);
  svg.addEventListener('mouseleave', reset);
  svg.addEventListener('touchstart', handle, { passive: false });
  svg.addEventListener('touchmove', handle, { passive: false });
  svg.addEventListener('touchend', reset);
}

async function refreshNews(){
  if (!allHoldingsInPf().length) return;
  const btn = $("#news-btn");
  if (btn) { btn.disabled = true; btn.innerHTML = `<span class="spin"></span> ${t().news_refreshing}`; }
  const tickers = [...new Set(allHoldingsInPf().map(h => h.ticker))];
  const today_d = new Date().toISOString().slice(0,10);
  const from = new Date(Date.now() - 14*86400000).toISOString().slice(0,10);
  const all = [];
  let lastErr = null;
  await Promise.all(tickers.map(async tic => {
    try {
      const url = `${FINNHUB}/company-news?symbol=${encodeURIComponent(tic)}&from=${from}&to=${today_d}&token=${FINNHUB_KEY}`;
      const r = await fetch(url);
      if (!r.ok) { lastErr = new Error("HTTP "+r.status); return; }
      const items = await r.json();
      if (!Array.isArray(items)) return;
      items.sort((a,b) => (b.datetime||0) - (a.datetime||0));
      items.slice(0, 4).forEach(n => {
        if (!n.headline) return;
        all.push({
          id: uid(),
          ticker: tic,
          title: n.headline,
          summary: n.summary || "",
          source: n.source || "",
          url: n.url || "",
          ts: n.datetime || 0,
          time: n.datetime ? timeAgo(n.datetime * 1000) : ""
        });
      });
    } catch(e) { lastErr = e; }
  }));
  if (!all.length){
    toast((lang==='ar'?"خطأ: ":"Error: ") + (lastErr?.message || t().news_failed));
    if (btn) { btn.disabled = false; btn.innerHTML = `↻ ${t().news_refresh}`; }
    return;
  }
  const seen = new Set();
  const dedup = all.filter(n => { const k = n.title.toLowerCase(); if (seen.has(k)) return false; seen.add(k); return true; });
  dedup.sort((a,b) => (b.ts||0) - (a.ts||0));
  news = dedup.slice(0, 40);
  settings.lastNewsRefresh = new Date().toLocaleTimeString(lang==='ar'?'ar-SA':'en-US',{hour:'2-digit',minute:'2-digit'});
  save();
  render();
  if (lang === 'ar') translateNewsToArabic();
}

/* translate news to Arabic via MyMemory (free, CORS-enabled) */
async function translateNewsToArabic(){
  for (const n of news) {
    if (n.titleAr && (n.summaryAr || !n.summary)) continue;
    try {
      if (!n.titleAr && n.title) {
        const r = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(n.title)}&langpair=en|ar`);
        if (r.ok) {
          const d = await r.json();
          const out = d?.responseData?.translatedText;
          if (out && !out.includes("MYMEMORY")) n.titleAr = out;
        }
      }
      if (!n.summaryAr && n.summary) {
        const short = n.summary.slice(0, 400);
        const r = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(short)}&langpair=en|ar`);
        if (r.ok) {
          const d = await r.json();
          const out = d?.responseData?.translatedText;
          if (out && !out.includes("MYMEMORY")) n.summaryAr = out;
        }
      }
    } catch(e){}
  }
  save();
  if (activeTab === 'news') renderTab();
}

function convCur(usdAmount){

function fmtMoney(usdAmount, decimals){

}

/* try direct fetch, then two CORS proxies */
async function tryFetch(url){
  const attempts = [
    url,
    "https://corsproxy.io/?url=" + encodeURIComponent(url),
    "https://api.allorigins.win/raw?url=" + encodeURIComponent(url),
  ];
  let lastErr;
  for (const u of attempts) {
    try {
      const r = await fetch(u);
      if (!r.ok) { lastErr = new Error("HTTP " + r.status); continue; }
      return await r.json();
    } catch(e) { lastErr = e; }
  }
  throw lastErr || new Error("network failed");
}

function timeAgo(ms){
  const sec = (Date.now() - ms) / 1000;
  if (sec < 60) return lang==='ar' ? "الآن" : "now";
  const min = sec / 60;
  if (min < 60) return Math.floor(min) + (lang==='ar' ? " د" : "m");
  const hr = min / 60;
  if (hr < 24) return Math.floor(hr) + (lang==='ar' ? " س" : "h");
  const day = hr / 24;
  if (day < 30) return Math.floor(day) + (lang==='ar' ? " ي" : "d");
  return new Date(ms).toLocaleDateString(lang==='ar'?'ar-SA':'en-US',{month:'short',day:'numeric'});
}

      <button class="btn" style="background:${accentBg};border-color:${accent};color:${accent};font-weight:700" onclick="saveTrade('${h.id}','${type}')">${isBuy?(lang==='ar'?'تأكيد الشراء':'Confirm Buy'):(lang==='ar'?'تأكيد البيع':'Confirm Sell')}</button>
    </div>
  `);
  setTimeout(()=>$("#tr_q")?.focus(),60);
}

function saveTrade(holdId, type){
  const h = holdings.find(x => x.id === holdId);
  if (!h) return;
  const qty = parseFloat($("#tr_q").value);
  const price = parseFloat($("#tr_p").value);
  const date = $("#tr_d").value || today();
  if (isNaN(qty) || qty <= 0 || isNaN(price) || price < 0){
    $("#tr_err").textContent = lang==='ar'?'تأكّد من الكمية والسعر':'Check quantity and price';
    return;
  }
  const curShares = statsFor(h).shares;
  if (type === 'sell' && qty > curShares){
    $("#tr_err").textContent = lang==='ar'?`الكمية أكبر من عندك (${fmt(curShares,curShares%1?4:0)})`:`Quantity exceeds holdings (${fmt(curShares,curShares%1?4:0)})`;
    return;
  }
  if (!Array.isArray(h.transactions)) h.transactions = [];
  h.transactions.push({ id: uid(), type, qty, price, date, ts: new Date(date).getTime() });
  cloudUpsertHolding(h);
  // check if sold everything
  const after = statsFor(h);
  if (type === 'sell' && after.shares <= 0.0000001){
    save();
    modal(`<h2>${lang==='ar'?'بعت كل الكمية':'Sold all shares'}</h2>
      <p class="sub">${lang==='ar'?`الربح المحقّق التراكمي: ${after.realized>=0?'+':''}$${fmt(Math.abs(after.realized),2)}. تبي تشيل ${esc(h.ticker)} من المحفظة؟ (السجل ينحفظ لو تشيله)`:`Realized total: ${after.realized>=0?'+':''}$${fmt(Math.abs(after.realized),2)}. Remove ${esc(h.ticker)} from portfolio?`}</p>
      <div class="m-actions">
        <button class="btn" onclick="closeModal();render();">${lang==='ar'?'احتفظ به':'Keep it'}</button>
        <button class="btn danger" onclick="doDel('${h.id}')">${lang==='ar'?'احذفه':'Remove'}</button>
      </div>`);
    return;
  }
  save();
  closeModal();
  openDetail(h.id);
}

function saveEditTx(holdId, txId){
  const h = holdings.find(x => x.id === holdId);
  if (!h) return;
  const tx = h.transactions.find(t => t.id === txId);
  if (!tx) return;
  const qty = parseFloat($("#et_q").value);

  const date = $("#et_d").value || tx.date || today();

/* ── Option expiry status + close handlers ── */
function optionExpiryStatus(h){
  if (!h.type || h.type === 'stock' || !h.expiry) return null;
  const s = statsFor(h);
  if (s.shares <= 0) return null;
  const exp = new Date(h.expiry);
  const now = new Date();
  const days = Math.ceil((exp - now) / 86400000);
  if (days < 0) return { kind:'over', days };
  if (days <= 7) return { kind:'warn', days };
  return null;
}
function expireWorthless(holdId){
  const h = holdings.find(x => x.id === holdId);
  if (!h) return;
  const s = statsFor(h);
  if (s.shares <= 0) return;
  h.transactions.push({
    id: uid(), type:'sell', qty: s.shares, price: 0,
    date: h.expiry || today(), ts: new Date(h.expiry || today()).getTime(),
    note: 'expired'
  });
  cloudUpsertHolding(h);
  save();
  toast(lang==='ar'?'تم التسجيل: انتهى بصفر':'Marked as expired worthless');
  openDetail(holdId);
}

function doCashTx(type){
  const amount = parseFloat($("#ch_a").value);
  if (!isFinite(amount) || amount <= 0){ $("#ch_err").textContent = lang==='ar'?'مبلغ غير صحيح':'invalid'; return; }
  const date = $("#ch_d").value || today();
  const note = $("#ch_n").value.trim();
  if (type === 'withdraw' && amount > settings.cash){
    $("#ch_err").textContent = lang==='ar'?`الرصيد $${fmt(settings.cash)} فقط`:`Balance is only $${fmt(settings.cash)}`;
    return;
  }
  settings.cashHistory.push({ id: uid(), type, amount, date, note, ts: Date.now() });
  settings.cash += (type === 'deposit' ? amount : -amount);
  cloudSaveSettings();
  save();
  closeModal();
  openSettings();
}
function delCashTx(id){
  const tx = settings.cashHistory.find(x => x.id === id);
  if (!tx) return;
  settings.cash -= (tx.type === 'deposit' ? tx.amount : -tx.amount);
  settings.cashHistory = settings.cashHistory.filter(x => x.id !== id);
  cloudSaveSettings();
  save();
  openSettings();
}

/* ── Watchlist + portfolio: target/stop alerts ── */
function targetAlertsCount(){
  let n = 0;
  holdings.filter(h => h.pfId === settings.activePf).forEach(h => {
    if (h.price == null) return;
    if (h.target && h.price >= h.target) n++;
    if (h.stopLoss && h.price <= h.stopLoss) n++;
  });
  watchlist.filter(w => w.pfId === settings.activePf).forEach(w => {
    if (w.price == null) return;
    if (w.target && w.price >= w.target) n++;
    if (w.stop && w.price <= w.stop) n++;
  });
  return n;
}

/* ── Insider trades via Finnhub ── */
async function loadInsiderTrades(holdId, ticker){
  const box = $("#ins-box-"+holdId);
  if (!box) return;
  try {
    const r = await fetch(`${FINNHUB}/stock/insider-transactions?symbol=${encodeURIComponent(ticker)}&token=${FINNHUB_KEY}`);
    if (!r.ok) throw new Error("HTTP "+r.status);
    const data = await r.json();
    const items = (data?.data || []).slice(0, 10);
    if (!items.length){ box.innerHTML = `<div style="padding:11px;text-align:center;color:var(--muted2);font-size:12px">${lang==='ar'?'لا توجد صفقات مطّلعين حديثة':'No recent insider activity'}</div>`; return; }
    box.innerHTML = `<div class="ins-list">${items.map(it => {
      const isBuy = (it.change || 0) > 0;
      return `<div class="ins-row">
        <span class="act ${isBuy?'buy':'sell'}">${isBuy?'BUY':'SELL'}</span>
        <span class="nm">${esc((it.name||'').slice(0,30))}</span>
        <span class="qty">${Math.abs(it.change||0).toLocaleString()}</span>
        <span class="dt">${esc((it.transactionDate||'').slice(0,10))}</span>
      </div>`;
    }).join("")}</div>`;
  } catch(e){
    box.innerHTML = `<div style="padding:11px;text-align:center;color:var(--muted2);font-size:12px">—</div>`;
  }
}

/* ── Earnings calendar via Finnhub ── */
async function loadStockEarnings(holdId, ticker){
  const box = $("#earn-box-"+holdId);
  if (!box) return;
  try {
    const to = new Date(Date.now() + 90*86400000).toISOString().slice(0,10);
    const from = new Date().toISOString().slice(0,10);
    const r = await fetch(`${FINNHUB}/calendar/earnings?from=${from}&to=${to}&symbol=${encodeURIComponent(ticker)}&token=${FINNHUB_KEY}`);
    if (!r.ok) throw new Error("HTTP "+r.status);
    const data = await r.json();
    const items = (data?.earningsCalendar || []);
    if (!items.length){ box.style.display = 'none'; return; }
    const next = items[0];
    const days = Math.ceil((new Date(next.date) - new Date()) / 86400000);
    box.innerHTML = `<div class="head">${lang==='ar'?'الأرباح القادمة':'Upcoming Earnings'}</div>
      <div class="when">${esc(next.date)} ${days>0?`<span style="color:var(--muted);font-size:11px;font-weight:500">· ${lang==='ar'?'بعد':'in'} ${days} ${lang==='ar'?'يوم':'days'}</span>`:''}</div>
      ${next.epsEstimate!=null?`<div class="est">${lang==='ar'?'EPS متوقع':'EPS estimate'}: $${fmt(next.epsEstimate,2)}</div>`:''}`;
  } catch(e){
    box.style.display = 'none';
  }
}

function doChallengeSell(chId, tradeId){
  const c = challenges.find(x => x.id === chId);
  if (!c) return;
  const tr = c.trades.find(t => t.id === tradeId);
  if (!tr) return;
  const price = parseFloat($("#cs_p").value);
  const date = $("#cs_d").value || today();
  if (!isFinite(price) || price <= 0){
    $("#cs_err").textContent = lang==='ar'?'تأكّد من السعر':'Check price'; return;
  }
  tr.sellDate = date;
  tr.sellPrice = price;
  // assume bought whole balance: shares = invested / buyPrice, sold = shares * sellPrice
  const shares = tr.invested / tr.buyPrice;
  tr.sold = shares * price;
  tr.returnPct = (tr.sold - tr.invested) / tr.invested * 100;
  c.currentBalance = tr.sold;
  // achievement check: target hit?
  const pct = (c.currentBalance - c.startCapital) / c.startCapital * 100;
  if (pct >= c.targetPct){
    grantAchievement('challenge_win');
  }
  cloudUpsertChallenge(c);
  save();
  openChallengePage();
}

function grantAchievement(id){
  if (!settings.achievements) settings.achievements = [];
  if (settings.achievements.includes(id)) return;
  settings.achievements.push(id);
  cloudSaveSettings();
  save();

function showAchievementPopup(id){

function checkAchievements(){
  if (!settings.achievements) settings.achievements = [];
  const hs = holdings.filter(h => h.pfId === settings.activePf);
  if (hs.length >= 1) grantAchievement('first_stock');
  const allTx = hs.flatMap(h => h.transactions || []);
  const buys = allTx.filter(t => t.type === 'buy');
  const sells = allTx.filter(t => t.type === 'sell');
  if (buys.length >= 1) grantAchievement('first_buy');
  if (sells.length >= 1) grantAchievement('first_sell');
  if (allTx.length >= 10) grantAchievement('ten_trades');
  if (hs.length >= 5) grantAchievement('five_stocks');
  if (hs.some(h => h.type && h.type !== 'stock')) grantAchievement('options');
  if (hs.some(h => (h.dividends||[]).length > 0)) grantAchievement('dividend');
  if (hs.some(h => { const s = statsFor(h); return s.realized > 0; })) grantAchievement('first_win');
  if (hs.some(h => { const s = statsFor(h); return s.plPct > 25 || (s.deposited>0 && (s.realized/s.deposited)*100 > 25); })) grantAchievement('big_win');
  const uniqueTags = new Set();
  hs.forEach(h => (h.tags||[]).forEach(tg => uniqueTags.add(tg)));
  if (uniqueTags.size >= 3) grantAchievement('diversified');
  if (hs.some(h => h.purchaseDate && (Date.now() - new Date(h.purchaseDate).getTime()) > 180*86400000)) grantAchievement('patient');
}

/* ── Weekly summary ── */
function weeklySummary(){
  const hist = history.filter(h => h.pfId === settings.activePf);
  if (hist.length < 2) return null;
  const now = Date.now();
  const week_ago = now - 7*86400000;
  const past = hist.filter(h => new Date(h.date).getTime() <= week_ago).slice(-1)[0];
  const cur = hist[hist.length-1];
  if (!past || !cur) return null;
  const change = cur.value - past.value;
  const pct = past.value > 0 ? change/past.value*100 : 0;
  // best/worst holding this week (based on day change roughly)
  const hs = activeHoldings().map(h => ({ h, s: statsFor(h) }));
  hs.sort((a,b) => (b.s.todayPct||0) - (a.s.todayPct||0));
  const best = hs[0]?.h.ticker;
  const worst = hs[hs.length-1]?.h.ticker;
  return { change, pct, best, worst };
}

function exportData(){
  const blob = {
    v: 6, exported: new Date().toISOString(),
    profile, settings, portfolios, holdings, news, history, watchlist, challenges,
  };
  const json = JSON.stringify(blob, null, 2);
  const dataUri = 'data:application/json;charset=utf-8,' + encodeURIComponent(json);
  const a = document.createElement('a');
  a.href = dataUri;
  a.download = `portfolio-backup-${today()}.json`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  toast(lang==='ar'?'تم التحميل':'Downloaded');
}
function importData(){
  const inp = document.createElement('input');
  inp.type = 'file';
  inp.accept = 'application/json,.json';
  inp.onchange = e => {
    const f = e.target.files[0];
    if (!f) return;
    const r = new FileReader();
    r.onload = async ev => {
      try {
        const b = JSON.parse(ev.target.result);
        if (!b.portfolios || !b.holdings){ toast(lang==='ar'?'ملف غير صالح':'Invalid file'); return; }
        profile = b.profile || profile;
        settings = { ...settings, ...(b.settings || {}) };
        portfolios = b.portfolios || [];
        holdings = b.holdings || [];
        news = b.news || [];
        history = b.history || [];
        watchlist = b.watchlist || [];
        challenges = b.challenges || [];
        await save();
        toast(lang==='ar'?'تم الاستيراد':'Imported');
        render();
      } catch(err){ toast((lang==='ar'?'خطأ: ':'Error: ') + err.message); }
    };
    r.readAsText(f);
  };
  inp.click();
}

const _origLiveSearch = liveSearch;
liveSearch = function(inpId, boxId){
  // backward-compat: no args → old behavior on f_tic/sg-box
  const ti = inpId || 'f_tic';
  const bx = boxId || 'sg-box';
  clearTimeout(searchTimer);
  searchTimer = setTimeout(async () => {
    const inp = document.getElementById(ti);
    const box = document.getElementById(bx);
    if (!inp || !box) return;
    const q = inp.value.trim();
    if (!q) { box.innerHTML = ""; return; }
    box.innerHTML = `<div class="suggest"><div class="sg-loading"><span class="spin"></span> ${t().search_loading}</div></div>`;
    try {
      const results = await finnhubSearch(q);
      if (inp.value.trim() !== q) return;
      if (!results.length) { box.innerHTML = `<div class="suggest"><div class="sg-loading">${t().no_match}</div></div>`; return; }
      box.innerHTML = `<div class="suggest">${results.map(r => {
        const nm = (r.d || '').replace(/'/g,"&#39;").replace(/"/g,"&quot;");
        return `<div class="sg-item" onclick="(()=>{document.getElementById('${ti}').value='${esc(r.s)}';document.getElementById('${ti}').dataset.name='${esc(nm)}';document.getElementById('${bx}').innerHTML='';})()">
          <span class="tic">${esc(r.s)}</span>
          <span class="nm">${esc(r.d || '')}</span>
        </div>`;
      }).join("")}</div>`;
    } catch(e) {
      if (inp.value.trim() === q) box.innerHTML = `<div class="suggest"><div class="sg-loading">${esc(e.message||t().no_match)}</div></div>`;
    }
  }, 380);
};

let pfChartOpen = false;
let pfChartRange = '1m';
function togglePfChart(){

function setPfChartRange(r){
  pfChartRange = r;

}
function drawPfMiniChart(){
  const svg = document.getElementById('pf-mini-svg');
  if (!svg) return;
  const hist = history.filter(h => h.pfId === settings.activePf)
    .sort((a,b) => new Date(a.date) - new Date(b.date));
  if (hist.length < 2){
    svg.parentElement.innerHTML = `<div style="text-align:center;color:var(--muted2);font-size:11.5px;padding:30px 10px">${lang==='ar'?'مافي بيانات كافية بعد. سجّل عمليات وارجع بعد كم يوم.':'Not enough history yet. Make some trades and check back.'}</div>`;
    return;
  }
  const now = Date.now();
  const ranges = { '1w':7, '1m':30, '3m':90, '6m':180, '1y':365, 'all':null };
  const cutoff = ranges[pfChartRange] ? now - ranges[pfChartRange] * 86400000 : 0;
  const data = hist.filter(h => new Date(h.date).getTime() >= cutoff);
  if (data.length < 2){
    svg.parentElement.innerHTML = `<div style="text-align:center;color:var(--muted2);font-size:11.5px;padding:30px 10px">${lang==='ar'?'لا توجد بيانات لهذه الفترة':'No data for this range'}</div>`;
    return;
  }
  const values = data.map(d => d.value);
  const min = Math.min(...values), max = Math.max(...values), range = max - min || 1;
  const W = 600, H = 120, PAD = 6;
  const xs = values.map((_,i) => PAD + (i/(values.length-1))*(W-2*PAD));
  const ys = values.map(v => PAD + (1-(v-min)/range)*(H-2*PAD));
  const pts = values.map((_,i) => `${xs[i]},${ys[i]}`).join(' ');
  const first = values[0], last = values[values.length-1];
  const chg = last - first;
  const chgPct = first > 0 ? chg/first*100 : 0;
  const up = chg >= 0;
  const col = up ? '#5FE9B0' : '#F26B6E';
  svg.innerHTML = `
    <defs><linearGradient id="pfgrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="${col}" stop-opacity="0.3"/>
      <stop offset="1" stop-color="${col}" stop-opacity="0"/>
    </linearGradient></defs>
    <polygon points="${PAD},${H-PAD} ${pts} ${W-PAD},${H-PAD}" fill="url(#pfgrad)"/>
    <polyline points="${pts}" fill="none" stroke="${col}" stroke-width="1.8"/>
    <line id="pfx" x1="0" y1="0" x2="0" y2="${H}" stroke="rgba(255,255,255,.25)" stroke-width="0.6" style="display:none"/>
    <circle id="pfdot" r="3.5" fill="${col}" stroke="#000" stroke-width="1.4" style="display:none"/>
  `;
  const head = document.getElementById('pf-mini-head-v');
  if (head) head.innerHTML = `<span class="v ${up?'up':'down'}">${up?'+':''}${fmtMoney(Math.abs(chg))} · ${up?'+':''}${fmt(chgPct,1)}%</span>`;
  const headTtl = document.getElementById('pf-mini-head-t');
  if (headTtl) headTtl.textContent = (lang==='ar'?'تغيّر القيمة':'Value change');
  const cross = svg.querySelector('#pfx');
  const dot = svg.querySelector('#pfdot');
  const handle = (e) => {
    const t = e.touches ? e.touches[0] : e;
    if (!t) return;
    const rect = svg.getBoundingClientRect();
    const x = (t.clientX - rect.left) / rect.width * W;
    let idx = Math.round((x - PAD) / (W - 2*PAD) * (values.length - 1));
    idx = Math.max(0, Math.min(values.length-1, idx));
    cross.setAttribute('x1', xs[idx]); cross.setAttribute('x2', xs[idx]); cross.style.display='block';
    dot.setAttribute('cx', xs[idx]); dot.setAttribute('cy', ys[idx]); dot.style.display='block';
    if (head) head.innerHTML = `<span class="v" style="color:${col};font-variant-numeric:tabular-nums">${fmtMoney(values[idx])}</span>`;
    if (headTtl) headTtl.textContent = data[idx].date;
    e.preventDefault();
  };
  const reset = () => {
    cross.style.display='none'; dot.style.display='none';
    if (head) head.innerHTML = `<span class="v ${up?'up':'down'}">${up?'+':''}${fmtMoney(Math.abs(chg))} · ${up?'+':''}${fmt(chgPct,1)}%</span>`;
    if (headTtl) headTtl.textContent = (lang==='ar'?'تغيّر القيمة':'Value change');
  };
  svg.addEventListener('mousemove', handle);
  svg.addEventListener('mouseleave', reset);
  svg.addEventListener('touchstart', handle, { passive:false });
  svg.addEventListener('touchmove', handle, { passive:false });
  svg.addEventListener('touchend', reset);
}

/* ── Performance summary ── */
let perfPeriod = '1m';
function openPerfSummary(){
  renderPerfSummary();
}
function setPerfPeriod(p){
  perfPeriod = p;
  renderPerfSummary();
}
function calcPerfStats(periodKey){
  const hist = history.filter(h => h.pfId === settings.activePf)
    .sort((a,b) => new Date(a.date) - new Date(b.date));
  const ranges = { '1w':7, '1m':30, '3m':90, '6m':180, '1y':365, 'all':null };
  const cutoff = ranges[periodKey] ? Date.now() - ranges[periodKey]*86400000 : 0;
  const data = hist.filter(h => new Date(h.date).getTime() >= cutoff);
  const allHs = activeHoldings();
  const allTx = [];
  allHs.forEach(h => (h.transactions||[]).forEach(tx => allTx.push({...tx, holdId:h.id, ticker:h.ticker, isOpt: h.type && h.type !== 'stock'})));
  const txInRange = allTx.filter(tx => tx.ts >= cutoff);

  // realized P&L in period (matching sells against running avg from earlier txs)
  let realizedInRange = 0;
  const byHold = {};
  allTx.forEach(tx => (byHold[tx.holdId] = byHold[tx.holdId] || []).push(tx));
  Object.values(byHold).forEach(txs => {
    txs.sort((a,b) => (a.ts||0)-(b.ts||0));
    let shares = 0, cost = 0;
    txs.forEach(tx => {
      const mult = tx.isOpt ? 100 : 1;
      if (tx.type === 'buy'){ cost += tx.qty * tx.price * mult; shares += tx.qty; }
      else {
        const avg = shares > 0 ? cost/shares : 0;
        const r = (tx.price - avg/mult) * tx.qty * mult;
        if (tx.ts >= cutoff) realizedInRange += r;
        cost = Math.max(0, cost - avg*tx.qty);
        shares = Math.max(0, shares - tx.qty);
      }
    });
  });
  const buysInRange = txInRange.filter(t => t.type === 'buy').length;
  const sellsInRange = txInRange.filter(t => t.type === 'sell').length;
  let wins = 0, losses = 0;
  Object.values(byHold).forEach(txs => {
    txs.sort((a,b) => (a.ts||0)-(b.ts||0));
    let shares = 0, cost = 0;
    txs.forEach(tx => {
      const mult = tx.isOpt ? 100 : 1;
      if (tx.type === 'buy'){ cost += tx.qty * tx.price * mult; shares += tx.qty; }
      else {
        const avg = shares > 0 ? cost/shares : 0;
        const r = (tx.price - avg/mult) * tx.qty * mult;
        if (tx.ts >= cutoff){
          if (r > 0) wins++; else if (r < 0) losses++;
        }
        cost = Math.max(0, cost - avg*tx.qty);
        shares = Math.max(0, shares - tx.qty);
      }
    });
  });
  const winRate = (wins+losses) > 0 ? wins/(wins+losses)*100 : null;

  // value change
  let valueChange = null, valueChangePct = null;
  if (data.length >= 2){
    const first = data[0].value, last = data[data.length-1].value;
    valueChange = last - first;
    valueChangePct = first > 0 ? valueChange/first*100 : 0;
  }

  // best/worst holding (by today's plPct)
  const hStats = allHs.map(h => ({ h, s: statsFor(h) }))
    .filter(x => x.s.shares > 0)
    .sort((a,b) => (b.s.plPct||0) - (a.s.plPct||0));
  const best = hStats[0]?.h;
  const worst = hStats[hStats.length-1]?.h;

  return {
    valueChange, valueChangePct,
    realizedInRange, buysInRange, sellsInRange,
    wins, losses, winRate,
    best, worst,
    bestStats: hStats[0]?.s, worstStats: hStats[hStats.length-1]?.s,
  };
}

  const periods = [

/* ── PNG export helpers ── */
async function captureToPNG(node, filename){
  if (!window.html2canvas){
    toast(lang==='ar'?'مكتبة الصور لم تحمّل':'Image library not loaded');
    return;
  }
  try {
    const canvas = await window.html2canvas(node, { backgroundColor:'#0A0A0A', scale: 2, logging:false, useCORS:true });
    const dataUrl = canvas.toDataURL('image/png');
    const a = document.createElement('a');
    a.href = dataUrl;
    a.download = filename;
    document.body.appendChild(a); a.click(); a.remove();
    toast(lang==='ar'?'تم التحميل':'Downloaded');
  } catch(e){
    toast((lang==='ar'?'خطأ: ':'Error: ') + e.message);
  }
}

/* ── Analyst recommendations (Polygon.io) ── */
const analystCache = {};
async function fetchAnalystData(ticker){
  const cached = analystCache[ticker];
  if (cached && Date.now() - cached.fetched < 6*3600000) return cached.data;
  try {
    // Polygon free tier: ticker details + last close from snapshot
    const [detailsRes, snapshotRes] = await Promise.all([
      fetch(`${POLYGON}/v3/reference/tickers/${ticker}?apiKey=${POLYGON_KEY}`),
      fetch(`${POLYGON}/v2/snapshot/locale/us/markets/stocks/tickers/${ticker}?apiKey=${POLYGON_KEY}`),
    ]);
    const details = detailsRes.ok ? await detailsRes.json() : null;
    const snapshot = snapshotRes.ok ? await snapshotRes.json() : null;
    const result = {
      name: details?.results?.name || ticker,
      price: snapshot?.ticker?.day?.c || snapshot?.ticker?.lastTrade?.p || null,
      changePct: snapshot?.ticker?.todaysChangePerc || null,
      marketCap: details?.results?.market_cap || null,
    };
    // Fetch Finnhub recommendation trends (compatible aggregate)
    try {
      const recRes = await fetch(`${FINNHUB}/stock/recommendation?symbol=${ticker}&token=${FINNHUB_KEY}`);
      if (recRes.ok){
        const recData = await recRes.json();
        if (Array.isArray(recData) && recData.length > 0){
          result.recommendation = recData[0];
        }
      }
    } catch(e){}
    // Fetch price target from Finnhub
    try {
      const tgtRes = await fetch(`${FINNHUB}/stock/price-target?symbol=${ticker}&token=${FINNHUB_KEY}`);
      if (tgtRes.ok){
        const tgtData = await tgtRes.json();
        result.target = {
          high: tgtData.targetHigh, low: tgtData.targetLow,
          mean: tgtData.targetMean, median: tgtData.targetMedian,
          analysts: tgtData.numberOfAnalysts,
          updated: tgtData.lastUpdated,
        };
      }
    } catch(e){}
    analystCache[ticker] = { data: result, fetched: Date.now() };
    return result;
  } catch(e){
    return null;
  }
}

/* ── Heatmap monthly performance ── */
function buildHeatmap(){
  const hist = history.filter(h => h.pfId === settings.activePf);
  if (hist.length < 2) return null;
  // group by year-month, take last value of month
  const byMonth = {};
  hist.forEach(h => {
    const key = h.date.slice(0,7); // YYYY-MM
    if (!byMonth[key] || new Date(h.date) > new Date(byMonth[key].date)){
      byMonth[key] = h;
    }
  });
  const sorted = Object.entries(byMonth).sort((a,b) => a[0].localeCompare(b[0]));
  if (sorted.length < 2) return null;
  // compute monthly % change from first record's value
  const results = [];
  for (let i = 1; i < sorted.length; i++){
    const prev = sorted[i-1][1].value;
    const cur = sorted[i][1].value;
    const pct = prev > 0 ? (cur - prev) / prev * 100 : 0;
    results.push({ ym: sorted[i][0], pct });
  }
  // group by year
  const years = {};
  results.forEach(r => {
    const [y, m] = r.ym.split('-');
    if (!years[y]) years[y] = {};
    years[y][parseInt(m)] = r.pct;
  });
  return years;
}
function renderHeatmapHTML(){
  const data = buildHeatmap();
  if (!data) return '';
  const months = ['J','F','M','A','M','J','J','A','S','O','N','D'];
  const monthsAr = ['ي','ف','م','أ','م','ي','ي','أ','س','أ','ن','د'];
  const ml = lang === 'ar' ? monthsAr : months;
  const yrs = Object.keys(data).sort();
  return `<div class="heat-wrap">
    <div class="heat-title">${lang==='ar'?'الأداء الشهري':'Monthly Performance'}</div>
    <div class="heat-grid">
      <div></div>
      ${ml.map(m => `<div class="heat-month-label">${m}</div>`).join('')}
      ${yrs.map(y => `
        <div class="heat-yr-label">${y.slice(2)}</div>
        ${ml.map((_, i) => {
          const pct = data[y][i+1];
          if (pct == null) return `<div class="heat-cell" style="background:#0A0A0A;border-color:#101010"></div>`;
          const up = pct >= 0;
          const intensity = Math.min(1, Math.abs(pct) / 15);
          const bg = up
            ? `rgba(95,233,176,${0.1 + intensity * 0.5})`
            : `rgba(242,107,110,${0.1 + intensity * 0.5})`;
          const bd = up ? 'var(--accent-d)' : 'var(--loss-d)';
          const fg = up ? '#5FE9B0' : '#F26B6E';
          return `<div class="heat-cell" style="background:${bg};border-color:${bd};color:${fg}" title="${y}/${i+1}: ${pct>=0?'+':''}${fmt(pct,1)}%">${pct>=0?'+':''}${fmt(pct,0)}</div>`;
        }).join('')}
      `).join('')}
    </div>
    <div class="heat-legend">
      <span>${lang==='ar'?'أقل':'Lower'}</span>
      <div class="b" style="background:rgba(242,107,110,.55);border-color:var(--loss-d)"></div>
      <div class="b" style="background:rgba(242,107,110,.25);border-color:var(--loss-d)"></div>
      <div class="b" style="background:#0A0A0A;border-color:#101010"></div>
      <div class="b" style="background:rgba(95,233,176,.25);border-color:var(--accent-d)"></div>
      <div class="b" style="background:rgba(95,233,176,.55);border-color:var(--accent-d)"></div>
      <span>${lang==='ar'?'أعلى':'Higher'}</span>
    </div>
  </div>`;
}

async function maybeRunDailyBackup(){

  if (lastBackup === today) return;
  try {
    const snapshot = {

  } catch(e){

}

/* ── Pull to Refresh ── */
let _ptrStartY = 0;
let _ptrDelta = 0;
let _ptrActive = false;
let _ptrRefreshing = false;
const PTR_THRESHOLD = 70;

function installPullToRefresh(){
  const ind = document.createElement('div');
  ind.className = 'ptr-indicator';
  ind.id = 'ptr-ind';
  ind.innerHTML = `<div class="ptr-inner"><span class="ptr-arrow" id="ptr-arrow">↓</span><span id="ptr-txt">${lang==='ar'?'اسحب للتحديث':'Pull to refresh'}</span></div>`;
  document.body.appendChild(ind);

  document.body.addEventListener('touchstart', (e) => {
    if (window.scrollY > 0 || _ptrRefreshing) return;
    const open = document.querySelector('.modal-back');
    if (open) return;
    _ptrStartY = e.touches[0].clientY;
    _ptrActive = true;
    _ptrDelta = 0;
  }, { passive: true });

  document.body.addEventListener('touchmove', (e) => {
    if (!_ptrActive || _ptrRefreshing) return;
    const y = e.touches[0].clientY;
    _ptrDelta = y - _ptrStartY;
    if (_ptrDelta <= 0){
      ind.classList.remove('show');
      return;
    }
    if (_ptrDelta > 6) ind.classList.add('show');
    const arrow = document.getElementById('ptr-arrow');
    const txt = document.getElementById('ptr-txt');
    if (_ptrDelta >= PTR_THRESHOLD){
      arrow?.classList.add('up');
      if (txt) txt.textContent = lang==='ar' ? 'حرّر للتحديث' : 'Release to refresh';
    } else {
      arrow?.classList.remove('up');
      if (txt) txt.textContent = lang==='ar' ? 'اسحب للتحديث' : 'Pull to refresh';
    }
  }, { passive: true });

  document.body.addEventListener('touchend', async () => {
    if (!_ptrActive) return;
    _ptrActive = false;
    if (_ptrDelta >= PTR_THRESHOLD && !_ptrRefreshing){
      _ptrRefreshing = true;
      const arrow = document.getElementById('ptr-arrow');
      const txt = document.getElementById('ptr-txt');
      if (arrow) arrow.outerHTML = '<span class="ptr-spin" id="ptr-arrow"></span>';
      if (txt) txt.textContent = lang==='ar' ? 'جاري التحديث...' : 'Refreshing...';
      try {
        await triggerRefresh();
      } catch(e){}
      _ptrRefreshing = false;
      ind.classList.remove('show');
      setTimeout(()=>{
        const arr = document.getElementById('ptr-arrow');
        if (arr) arr.outerHTML = '<span class="ptr-arrow" id="ptr-arrow">↓</span>';
        const t = document.getElementById('ptr-txt');
        if (t) t.textContent = lang==='ar'?'اسحب للتحديث':'Pull to refresh';
      }, 200);
    } else {
      ind.classList.remove('show');
    }
    _ptrDelta = 0;
  }, { passive: true });
}

async function triggerRefresh(){
  if (activeTab === 'portfolio'){
    if (typeof refreshPrices === 'function') await refreshPrices();
    renderTab();
  } else if (activeTab === 'watch'){
    if (typeof refreshWatchlistPrices === 'function') await refreshWatchlistPrices();
    renderWatchlist();
  } else if (activeTab === 'analysts'){
    renderAnalysts();
  } else if (activeTab === 'news'){
    if (typeof renderNews === 'function') renderNews();
  } else if (activeTab === 'more'){
    renderMore();
  } else if (activeTab === 'community'){
    renderCommunity();
  }
  toast(lang==='ar' ? '✓ تم التحديث' : '✓ Refreshed');
}

/* ── Daily Brief ── */
function shouldShowDailyBrief(){
  if (!currentUser) return false;
  if (!portfolios.length || !holdings.length) return false;
  const key = 'lastBrief_' + currentUser.id;
  const last = localStorage.getItem(key);
  const today = new Date().toISOString().slice(0,10);
  return last !== today;
}
function markBriefSeen(){
  if (!currentUser) return;
  localStorage.setItem('lastBrief_' + currentUser.id, new Date().toISOString().slice(0,10));
}

function showDailyBrief(){
  if (!shouldShowDailyBrief()) return;
  // Need active portfolio with stocks
  const pf = portfolios.find(p => p.id === settings.activePf);
  if (!pf) return;
  const hs = activeHoldings();
  if (!hs.length) return;
  
  const ar = lang === 'ar';
  const now = new Date();
  const hour = now.getHours();
  const greeting = hour < 5 ? (ar?'مساء الخير':'Good evening')
                  : hour < 12 ? (ar?'صباح الخير':'Good morning')
                  : hour < 18 ? (ar?'مساء الخير':'Good afternoon')
                  : (ar?'مساء الخير':'Good evening');
  const dateStr = now.toLocaleDateString(ar?'ar-SA-u-ca-gregory':'en-US',{weekday:'long', month:'long', day:'numeric'});
  
  // Compute today's performance
  let todayPL = 0, todayPLPct = 0, totalMV = 0;
  hs.forEach(h => {
    const s = statsFor(h);
    totalMV += s.mv;
    if (s.today != null) todayPL += s.today;
  });
  if (totalMV > 0) todayPLPct = (todayPL / (totalMV - todayPL)) * 100;
  const up = todayPL >= 0;
  
  // Top 3 movers (by day change %)
  const movers = hs
    .map(h => ({ h, s: statsFor(h) }))
    .filter(x => x.s.todayPct != null && x.s.mv > 0)
    .sort((a,b) => Math.abs(b.s.todayPct) - Math.abs(a.s.todayPct))
    .slice(0, 5);
  
  modal(`
    <div class="brief-wrap">
      <div class="brief-greeting">${greeting} 👋</div>
      <div class="brief-h">${ar?'هذي محفظتك اليوم':'Your portfolio today'}</div>
      <div style="font-size:10px;color:var(--muted2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:14px;font-weight:700">${esc(dateStr)}</div>
      <div class="brief-pl ${up?'up':'down'}">${up?'+':''}${fmtMoney(Math.abs(todayPL))}</div>
      <div class="brief-pct">${up?'+':''}${fmt(todayPLPct,2)}% ${ar?'اليوم':'today'}</div>
      ${movers.length ? `
        <div class="brief-movers">
          <div class="brief-movers-h">${ar?'أكثر الأسهم تحرّكاً':'Top Movers'}</div>
          ${movers.map(m => {
            const sUp = m.s.todayPct >= 0;
            return `<div class="brief-mover">
              <span class="tic">${esc(m.h.ticker)}</span>
              <span class="val ${sUp?'up':'down'}">${sUp?'+':''}${fmt(m.s.todayPct,2)}%</span>
            </div>`;
          }).join('')}
        </div>
      ` : ''}
    </div>
    <div class="m-actions">
      <button class="btn primary" style="width:100%" onclick="markBriefSeen();closeModal()">${ar?'لنبدأ ←':'Let us go ←'}</button>
    </div>
  `);
}

  return [...new Set(matches.map(m => m.slice(1)))];
}

      user_id: currentUser.id,

async function toggleLike(postId, btn){
  if (!currentUser) return;
  const isLiked = btn.classList.contains('liked');
  const countEl = btn.querySelector('.count');
  const heartEl = btn.querySelector('.heart');
  const cur = parseInt(countEl.textContent) || 0;
  // Optimistic UI
  if (isLiked){
    btn.classList.remove('liked');
    heartEl.textContent = '♡';
    countEl.textContent = Math.max(0, cur - 1);
    await sb.from('community_likes').delete().eq('post_id', postId).eq('user_id', currentUser.id);
  } else {
    btn.classList.add('liked');
    heartEl.textContent = '♥';
    countEl.textContent = cur + 1;
    const { error } = await sb.from('community_likes').insert({ post_id: postId, user_id: currentUser.id });
    if (error){
      // Revert
      btn.classList.remove('liked');
      heartEl.textContent = '♡';
      countEl.textContent = cur;
      toast(lang==='ar'?'يتطلب اشتراك':'Subscription required');
    }
  }
}

        </div>
      ` : ''}
    `;
  } catch(e){
    list.innerHTML = `<div style="color:var(--muted2);font-size:11.5px;text-align:center;padding:6px">${lang==='ar'?'تعذّر التحميل':'Failed'}</div>`;
  }
}

async function submitComment(postId){
  const input = document.getElementById(`cc-${postId}`);
  if (!input || !currentUser) return;
  const content = input.value.trim();
  if (content.length < 1) return;
  try {
    const { error } = await sb.from('community_comments').insert({
      post_id: postId, user_id: currentUser.id, content,
    });
    if (error) throw error;
    input.value = '';
    // Refresh comments
    const post = document.getElementById(`post-${postId}`);
    if (post){
      post.classList.remove('expanded');
      toggleComments(postId);
    }
    // Update count on post (optimistic)
    const countEl = document.querySelector(`#post-${postId} .footer .act:nth-child(2) .count`);
    if (countEl){
      const cur = parseInt(countEl.textContent) || 0;
      countEl.textContent = cur + 1;
    }
  } catch(e){
    toast(lang==='ar'?'يتطلب اشتراك':'Subscription required');
  }
}

async function deletePost(postId){
  if (!confirm(lang==='ar'?'حذف هذا المنشور؟':'Delete this post?')) return;
  await sb.from('community_posts').delete().eq('id', postId);
  renderCommunity();
}

// In-flight assessment state
let assessState = null;

function getUserTemplate(){
  // returns custom template if exists, else default
  return (settings.checklistTemplate && Array.isArray(settings.checklistTemplate) && settings.checklistTemplate.length > 0)
    ? settings.checklistTemplate
    : DEFAULT_CRITERIA.map(c => ({ id:c.id, q: c.q[lang] || c.q.en, included: true }));
}

function saveUserTemplate(template){
  settings.checklistTemplate = template;
  save();
  cloudSaveSettings();
}

function recommendationFor(percentage){
  if (percentage >= 75) return { key:'strong', ar:'يُنصح بقوة بالشراء', en:'Strongly Recommended', emoji:'✅' };
  if (percentage >= 60) return { key:'caution', ar:'فرصة جيدة مع حذر', en:'Good with Caution', emoji:'🟡' };
  if (percentage >= 45) return { key:'caution', ar:'محايد - يحتاج دراسة', en:'Neutral - Needs Study', emoji:'⚖️' };
  return { key:'avoid', ar:'لا يُنصح بالشراء الآن', en:'Not Recommended', emoji:'❌' };
}

let _assessLookupTimer = null;
function assessLookup(){
  const tic = $("#as_t").value.trim();
  const nameEl = $("#as_name");
  const nextBtn = $("#as_next");
  clearTimeout(_assessLookupTimer);
  if (!tic){
    if (nameEl) nameEl.textContent = lang==='ar'?'اكتب رمز السهم':'Type a ticker symbol';
    if (nextBtn) nextBtn.disabled = true;
    return;
  }
  if (tic.length < 1){ return; }
  _assessLookupTimer = setTimeout(async () => {
    if (nameEl) nameEl.textContent = lang==='ar'?'يبحث...':'Looking up...';
    try {
      const r = await fetch(`${FINNHUB}/stock/profile2?symbol=${tic}&token=${FINNHUB_KEY}`);
      const data = r.ok ? await r.json() : null;
      if (data && data.name){
        if (assessState){
          assessState.ticker = tic;
          assessState.companyName = data.name;
          assessState.logo = data.logo || '';
        }
        if (nameEl) nameEl.innerHTML = `<b style="color:var(--accent)">${esc(data.name)}</b>${data.finnhubIndustry?` · <span style="color:var(--muted)">${esc(data.finnhubIndustry)}</span>`:''}`;
        if (nextBtn) nextBtn.disabled = false;
      } else {
        if (assessState){ assessState.ticker = tic; assessState.companyName = tic; assessState.logo = ''; }
        if (nameEl) nameEl.innerHTML = `<span style="color:var(--gold)">${lang==='ar'?'سهم غير معروف - يمكنك المتابعة':'Unknown ticker - you can still proceed'}</span>`;
        if (nextBtn) nextBtn.disabled = false;
      }
    } catch(e){
      if (assessState){ assessState.ticker = tic; assessState.companyName = tic; assessState.logo = ''; }
      if (nextBtn) nextBtn.disabled = false;
    }
  }, 450);
}

/* ── STAGE 2: Customize criteria ── */
function assessmentToStage2(){
  if (!assessState) return;
  renderAssessmentStage2();
}

function renderAssessmentStage2(){
  const ar = lang === 'ar';
  modal(`
    <h2>📋 ${esc(assessState.ticker)}</h2>
    <div class="assess-step-h"><span class="dot"></span><span>${ar?'الخطوة ٢ من ٣ · تخصيص المعايير':'Step 2 of 3 · Customize criteria'}</span></div>
    <p class="sub" style="margin-bottom:10px">${ar?'اختر المعايير التي تهمك، عدّلها، أو أضف معايير خاصة بك':'Choose criteria you care about, edit them, or add your own'}</p>

    <div class="assess-crit-list" id="as-crit-list">
      ${assessState.criteria.map((cr, i) => `
        <div class="assess-crit-row ${cr.included?'included':''}">
          <div class="check ${cr.included?'on':''}" onclick="toggleCrit(${i})"></div>
          <div class="txt" onclick="toggleCrit(${i})">${esc(cr.q)}</div>
          <div class="actions">

          </div>
        </div>
      `).join('')}
      <div class="assess-add-crit">
        <input id="as_new_crit" placeholder="${ar?'أضف معيار جديد...':'Add new criterion...'}" maxlength="160">
        <button onclick="addNewCrit()">+</button>
      </div>
    </div>

    <div style="margin-top:10px;font-size:11.5px;color:var(--muted);text-align:center">
      ${ar?`<b style="color:var(--accent)">${assessState.criteria.filter(c=>c.included).length}</b> معيار محدد من <b>${assessState.criteria.length}</b>`:`<b style="color:var(--accent)">${assessState.criteria.filter(c=>c.included).length}</b> of <b>${assessState.criteria.length}</b> selected`}
    </div>

    <div class="m-actions">
      <button class="btn" onclick="renderAssessmentStage1()">${ar?'← رجوع':'← Back'}</button>
      <button class="btn" onclick="saveAndUseTemplate()" title="${ar?'حفظ كقالب شخصي':'Save as personal template'}">💾</button>
      <button class="btn primary" onclick="assessmentToStage3()" ${assessState.criteria.filter(c=>c.included).length===0?'disabled':''}>${ar?'ابدأ التقييم ←':'Start Rating →'}</button>
    </div>
  `);
}

function toggleCrit(i){
  if (!assessState) return;
  assessState.criteria[i].included = !assessState.criteria[i].included;
  renderAssessmentStage2();
}

function editCrit(i){
  if (!assessState) return;
  const ar = lang === 'ar';
  const cur = assessState.criteria[i].q;
  const updated = prompt(ar?'عدّل نص المعيار:':'Edit criterion text:', cur);
  if (updated == null) return;
  const trimmed = updated.trim();
  if (!trimmed){ return; }
  assessState.criteria[i].q = trimmed;
  renderAssessmentStage2();
}

function deleteCrit(i){
  if (!assessState) return;
  assessState.criteria.splice(i, 1);
  renderAssessmentStage2();
}

function addNewCrit(){
  if (!assessState) return;
  const input = $("#as_new_crit");
  const val = input?.value.trim();
  if (!val) return;
  assessState.criteria.push({ id: 'custom_' + Date.now(), q: val, included: true });
  renderAssessmentStage2();
  setTimeout(()=>{ const i = $("#as_new_crit"); if (i) i.focus(); }, 50);
}

function saveAndUseTemplate(){
  if (!assessState) return;
  saveUserTemplate(assessState.criteria.map(c => ({ id: c.id, q: c.q, included: c.included })));
  toast(lang==='ar'?'تم حفظ القالب':'Template saved');
}

/* ── STAGE 3: Rate each criterion ── */
function assessmentToStage3(){
  if (!assessState) return;
  assessState.criteria.forEach(c => {
    if (c.included && assessState.ratings[c.id] == null) assessState.ratings[c.id] = 0;
  });
  renderAssessmentStage3();
}

function renderAssessmentStage3(){
  const ar = lang === 'ar';
  const included = assessState.criteria.filter(c => c.included);
  const totalSoFar = included.reduce((sum, c) => sum + (assessState.ratings[c.id] || 0), 0);
  const maxScore = included.length * 5;
  const pct = maxScore > 0 ? (totalSoFar / maxScore) * 100 : 0;
  const allRated = included.every(c => assessState.ratings[c.id] > 0);

  modal(`
    <h2>⭐ ${esc(assessState.ticker)}</h2>
    <div class="assess-step-h"><span class="dot"></span><span>${ar?'الخطوة ٣ من ٣ · التقييم':'Step 3 of 3 · Rate'}</span></div>

    <div class="rate-running">
      <div class="r-bar"><div class="r-fill" style="width:${pct}%"></div></div>
      <div class="r-score">${totalSoFar}/${maxScore}</div>
    </div>

    <div style="background:#000;border:1px solid var(--line);border-radius:12px;overflow:hidden;max-height:60vh;overflow-y:auto">
      ${included.map((cr, idx) => {
        const r = assessState.ratings[cr.id] || 0;
        return `<div class="rate-q">
          <div class="q-txt"><span style="color:var(--muted);font-weight:600;font-size:11.5px">${idx+1}/${included.length} ·</span> ${esc(cr.q)}</div>
          <div class="q-dots">
            ${[1,2,3,4,5].map(n => `<button class="dot ${r===n?'on':''}" data-r="${n}" onclick="setRating('${cr.id}',${n})">${n}</button>`).join('')}
          </div>
          <div class="scale-lbl">
            <span>${ar?'ضعيف':'Weak'}</span>
            <span>${ar?'ممتاز':'Strong'}</span>
          </div>
        </div>`;
      }).join('')}
    </div>

    <div class="m-actions">
      <button class="btn" onclick="renderAssessmentStage2()">${ar?'← رجوع':'← Back'}</button>
      <button class="btn primary" onclick="assessmentToResult()" ${allRated?'':'disabled'}>${allRated?(ar?'إنهاء التقييم ←':'Finish ←'):(ar?'قيّم الكل أولاً':'Rate all first')}</button>
    </div>
  `);
}

function setRating(critId, n){
  if (!assessState) return;
  assessState.ratings[critId] = n;
  renderAssessmentStage3();
}

/* ── STAGE 4: Result ── */
function assessmentToResult(){
  if (!assessState) return;
  const included = assessState.criteria.filter(c => c.included);
  const totalScore = included.reduce((s, c) => s + (assessState.ratings[c.id] || 0), 0);
  const maxScore = included.length * 5;
  const pct = maxScore > 0 ? (totalScore / maxScore) * 100 : 0;
  const rec = recommendationFor(pct);
  assessState.totalScore = totalScore;
  assessState.maxScore = maxScore;
  assessState.percentage = pct;
  assessState.recommendation = rec.key;
  assessState.stage = 4;
  renderAssessmentResult();
}

function renderAssessmentResult(){
  const ar = lang === 'ar';
  const rec = recommendationFor(assessState.percentage);
  const included = assessState.criteria.filter(c => c.included);
  const strengths = included.filter(c => (assessState.ratings[c.id]||0) >= 4);
  const weak = included.filter(c => (assessState.ratings[c.id]||0) <= 2 && (assessState.ratings[c.id]||0) > 0);
  const neutral = included.filter(c => (assessState.ratings[c.id]||0) === 3);

  modal(`
    <div id="assess-result-content">
    <div class="result-hero ${rec.key}">
      <div class="ticker-line">${esc(assessState.ticker)}${assessState.companyName && assessState.companyName !== assessState.ticker ? `<span style="color:var(--muted);font-weight:600;font-size:13px"> · ${esc(assessState.companyName)}</span>` : ''}</div>
      <div class="rec-emoji">${rec.emoji}</div>
      <div class="rec-label">${rec[lang]}</div>
      <div class="score-big">${assessState.totalScore}<span class="score-frac"> / ${assessState.maxScore}</span></div>
      <div class="pct">${fmt(assessState.percentage,1)}%</div>
    </div>

    ${strengths.length ? `
      <div class="result-section strengths">
        <div class="head">💪 ${ar?'نقاط القوة':'Strengths'} (${strengths.length})</div>
        ${strengths.map(c => `<div class="item"><span class="num">${assessState.ratings[c.id]}</span><span>${esc(c.q)}</span></div>`).join('')}
      </div>
    ` : ''}

    ${weak.length ? `
      <div class="result-section weak">
        <div class="head">⚠️ ${ar?'التحديات':'Challenges'} (${weak.length})</div>
        ${weak.map(c => `<div class="item"><span class="num">${assessState.ratings[c.id]}</span><span>${esc(c.q)}</span></div>`).join('')}
      </div>
    ` : ''}

    ${neutral.length ? `
      <div class="result-section neutral">
        <div class="head">⚖️ ${ar?'محايد':'Neutral'} (${neutral.length})</div>
        ${neutral.map(c => `<div class="item"><span class="num">${assessState.ratings[c.id]}</span><span>${esc(c.q)}</span></div>`).join('')}
      </div>
    ` : ''}
    </div>

    <textarea class="notes-textarea" id="as_final_notes" placeholder="${ar?'ملاحظاتك العامة عن هذا التقييم...':'Your general notes about this assessment...'}" style="margin-top:12px">${esc(assessState.notes||'')}</textarea>

    <div class="m-actions">
      <button class="btn" onclick="renderAssessmentStage3()">${ar?'← تعديل':'← Edit'}</button>
      <button class="png-btn" onclick="exportAssessmentPNG()">📥 ${ar?'صورة':'PNG'}</button>
      <button class="btn primary" onclick="saveAssessment()">${ar?'✓ حفظ':'✓ Save'}</button>
    </div>
  `);
}

/* ── Save assessment to cloud ── */
async function saveAssessment(){
  if (!assessState || !currentUser) return;
  const notesEl = $("#as_final_notes");
  if (notesEl) assessState.notes = notesEl.value.trim();
  const criteriaSnapshot = assessState.criteria
    .filter(c => c.included)
    .map(c => ({ id: c.id, q: c.q, rating: assessState.ratings[c.id] || 0 }));
  try {
    const { error } = await sb.from('stock_assessments').insert({
      user_id: currentUser.id,
      ticker: assessState.ticker,
      company_name: assessState.companyName || null,
      logo_url: assessState.logo || null,
      criteria: criteriaSnapshot,
      total_score: assessState.totalScore,
      max_score: assessState.maxScore,
      percentage: assessState.percentage,
      recommendation: assessState.recommendation,
      notes: assessState.notes || null,
    });
    if (error) throw error;
    toast(lang==='ar'?'تم حفظ التقييم':'Assessment saved');
    assessState = null;
    openChecklistTool();
  } catch(e){
    toast((lang==='ar'?'خطأ: ':'Error: ') + (e.message || ''));
  }

  try {

  // Test 5: corsproxy

    log('', 'info');
    log('[5] corsproxy.io (Yahoo fallback)', 'info');
    try {
      const url = `https://query1.finance.yahoo.com/v8/finance/chart/AAPL?interval=1d&range=1mo`;

/* ════ refresh prices via Finnhub ════ */
async function refreshPrices(){
  if (!allHoldingsInPf().length){ toast(t().add_first); return; }
  const btn = $("#refresh-btn");
  if (btn) { btn.disabled = true; btn.innerHTML = `<span class="spin"></span> ${t().refreshing}`; }
  ensureSymbols();
  const tickers = [...new Set(allHoldingsInPf().map(h => h.ticker))];
  let n = 0, lastErr = null;
  const results = await Promise.all(tickers.map(async tic => {
    try {
      const url = `${FINNHUB}/quote?symbol=${encodeURIComponent(tic)}&token=${FINNHUB_KEY}`;
      const r = await fetch(url);
      if (!r.ok) { lastErr = new Error("HTTP "+r.status); return null; }
      const q = await r.json();
      if (q.c == null || q.c === 0) { lastErr = new Error((lang==='ar'?`الرمز ${tic} غير صالح`:`invalid: ${tic}`)); return null; }
      return { tic, price: q.c, prev: q.pc, changePct: q.dp };
    } catch(e) { lastErr = e; return null; }
  }));
  results.forEach(r => {
    if (!r) return;
    holdings.forEach(h => {
      if (h.pfId === settings.activePf && h.ticker === r.tic) {
        h.price = r.price;
        if (r.prev != null) h.prev = r.prev;
        if (r.changePct != null) h.dayChangePct = r.changePct;
        n++;
      }
    });
  });
  // backfill names from cached symbol list
  if (symbolList?.length) {
    holdings.forEach(h => {
      if (h.pfId === settings.activePf && (!h.name || h.name === h.ticker)) {
        const found = symbolList.find(s => s.s === h.ticker);
        if (found?.d) h.name = found.d;
      }
    });
  }
  if (n === 0) {
    toast((lang==='ar'?"خطأ: ":"Error: ") + (lastErr?.message || t().refresh_failed));
    if (btn) { btn.disabled = false; btn.innerHTML = `↻ ${t().refresh}`; }
    return;
  }
  settings.lastRefresh = new Date().toLocaleTimeString(lang==='ar'?'ar-SA':'en-US',{hour:'2-digit',minute:'2-digit'});
  save();
  toast(t().refresh_ok(n));
  render();
}

  const p = { id: uid(), name, color: PF_COLORS[portfolios.length % PF_COLORS.length], passHash: null, createdAt: Date.now() };
  try {
    await cloudInsertPortfolio(p);
  } catch(e){

  render();

/* modal / toast */
function modal(html){
  closeModal();
  const s = document.createElement("div"); s.className="scrim"; s.id="scrim";
  s.innerHTML = `<div class="modal">${html}</div>`;
  s.addEventListener("click", e => { if (e.target === s) closeModal(); });
  document.body.appendChild(s);
}
function closeModal(){ const s=$("#scrim"); if(s) s.remove(); }
function toast(msg){
  $$(".toast").forEach(t => t.remove());
  const el = document.createElement("div");
  el.className = "toast";
  el.textContent = msg;
  el.title = "Tap to dismiss";
  el.style.cursor = "pointer";
  el.onclick = () => el.remove();
  document.body.appendChild(el);
  setTimeout(()=>{ if (el.parentElement) { el.style.transition="opacity .3s"; el.style.opacity="0"; setTimeout(()=>el.remove(),300); } }, 7000);
}

async function checkAdmin(){

  try {
    const { data } = await sb.from('profiles').select('is_admin').eq('id', currentUser.id).single();
    return data?.is_admin === true;
  } catch(e){ return false; }
}

let userProfile = null; // holds full profile incl subscription

async function loadUserProfile(){
  if (!currentUser) return null;
  const { data } = await sb.from('profiles').select('*').eq('id', currentUser.id).maybeSingle();
  userProfile = data;
  return data;
}

function isAccessBlocked(){
  if (!userProfile) return false;
  if (userProfile.is_admin) return false;
  if (userProfile.suspended) return { kind:'suspended' };
  if (userProfile.subscription_paid_until){
    const exp = new Date(userProfile.subscription_paid_until);
    if (exp < new Date()){
      return { kind:'expired', wasTrial: userProfile.subscription_status === 'trial' };
    }
  }
  return false;
}

async function dismissNotification(){
  if (!currentUser) return;
  await sb.from('profiles').update({ notification_seen: true }).eq('id', currentUser.id);
  if (userProfile) userProfile.notification_seen = true;
  closeModal();
}

    <div class="field"><label>${lang==='ar'?'كلمة السر':'Password'} <small style="color:#444">${lang==='ar'?'6 أحرف على الأقل':'min 6 chars'}</small></label>
      <input class="inp" id="au_p" type="password" placeholder="••••••••" autocomplete="new-password"></div>

    </div>
  `);
  setTimeout(()=>$("#au_n")?.focus(),60);
}
async function doSignup(){
  const name = $("#au_n").value.trim();
  const email = $("#au_e").value.trim();
  const pw = $("#au_p").value;
  if (!name){ $("#au_err").textContent = lang==='ar'?'اكتب اسمك':'Enter your name'; return; }
  if (!email || !email.includes('@')){ $("#au_err").textContent = lang==='ar'?'إيميل غير صالح':'Invalid email'; return; }
  if (!pw || pw.length < 6){ $("#au_err").textContent = lang==='ar'?'كلمة السر 6 أحرف على الأقل':'Password min 6 chars'; return; }
  $("#au_err").textContent = lang==='ar'?'جاري الإنشاء...':'Creating...';
  const { error } = await sb.auth.signUp({ email, password: pw, options: { data: { name } } });
  if (error){ $("#au_err").textContent = error.message; return; }
  closeModal();
}
function openLogin(){
  modal(`
    <h2>${lang==='ar'?'تسجيل الدخول':'Log in'}</h2>
    <div class="field"><label>${lang==='ar'?'الإيميل':'Email'}</label>
      <input class="inp" id="lo_e" type="email" autocomplete="email"></div>
    <div class="field"><label>${lang==='ar'?'كلمة السر':'Password'}</label>
      <input class="inp" id="lo_p" type="password" autocomplete="current-password"></div>
    <div class="err" id="lo_err"></div>
    <div class="m-actions">
      <button class="btn" onclick="closeModal();openSignup()">${lang==='ar'?'حساب جديد':'New account'}</button>
      <button class="btn primary" onclick="doLogin()">${lang==='ar'?'دخول':'Log in'}</button>
    </div>
  `);
  setTimeout(()=>{
    $("#lo_e")?.focus();
    ['lo_e','lo_p'].forEach(id=>$("#"+id)?.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()}));
  },60);
}
async function doLogin(){
  const email = $("#lo_e").value.trim();
  const pw = $("#lo_p").value;
  if (!email || !pw){ $("#lo_err").textContent = lang==='ar'?'املأ الحقول':'Fill fields'; return; }
  $("#lo_err").textContent = lang==='ar'?'جاري الدخول...':'Logging in...';
  const { error } = await sb.auth.signInWithPassword({ email, password: pw });
  if (error){ $("#lo_err").textContent = error.message; return; }
  closeModal();
}
async function cloudLogout(){
  await sb.auth.signOut();
}
