<!DOCTYPE html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0A0A0A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Circle">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href='data:application/json,{"name":"Circle","short_name":"Circle","description":"Smart portfolio tracker","start_url":"/","display":"standalone","background_color":"%230A0A0A","theme_color":"%230A0A0A","orientation":"portrait","icons":[{"src":"data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 192 192%22><rect width=%22192%22 height=%22192%22 rx=%2240%22 fill=%22%230A0A0A%22/><circle cx=%2296%22 cy=%2296%22 r=%2260%22 fill=%22none%22 stroke=%22%235FE9B0%22 stroke-width=%2210%22/><circle cx=%2296%22 cy=%2296%22 r=%2230%22 fill=%22%235FE9B0%22/></svg>","sizes":"192x192","type":"image/svg+xml"}]}'>
<link rel="apple-touch-icon" href='data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192"><rect width="192" height="192" rx="40" fill="%230A0A0A"/><circle cx="96" cy="96" r="60" fill="none" stroke="%235FE9B0" stroke-width="10"/><circle cx="96" cy="96" r="30" fill="%235FE9B0"/></svg>'>
<link rel="icon" type="image/svg+xml" href='data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32"><circle cx="16" cy="16" r="11" fill="none" stroke="%235FE9B0" stroke-width="2.5"/><circle cx="16" cy="16" r="5.5" fill="%235FE9B0"/></svg>'>
<title>Circle | سيركل</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.0/dist/umd/supabase.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
:root{
  --bg:#000; --surf:#0A0A0A; --surf2:#141414;
  --line:#1F1F1F; --line2:#2A2A2A;
  --txt:#FFFFFF; --muted:#7A7A7A; --muted2:#525252;
  --accent:#5FE9B0; --accent-d:#1E5C44; --accent-bg:#0B2A20;
  --loss:#F26B6E; --loss-d:#5C1F22; --loss-bg:#2A0E10;
  --blue:#5BA5FF; --gold:#E8B96A;
  --r:16px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased;font-feature-settings:"tnum","ss01"}
html,body{margin:0;padding:0;background:var(--bg);color:var(--txt);font-family:"Inter",system-ui,sans-serif;line-height:1.55;-moz-osx-font-smoothing:grayscale;letter-spacing:-.005em}
body{min-height:100vh;padding-bottom:48px}
body[dir="rtl"]{font-family:"Tajawal","Inter",system-ui,sans-serif;letter-spacing:0}
.mono{font-variant-numeric:tabular-nums}
.up{color:var(--accent)} .down{color:var(--loss)}
button{font-family:inherit;cursor:pointer;border:none;color:inherit;background:none;font-size:inherit}
input,select,textarea{font-family:inherit;color:inherit}
.wrap{max-width:680px;margin:0 auto;padding:14px 18px 0}

/* top bar */
.top{display:flex;align-items:center;justify-content:space-between;padding:6px 0 22px;gap:8px}
.pf-pill{display:inline-flex;align-items:center;gap:8px;background:var(--surf);border:1px solid var(--line);padding:7px 14px;border-radius:999px;font-size:13px;font-weight:600;color:var(--txt);max-width:55%;transition:.15s}
.pf-pill:hover{border-color:var(--line2);background:var(--surf2)}
.pf-pill .dot{width:6px;height:6px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 3px rgba(95,233,176,.14);flex-shrink:0}
.pf-pill .nm{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pf-pill .ar{color:var(--muted);font-size:10px}
.top-actions{display:flex;gap:6px;align-items:center}
.lang{font-size:11px;font-weight:700;color:var(--muted);background:var(--surf);border:1px solid var(--line);padding:6px 10px;border-radius:999px;letter-spacing:.04em;transition:.15s}
.lang:hover{color:var(--txt);border-color:var(--line2)}
.ico{width:34px;height:34px;border-radius:10px;background:var(--surf);border:1px solid var(--line);color:var(--muted);display:grid;place-items:center;font-size:15px;transition:.15s}
.ico:hover{color:var(--txt);border-color:var(--line2)}
.ico.on{color:var(--accent);border-color:var(--accent-d);background:var(--accent-bg)}

/* hero */
.hero-eyebrow{text-align:center;color:var(--blue);font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;margin-bottom:14px}
.hero-eyebrow .dot{display:inline-block;margin:0 8px;color:#3a3a3a}
.hero-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:8px;text-align:center}
.hero-cell .lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;font-weight:600;margin-bottom:4px}
.hero-cell .val{font-size:30px;font-weight:700;letter-spacing:-1px;line-height:1.1}
.hero-cell .val.up{color:var(--accent)} .hero-cell .val.down{color:var(--loss)}
.hero-sub{text-align:center;color:var(--accent);font-size:13.5px;font-weight:500;margin-top:6px}
.hero-sub.down{color:var(--loss)}
.hero-sub .sep{color:#2a2a2a;margin:0 6px}
.hero-sar{text-align:center;color:var(--muted2);font-size:11.5px;margin-top:6px}
.hero-live{display:flex;justify-content:center;align-items:center;gap:14px;margin:16px 0 18px}
.live-pill{display:inline-flex;align-items:center;gap:7px;color:var(--muted);font-size:12px;font-weight:500}
.live-pill::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--muted)}
.live-pill.on::before{background:var(--accent);box-shadow:0 0 0 3px rgba(95,233,176,.18);animation:pulse 2.2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.refresh-btn{display:inline-flex;align-items:center;gap:6px;background:transparent;border:1px solid var(--line2);border-radius:999px;padding:6px 14px;font-size:12px;color:var(--muted);font-weight:500;transition:.15s}
.refresh-btn:hover{color:var(--txt);border-color:#3a3a3a}
.refresh-btn:disabled{opacity:.5}

/* bottom navigation tabs */
.tabs{position:fixed;bottom:0;left:0;right:0;display:flex;background:rgba(8,8,8,.92);backdrop-filter:saturate(180%) blur(14px);-webkit-backdrop-filter:saturate(180%) blur(14px);border-top:1px solid var(--line);z-index:30;padding:6px 6px calc(6px + env(safe-area-inset-bottom));margin:0;justify-content:space-around;gap:0}
.tab{flex:1;padding:8px 4px;border-radius:10px;font-size:9.5px;font-weight:600;color:var(--muted);background:transparent;transition:.15s;display:flex;flex-direction:column;align-items:center;gap:4px;letter-spacing:.02em;min-height:54px;justify-content:center;line-height:1;border:none;cursor:pointer;font-family:inherit}
.tab svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;transition:.15s}
.tab:hover{color:var(--txt2)}
.tab.on{color:var(--accent)}
.tab.on svg{stroke:var(--accent)}
body{padding-bottom:80px !important}

/* New cards view (simplified - just ticker + %) */
.cards-grid-v2{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px;padding:0 4px}
@media (max-width:420px){.cards-grid-v2{grid-template-columns:repeat(2,1fr)}}
.card-v2{background:var(--surf);border:1px solid var(--line);border-radius:18px;padding:18px 12px;text-align:center;cursor:pointer;transition:.2s;position:relative;overflow:hidden;aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;min-height:110px}
.card-v2.up{background:linear-gradient(135deg,#0e2017,#0a1812);border-color:var(--accent-d)}
.card-v2.down{background:linear-gradient(135deg,#1f0e10,#180a0a);border-color:var(--loss-d)}
.card-v2:active{transform:scale(.96)}
.card-v2 .logo-img{width:36px;height:36px;border-radius:8px;background:#000;border:1px solid var(--line2);object-fit:contain;padding:3px;flex-shrink:0;margin-bottom:2px}
.card-v2 .logo-fallback{width:36px;height:36px;border-radius:8px;display:grid;place-items:center;font-weight:800;font-size:11px;border:1px solid;flex-shrink:0;margin-bottom:2px}
.card-v2 .tic{font-size:20px;font-weight:800;letter-spacing:-.3px;line-height:1}
.card-v2.up .tic{color:var(--accent)}
.card-v2.down .tic{color:var(--loss)}
.card-v2 .pct{font-size:14px;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:-.2px}
.card-v2.up .pct{color:var(--accent)}
.card-v2.down .pct{color:var(--loss)}

/* Company logo (small for lists) */
.co-logo{width:34px;height:34px;border-radius:8px;background:#FFF;padding:3px;object-fit:contain;flex-shrink:0;border:1px solid var(--line)}

/* Earnings timeline (horizontal) */
.earn-tl{background:var(--surf);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:14px}
.earn-tl-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.earn-tl-head .t{font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.07em}
.earn-tl-head .yr{font-size:12px;font-weight:700;color:var(--txt);font-variant-numeric:tabular-nums}
.earn-tl-bar{position:relative;height:38px;margin:0 16px 14px}
.earn-tl-line{position:absolute;top:50%;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--line),var(--line2),var(--line));transform:translateY(-50%)}
.earn-tl-dot{position:absolute;top:50%;transform:translate(-50%,-50%);width:14px;height:14px;border-radius:50%;background:var(--bg);border:2px solid var(--line2);transition:.15s;cursor:pointer}
.earn-tl-dot.past{border-color:var(--accent);background:var(--accent)}
.earn-tl-dot.future{border-color:var(--gold);background:var(--bg);box-shadow:0 0 8px rgba(232,185,106,.4)}
.earn-tl-dot.next{border-color:var(--gold);background:var(--gold);box-shadow:0 0 16px var(--gold);animation:earnPulse 2s ease-in-out infinite}
@keyframes earnPulse{0%,100%{box-shadow:0 0 10px var(--gold)}50%{box-shadow:0 0 20px var(--gold)}}
.earn-tl-lbl{position:absolute;top:calc(50% + 12px);transform:translateX(-50%);font-size:9px;color:var(--muted);font-weight:700;letter-spacing:.05em;white-space:nowrap}
.earn-tl-lbl.next{color:var(--gold);font-weight:800}
.earn-tl-q{position:absolute;top:calc(50% - 18px);transform:translateX(-50%);font-size:9px;color:var(--muted2);font-weight:700;letter-spacing:.05em}
.earn-summary{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;margin-top:10px}
.earn-q{background:#000;border:1px solid var(--line);border-radius:9px;padding:9px 11px}
.earn-q .q-h{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px}
.earn-q .q-h .q-n{font-size:10.5px;color:var(--muted);font-weight:700;letter-spacing:.05em}
.earn-q .q-h .q-dt{font-size:10px;color:var(--muted2);font-variant-numeric:tabular-nums}
.earn-q .row{display:flex;justify-content:space-between;font-size:11px;margin-top:2px;font-variant-numeric:tabular-nums}
.earn-q .row .l{color:var(--muted)}
.earn-q .row .v{font-weight:700}
.earn-q .row .v.beat{color:var(--accent)}
.earn-q .row .v.miss{color:var(--loss)}
.earn-q .surprise{margin-top:6px;font-size:10.5px;font-weight:800;padding:3px 8px;border-radius:5px;display:inline-block;letter-spacing:.05em;font-variant-numeric:tabular-nums}
.earn-q .surprise.beat{background:var(--accent-bg);color:var(--accent)}
.earn-q .surprise.miss{background:var(--loss-bg);color:var(--loss)}

/* Add stock button in top bar */
.ico-add{background:var(--accent);color:#000;border-color:var(--accent);font-weight:900;font-size:18px}
.ico-add:hover{background:#7AFAC2;border-color:#7AFAC2}

/* "More" menu list */
.more-list{background:#000;border:1px solid var(--line);border-radius:14px;overflow:hidden;margin-bottom:14px}
.more-row{padding:14px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:13px;cursor:pointer;transition:.15s}
.more-row:last-child{border-bottom:none}
.more-row:hover{background:var(--surf)}
.more-row .ic{width:36px;height:36px;border-radius:10px;display:grid;place-items:center;font-size:17px;border:1px solid var(--line2);background:var(--bg);flex-shrink:0}
.more-row .ic.gr{background:var(--accent-bg);border-color:var(--accent-d);color:var(--accent)}
.more-row .ic.gd{background:#1F1A0E;border-color:#5A4818;color:var(--gold)}
.more-row .ic.bl{background:#0E1828;border-color:#1F3A6E;color:#5BA5FF}
.more-row .ic.rd{background:var(--loss-bg);border-color:var(--loss-d);color:var(--loss)}
.more-row .body{flex:1;min-width:0}
.more-row .nm{font-size:13.5px;font-weight:700;color:var(--txt);margin-bottom:2px}
.more-row .sub{font-size:11px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.more-row .ar{color:var(--muted2);font-size:14px;flex-shrink:0}
body[dir="rtl"] .more-row .ar{transform:scaleX(-1)}

/* research checklist */
.chk-section{margin-bottom:12px}
.chk-header{display:flex;align-items:center;gap:10px;cursor:pointer;padding:11px 0;user-select:none}
.chk-header .h{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;flex:1}
.chk-header .score{font-size:11px;font-weight:800;padding:3px 9px;border-radius:6px;font-variant-numeric:tabular-nums}
.chk-header .score.low{background:var(--surf);color:var(--muted)}
.chk-header .score.mid{background:#1F1A0E;color:var(--gold);border:1px solid #5A4818}
.chk-header .score.high{background:var(--accent-bg);color:var(--accent);border:1px solid var(--accent-d)}
.chk-header .ar-i{font-size:11px;color:var(--muted2);transition:.2s}
.chk-section.open .chk-header .ar-i{transform:rotate(180deg)}
.chk-body{display:none;background:#000;border:1px solid var(--line);border-radius:12px;overflow:hidden}
.chk-section.open .chk-body{display:block}
.chk-cat{padding:11px 13px 6px;background:linear-gradient(180deg,#0F0F0F,#0A0A0A);border-bottom:1px solid var(--line)}
.chk-cat .cat-t{font-size:10px;font-weight:800;color:var(--accent);text-transform:uppercase;letter-spacing:.1em}
.chk-item{padding:10px 13px;border-bottom:1px solid var(--line);display:flex;align-items:flex-start;gap:10px;cursor:pointer;transition:.15s}
.chk-item:last-child{border-bottom:none}
.chk-item:hover{background:#080808}
.chk-item .box{width:22px;height:22px;border-radius:6px;border:1.5px solid var(--line2);display:grid;place-items:center;flex-shrink:0;margin-top:1px;transition:.15s;background:transparent}
.chk-item.on .box{background:var(--accent);border-color:var(--accent)}
.chk-item.on .box::after{content:"✓";color:#000;font-weight:800;font-size:14px;line-height:1}
.chk-item .body{flex:1;min-width:0}
.chk-item .nm{font-size:13px;font-weight:700;margin-bottom:3px;color:var(--txt2);line-height:1.4}
.chk-item.on .nm{color:var(--txt)}
.chk-item .ds{font-size:11px;color:var(--muted);line-height:1.5}
.chk-total{padding:13px;background:linear-gradient(180deg,#0F0F0F,#0A0A0A);text-align:center;border-top:1px solid var(--line)}
.chk-total .t{font-size:10.5px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.chk-total .v{font-size:24px;font-weight:900;font-variant-numeric:tabular-nums;letter-spacing:-.5px}

/* tabs */

/* horizon filter strip */
.horizon{display:flex;justify-content:center;gap:5px;margin-bottom:14px}
.h-chip{padding:6px 14px;border-radius:999px;font-size:11.5px;font-weight:700;color:var(--muted);background:transparent;border:1px solid var(--line);letter-spacing:.05em;transition:.18s;min-width:48px;text-align:center}
.h-chip:hover{color:var(--txt);border-color:var(--line2)}
.h-chip.on{background:#fff;color:#000;border-color:#fff}
.h-chip .cnt{font-size:9.5px;opacity:.6;margin-inline-start:4px;font-weight:600}

/* bubbles */
.bub-wrap{position:relative;width:100%}
#bub-svg{display:block;width:100%}
.bub{cursor:pointer}
.bub circle{transition:filter .2s,r .25s ease-out}
.bub:hover circle{filter:brightness(1.18)}
.bub text{pointer-events:none;font-family:inherit}

/* fab */
.fab{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--accent);color:#000;font-weight:700;font-size:14px;padding:13px 22px;border-radius:999px;box-shadow:0 6px 24px rgba(95,233,176,.25),0 0 0 1px rgba(95,233,176,.4);z-index:20;display:flex;align-items:center;gap:7px;transition:.15s}
.fab:hover{transform:translateX(-50%) scale(1.04)}
.fab .plus{font-size:17px;line-height:1}

/* holdings list */
.list{display:flex;flex-direction:column;gap:1px;background:var(--line);border-radius:14px;overflow:hidden;border:1px solid var(--line);margin-top:6px}
.row{background:var(--bg);padding:13px 14px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:.15s}
.row:hover{background:var(--surf)}
.row .tic-bx{width:38px;height:38px;border-radius:9px;display:grid;place-items:center;font-weight:700;font-size:11.5px;flex-shrink:0;letter-spacing:-.2px}
.row .info{flex:1;min-width:0}
.row .info .t-line{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.row .info .t{font-weight:700;font-size:14.5px;letter-spacing:-.2px}
.row .info .h-tag{font-size:9px;font-weight:800;padding:1px 5px;border-radius:3px;letter-spacing:.05em;color:var(--muted);background:#1A1A1A;border:1px solid #222}
.row .info .h-tag.st{background:#2A1F18;color:#FB923C;border-color:#5A3818}
.row .info .h-tag.mt{background:#1F2A3E;color:#5BA5FF;border-color:#1F3A6E}
.row .info .h-tag.lt{background:#1F2E25;color:#5FE9B0;border-color:#1E5C44}
.row .info .s{color:var(--muted);font-size:11.5px;margin-top:2px}
.row .rt{text-align:right;flex-shrink:0}
body[dir="rtl"] .row .rt{text-align:left}
.row .rt .mv{font-weight:700;font-size:14px}
.row .rt .pl{font-size:11.5px;font-weight:600;margin-top:2px}

/* empty / onboard */
.empty{text-align:center;padding:50px 22px;color:var(--muted)}
.empty .ic{font-size:42px;color:var(--accent);opacity:.45;margin-bottom:10px;line-height:1}
.empty h3{margin:0 0 6px;color:var(--txt);font-size:17px;font-weight:700}
.empty p{margin:0 0 18px;font-size:13.5px;line-height:1.6;max-width:300px;margin-inline:auto;color:var(--muted)}

.onboard{min-height:90vh;display:grid;place-items:center;padding:20px}
.onboard-card{max-width:380px;width:100%;text-align:center}
.onboard-card .logo{font-size:54px;color:var(--accent);margin-bottom:6px;font-weight:300;letter-spacing:-2px;line-height:1}
.onboard-card h1{margin:0 0 8px;font-size:24px;font-weight:700;letter-spacing:-.6px}
.onboard-card p{color:var(--muted);font-size:14px;margin:0 0 22px;line-height:1.7}
.onboard-card .inp{text-align:center;font-size:15px}

/* modal */
.scrim{position:fixed;inset:0;background:rgba(0,0,0,.78);backdrop-filter:blur(8px);display:grid;place-items:flex-end;padding:0;z-index:60;animation:fade .18s}
@media(min-width:520px){.scrim{place-items:center;padding:20px}}
@keyframes fade{from{opacity:0}to{opacity:1}}
.modal{width:100%;max-width:440px;background:#0A0A0A;border:1px solid var(--line);border-radius:20px 20px 0 0;padding:24px 22px;max-height:92vh;overflow:auto;animation:slide .22s}
@media(min-width:520px){.modal{border-radius:20px}}
@keyframes slide{from{transform:translateY(20px);opacity:.5}to{transform:none;opacity:1}}
.modal h2{margin:0 0 6px;font-size:19px;font-weight:700;letter-spacing:-.3px}
.modal .sub{color:var(--muted);font-size:13px;margin:0 0 18px;line-height:1.6}
.modal h4{margin:14px 0 8px;font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.08em}
.field{margin-bottom:12px}
.field label{display:block;font-size:11.5px;color:var(--muted);font-weight:600;margin-bottom:6px;letter-spacing:.02em}
.inp{width:100%;background:#000;border:1px solid var(--line);border-radius:11px;padding:11px 13px;color:var(--txt);font-size:14.5px;outline:none;transition:.15s;font-variant-numeric:tabular-nums}
.inp:focus{border-color:var(--accent-d);box-shadow:0 0 0 3px rgba(95,233,176,.08)}
.inp::placeholder{color:#3a3a3a}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.m-actions{display:flex;gap:8px;margin-top:18px}
.m-actions .btn{flex:1}
.btn{background:var(--surf2);border:1px solid var(--line);border-radius:11px;padding:11px 14px;font-size:13.5px;font-weight:600;color:var(--txt);display:inline-flex;align-items:center;gap:6px;justify-content:center;transition:.15s}
.btn:hover{background:#1c1c1c;border-color:var(--line2)}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#000}
.btn.primary:hover{filter:brightness(1.08)}
.btn.danger{background:transparent;color:var(--loss);border-color:var(--loss-d)}
.btn.danger:hover{background:var(--loss-bg)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.err{color:var(--loss);font-size:12px;margin-top:6px;font-weight:500;min-height:0}
.spin{display:inline-block;width:12px;height:12px;border:2px solid currentColor;border-top-color:transparent;border-radius:50%;animation:rot .7s linear infinite;vertical-align:-2px}
@keyframes rot{to{transform:rotate(360deg)}}

/* ticker search */
.search-wrap{position:relative}
.search-btn{position:absolute;top:8px;right:8px;width:30px;height:30px;border-radius:8px;background:var(--surf2);display:grid;place-items:center;color:var(--muted);font-size:13px;transition:.15s}
body[dir="rtl"] .search-btn{right:auto;left:8px}
.search-btn:hover{color:var(--accent);background:var(--accent-bg)}
.suggest{margin-top:6px;background:#000;border:1px solid var(--line);border-radius:10px;overflow:hidden;max-height:180px;overflow-y:auto}
.sg-item{padding:9px 12px;border-bottom:1px solid var(--line);cursor:pointer;display:flex;align-items:center;gap:10px;transition:.12s}
.sg-item:last-child{border-bottom:none}
.sg-item:hover{background:var(--surf2)}
.sg-item .tic{font-weight:700;font-size:13px;color:var(--accent);min-width:60px}
.sg-item .nm{color:var(--txt);font-size:12.5px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sg-loading{padding:11px;text-align:center;color:var(--muted);font-size:12px}

/* horizon segment in edit */
.seg{display:flex;background:#000;border:1px solid var(--line);border-radius:10px;padding:3px;gap:3px}
.seg button{flex:1;padding:9px 6px;border-radius:7px;font-size:11.5px;font-weight:700;color:var(--muted);letter-spacing:.04em;transition:.15s}
.seg button.on{background:var(--surf2);color:var(--txt)}
.seg button.on.st{color:#FB923C}
.seg button.on.mt{color:#5BA5FF}
.seg button.on.lt{color:#5FE9B0}
.seg button .lbl{display:block;font-size:9.5px;font-weight:600;opacity:.7;margin-top:1px;letter-spacing:0}

/* tags select */
.tags-grid{display:flex;flex-wrap:wrap;gap:6px}
.tag-chip{padding:6px 11px;border-radius:999px;font-size:12px;font-weight:600;background:#000;border:1px solid var(--line);color:var(--muted);cursor:pointer;transition:.15s;user-select:none}
.tag-chip:hover{border-color:var(--line2);color:var(--txt)}
.tag-chip.on{background:var(--accent-bg);border-color:var(--accent-d);color:var(--accent)}

/* detail */
.d-head{display:flex;align-items:center;gap:13px;margin-bottom:16px}
.d-head .tic-bx{width:48px;height:48px;border-radius:11px;display:grid;place-items:center;font-weight:700;font-size:13px}
.d-head .nm{font-size:19px;font-weight:700;letter-spacing:-.3px}
.d-head .sb{color:var(--muted);font-size:12.5px;margin-top:1px}
.d-rows{background:#000;border:1px solid var(--line);border-radius:12px;overflow:hidden;margin-bottom:10px}
.d-row{display:flex;justify-content:space-between;align-items:center;padding:11px 14px;border-bottom:1px solid var(--line)}
.d-row:last-child{border-bottom:none}
.d-row span{color:var(--muted);font-size:12.5px;font-weight:500}
.d-row .v{font-size:13.5px;font-weight:700;font-variant-numeric:tabular-nums}
.d-row .v small{display:block;color:var(--muted2);font-size:10.5px;font-weight:400;margin-top:1px}
.d-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px}
.d-tags .tg{padding:3px 9px;border-radius:999px;font-size:11px;font-weight:600;background:var(--accent-bg);color:var(--accent)}

/* chart */
.chart-card{background:#000;border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:12px}
.chart-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.chart-head .title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.chart-head .meta{font-size:11.5px;color:var(--muted);font-weight:500}
.chart-head .meta b{color:var(--txt);font-weight:700;font-variant-numeric:tabular-nums}
#stock-chart{display:block;width:100%;height:140px}
.chart-empty{padding:34px 14px;text-align:center;color:var(--muted2);font-size:12px}

/* buy/sell action buttons */
.trade-row{display:flex;gap:8px;margin-bottom:14px}
.trade-row .tbtn{flex:1;padding:14px;border-radius:12px;font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:7px;border:1px solid;transition:.15s;letter-spacing:.02em}
.trade-row .tbtn.buy{background:rgba(95,233,176,.08);color:var(--accent);border-color:var(--accent-d)}
.trade-row .tbtn.buy:hover{background:rgba(95,233,176,.16);border-color:var(--accent)}
.trade-row .tbtn.sell{background:rgba(242,107,110,.08);color:var(--loss);border-color:var(--loss-d)}
.trade-row .tbtn.sell:hover{background:rgba(242,107,110,.16);border-color:var(--loss)}
.trade-row .tbtn .sign{font-size:18px;font-weight:700;line-height:1}

/* realized P&L display in detail */
.realized-box{display:flex;align-items:center;justify-content:space-between;padding:10px 13px;background:#000;border:1px solid var(--line);border-radius:11px;margin-bottom:12px;font-size:12.5px}
.realized-box .lbl{color:var(--muted);font-weight:500}
.realized-box .val{font-weight:700;font-variant-numeric:tabular-nums}

/* ───── landing page (account list) ───── */
.landing{min-height:100vh;display:flex;flex-direction:column;padding:20px 18px 40px;max-width:560px;margin:0 auto}
.landing-head{text-align:center;padding:30px 0 24px;position:relative}
.landing-head .logo{font-size:48px;color:var(--accent);font-weight:300;letter-spacing:-2px;line-height:1;margin-bottom:6px}
.landing-head h1{margin:0 0 4px;font-size:23px;font-weight:700;letter-spacing:-.5px}
.landing-head .sub{color:var(--muted);font-size:13px;margin:0}
.landing-lang{position:absolute;top:30px;left:0}
body[dir="rtl"] .landing-lang{left:auto;right:0}
.accounts-list{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
.acct-card{display:flex;align-items:center;gap:12px;background:var(--surf);border:1px solid var(--line);border-radius:14px;padding:14px 16px;cursor:pointer;transition:.15s}
.acct-card:hover{background:var(--surf2);border-color:var(--line2);transform:translateY(-1px)}
.acct-card .av{width:44px;height:44px;border-radius:50%;display:grid;place-items:center;font-weight:700;font-size:17px;color:#000;flex-shrink:0}
.acct-card .acn{flex:1;min-width:0}
.acct-card .acn .name{font-weight:600;font-size:15px;letter-spacing:-.2px}
.acct-card .acn .meta{color:var(--muted);font-size:11.5px;margin-top:2px;font-variant-numeric:tabular-nums}
.acct-card .lock{color:var(--muted);font-size:14px;opacity:.7}
.acct-card.locked .lock{color:var(--gold)}
.acct-empty{text-align:center;padding:30px 14px;color:var(--muted);font-size:13.5px}
.acct-new{display:flex;align-items:center;justify-content:center;gap:8px;background:transparent;border:1.5px dashed var(--line2);color:var(--accent);padding:14px;border-radius:14px;font-weight:600;font-size:14px;cursor:pointer;transition:.15s}
.acct-new:hover{border-color:var(--accent);background:rgba(95,233,176,.04)}

/* ───── logout button in topbar ───── */
.ico.logout{color:var(--loss)}
.ico.logout:hover{background:var(--loss-bg);border-color:var(--loss-d)}

/* ───── deposited stat (added to hero) ───── */
.deposited-line{text-align:center;color:var(--muted);font-size:11.5px;margin-top:8px;font-variant-numeric:tabular-nums;letter-spacing:.02em}
.deposited-line .lbl{color:var(--muted2);font-weight:500}
.deposited-line .v{color:var(--txt2);font-weight:600}
.deposited-line .sep{color:#2a2a2a;margin:0 8px}

/* ───── performance chart ───── */
.perf-card{background:var(--surf);border:1px solid var(--line);border-radius:14px;padding:14px 14px 12px;margin-top:14px}
.perf-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.perf-head .ttl{font-size:11.5px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.perf-head .ch{font-size:12px;font-weight:700;font-variant-numeric:tabular-nums;margin-top:2px}
.perf-tabs{display:flex;gap:3px;background:#000;border:1px solid var(--line);border-radius:8px;padding:3px}
.perf-tabs button{padding:4px 9px;border-radius:5px;font-size:10.5px;font-weight:700;color:var(--muted);font-variant-numeric:tabular-nums;letter-spacing:.04em}
.perf-tabs button.on{background:var(--surf2);color:var(--txt)}
#perf-svg{display:block;width:100%;height:120px}
.perf-empty{padding:24px 0;text-align:center;color:var(--muted2);font-size:11.5px}

/* ───── chart type switcher ───── */
.chart-type-switch{display:flex;justify-content:center;gap:4px;background:var(--surf);border:1px solid var(--line);border-radius:12px;padding:4px;margin:0 auto 12px;max-width:280px}
.chart-type-switch button{padding:8px 14px;border-radius:8px;font-size:11.5px;font-weight:700;color:var(--muted);letter-spacing:.03em;flex:1;transition:.18s;display:flex;align-items:center;justify-content:center;gap:5px;border:none;background:transparent;cursor:pointer;font-family:inherit;white-space:nowrap}
.chart-type-switch button .ic{font-size:13px;line-height:1}
.chart-type-switch button:hover{color:var(--txt2)}
.chart-type-switch button.on{background:var(--surf2);color:var(--txt);box-shadow:0 1px 3px rgba(0,0,0,.3)}

/* prominent centered add button */
.add-stock-row{display:flex;justify-content:center;margin:0 0 14px}
.add-stock-btn{background:var(--accent);color:#000;border:none;padding:11px 26px;border-radius:11px;font-size:13px;font-weight:800;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:8px;box-shadow:0 6px 20px rgba(95,233,176,.25);transition:.18s;letter-spacing:.02em}
.add-stock-btn:hover{background:#7AFAC2;transform:translateY(-1px);box-shadow:0 10px 28px rgba(95,233,176,.35)}
.add-stock-btn:active{transform:translateY(0)}
.add-stock-btn .plus{font-size:18px;font-weight:900;line-height:1}
.chart-type-switch button .ic{font-size:13px;opacity:.8}

/* ───── bar chart ───── */
.bar-wrap{padding:8px 10px}
.bar-row{display:flex;align-items:center;gap:10px;padding:7px 0;cursor:pointer}
.bar-row .lbl{width:56px;flex-shrink:0;font-weight:700;font-size:12.5px;font-variant-numeric:tabular-nums}
.bar-row .bar-bg{flex:1;height:22px;background:#0E0E0E;border-radius:5px;position:relative;overflow:hidden}
.bar-row .bar-fill{position:absolute;top:0;height:100%;border-radius:5px;transition:width .3s ease-out}
body[dir="ltr"] .bar-row .bar-fill{left:0}
body[dir="rtl"] .bar-row .bar-fill{right:0}
.bar-row .bar-pct{position:absolute;top:50%;transform:translateY(-50%);font-size:10.5px;font-weight:700;color:#fff;padding:0 8px;font-variant-numeric:tabular-nums;text-shadow:0 1px 2px rgba(0,0,0,.5)}
body[dir="ltr"] .bar-row .bar-pct{left:0}
body[dir="rtl"] .bar-row .bar-pct{right:0}
.bar-row .rt{flex-shrink:0;text-align:right;min-width:90px}
body[dir="rtl"] .bar-row .rt{text-align:left}
.bar-row .rt .mv{font-weight:700;font-size:12.5px;font-variant-numeric:tabular-nums}
.bar-row .rt .pl{font-size:10.5px;font-weight:600;font-variant-numeric:tabular-nums}

/* ───── transactions list in detail ───── */
.tx-head{margin:14px 0 8px;font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.08em}
.tx-list{background:#000;border:1px solid var(--line);border-radius:11px;overflow:hidden;margin-bottom:8px}
.tx-row{display:flex;align-items:center;gap:9px;padding:9px 12px;border-bottom:1px solid var(--line);font-size:12px;font-variant-numeric:tabular-nums}
.tx-row:last-child{border-bottom:none}
.tx-row .tpe{font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;letter-spacing:.04em}
.tx-row .tpe.buy{background:var(--accent-bg);color:var(--accent)}
.tx-row .tpe.sell{background:var(--loss-bg);color:var(--loss)}
.tx-row .dt{color:var(--muted);min-width:78px;font-size:11px}
.tx-row .qp{flex:1;color:var(--txt2)}
.tx-row .tot{font-weight:700;color:var(--txt)}
.tx-row .del{color:var(--muted2);width:24px;height:24px;border-radius:5px;display:grid;place-items:center;font-size:11px;flex-shrink:0}
.tx-row .del:hover{color:var(--loss);background:var(--loss-bg)}

/* ───── options fields in modal ───── */
.opt-type-seg{display:flex;background:#000;border:1px solid var(--line);border-radius:10px;padding:3px;gap:3px;margin-bottom:10px}

/* expiry banner */
.expiry-banner{padding:11px 14px;border-radius:11px;font-size:12.5px;margin-bottom:12px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;line-height:1.45}
.expiry-banner.warn{background:#2A2410;color:#E8B96A;border:1px solid #5A4818}
.expiry-banner.over{background:var(--loss-bg);color:var(--loss);border:1px solid var(--loss-d)}
.expiry-banner .msg{flex:1;min-width:140px;font-weight:600}
.expiry-banner .acts{display:flex;gap:5px;flex-wrap:wrap}
.expiry-banner button{padding:5px 11px;border-radius:7px;font-size:11px;font-weight:700;background:rgba(255,255,255,.08);color:inherit;border:1px solid rgba(255,255,255,.18);transition:.15s}
.expiry-banner button:hover{background:rgba(255,255,255,.16)}

/* tx editable hint */
.tx-row.editable{cursor:pointer;transition:.15s}
.tx-row.editable:hover{background:#080808}
.tx-hint{font-size:10.5px;color:var(--muted2);margin-top:-4px;margin-bottom:8px;text-align:center;font-weight:500;letter-spacing:.02em}

/* cash line in hero */
.cash-line{text-align:center;color:var(--muted);font-size:11.5px;margin-top:4px;font-variant-numeric:tabular-nums}
.cash-line .ic{margin-inline-end:4px;opacity:.7}
.cash-line .v{color:var(--blue);font-weight:600}

/* weekly summary banner */
.week-banner{background:linear-gradient(135deg,#0c1e1a,#0a1a2a);border:1px solid #1a3a3a;border-radius:14px;padding:13px 15px;margin-bottom:14px;display:flex;align-items:center;gap:11px;font-size:12.5px;position:relative}
.week-banner .ic{font-size:20px;flex-shrink:0}
.week-banner .body{flex:1;line-height:1.55}
.week-banner .body .ttl{font-weight:700;color:var(--accent);margin-bottom:2px;font-size:12px;letter-spacing:.03em;text-transform:uppercase}
.week-banner .body .txt{color:var(--txt2)}
.week-banner .close{position:absolute;top:8px;right:10px;color:var(--muted2);font-size:13px;width:22px;height:22px;border-radius:5px;display:grid;place-items:center}
body[dir="rtl"] .week-banner .close{right:auto;left:10px}
.week-banner .close:hover{color:var(--txt)}

/* watchlist */
.watch-empty{text-align:center;padding:50px 22px;color:var(--muted)}
.watch-list{display:flex;flex-direction:column;gap:1px;background:var(--line);border-radius:14px;overflow:hidden;border:1px solid var(--line)}
.watch-row{background:var(--bg);padding:13px 14px;display:flex;align-items:center;gap:11px;cursor:pointer;transition:.15s}
.watch-row:hover{background:var(--surf)}
.watch-row .tic-bx{width:38px;height:38px;border-radius:9px;display:grid;place-items:center;font-weight:700;font-size:11.5px;flex-shrink:0;background:#1A1F2E;color:#5BA5FF;border:1px solid #1F3A6E33}
.watch-row .info{flex:1;min-width:0}
.watch-row .info .t{font-weight:700;font-size:14.5px}
.watch-row .info .s{color:var(--muted);font-size:11.5px;margin-top:2px}
.watch-row .rt{text-align:right;flex-shrink:0}
body[dir="rtl"] .watch-row .rt{text-align:left}
.watch-row .rt .pr{font-weight:700;font-size:13.5px;font-variant-numeric:tabular-nums}
.watch-row .rt .ch{font-size:11.5px;font-weight:600;margin-top:2px;font-variant-numeric:tabular-nums}
.tgt-pill{font-size:9.5px;font-weight:700;padding:2px 6px;border-radius:4px;margin-inline-start:6px;letter-spacing:.04em}
.tgt-pill.hit{background:var(--accent-bg);color:var(--accent)}
.tgt-pill.stop{background:var(--loss-bg);color:var(--loss)}

/* targets / stop / notes inputs in detail */
.tgt-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.tgt-cell{background:#000;border:1px solid var(--line);border-radius:10px;padding:8px 10px}
.tgt-cell .lbl{font-size:10px;color:var(--muted);font-weight:700;letter-spacing:.05em;text-transform:uppercase;margin-bottom:4px}
.tgt-cell.target .lbl{color:var(--accent)}
.tgt-cell.stop .lbl{color:var(--loss)}
.tgt-cell input{background:transparent;border:none;color:var(--txt);font-size:14px;font-weight:700;width:100%;outline:none;font-variant-numeric:tabular-nums;padding:0}
.tgt-cell input::placeholder{color:var(--muted2);font-weight:400}
.notes-textarea{width:100%;background:#000;border:1px solid var(--line);border-radius:10px;padding:10px 12px;color:var(--txt);font-size:13px;font-family:inherit;resize:vertical;min-height:60px;outline:none;line-height:1.55;margin-bottom:12px}
.notes-textarea:focus{border-color:var(--accent-d)}

/* dividend row */
.div-list{background:#000;border:1px solid var(--line);border-radius:11px;overflow:hidden;margin-bottom:8px}
.div-row{display:flex;align-items:center;gap:10px;padding:9px 12px;border-bottom:1px solid var(--line);font-size:12px;font-variant-numeric:tabular-nums}
.div-row:last-child{border-bottom:none}
.div-row .ic{color:var(--gold);font-size:13px;flex-shrink:0}
.div-row .dt{color:var(--muted);min-width:78px;font-size:11px}
.div-row .nt{flex:1;color:var(--muted)}
.div-row .am{font-weight:700;color:var(--accent)}
.div-row .del{color:var(--muted2);width:24px;height:24px;border-radius:5px;display:grid;place-items:center;font-size:11px}
.div-row .del:hover{color:var(--loss);background:var(--loss-bg)}
.add-btn{display:flex;align-items:center;justify-content:center;gap:6px;padding:9px;border-radius:10px;background:transparent;border:1px dashed var(--line2);color:var(--muted);font-size:12.5px;font-weight:600;width:100%;cursor:pointer;transition:.15s}
.add-btn:hover{border-color:var(--accent-d);color:var(--accent)}

/* earnings card */
.earn-card{background:#000;border:1px solid var(--line);border-radius:11px;padding:11px 13px;margin-bottom:10px;font-size:12px}
.earn-card .head{font-size:10.5px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.earn-card .when{font-weight:700;font-size:13.5px;color:var(--gold)}
.earn-card .est{color:var(--muted2);font-size:11px;margin-top:3px}

/* insider rows */
.ins-list{background:#000;border:1px solid var(--line);border-radius:11px;overflow:hidden;margin-bottom:8px;max-height:200px;overflow-y:auto}
.ins-row{padding:8px 12px;border-bottom:1px solid var(--line);font-size:11.5px;display:flex;align-items:center;gap:10px;font-variant-numeric:tabular-nums}
.ins-row:last-child{border-bottom:none}
.ins-row .nm{flex:1;font-weight:600;font-size:11.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--txt2)}
.ins-row .act{font-size:9.5px;font-weight:700;padding:1px 5px;border-radius:3px;letter-spacing:.04em}
.ins-row .act.buy{background:var(--accent-bg);color:var(--accent)}
.ins-row .act.sell{background:var(--loss-bg);color:var(--loss)}
.ins-row .qty{font-size:11px;color:var(--muted);min-width:70px;text-align:right}
.ins-row .dt{font-size:10.5px;color:var(--muted2);min-width:64px}

/* collapsible section */
.coll{margin-bottom:12px}
.coll-head{display:flex;align-items:center;justify-content:space-between;padding:9px 0;cursor:pointer;user-select:none}
.coll-head .ttl{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
.coll-head .ar{color:var(--muted2);font-size:11px;transition:transform .2s}
.coll.open .coll-head .ar{transform:rotate(180deg)}
.coll-body{display:none}
.coll.open .coll-body{display:block}

/* challenge bar */
.ch-bar-card{background:linear-gradient(135deg,#16140a,#0f1810);border:1px solid #3a3015;border-radius:14px;padding:13px 15px;margin-bottom:14px;display:flex;align-items:center;gap:11px;font-size:12.5px;cursor:pointer;transition:.15s}
.ch-bar-card:hover{background:linear-gradient(135deg,#1a1808,#13200f);border-color:#5a4815}
.ch-bar-card .ic{font-size:22px;flex-shrink:0}
.ch-bar-card .body{flex:1;min-width:0}
.ch-bar-card .body .nm{font-weight:700;font-size:13px;color:var(--gold);margin-bottom:3px}
.ch-bar-card .body .pg{height:6px;background:#1A1A1A;border-radius:3px;overflow:hidden;margin-bottom:4px}
.ch-bar-card .body .pg-fill{height:100%;background:linear-gradient(90deg,#E8B96A,#5FE9B0);border-radius:3px;transition:width .3s}
.ch-bar-card .body .meta{font-size:11px;color:var(--muted);font-variant-numeric:tabular-nums}
.ch-bar-card .body .meta b{color:var(--txt);font-weight:700}
.ch-bar-card .ar{color:var(--muted);font-size:14px}

/* challenge page */
.ch-empty{text-align:center;padding:60px 22px;color:var(--muted)}
.ch-empty .ic{font-size:54px;margin-bottom:10px;opacity:.5}
.ch-card{background:var(--surf);border:1px solid var(--line);border-radius:14px;padding:15px;margin-bottom:12px}
.ch-card .top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;gap:10px}
.ch-card .top .nm{font-size:15px;font-weight:700;letter-spacing:-.2px}
.ch-card .top .dates{color:var(--muted);font-size:11px;margin-top:2px;font-variant-numeric:tabular-nums}
.ch-card .top .badge{padding:3px 9px;border-radius:5px;font-size:10px;font-weight:700;letter-spacing:.04em}
.ch-card .top .badge.active{background:var(--accent-bg);color:var(--accent)}
.ch-card .top .badge.done{background:#1F3A6E33;color:#5BA5FF}
.ch-card .top .badge.failed{background:var(--loss-bg);color:var(--loss)}
.ch-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px}
.ch-stat{text-align:center;padding:9px 6px;background:#000;border-radius:9px;border:1px solid var(--line)}
.ch-stat .lbl{font-size:9.5px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.05em}
.ch-stat .v{font-size:14.5px;font-weight:700;margin-top:3px;font-variant-numeric:tabular-nums;letter-spacing:-.3px}
.ch-pg{height:7px;background:#0E0E0E;border-radius:4px;overflow:hidden;margin-bottom:9px}
.ch-pg .fill{height:100%;border-radius:4px;transition:width .3s}
.ch-pg .fill.gain{background:linear-gradient(90deg,#5FE9B0,#34D399)}
.ch-pg .fill.loss{background:linear-gradient(90deg,#F26B6E,#EF4444)}
.ch-trades{margin-top:10px}
.ch-trade{display:flex;align-items:center;gap:9px;padding:8px 10px;background:#000;border:1px solid var(--line);border-radius:9px;margin-bottom:5px;font-size:11.5px;font-variant-numeric:tabular-nums}
.ch-trade .nm{flex:1;font-weight:700}
.ch-trade .nm .tic{color:var(--accent)}
.ch-trade .am{color:var(--muted);font-size:10.5px}
.ch-trade .ret{font-weight:700}
.ch-trade .open{font-size:9.5px;font-weight:700;padding:1px 5px;border-radius:3px;background:var(--gold);color:#000}

/* achievements grid */
.ach-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.ach{background:#000;border:1px solid var(--line);border-radius:11px;padding:13px 6px;text-align:center;opacity:.35;transition:.2s;position:relative}
.ach.earned{opacity:1;background:linear-gradient(135deg,#0e1f17,#0a1a15);border-color:#1e5c44}
.ach .ic{font-size:28px;line-height:1;margin-bottom:6px}
.ach .nm{font-size:10.5px;font-weight:700;color:var(--txt);letter-spacing:-.1px;line-height:1.3;min-height:26px;display:flex;align-items:center;justify-content:center;padding:0 2px}
.ach .ds{font-size:9px;color:var(--muted);margin-top:3px;line-height:1.4}

/* achievement popup */
.ach-pop{position:fixed;top:80px;left:50%;transform:translateX(-50%) translateY(-10px);background:linear-gradient(135deg,#0e3a28,#0a2018);border:1px solid #34D399;border-radius:14px;padding:14px 18px 14px 14px;z-index:90;display:flex;align-items:center;gap:12px;box-shadow:0 14px 40px rgba(0,0,0,.7);max-width:90vw;animation:ach-in .3s ease-out forwards}
@keyframes ach-in{to{transform:translateX(-50%) translateY(0);opacity:1}}
.ach-pop .ic{font-size:34px;line-height:1;flex-shrink:0}
.ach-pop .nm{font-size:11px;font-weight:700;color:var(--accent);letter-spacing:.06em;text-transform:uppercase}
.ach-pop .ds{font-size:13.5px;font-weight:700;color:var(--txt);margin-top:2px}

/* settings sections */
.set-section{margin-bottom:14px}
.set-section h4{margin:6px 0 8px;font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.08em}
.set-section .info{font-size:12px;color:var(--muted);margin-top:4px;line-height:1.55}

/* ── marketing landing (full page when logged out) ── */
.mkt{position:fixed;inset:0;overflow-y:auto;overflow-x:hidden;background:#0A0A0A;-webkit-overflow-scrolling:touch}
.mkt::before{content:"";position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 50% -20%,rgba(95,233,176,.08),transparent 60%),radial-gradient(ellipse 60% 40% at 80% 70%,rgba(91,165,255,.04),transparent 60%);pointer-events:none;z-index:0}
.mkt::after{content:"";position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,.015) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.015) 1px,transparent 1px);background-size:60px 60px;pointer-events:none;z-index:0;opacity:.5}
.mkt-wrap{position:relative;z-index:1;max-width:1180px;margin:0 auto;padding:0 22px}

.mkt-nav{position:sticky;top:0;z-index:50;backdrop-filter:saturate(180%) blur(14px);-webkit-backdrop-filter:saturate(180%) blur(14px);background:rgba(10,10,10,.72);border-bottom:1px solid rgba(255,255,255,.04)}
.mkt-nav-in{max-width:1180px;margin:0 auto;padding:13px 22px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.mkt-logo{display:flex;align-items:center;gap:10px;font-weight:800;font-size:18px;letter-spacing:-.5px;color:var(--txt)}
.circle-ico{width:30px;height:30px;border-radius:50%;border:2.5px solid var(--accent);background:radial-gradient(circle at 50% 50%,rgba(95,233,176,.15),transparent 70%);position:relative;display:inline-block;box-shadow:0 0 18px rgba(95,233,176,.35)}
.circle-ico::after{content:"";position:absolute;inset:5px;border-radius:50%;background:var(--accent);box-shadow:0 0 10px var(--accent)}
.mkt-nav-r{display:flex;align-items:center;gap:8px}
.mkt-lang{background:transparent;border:1px solid var(--line2);color:var(--txt2);padding:6px 11px;border-radius:7px;font-size:12px;font-weight:700;letter-spacing:.05em;cursor:pointer;font-family:inherit;transition:.15s}
.mkt-lang:hover{border-color:var(--muted2);background:var(--surf)}
.mkt-login{background:transparent;border:1px solid var(--line2);color:var(--txt2);padding:7px 14px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:.15s}
.mkt-login:hover{border-color:var(--accent-d);color:var(--accent);background:var(--accent-bg)}

.mkt-hero{padding:80px 0 50px;text-align:center}
@media (max-width:680px){.mkt-hero{padding:50px 0 36px}}
.mkt-badge{display:inline-flex;align-items:center;gap:7px;background:var(--accent-bg);border:1px solid var(--accent-d);color:var(--accent);font-size:12px;font-weight:700;padding:6px 13px;border-radius:99px;margin-bottom:22px;letter-spacing:.02em}
.mkt-badge .dot{width:6px;height:6px;border-radius:50%;background:var(--accent);box-shadow:0 0 10px var(--accent);animation:mpulse 2s ease-in-out infinite}
@keyframes mpulse{0%,100%{opacity:1}50%{opacity:.4}}
.mkt-hero h1{font-size:clamp(34px,7vw,64px);font-weight:900;letter-spacing:-.03em;line-height:1.08;margin:0 0 18px;background:linear-gradient(180deg,#fff 30%,#888);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.mkt-hero h1 .acc{background:linear-gradient(135deg,#5FE9B0 30%,#A8FFD8);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.mkt-hero .sub{font-size:clamp(15px,2.3vw,18px);color:var(--muted);max-width:600px;margin:0 auto 32px;line-height:1.65}
.mkt-ctas{display:flex;gap:11px;justify-content:center;flex-wrap:wrap;margin-bottom:14px}
.mkt-cta-1{background:var(--accent);color:#000;padding:14px 28px;border-radius:11px;font-size:15px;font-weight:800;border:none;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:9px;box-shadow:0 10px 32px rgba(95,233,176,.25);transition:.2s}
.mkt-cta-1:hover{transform:translateY(-2px);box-shadow:0 16px 44px rgba(95,233,176,.4)}
.mkt-cta-1 .arr{font-size:13px;transition:transform .2s;display:inline-block}
body[dir="rtl"] .mkt-cta-1 .arr{transform:scaleX(-1)}
.mkt-cta-2{background:transparent;color:var(--txt2);padding:14px 22px;border-radius:11px;font-size:14.5px;font-weight:700;border:1px solid var(--line2);cursor:pointer;font-family:inherit;transition:.2s}
.mkt-cta-2:hover{border-color:var(--muted2);background:var(--surf)}
.mkt-meta{font-size:12.5px;color:var(--muted2);display:inline-flex;align-items:center;gap:14px;flex-wrap:wrap;justify-content:center;margin-top:10px}
.mkt-meta .sep{width:3px;height:3px;border-radius:50%;background:var(--muted2)}

.mkt-stats{margin-top:50px;padding:22px;background:linear-gradient(180deg,var(--surf),transparent);border-top:1px solid var(--line);border-bottom:1px solid var(--line)}
.mkt-stats-grid{max-width:880px;margin:0 auto;display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
@media (max-width:680px){.mkt-stats-grid{grid-template-columns:repeat(2,1fr);gap:18px}}
.mkt-stat{text-align:center}
.mkt-stat .n{font-size:clamp(22px,3.5vw,30px);font-weight:800;letter-spacing:-.02em;font-variant-numeric:tabular-nums}
.mkt-stat .n.g{color:var(--accent)}
.mkt-stat .n.gd{color:var(--gold)}
.mkt-stat .n.b{color:#5BA5FF}
.mkt-stat .l{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.1em;margin-top:5px}

.mkt-section{padding:80px 0}
@media (max-width:680px){.mkt-section{padding:50px 0}}
.mkt-section-head{text-align:center;margin-bottom:42px}
.mkt-tag{display:inline-block;color:var(--accent);font-size:11px;font-weight:800;letter-spacing:.18em;text-transform:uppercase;margin-bottom:14px}
.mkt-h{font-size:clamp(28px,4.5vw,42px);font-weight:900;letter-spacing:-.025em;line-height:1.15;margin:0 0 14px}
.mkt-sub{font-size:clamp(14px,2vw,16px);color:var(--muted);max-width:580px;margin:0 auto;line-height:1.65}

.mkt-features{display:grid;grid-template-columns:repeat(3,1fr);gap:13px}
@media (max-width:920px){.mkt-features{grid-template-columns:repeat(2,1fr)}}
@media (max-width:580px){.mkt-features{grid-template-columns:1fr}}
.mkt-feat{background:var(--surf);border:1px solid var(--line);border-radius:16px;padding:22px 20px;transition:.25s}
.mkt-feat:hover{border-color:var(--line2);transform:translateY(-2px);background:var(--surf2)}
.mkt-feat .ico{width:44px;height:44px;border-radius:11px;background:var(--bg);border:1px solid var(--line2);display:grid;place-items:center;font-size:20px;margin-bottom:16px}
.mkt-feat.g .ico{background:var(--accent-bg);border-color:var(--accent-d)}
.mkt-feat.gd .ico{background:#1F1A0E;border-color:#5A4818}
.mkt-feat.b .ico{background:#0E1828;border-color:#1F3A6E}
.mkt-feat h3{font-size:16px;font-weight:800;margin:0 0 7px;letter-spacing:-.3px}
.mkt-feat p{font-size:13px;color:var(--muted);line-height:1.6;margin:0}

.mkt-showcase{background:linear-gradient(180deg,transparent,var(--surf) 30%,var(--surf) 70%,transparent);position:relative}
.mkt-phones{display:flex;justify-content:center;align-items:center;gap:20px;margin-top:42px;flex-wrap:wrap}
.mkt-phone{width:265px;background:#000;border:1px solid var(--line2);border-radius:30px;padding:13px 9px;box-shadow:0 22px 70px rgba(0,0,0,.7),inset 0 0 0 1px rgba(255,255,255,.04);flex-shrink:0;transition:.4s}
.mkt-phone:nth-child(2){transform:translateY(-22px)}
.mkt-phone:hover{transform:translateY(-6px) scale(1.02)}
.mkt-phone:nth-child(2):hover{transform:translateY(-28px) scale(1.02)}
@media (max-width:920px){.mkt-phone{width:240px}.mkt-phone:nth-child(2){transform:none;order:-1}}
@media (max-width:680px){.mkt-phones{gap:12px}.mkt-phone{width:calc(50% - 6px);max-width:200px}.mkt-phone:nth-child(3){display:none}}
.mkt-phone .notch{width:55px;height:5px;border-radius:99px;background:#1A1A1A;margin:0 auto 10px}
.mkt-phone .screen{background:var(--bg);border-radius:22px;overflow:hidden;font-size:10px;color:var(--txt);padding:13px 11px;min-height:450px}

.mkt-pricing-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;max-width:760px;margin:0 auto}
@media (max-width:680px){.mkt-pricing-grid{grid-template-columns:1fr}}
.mkt-price{background:var(--surf);border:1px solid var(--line);border-radius:20px;padding:30px 26px;position:relative;transition:.25s}
.mkt-price.feat{border-color:var(--accent-d);background:linear-gradient(180deg,var(--accent-bg) 0%,var(--surf) 100%)}
.mkt-price.feat::before{content:"الأكثر شعبية";position:absolute;top:-1px;inset-inline-end:22px;background:var(--accent);color:#000;font-size:10.5px;font-weight:800;padding:5px 11px;border-radius:0 0 8px 8px;letter-spacing:.03em}
body[dir="ltr"] .mkt-price.feat::before{content:"MOST POPULAR"}
.mkt-price h3{font-size:21px;font-weight:800;margin:0 0 6px;letter-spacing:-.3px}
.mkt-price .tagp{display:flex;align-items:baseline;gap:6px;margin:16px 0}
.mkt-price .p{font-size:42px;font-weight:900;letter-spacing:-.03em;font-variant-numeric:tabular-nums}
.mkt-price .p.gr{color:var(--accent)}
.mkt-price .pp{color:var(--muted);font-size:13px;font-weight:600}
.mkt-price .ds{color:var(--muted);font-size:13.5px;line-height:1.55;margin-bottom:18px}
.mkt-price ul{list-style:none;padding:0;margin:0}
.mkt-price li{font-size:13.5px;color:var(--txt2);padding:6px 0;display:flex;align-items:flex-start;gap:9px;line-height:1.5}
.mkt-price li::before{content:"✓";color:var(--accent);font-weight:900;font-size:13px;flex-shrink:0;margin-top:1px}
.mkt-price .pcta{width:100%;margin-top:22px;padding:13px;border-radius:11px;font-size:14px;font-weight:800;text-align:center;display:block;transition:.2s;border:none;cursor:pointer;font-family:inherit;text-decoration:none}
.mkt-price .pcta.free{background:var(--txt);color:#000}
.mkt-price .pcta.free:hover{transform:translateY(-2px);box-shadow:0 8px 22px rgba(250,250,250,.18)}
.mkt-price .pcta.prem{background:var(--accent);color:#000}
.mkt-price .pcta.prem:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(95,233,176,.3)}

.mkt-cta-section{text-align:center;background:linear-gradient(180deg,transparent,var(--surf));position:relative;overflow:hidden}
.mkt-cta-section::before{content:"";position:absolute;inset:0;background:radial-gradient(ellipse 60% 50% at 50% 100%,rgba(95,233,176,.12),transparent 70%);pointer-events:none}
.mkt-cta-section .mkt-wrap{position:relative;z-index:1}

.mkt-footer{border-top:1px solid var(--line);padding:32px 0 50px;margin-top:30px;position:relative;z-index:1}
.mkt-footer-in{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:18px;max-width:1180px;margin:0 auto;padding:0 22px}
.mkt-footer-l{display:flex;align-items:center;gap:8px;font-weight:800;font-size:14px;color:var(--txt2)}
.mkt-footer-l .ico-s{width:22px;height:22px;border-radius:50%;border:2px solid var(--accent);background:radial-gradient(circle,rgba(95,233,176,.2),transparent 70%);position:relative}
.mkt-footer-l .ico-s::after{content:"";position:absolute;inset:4px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent)}
.mkt-footer-meta{font-size:12px;color:var(--muted)}
.mkt-footer-links{display:flex;gap:18px}
.mkt-footer-links a{color:var(--muted);font-size:12.5px;text-decoration:none;transition:.15s;cursor:pointer}
.mkt-footer-links a:hover{color:var(--txt)}

/* phone mockup contents */
.mp .pf-name{display:flex;align-items:center;justify-content:space-between;margin-bottom:13px}
.mp .pf-name .name{background:var(--surf);border:1px solid var(--line);border-radius:99px;padding:4px 11px;font-weight:700;font-size:10px;display:inline-flex;align-items:center;gap:5px}
.mp .pf-name .dot{width:6px;height:6px;border-radius:50%;background:var(--accent)}
.mp .pf-name .acts{display:flex;gap:4px}
.mp .pf-name .acts span{width:18px;height:18px;border:1px solid var(--line);border-radius:5px;display:grid;place-items:center;font-size:8px;color:var(--muted)}
.mp .day{font-size:8.5px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;text-align:center;margin-bottom:5px;font-weight:700}
.mp .hero-s{text-align:center;margin-bottom:10px}
.mp .lbls{display:flex;justify-content:center;gap:24px;font-size:8.5px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.mp .vals{display:flex;justify-content:center;gap:24px;font-size:17px;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:-.5px}
.mp .vals .pl{color:var(--accent)}
.mp .delta{font-size:9px;color:var(--accent);font-weight:700;margin-top:3px}
.mp .inv{text-align:center;color:var(--muted);font-size:9px;border-top:1px solid var(--line);padding-top:9px;margin-top:9px;margin-bottom:10px}
.mp .inv .up{color:var(--accent);font-weight:700}
.mp .mtabs{display:flex;gap:3px;margin-bottom:11px;background:#000;border:1px solid var(--line);border-radius:7px;padding:2px}
.mp .mtabs .t{flex:1;padding:5px;text-align:center;font-size:8.5px;font-weight:700;border-radius:5px;color:var(--muted)}
.mp .mtabs .t.on{background:var(--surf2);color:var(--txt)}
.mp .bubs{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-bottom:9px}
.mp .bub{aspect-ratio:1;border-radius:9px;display:grid;place-items:center;font-weight:800;font-size:10px;border:1px solid;text-align:center;line-height:1.1;padding:3px}
.mp .bub .pct{font-size:7.5px;font-weight:700;margin-top:2px}
.mp .bub.g1{background:var(--accent-bg);border-color:var(--accent-d);color:var(--accent)}
.mp .bub.g2{background:#0a1812;border-color:#143028;color:#3ad19a}
.mp .bub.r{background:#2A0E10;border-color:#5C1F22;color:#F26B6E}
.mp .dh{display:flex;align-items:center;gap:8px;margin-bottom:11px}
.mp .dh .tic{width:34px;height:34px;border-radius:8px;display:grid;place-items:center;font-weight:800;font-size:10px;background:var(--accent-bg);color:var(--accent);border:1px solid var(--accent-d)}
.mp .dh .nm{font-weight:800;font-size:14px;display:flex;align-items:center;gap:6px}
.mp .dh .bc{font-size:7.5px;font-weight:700;padding:1px 5px;border-radius:3px;background:#1F2E25;color:var(--accent);letter-spacing:.05em;border:1px solid var(--accent-d)}
.mp .dh .sub{font-size:8.5px;color:var(--muted);margin-top:1px}
.mp .malert{padding:7px 9px;background:var(--accent-bg);border:1px solid var(--accent-d);border-radius:8px;font-size:9px;color:var(--accent);margin-bottom:9px;font-weight:600;text-align:center}
.mp .mtrade{display:flex;gap:5px;margin-bottom:11px}
.mp .mtrade .tb{flex:1;padding:8px;border-radius:8px;font-size:10px;font-weight:800;text-align:center;border:1px solid}
.mp .mtrade .tb.b{background:var(--accent-bg);color:var(--accent);border-color:var(--accent-d)}
.mp .mtrade .tb.s{background:#2A0E10;color:#F26B6E;border-color:#5C1F22}
.mp .mgreeks{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin-bottom:11px}
.mp .mgreeks .g{background:#000;border:1px solid var(--line);border-radius:6px;padding:5px 3px;text-align:center}
.mp .mgreeks .g .l{font-size:7px;color:var(--muted);font-weight:700;letter-spacing:.04em}
.mp .mgreeks .g .v{font-size:9.5px;font-weight:800;margin-top:2px;font-variant-numeric:tabular-nums}
.mp .mgreeks .g .v.u{color:var(--accent)}
.mp .mchart{height:60px;background:#000;border:1px solid var(--line);border-radius:8px;padding:6px;margin-bottom:10px}
.mp .mchart svg{width:100%;height:100%}
.mp .mtgts{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:9px}
.mp .mtgts .c{background:#000;border:1px solid var(--line);border-radius:7px;padding:5px 7px}
.mp .mtgts .c .l{font-size:7px;font-weight:800;letter-spacing:.04em}
.mp .mtgts .c.t .l{color:var(--accent)}
.mp .mtgts .c.s .l{color:#F26B6E}
.mp .mtgts .c .v{font-size:12px;font-weight:800;font-variant-numeric:tabular-nums;margin-top:2px}
.mp .mch-h{display:flex;align-items:center;gap:6px;margin-bottom:14px}
.mp .mch-h .i{font-size:18px;color:var(--gold)}
.mp .mch-h h3{font-size:13px;font-weight:800;margin:0}
.mp .mcc{background:var(--surf);border:1px solid var(--line);border-radius:10px;padding:11px}
.mp .mcc-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.mp .mcc-top .nm{font-size:11px;font-weight:800;letter-spacing:-.2px}
.mp .mcc-top .dt{font-size:7.5px;color:var(--muted);margin-top:1px}
.mp .mcc-top .bd{font-size:7.5px;font-weight:800;padding:2px 6px;border-radius:3px;background:var(--accent-bg);color:var(--accent);letter-spacing:.04em}
.mp .mcc3{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;margin-bottom:9px}
.mp .mcc3 .c{text-align:center;padding:6px 4px;background:#000;border-radius:6px;border:1px solid var(--line)}
.mp .mcc3 .c .l{font-size:7px;color:var(--muted);font-weight:800;letter-spacing:.04em}
.mp .mcc3 .c .v{font-size:10.5px;font-weight:800;margin-top:2px;font-variant-numeric:tabular-nums}
.mp .mcc3 .c .v.u{color:var(--accent)}
.mp .mcpg{height:5px;background:#0E0E0E;border-radius:3px;overflow:hidden;margin-bottom:8px}
.mp .mcpg .f{height:100%;background:linear-gradient(90deg,#E8B96A,#5FE9B0);border-radius:3px;width:72%}
.mp .mct{display:flex;flex-direction:column;gap:3px}
.mp .mct .r{display:flex;align-items:center;gap:5px;padding:5px 7px;background:#000;border:1px solid var(--line);border-radius:6px;font-size:8.5px}
.mp .mct .r .n{flex:1;font-weight:800;color:var(--accent)}
.mp .mct .r .a{color:var(--muted);font-size:7.5px}
.mp .mct .r .p{font-weight:800;color:var(--accent)}

/* ── Pull to refresh ── */
.ptr-indicator{position:fixed;top:0;left:0;right:0;height:0;display:flex;align-items:flex-end;justify-content:center;pointer-events:none;z-index:100;transition:height .2s ease-out;overflow:hidden}
.ptr-indicator.show{height:54px}
.ptr-indicator .ptr-inner{display:flex;align-items:center;justify-content:center;gap:8px;background:rgba(8,8,8,.92);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border:1px solid var(--line);border-radius:999px;padding:8px 14px;color:var(--accent);font-size:11px;font-weight:700;margin-bottom:8px;letter-spacing:.04em}
.ptr-spin{width:14px;height:14px;border:2px solid var(--accent);border-top-color:transparent;border-radius:50%;animation:ptrSpin .8s linear infinite;display:inline-block}
@keyframes ptrSpin{to{transform:rotate(360deg)}}
.ptr-arrow{display:inline-block;font-size:14px;transition:transform .2s}
.ptr-arrow.up{transform:rotate(180deg)}

/* ── Daily Brief ── */
.brief-wrap{background:linear-gradient(180deg,#0E2517,#0A1812);border:1px solid var(--accent-d);border-radius:16px;padding:22px 20px;margin-bottom:16px;position:relative;overflow:hidden}
.brief-wrap::before{content:'';position:absolute;top:-50%;right:-30%;width:280px;height:280px;background:radial-gradient(circle,rgba(95,233,176,.18),transparent 70%);pointer-events:none}
.brief-greeting{font-size:12.5px;color:var(--accent);font-weight:700;letter-spacing:.06em;margin-bottom:4px}
.brief-h{font-size:22px;font-weight:900;letter-spacing:-.5px;margin-bottom:12px;line-height:1.3}
.brief-pl{font-size:32px;font-weight:900;font-variant-numeric:tabular-nums;letter-spacing:-.8px;line-height:1;margin-bottom:8px}
.brief-pl.up{color:var(--accent)}
.brief-pl.down{color:var(--loss)}
.brief-pct{font-size:13px;color:var(--muted);font-weight:700;font-variant-numeric:tabular-nums}
.brief-movers{margin-top:18px}
.brief-movers-h{font-size:10px;color:var(--muted);font-weight:800;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
.brief-mover{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-top:1px solid rgba(255,255,255,.06);font-size:12px}
.brief-mover:first-of-type{border-top:none}
.brief-mover .tic{font-weight:800;color:var(--txt)}
.brief-mover .val{font-variant-numeric:tabular-nums;font-weight:700}
.brief-mover .val.up{color:var(--accent)}
.brief-mover .val.down{color:var(--loss)}

/* ── Paper trading badge ── */
.paper-badge{font-size:8.5px;font-weight:800;padding:2px 6px;border-radius:4px;background:#0E1828;color:#5BA5FF;border:1px solid #1F3A6E;letter-spacing:.08em;display:inline-flex;align-items:center;gap:4px}
.paper-bg-tint{background:linear-gradient(135deg,rgba(91,165,255,.08),transparent)}

/* ── Community ── */
.com-post-form{background:linear-gradient(135deg,#0E1F17,#0a1812);border:1px solid var(--accent-d);border-radius:14px;padding:14px;margin-bottom:14px}
.com-post-form textarea{width:100%;background:#000;border:1px solid var(--line);color:var(--txt);padding:11px 13px;border-radius:10px;font-family:inherit;font-size:13.5px;line-height:1.55;min-height:80px;resize:vertical}
.com-post-form textarea:focus{outline:none;border-color:var(--accent-d)}
.com-post-form .actions{display:flex;justify-content:space-between;align-items:center;margin-top:8px}
.com-post-form .meta{font-size:10px;color:var(--muted2);font-variant-numeric:tabular-nums}
.com-post-form button{background:var(--accent);color:#000;border:none;padding:9px 18px;border-radius:9px;font-weight:800;font-size:12.5px;cursor:pointer;font-family:inherit}
.com-post-form button:disabled{opacity:.4;cursor:not-allowed}
.com-feed{display:flex;flex-direction:column;gap:10px}
.com-post{background:var(--surf);border:1px solid var(--line);border-radius:14px;padding:14px;transition:.18s}
.com-post .head{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.com-post .avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#1A1F2E,#0E1828);color:#5BA5FF;display:grid;place-items:center;font-weight:800;font-size:13px;border:1px solid #1F3A6E33;flex-shrink:0}
.com-post .meta{flex:1;min-width:0}
.com-post .pseudo{font-weight:800;font-size:12.5px;color:var(--txt)}
.com-post .dt{font-size:10px;color:var(--muted2);font-variant-numeric:tabular-nums}
.com-post .body{font-size:13.5px;line-height:1.6;color:var(--txt2);white-space:pre-wrap;margin-bottom:10px}
.com-post .tickers{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
.com-post .tic-pill{font-size:11px;font-weight:800;padding:2px 8px;border-radius:5px;background:var(--accent-bg);color:var(--accent);border:1px solid var(--accent-d);font-variant-numeric:tabular-nums;letter-spacing:.04em}
.com-post .footer{display:flex;align-items:center;gap:14px;padding-top:10px;border-top:1px solid var(--line)}
.com-post .act{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--muted);font-weight:700;cursor:pointer;background:none;border:none;font-family:inherit;padding:4px 8px;border-radius:6px;transition:.15s}
.com-post .act:hover{color:var(--txt2);background:var(--surf2)}
.com-post .act.liked{color:var(--accent)}
.com-post .act.liked .heart{color:var(--accent)}
.com-post .act .heart{font-size:14px}
.com-post .del-btn{margin-inline-start:auto;background:none;border:none;color:var(--muted2);cursor:pointer;font-size:13px;font-family:inherit;padding:4px 8px;border-radius:6px;transition:.15s}
.com-post .del-btn:hover{color:var(--loss)}
.com-comments-list{margin-top:10px;padding-top:10px;border-top:1px solid var(--line);display:none}
.com-post.expanded .com-comments-list{display:block}
.com-comment{display:flex;gap:9px;padding:8px 0;align-items:flex-start;font-size:12px}
.com-comment .av-sm{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,#1A1F2E,#0E1828);color:#5BA5FF;display:grid;place-items:center;font-weight:800;font-size:10px;border:1px solid #1F3A6E33;flex-shrink:0}
.com-comment .body{flex:1;min-width:0}
.com-comment .pseudo{font-weight:800;color:var(--txt);font-size:11.5px}
.com-comment .dt{font-size:9.5px;color:var(--muted2);margin-inline-start:6px}
.com-comment .text{margin-top:2px;color:var(--txt2);line-height:1.5}
.com-comment-form{display:flex;gap:6px;margin-top:8px}
.com-comment-form input{flex:1;background:#000;border:1px solid var(--line);color:var(--txt);padding:8px 11px;border-radius:8px;font-family:inherit;font-size:12px}
.com-comment-form button{background:var(--accent);color:#000;border:none;padding:8px 14px;border-radius:8px;font-weight:800;font-size:12px;cursor:pointer;font-family:inherit}
.com-locked{background:linear-gradient(135deg,#1F1A0E,#160E08);border:1px solid #5A4818;border-radius:14px;padding:24px 18px;text-align:center}
.com-locked .ic{font-size:32px;margin-bottom:8px}
.com-locked h3{font-size:16px;font-weight:800;color:var(--gold);margin:0 0 6px}
.com-locked p{font-size:12.5px;color:var(--muted);line-height:1.6;margin:0 auto 14px;max-width:280px}


/* ── Stock Assessment Tool (v12) ── */
.assess-stage{animation:slideIn .25s ease-out}
.assess-step-h{display:flex;align-items:center;gap:8px;margin:-4px 0 12px;font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.08em}
.assess-step-h .dot{width:6px;height:6px;border-radius:50%;background:var(--accent)}
.assess-stock-pick{background:linear-gradient(135deg,#0E1F17,#0a1812);border:1px solid var(--accent-d);border-radius:14px;padding:18px;margin-bottom:14px;text-align:center}
.assess-stock-pick .l{font-size:10.5px;color:var(--accent);font-weight:800;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
.assess-stock-pick input{width:100%;text-align:center;background:#000;border:1.5px solid var(--accent-d);color:var(--accent);font-size:24px;font-weight:800;padding:14px;border-radius:10px;font-family:inherit;text-transform:uppercase;letter-spacing:.1em;font-variant-numeric:tabular-nums}
.assess-stock-pick input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(95,233,176,.15)}
.assess-stock-pick .h-name{font-size:13px;color:var(--muted);margin-top:6px;min-height:16px}

.assess-crit-list{background:#000;border:1px solid var(--line);border-radius:12px;overflow:hidden}
.assess-crit-row{padding:12px 14px;border-bottom:1px solid var(--line);display:flex;align-items:flex-start;gap:9px;font-size:13px}
.assess-crit-row:last-child{border-bottom:none}
.assess-crit-row .check{width:22px;height:22px;border-radius:6px;border:1.5px solid var(--line2);display:grid;place-items:center;flex-shrink:0;margin-top:1px;cursor:pointer;transition:.15s;background:transparent}
.assess-crit-row .check.on{background:var(--accent);border-color:var(--accent)}
.assess-crit-row .check.on::after{content:"✓";color:#000;font-weight:800;font-size:14px;line-height:1}
.assess-crit-row .txt{flex:1;line-height:1.5;color:var(--txt2);cursor:pointer}
.assess-crit-row.included .txt{color:var(--txt)}
.assess-crit-row .actions{display:flex;gap:4px;flex-shrink:0;align-items:center}
.assess-crit-row .act-btn{width:26px;height:26px;border-radius:6px;background:transparent;border:1px solid var(--line2);color:var(--muted);font-size:11px;cursor:pointer;display:grid;place-items:center;transition:.15s;font-family:inherit}
.assess-crit-row .act-btn:hover{border-color:var(--line2);color:var(--txt2);background:var(--surf)}
.assess-add-crit{padding:14px;display:flex;gap:6px;border-top:1px dashed var(--line)}
.assess-add-crit input{flex:1;background:#000;border:1px solid var(--line);color:var(--txt);padding:9px 11px;border-radius:8px;font-size:13px;font-family:inherit}
.assess-add-crit button{background:var(--accent);color:#000;border:none;padding:9px 14px;border-radius:8px;font-weight:800;font-size:12.5px;cursor:pointer;font-family:inherit}

/* Rating dots (1-5 colored circles) */
.rate-q{padding:14px 14px 12px;border-bottom:1px solid var(--line);background:#000}
.rate-q:last-child{border-bottom:none}
.rate-q .q-txt{font-size:13.5px;font-weight:700;color:var(--txt);line-height:1.5;margin-bottom:10px}
.rate-q .q-dots{display:flex;gap:8px;justify-content:space-between;align-items:center;margin-bottom:8px}
.rate-q .dot{width:36px;height:36px;border-radius:50%;border:2px solid var(--line2);background:transparent;cursor:pointer;transition:.18s;display:grid;place-items:center;font-size:13px;font-weight:800;color:var(--muted2);font-family:inherit;font-variant-numeric:tabular-nums}
.rate-q .dot:hover{border-color:var(--line2);color:var(--txt2);transform:scale(1.05)}
.rate-q .dot.on{transform:scale(1.05)}
.rate-q .dot[data-r="1"].on{background:#3a0e10;border-color:#F26B6E;color:#F26B6E}
.rate-q .dot[data-r="2"].on{background:#3a1d10;border-color:#E89B6B;color:#E89B6B}
.rate-q .dot[data-r="3"].on{background:#3a3010;border-color:#E8B96A;color:#E8B96A}
.rate-q .dot[data-r="4"].on{background:#1A3025;border-color:#7FD9A5;color:#7FD9A5}
.rate-q .dot[data-r="5"].on{background:#0E2517;border-color:#5FE9B0;color:#5FE9B0}
.rate-q .scale-lbl{display:flex;justify-content:space-between;font-size:9px;color:var(--muted2);font-weight:700;text-transform:uppercase;letter-spacing:.06em;padding:0 2px}
.rate-q textarea{width:100%;margin-top:8px;background:transparent;border:1px solid var(--line);color:var(--muted);padding:7px 9px;border-radius:7px;font-size:11.5px;font-family:inherit;resize:none;min-height:34px}
.rate-q textarea:focus{outline:none;border-color:var(--accent-d);color:var(--txt2)}

/* Running total bar */
.rate-running{position:sticky;top:0;background:rgba(8,8,8,.94);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);z-index:5;padding:10px 12px;border:1px solid var(--line);border-radius:10px;margin-bottom:10px;display:flex;align-items:center;gap:10px}
.rate-running .r-bar{flex:1;height:6px;background:#1A1A1A;border-radius:3px;overflow:hidden}
.rate-running .r-fill{height:100%;background:linear-gradient(90deg,var(--loss),var(--gold),var(--accent));transition:width .25s}
.rate-running .r-score{font-size:14px;font-weight:800;color:var(--txt);font-variant-numeric:tabular-nums;min-width:50px;text-align:end}

/* Result screen */
.result-hero{background:linear-gradient(180deg,var(--surf),#000);border:1px solid var(--line);border-radius:16px;padding:24px 18px;text-align:center;margin-bottom:14px;position:relative;overflow:hidden}
.result-hero.strong{background:linear-gradient(180deg,#0E2517,#000);border-color:var(--accent-d)}
.result-hero.caution{background:linear-gradient(180deg,#1F1A0E,#000);border-color:#5A4818}
.result-hero.avoid{background:linear-gradient(180deg,#2A0E10,#000);border-color:var(--loss-d)}
.result-hero .rec-emoji{font-size:38px;margin-bottom:6px;line-height:1}
.result-hero .rec-label{font-size:14.5px;font-weight:800;letter-spacing:.04em;margin-bottom:10px}
.result-hero.strong .rec-label{color:var(--accent)}
.result-hero.caution .rec-label{color:var(--gold)}
.result-hero.avoid .rec-label{color:var(--loss)}
.result-hero .score-big{font-size:44px;font-weight:900;letter-spacing:-1.2px;font-variant-numeric:tabular-nums;line-height:1}
.result-hero.strong .score-big{color:var(--accent)}
.result-hero.caution .score-big{color:var(--gold)}
.result-hero.avoid .score-big{color:var(--loss)}
.result-hero .score-frac{font-size:18px;color:var(--muted2);font-weight:600}
.result-hero .pct{font-size:14px;color:var(--muted);font-weight:700;margin-top:4px;font-variant-numeric:tabular-nums}
.result-hero .ticker-line{font-size:18px;font-weight:800;margin-bottom:14px}

.result-section{margin-bottom:14px;background:#000;border:1px solid var(--line);border-radius:12px;overflow:hidden}
.result-section .head{padding:11px 14px;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.07em;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:7px}
.result-section.strengths .head{color:var(--accent)}
.result-section.weak .head{color:var(--loss)}
.result-section.neutral .head{color:var(--gold)}
.result-section .item{padding:10px 14px;font-size:13px;color:var(--txt2);line-height:1.5;border-bottom:1px solid var(--line);display:flex;align-items:flex-start;gap:9px}
.result-section .item:last-child{border-bottom:none}
.result-section .item .num{flex-shrink:0;font-size:11px;font-weight:800;padding:1px 6px;border-radius:4px;font-variant-numeric:tabular-nums}
.result-section.strengths .item .num{background:var(--accent-bg);color:var(--accent);border:1px solid var(--accent-d)}
.result-section.weak .item .num{background:var(--loss-bg);color:var(--loss);border:1px solid var(--loss-d)}
.result-section.neutral .item .num{background:#1F1A0E;color:var(--gold);border:1px solid #5A4818}

/* Assessment history rows */
.assess-hist-row{padding:13px 14px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:11px;cursor:pointer;transition:.15s}
.assess-hist-row:hover{background:var(--surf)}
.assess-hist-row:last-child{border-bottom:none}
.assess-hist-row .logo{width:38px;height:38px;border-radius:9px;background:#000;border:1px solid var(--line2);object-fit:contain;padding:3px;flex-shrink:0}
.assess-hist-row .logo-fb{width:38px;height:38px;border-radius:9px;display:grid;place-items:center;font-weight:800;font-size:12px;flex-shrink:0;border:1px solid}
.assess-hist-row .info{flex:1;min-width:0}
.assess-hist-row .tic{font-weight:800;font-size:13.5px;color:var(--txt)}
.assess-hist-row .nm{font-size:11px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.assess-hist-row .dt{font-size:10px;color:var(--muted2);margin-top:2px;font-variant-numeric:tabular-nums}
.assess-hist-row .pill{font-size:11px;font-weight:800;padding:4px 9px;border-radius:6px;letter-spacing:.04em;font-variant-numeric:tabular-nums}
.assess-hist-row .pill.strong{background:var(--accent-bg);color:var(--accent);border:1px solid var(--accent-d)}
.assess-hist-row .pill.caution{background:#1F1A0E;color:var(--gold);border:1px solid #5A4818}
.assess-hist-row .pill.avoid{background:var(--loss-bg);color:var(--loss);border:1px solid var(--loss-d)}

/* chart range buttons */
.chart-range-row{display:flex;gap:3px;margin:6px 0 10px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding:0 1px;scrollbar-width:none}
.chart-range-row::-webkit-scrollbar{display:none}
.chart-range-btn{flex-shrink:0;background:transparent;border:1px solid var(--line);color:var(--muted);padding:4px 9px;border-radius:6px;font-size:10.5px;font-weight:700;cursor:pointer;font-family:inherit;letter-spacing:.04em;transition:.15s;font-variant-numeric:tabular-nums}
.chart-range-btn:hover{border-color:var(--line2);color:var(--txt2)}
.chart-range-btn.on{background:var(--accent-bg);border-color:var(--accent-d);color:var(--accent)}

/* cards view */
.cards-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px}
@media (max-width:380px){.cards-grid{grid-template-columns:1fr}}
.card-h{background:var(--surf);border:1px solid var(--line);border-radius:14px;padding:13px;cursor:pointer;transition:.2s;position:relative;overflow:hidden}
.card-h:active{transform:scale(.98)}
.card-h .top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:9px;gap:6px}

/* ════ Storage shim — works in plain browser via localStorage,
        falls back to Claude artifact's window.storage when present ════ */
if (!window.storage) {
  window.storage = {
    async get(key) {
      const v = localStorage.getItem(key);
      return v != null ? { key, value: v } : null;
    },
    async set(key, value) {
      localStorage.setItem(key, value);
      return { key, value };
    },
    async delete(key) {
      localStorage.removeItem(key);
      return { key, deleted: true };
    }
  };
}

/* SHA-256 hash for passwords (browser native crypto) */
async function hashPin(pin){
  if (!pin) return null;
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pin));
  return [...new Uint8Array(buf)].map(b => b.toString(16).padStart(2,'0')).join('');
}

/* snapshot today's portfolio value to history */
function snapshotHistory(){
  if (!settings.activePf) return;
  const t = totals();
  if (!t.mv) return;
  const d = today();
  const key = settings.activePf + ':' + d;
  const i = history.findIndex(x => x.key === key);
  const entry = { key, pfId: settings.activePf, date: d, value: t.mv, deposited: t.deposited, realized: t.realized };
  if (i >= 0) history[i] = entry;
  else history.push(entry);
  history = history.slice(-1000);
}
